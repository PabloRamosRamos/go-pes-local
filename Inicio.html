<script>
  window.GO_PES_INICIO = (() => {
    function render(options) {
      const root = options && options.root;
      const escapeHtml = options && options.escapeHtml;
      const homeEmbedUrl = options && options.homeEmbedUrl;
      const panelData = (options && options.panelData) || {};
      const summary = panelData.summary || {};
      const meta = panelData.meta || {};
      const benefitAlerts = Array.isArray(panelData.alerts) ? panelData.alerts : [];
      const assemblies = Array.isArray(panelData.reminders) ? panelData.reminders : [];

      if (!root || typeof escapeHtml !== 'function') return;

      root.innerHTML = `
        <div class="inicio-shell">
          <div class="section-head inicio-head">
            <div>
              <p class="eyebrow">Modulo 0</p>
              <h2>Inicio</h2>
              <p class="muted">Resumen operativo, alertas reales o derivadas y visualización ejecutiva del sistema.</p>
            </div>
          </div>

          <div class="inicio-layout">
            <aside class="inicio-alerts-panel">
              <div class="inicio-summary-grid">
                ${renderMetric_('Alertas activas', summary.activeAlertsCount || 0, 'warning', escapeHtml)}
                ${renderMetric_('Beneficios a revisar', summary.benefitsToReviewCount || 0, 'handshake', escapeHtml)}
                ${renderMetric_('Próximas asambleas', summary.upcomingAssembliesCount || 0, 'groups', escapeHtml)}
              </div>

              <section class="inicio-card">
                <div class="inicio-card__head">
                  <span class="material-symbols-outlined">notifications_active</span>
                  <div>
                    <h3>Alertas de fechas de beneficios</h3>
                    <p>${escapeHtml(meta.alertsDescription || 'Sin alertas operativas conectadas aún.')}</p>
                  </div>
                </div>
                <div class="inicio-alert-list">
                  ${benefitAlerts.length
                    ? benefitAlerts.map(item => renderAlertItem_(item, escapeHtml)).join('')
                    : renderEmptyAlertState_(meta.alertsEmptyMessage, escapeHtml)}
                </div>
              </section>

              <section class="inicio-card">
                <div class="inicio-card__head">
                  <span class="material-symbols-outlined">groups</span>
                  <div>
                    <h3>Próximas Asambleas</h3>
                    <p>${escapeHtml(meta.remindersDescription || 'Sin agenda conectada aún.')}</p>
                  </div>
                </div>
                <div class="inicio-reminder-list">
                  ${assemblies.length
                    ? assemblies.map(item => renderAssemblyItem_(item, escapeHtml)).join('')
                    : renderEmptyReminderState_(meta.remindersEmptyMessage, escapeHtml)}
                </div>
              </section>
            </aside>

            <section class="inicio-dashboard-panel">
              <div class="inicio-dashboard-head">
                <div>
                  <p class="eyebrow">Dashboard</p>
                  <h3>Panel ejecutivo Looker Studio</h3>
                </div>
                <span class="inicio-dashboard-pill">Embebido</span>
              </div>
              ${homeEmbedUrl
                ? `<iframe class="inicio-dashboard-embed" width="600" height="443" src="${escapeHtml(homeEmbedUrl)}" frameborder="0" style="border:0" allowfullscreen sandbox="allow-storage-access-by-user-activation allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox" loading="lazy" scrolling="no" title="Dashboard Inicio"></iframe>`
                : `<div class="inicio-dashboard-empty"><span class="material-symbols-outlined">insert_chart</span><strong>Dashboard pendiente de configuración</strong><span>Define <code>homeDashboardUrl</code> para mostrar el panel embebido.</span></div>`}
            </section>
          </div>
        </div>
      `;
    }

    function renderMetric_(label, value, icon, escapeHtml) {
      return `
        <div class="inicio-metric">
          <span class="material-symbols-outlined">${escapeHtml(icon)}</span>
          <strong>${escapeHtml(String(value))}</strong>
          <small>${escapeHtml(label)}</small>
        </div>
      `;
    }

    function renderAlertItem_(item, escapeHtml) {
      return `
        <article class="inicio-alert-item inicio-alert-item--${escapeHtml(item.tone || 'info')}">
          <span class="material-symbols-outlined">${escapeHtml(item.icon || 'notifications')}</span>
          <div>
            <small>${escapeHtml(item.status || 'Alerta')}</small>
            <strong>${escapeHtml(item.title || 'Beneficio')}</strong>
            <p>${escapeHtml(buildItemDetail_(item))}</p>
          </div>
        </article>
      `;
    }

    function renderAssemblyItem_(item, escapeHtml) {
      return `
        <article class="inicio-reminder-item">
          <span class="material-symbols-outlined">${escapeHtml(item.icon || 'event')}</span>
          <div>
            ${item.status ? `<small>${escapeHtml(item.status)}</small>` : ''}
            <strong>${escapeHtml(item.title || 'Recordatorio')}</strong>
            <p>${escapeHtml(buildItemDetail_(item))}</p>
          </div>
        </article>
      `;
    }

    function renderEmptyAlertState_(message, escapeHtml) {
      return `
        <article class="inicio-alert-item inicio-alert-item--info">
          <span class="material-symbols-outlined">info</span>
          <div>
            <small>Sin datos operativos</small>
            <strong>Alertas aún no activadas</strong>
            <p>${escapeHtml(message || 'No existen vencimientos con base suficiente para mostrar alertas reales en este momento.')}</p>
          </div>
        </article>
      `;
    }

    function renderEmptyReminderState_(message, escapeHtml) {
      return `
        <article class="inicio-reminder-item">
          <span class="material-symbols-outlined">event_busy</span>
          <div>
            <strong>Sin recordatorios activos</strong>
            <p>${escapeHtml(message || 'No existen asambleas ni recordatorios con soporte suficiente para mostrar agenda real.')}</p>
          </div>
        </article>
      `;
    }

    function buildItemDetail_(item) {
      return [item && item.detail, item && item.note].filter(Boolean).join(' - ');
    }

    return { render };
  })();
</script>
