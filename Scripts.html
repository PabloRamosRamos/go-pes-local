<script>
  function showAppLoading(message) {
    const overlay = document.getElementById('app-loading');
    const text = overlay ? overlay.querySelector('.app-loading__text') : null;
    if (!overlay) return;

    if (text && message) text.textContent = message;
    overlay.classList.remove('is-hidden');
    overlay.style.display = 'flex';
  }

  function hideAppLoading() {
    const overlay = document.getElementById('app-loading');
    if (!overlay) return;
    overlay.classList.add('is-hidden');
    overlay.style.display = 'none';
  }

  function showContentLoading(message) {
    const overlay = document.getElementById('content-loading');
    const text = overlay ? overlay.querySelector('.content-loading__text') : null;
    if (!overlay) return;

    if (text && message) text.textContent = message;
    overlay.classList.remove('is-hidden');
    overlay.style.display = 'flex';
  }

  function hideContentLoading() {
    const overlay = document.getElementById('content-loading');
    if (!overlay) return;
    overlay.classList.add('is-hidden');
    overlay.style.display = 'none';
  }

      { name: 'fecha_postulacion', label: 'Fecha postulación', type: 'date' },

      { name: 'resultado_instrumento', label: 'Resultado', type: 'select', optionsKey: 'resultado_instrumento' },

      { name: 'instrumento_codigo_catalogo', label: 'Instrumento', type: 'select', optionsKey: 'instrumentosCodigo', required: true },
      { name: 'requisito_codigo', label: 'Requisito', type: 'select', optionsKey: 'requisitosDependientes', required: true },
      { name: 'requisito_nombre_libre', label: 'Nombre libre si es otro', type: 'text' },
      { name: 'categoria_requisito', label: 'Categoría', type: 'select', optionsKey: 'requisitoCategorias', required: true },
      { name: 'estado_requisito', label: 'Estado', type: 'select', optionsKey: 'estado_requisito', required: true },
      { name: 'fecha_solicitud', label: 'Fecha solicitud', type: 'date' },
      { name: 'fecha_cumplimiento', label: 'Fecha cumplimiento', type: 'date' },
      { name: 'fecha_vencimiento', label: 'Fecha vencimiento', type: 'date' },
      { name: 'responsable_requisito', label: 'Responsable', type: 'select', optionsKey: 'responsables' },
      { name: 'documento_respaldo_url', label: 'URL respaldo', type: 'text', span: 2 },
      { name: 'observacion_requisito', label: 'Observación', type: 'textarea', span: 2 },
      { name: 'vigente_flag', label: 'Vigente', type: 'select', options: ['Sí', 'No'] }
    ]
  };

  document.addEventListener('DOMContentLoaded', init);

  function init() {
    if (!APP.state.user || !APP.state.user.canAccess) {
      showAccessDenied_();
      hideAppLoading();
      hideContentLoading();
      return;
    }

    bindGlobalNav();
    initSidebarCollapse_();
    hydrateStaticUser();
    hydrateLogo();
    renderQuickActions();
    renderHomeTiles();
    toggleTopQuickActions_(APP.state.activeView);

    showAppLoading('Iniciando Gestor Operativo');

    Promise.resolve().then(() => {
      APP.state.user = BOOTSTRAP.user || APP.state.user;
      APP.state.permissions = BOOTSTRAP.permissions || APP.state.permissions;
      mergeCatalogs_(BOOTSTRAP.catalogs || {});
      hydrateStaticUser();
      applyPermissions();
      route(APP.state.activeView, BOOTSTRAP.query || {});

      if ((BOOTSTRAP.query || {}).solicitud_id || (BOOTSTRAP.query || {}).organizacion_id) {
        loadFicha(BOOTSTRAP.query);
      }

      setStatus('Listo.', null);
    }).catch(err => {
      console.error('Init fatal error:', err);
      setStatus('Ocurrió un error al iniciar la aplicación.', false);
    }).finally(() => {
      setTimeout(() => {
        hideAppLoading();
        hideContentLoading();
      }, 120);
    });
  }

  function showAccessDenied_() {
    const app = document.getElementById('app');
    const detectedEmail = APP.state.user && (APP.state.user.detected_email || APP.state.user.email)
      ? (APP.state.user.detected_email || APP.state.user.email)
      : '';
    const reason = APP.state.user && APP.state.user.reason
      ? APP.state.user.reason
      : 'Usuario no registrado o inactivo.';
    if (!app) return;
    app.innerHTML = `
      <section class="access-denied">
        <div class="access-denied__card">
          <span class="material-symbols-outlined">lock</span>
          <p class="eyebrow">Acceso denegado</p>
          <h1>No tienes acceso a esta aplicación</h1>
          <p>Tu usuario no está registrado o se encuentra inactivo. Contacta al administrador para solicitar acceso.</p>
          <p class="muted"><strong>Correo detectado:</strong> ${escapeHtml(detectedEmail || 'no disponible')}</p>
          <p class="muted"><strong>Motivo:</strong> ${escapeHtml(reason)}</p>
        </div>
      </section>
    `;
  }

  function initSidebarCollapse_() {
    const layout = document.querySelector('.layout');
    const toggle = document.getElementById('sidebar-toggle');
    const icon = document.getElementById('sidebar-toggle-icon');
    const label = document.getElementById('sidebar-toggle-label');
    if (!layout || !toggle) return;

    const applyState = collapsed => {
      layout.classList.toggle('is-sidebar-collapsed', collapsed);
      toggle.setAttribute('aria-expanded', String(!collapsed));
      toggle.setAttribute('aria-label', collapsed ? 'Expandir menú' : 'Contraer menú');
      toggle.title = collapsed ? 'Expandir menú' : 'Contraer menú';
      if (icon) icon.textContent = collapsed ? 'keyboard_double_arrow_right' : 'keyboard_double_arrow_left';
      if (label) label.textContent = 'Modulos';
    };

    let stored = false;
    try {
      stored = localStorage.getItem('goPesSidebarCollapsed') === 'true';
    } catch (err) {
      stored = false;
    }
    applyState(stored);

    toggle.addEventListener('click', () => {
      const collapsed = !layout.classList.contains('is-sidebar-collapsed');
      try {
        localStorage.setItem('goPesSidebarCollapsed', String(collapsed));
      } catch (err) {
        console.warn('No se pudo persistir el estado del menú lateral.', err);
      }
      applyState(collapsed);
    });
  }

  function api(fn, payload) {
    return new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(err => reject(err && err.message ? err.message : err))
        [fn](payload);
    });
  }

  function hydrateLogo() {
    const img = document.getElementById('appLogo');
    if (!img) return;

    const logo =
      (window.GO_PES_TEMPLATE && window.GO_PES_TEMPLATE.logoDataUri) ||
      img.getAttribute('src') ||
      '';

    if (logo) {
      img.src = logo;
      img.style.display = 'block';
    }
  }

  function normalizeCatalogs(c) {
    return {
      ...c,
      estado_hito: (c.estadosPorTipo || {}).estado_hito || [],
      estado_constitucion: (c.estadosPorTipo || {}).estado_constitucion || [],
      estado_general_organizacion: (c.estadosPorTipo || {}).estado_general_organizacion || [],
      estado_instrumento: (c.estadosPorTipo || {}).estado_instrumento || [],
      resultado_instrumento: (c.estadosPorTipo || {}).resultado_instrumento || [],
      estado_requisito: (c.estadosPorTipo || {}).estado_requisito || [],
      estado_vecino: (c.estadosPorTipo || {}).estado_vecino || [],
      instrumentosCodigo: (c.instrumentos || []).map(i => i.instrumento_codigo_catalogo),
      instrumentosTipo: [...new Set((c.instrumentos || []).map(i => i.instrumento_tipo).filter(Boolean))],
      instrumentosOrigen: [...new Set((c.instrumentos || []).map(i => i.origen_instrumento).filter(Boolean))],
      requisitoCategorias: ['legal', 'administrativo', 'financiero', 'documental', 'tecnico', 'otro']
    };
  }

  function mergeCatalogs_(catalogs) {
    APP.state.catalogs = normalizeCatalogs({
      ...(APP.state.catalogs || {}),
      ...(catalogs || {})
    });
  }

  function ensureIngresoCatalogs_() {
    if (APP.state.catalogStatus.ingreso) return null;

    return api('getCatalogosNuevoIngresoClient').then(data => {
      mergeCatalogs_(data || {});
      APP.state.catalogStatus.ingreso = true;
    });
  }

  function ensureAppCatalogs_() {
    if (APP.state.catalogStatus.app) return null;

    return api('getCatalogosAppClient').then(data => {
      mergeCatalogs_(data || {});
      APP.state.catalogStatus.app = true;
    });
  }

  function ensureOrganizacionCatalogs_() {
    if (APP.state.catalogStatus.organizacion) return null;

    return api('getOrganizacionesModuloClient').then(data => {
      APP.state.organizacionesModulo = (data && data.organizaciones) || [];
      APP.state.organizacionesModuloFetchedAt = Date.now();
      mergeCatalogs_({
        organizacionesList: APP.state.organizacionesModulo
      });
      APP.state.catalogStatus.organizacion = true;
    });
  }

  function ensureSociosCatalogs_() {
    const now = Date.now();
    if (
      APP.state.sociosOrganizaciones.length &&
      APP.state.sociosOrganizacionesFetchedAt &&
      (now - APP.state.sociosOrganizacionesFetchedAt) < 30000
    ) {
      return Promise.resolve();
    }

    return api('getOrganizacionesAvanceClient').then(data => {
      APP.state.sociosOrganizaciones = (data && data.organizacionesList) || [];
      APP.state.sociosOrganizacionesFetchedAt = Date.now();
    });
  }

  function ensureOrganizacionesModuloList_() {
    const now = Date.now();
    if (
      APP.state.organizacionesModulo.length &&
      APP.state.organizacionesModuloFetchedAt &&
      (now - APP.state.organizacionesModuloFetchedAt) < 30000
    ) {
      return Promise.resolve();
    }

    return api('getOrganizacionesModuloClient').then(data => {
      APP.state.organizacionesModulo = (data && data.organizaciones) || [];
      APP.state.organizacionesModuloFetchedAt = Date.now();
    });
  }

  function ensureCatalogsForView_(view) {
    switch (view) {
      case 'nuevo-ingreso':
        return ensureIngresoCatalogs_();
      case 'organizacion': {
        const pending = [ensureAppCatalogs_(), ensureOrganizacionesModuloList_()].filter(Boolean);
        return pending.length ? Promise.all(pending) : null;
      }
      case 'instrumento':
      case 'requisito': {
        const pending = [ensureAppCatalogs_()].filter(Boolean);
        return pending.length ? Promise.all(pending) : null;
      }
      case 'socios':
        return ensureSociosCatalogs_();
      default:
        return null;
    }
  }

  function hydrateStaticUser() {
    const user = APP.state.user || {};
    const userName = document.getElementById('user-name');
    const userRole = document.getElementById('user-role');
    const badgeUser = document.getElementById('ingreso-current-user');
    const resetBtn = document.getElementById('admin-reset-open-btn');

    if (userName) userName.textContent = user.nombre_visible || user.email || 'Usuario';
    if (userRole) userRole.textContent = user.roleLabel || user.perfil || 'Sin perfil';
    if (badgeUser) badgeUser.textContent = user.nombre_visible || user.email || 'Usuario activo';
    if (resetBtn) {
      resetBtn.classList.toggle('is-visible', !!APP.state.permissions.canResetData);
      resetBtn.classList.toggle('is-hidden', !APP.state.permissions.canResetData);
    }
  }

  function bindGlobalNav() {
    document.querySelectorAll('[data-view]').forEach(btn =>
      btn.addEventListener('click', () => {
        const view = btn.dataset.view;
        if (!canOpenView_(view)) {
          showError('No tienes permisos para acceder a este módulo.');
          return;
        }
        route(view);
      })
    );

    const searchBtn = document.getElementById('search-btn');
    const saveUserBtn = document.getElementById('save-user-btn');
    const sociosValidateBtn = document.getElementById('socios-validate-btn');
    const sociosSaveBtn = document.getElementById('socios-save-btn');
    const adminResetOpenBtn = document.getElementById('admin-reset-open-btn');
    const adminResetForm = document.getElementById('admin-reset-form');
    const userEditForm = document.getElementById('user-edit-form');
    const userDeleteForm = document.getElementById('user-delete-form');

    if (searchBtn) searchBtn.addEventListener('click', runSearch);
    if (saveUserBtn) saveUserBtn.addEventListener('click', saveUserFromForm);
    if (sociosValidateBtn) sociosValidateBtn.addEventListener('click', validateSociosInput);
    if (sociosSaveBtn) sociosSaveBtn.addEventListener('click', saveSociosInput);
    if (adminResetOpenBtn) adminResetOpenBtn.addEventListener('click', openAdminResetModal_);
    if (adminResetForm) adminResetForm.addEventListener('submit', submitAdminReset_);
    if (userEditForm) userEditForm.addEventListener('submit', saveUserEditModal_);
    if (userDeleteForm) userDeleteForm.addEventListener('submit', confirmDeactivateUser_);
    document.querySelectorAll('[data-admin-reset-close]').forEach(btn => {
      btn.addEventListener('click', closeAdminResetModal_);
    });
    document.querySelectorAll('[data-user-edit-close]').forEach(btn => {
      btn.addEventListener('click', closeUserEditModal_);
    });
    document.querySelectorAll('[data-user-delete-close]').forEach(btn => {
      btn.addEventListener('click', closeUserDeleteModal_);
    });
  }

  function renderQuickActions() {
    const container = document.getElementById('quick-actions');
    if (!container) return;

    const items = [
      ['person_add', 'Nuevo ingreso', 'Registrar un nuevo vecino o solicitud', 'nuevo-ingreso'],
      ['search', 'Buscar vecino', 'Encontrar vecinos, solicitudes u organizaciones', 'buscar'],
      ['event_note', 'Avance', 'Registrar hitos y controlar el proceso de constitución', 'seguimiento'],
      ['groups', 'Organizaciones', 'Consultar y administrar organizaciones', 'organizacion'],
      ['badge', 'Socios', 'Visualización y carga de socios', 'socios'],
      ['handshake', 'Gestionar instrumentos', 'Beneficios, fondos e instrumentos', 'instrumento'],
      ['inventory_2', 'Registrar requisitos', 'Control documental por instrumento', 'requisito']
    ];

    container.innerHTML = items.filter(item => canOpenView_(item[3])).map(item => `
      <button class="quick-card" data-view="${item[3]}">
        <span class="material-symbols-outlined">${item[0]}</span>
        <h3>${item[1]}</h3>
        <p>${item[2]}</p>
      </button>
    `).join('');

    container.querySelectorAll('.quick-card').forEach(btn =>
      btn.addEventListener('click', () => route(btn.dataset.view))
    );
  }

  function renderHomeTiles() {
    const container = document.getElementById('home-tiles');
    if (!container) return;

    const tiles = [
      ['Nuevo ingreso', 'Registrar la solicitud inicial del vecino.', 'person_add', 'nuevo-ingreso'],
      ['Avance', 'Registrar hitos del proceso de constitución.', 'event_note', 'seguimiento'],
      ['Organizaciones', 'Consultar y administrar organizaciones.', 'groups', 'organizacion'],
      ['Socios', 'Visualización y carga manual o masiva.', 'badge', 'socios'],
      ['Instrumentos', 'Gestionar beneficios, fondos y otros apoyos.', 'handshake', 'instrumento'],
      ['Requisitos', 'Registrar o validar documentación.', 'inventory_2', 'requisito']
    ];

    container.innerHTML = tiles.filter(([, , , view]) => canOpenView_(view)).map(([title, text, icon, view]) => `
      <button class="tile" data-view="${view}">
        <span class="material-symbols-outlined">${icon}</span>
        <h3>${title}</h3>
        <p>${text}</p>
      </button>
    `).join('');

    container.querySelectorAll('.tile').forEach(btn =>
      btn.addEventListener('click', () => route(btn.dataset.view))
    );
  }

  function ensureViewRendered_(view) {
    if (APP.state.renderedViews[view]) return;

    switch (view) {
      case 'nuevo-ingreso':
        renderIngresoForm();
        APP.state.renderedViews[view] = true;
        break;
      case 'seguimiento':
        renderAvanceView_();
        APP.state.renderedViews[view] = true;
        break;
      case 'organizacion':
        renderOrganizacionesView_();
        APP.state.renderedViews[view] = true;
        break;
      case 'instrumento':
        buildForm('form-instrumento', FORM_SCHEMAS.instrumento, saveInstrumentoFromForm);
        APP.state.renderedViews[view] = true;
        break;
      case 'requisito':
        buildForm('form-requisito', FORM_SCHEMAS.requisito, saveRequisitoFromForm);
        APP.state.renderedViews[view] = true;
        break;
      case 'socios':
        renderSociosView_();
        APP.state.renderedViews[view] = true;
        break;
      default:
        break;
    }
  }

  function arrangeOrganizacionFormLayout_() {
    const form = document.getElementById('form-organizacion');
    if (!form || form.dataset.layoutReady === 'true') return;

    form.dataset.layoutReady = 'true';
    form.classList.add('form-grid--organizacion');

    const orgSelectField = form.querySelector('[name="organizacion_id"]')?.closest('.field');
    const imageField = form.querySelector('[data-image-field="imagen_logo_base64"]')?.closest('.field');

    if (orgSelectField) orgSelectField.classList.add('field--org-selector');
    if (imageField) imageField.classList.add('field--org-image');
  }

  function renderIngresoForm() {
    const form = document.getElementById('form-ingreso');
    if (!form || form.dataset.initialized === 'true') return;

    form.dataset.initialized = 'true';
    form.addEventListener('submit', saveIngresoFromForm);

    fillSelect(document.getElementById('ing-uv'), APP.state.catalogs.uvList || [], 'Seleccionar UV');
    fillSelect(document.getElementById('ing-sector'), [], 'Seleccionar sector');
    fillSelect(document.getElementById('ing-tipo_vivienda'), APP.state.catalogs.tipoVivienda || [], 'Seleccionar tipo de vivienda');
    fillSelect(document.getElementById('ing-medio_solicitud'), APP.state.catalogs.medioSolicitud || [], 'Seleccionar medio');
    fillSelect(document.getElementById('ing-unidad_origen'), APP.state.catalogs.unidadOrigen || [], 'Seleccionar unidad');

    const fechaInput = document.getElementById('ing-fecha_solicitud');
    if (fechaInput && !fechaInput.value) fechaInput.value = todayISO_();

    const uvSelect = document.getElementById('ing-uv');
    const reviewBtn = document.getElementById('ingreso-review-btn');
    const clearBtn = document.getElementById('ingreso-clear-btn');

    if (uvSelect) uvSelect.addEventListener('change', syncIngresoSectorOptions);
    if (reviewBtn) reviewBtn.addEventListener('click', reviewIngresoMatches);
    if (clearBtn) clearBtn.addEventListener('click', clearIngresoForm);

    form.querySelectorAll('input, textarea, select').forEach(el => {
      el.addEventListener('input', renderIngresoPreview);
      el.addEventListener('change', renderIngresoPreview);
      el.addEventListener('blur', () => validateIngresoField(el));
    });

    syncIngresoSectorOptions();
    renderIngresoPreview();
  }

  function buildForm(formId, schema, submitHandler) {
    const form = document.getElementById(formId);
    if (!form || form.dataset.initialized === 'true') return;

    form.dataset.initialized = 'true';
    form.innerHTML = schema.map(f => fieldTemplate(f)).join('') + `
      <div class="field" data-span="2">
        <div class="actions">
          <button type="submit" class="primary-btn">
            <span class="material-symbols-outlined">save</span>Guardar
          </button>
        </div>
      </div>
    `;

    form.addEventListener('submit', submitHandler);
    populateSelectsInForm_(form);

    form.querySelectorAll('select[data-options-key="sectorByUv"]').forEach(select => syncSectorOptions(select));
    form.querySelectorAll('select[data-options-key="requisitosDependientes"]').forEach(select => syncRequisitoOptions(select));

    form.querySelectorAll('select[name="uv"]').forEach(select =>
      select.addEventListener('change', () => {
        const sectorSelect = form.querySelector('select[name="sector"]');
        if (sectorSelect) syncSectorOptions(sectorSelect, select.value);
      })
    );

    form.querySelectorAll('select[name="instrumento_codigo_catalogo"]').forEach(select =>
      select.addEventListener('change', () => {
        const reqSelect = form.querySelector('select[name="requisito_codigo"]');
        if (reqSelect) syncRequisitoOptions(reqSelect, select.value);
      })
    );
  }

  function populateSelectsInForm_(form) {
    form.querySelectorAll('select').forEach(select => {
      const key = select.dataset.optionsKey;
      if (key === 'sectorByUv' || key === 'requisitosDependientes') return;

      let options = [];
      if (key && APP.state.catalogs[key]) {
        options = APP.state.catalogs[key];
      } else {
        const schemaField = [...Object.values(FORM_SCHEMAS).flat()].find(f => f.name === select.name);
        if (schemaField && schemaField.options) options = schemaField.options;
      }

      fillSelect(select, options);
    });
  }

  function fieldTemplate(field) {
    const spanAttr = field.span === 2 ? ' data-span="2"' : '';
    const requiredAttr = field.required ? ' required' : '';

    if (field.type === 'hidden') {
      return `<input name="${field.name}" type="hidden">`;
    }

    if (field.type === 'image_upload_top') {
      return `
        <div class="field field--image-top"${spanAttr}>
          <label>${field.label}</label>
          <div class="image-upload image-upload--top" data-image-field="${field.name}">
            <input type="hidden" name="${field.name}" value="">
            <input type="file" class="image-upload__file" accept="image/*" hidden>
            <div class="image-upload__preview image-upload__preview--top empty-state">Sin imagen</div>
            <div class="image-upload__actions image-upload__actions--stack">
              <button type="button" class="secondary-btn" data-org-image-action="upload">
                <span class="material-symbols-outlined">upload</span>Subir imagen
              </button>
              <button type="button" class="secondary-btn" data-org-image-action="remove">
                <span class="material-symbols-outlined">delete</span>Eliminar
              </button>
            </div>
          </div>
        </div>
      `;
    }

    if (field.type === 'textarea') {
      return `<div class="field"${spanAttr}><label>${field.label}</label><textarea name="${field.name}"${requiredAttr}></textarea></div>`;
    }

    if (field.type === 'select') {
      return `<div class="field"${spanAttr}><label>${field.label}</label><select name="${field.name}" data-options-key="${field.optionsKey || ''}"${requiredAttr}></select></div>`;
    }

    return `<div class="field"${spanAttr}><label>${field.label}</label><input name="${field.name}" type="${field.type || 'text'}"${requiredAttr}></div>`;
  }

  function fillSelect(select, options, placeholder = 'Seleccionar') {
    if (!select) return;

    select.innerHTML = `<option value="">${placeholder}</option>` + (options || []).map(opt => {
      const value = typeof opt === 'string'
        ? opt
        : (opt.value || opt.codigo || opt.requisito_codigo || opt.instrumento_codigo_catalogo || '');
      const label = typeof opt === 'string'
        ? opt
        : (opt.label || opt.descripcion || opt.nombre || opt.requisito_nombre || opt.instrumento_nombre || opt.requisito_codigo || value);

      return `<option value="${escapeHtml(value)}">${escapeHtml(label)}</option>`;
    }).join('');
  }

  function syncSectorOptions(select, uvValue) {
    const uv = uvValue || select.form.querySelector('select[name="uv"]')?.value || '';
    const map = APP.state.catalogs.sectorByUv || {};
    const options = uv ? (map[uv] || []) : [];
    fillSelect(select, [...new Set(options)].sort(), uv ? 'Seleccionar sector' : 'Selecciona UV primero');
  }

  function syncIngresoSectorOptions() {
    const uvSelect = document.getElementById('ing-uv');
    const uv = uvSelect ? uvSelect.value : '';
    const sectors = uv ? (APP.state.catalogs.sectorByUv?.[uv] || []) : [];
    fillSelect(document.getElementById('ing-sector'), sectors, uv ? 'Seleccionar sector' : 'Selecciona UV primero');
  }

  function syncRequisitoOptions(select, instrumentoValue) {
    const instrumento = instrumentoValue || select.form.querySelector('select[name="instrumento_codigo_catalogo"]')?.value || '';
    const list = instrumento ? (APP.state.catalogs.requisitosPorInstrumento?.[instrumento] || []) : [];
    fillSelect(
      select,
      list.map(x => ({
        value: x.requisito_codigo,
        label: `${x.requisito_nombre} (${x.requisito_codigo})`
      })),
      instrumento ? 'Seleccionar requisito' : 'Selecciona instrumento primero'
    );
  }

  function applyPermissions() {
    document.querySelectorAll('[data-view]').forEach(el => {
      const view = el.dataset.view;
      const allowed = canOpenView_(view);
      el.classList.toggle('is-hidden', !allowed);
      el.setAttribute('aria-hidden', allowed ? 'false' : 'true');
    });

    document.querySelectorAll('.is-admin').forEach(el => {
      el.classList.toggle('show-admin', !!APP.state.permissions.canManageUsers);
    });

    const resetBtn = document.getElementById('admin-reset-open-btn');
    if (resetBtn) {
      resetBtn.classList.toggle('is-visible', !!APP.state.permissions.canResetData);
      resetBtn.classList.toggle('is-hidden', !APP.state.permissions.canResetData);
    }

    const usersView = document.getElementById('view-usuarios');
    if (usersView && !APP.state.permissions.canManageUsers) {
      usersView.innerHTML = '<div class="empty-state">No tienes permisos para administrar usuarios.</div>';
    }

    fillSelect(document.getElementById('user-role-input'), ['operador', 'coordinador', 'administrador', 'superuser']);
    fillSelect(document.getElementById('user-edit-role-input'), ['operador', 'coordinador', 'administrador', 'superuser']);
    renderUserModuleOptions_();
  }

  function canOpenView_(view) {
    if (!APP.state.user || !APP.state.user.canAccess) return false;
    if (!view) return false;
    if (view === 'usuarios') return !!APP.state.permissions.canManageUsers;
    if (view === 'ficha') return !!((APP.state.permissions.modules || {}).ficha);
    return !!((APP.state.permissions.modules || {})[view]);
  }

  function renderUserModuleOptions_(selectedModules, targetId) {
    const root = document.getElementById(targetId || 'user-modules-input');
    if (!root) return;
    const selected = Array.isArray(selectedModules)
      ? selectedModules
      : String(selectedModules || '').split(',').map(x => x.trim()).filter(Boolean);
    const defs = (APP.state.moduleDefinitions || []).filter(m => m.key !== 'usuarios' && m.key !== 'ficha');
    root.innerHTML = defs.map(m => `
      <label class="module-check">
        <input type="checkbox" value="${escapeHtml(m.key)}" ${selected.includes(m.key) ? 'checked' : ''}>
        <span>${escapeHtml(m.label || m.key)}</span>
      </label>
    `).join('');
  }

  function openAdminResetModal_() {
    if (!APP.state.permissions.canResetData) {
      showError('Solo un SUPERUSER puede limpiar datos de prueba.');
      return;
    }

    const modal = document.getElementById('admin-reset-modal');
    const form = document.getElementById('admin-reset-form');
    if (form) form.reset();
    if (modal) {
      modal.classList.remove('is-hidden');
      modal.setAttribute('aria-hidden', 'false');
    }
    setTimeout(() => document.getElementById('admin-reset-pin')?.focus(), 20);
  }

  function closeAdminResetModal_() {
    const modal = document.getElementById('admin-reset-modal');
    if (!modal) return;
    modal.classList.add('is-hidden');
    modal.setAttribute('aria-hidden', 'true');
  }

  function submitAdminReset_(ev) {
    ev.preventDefault();
    if (!APP.state.permissions.canResetData) {
      showError('Solo un SUPERUSER puede limpiar datos de prueba.');
      return;
    }

    const pin = String(document.getElementById('admin-reset-pin')?.value || '').trim();
    const confirmacion = String(document.getElementById('admin-reset-confirm')?.value || '').trim();

    if (!pin) {
      showError('Debes ingresar el PIN de seguridad.');
      return;
    }

    if (confirmacion.toUpperCase() !== 'LIMPIAR') {
      showError('Debes escribir LIMPIAR para confirmar.');
      return;
    }

    showContentLoading('Limpiando datos de prueba...');
    api('limpiarDatosPruebaAdmin', { pin, confirmacion }).then(res => {
      closeAdminResetModal_();
      const totalRows = (res.cleared || []).reduce((sum, item) => sum + Number(item.rows_cleared || 0), 0);
      showSuccess(`Datos de prueba limpiados. Hojas: ${(res.cleared || []).length}. Filas: ${totalRows}.`);
      APP.state.catalogStatus = { app: false, ingreso: false, organizacion: false };
      APP.state.currentFicha = null;
      APP.state.currentAvance = null;
      APP.state.avanceCatalogos = null;
      APP.state.avanceGrupos = [];
      APP.state.avanceGruposFetchedAt = 0;
      APP.state.avanceOrganizaciones = [];
      APP.state.avanceOrganizacionesFetchedAt = 0;
      APP.state.organizacionesModulo = [];
      APP.state.organizacionesModuloFetchedAt = 0;
      APP.state.sociosOrganizaciones = [];
      APP.state.sociosOrganizacionesFetchedAt = 0;
      APP.state.renderedViews = {};
      route('inicio');
    }).catch(showError).finally(() => {
      hideContentLoading();
    });
  }

  function toggleTopQuickActions_(view) {
    const quick = document.getElementById('quick-actions');
    if (!quick) return;
    quick.style.display = view === 'inicio' ? 'grid' : 'none';
  }

  function route(view, params = {}) {
    if (!canOpenView_(view)) {
      showError('No tienes permisos para acceder a este módulo.');
      view = getFirstAllowedViewClient_();
      if (!view || !canOpenView_(view)) return;
    }

    APP.state.activeView = view;
    const wasRendered = !!APP.state.renderedViews[view];

    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(`view-${view}`)?.classList.add('active');

    document.querySelectorAll('.nav-btn').forEach(btn =>
      btn.classList.toggle('is-active', btn.dataset.view === view)
    );

    toggleTopQuickActions_(view);
    const finalizeRoute = () => {
      hideContentLoading();
      ensureViewRendered_(view);

      if (view === 'ficha' && APP.state.currentFicha && APP.state.currentFicha.summary) {
        renderFicha(APP.state.currentFicha);
      }

      if (view === 'seguimiento' && wasRendered) {
        refreshAvanceViewOnRoute_();
      }

      if (view === 'organizacion' && wasRendered) {
        refreshOrganizacionesModuloList_();
      }

      if (view === 'socios' && wasRendered) {
        refreshSociosComites_();
      }

      if (view === 'historial') loadHistorial();
      if (view === 'usuarios' && APP.state.permissions.canManageUsers) loadUsers();
      if (view === 'nuevo-ingreso') {
        renderNuevoIngresoView_();
      }

      setStatus(`Vista actual: ${friendlyViewName_(view)}`);
    };

    const catalogPromise = ensureCatalogsForView_(view);
    if (catalogPromise) {
      showContentLoading(view === 'socios' ? 'Cargando socios' : `Cargando ${friendlyViewName_(view)}...`);
      catalogPromise.then(finalizeRoute).catch(showError).finally(hideContentLoading);
      return;
    }

    finalizeRoute();
  }

    const query = document.getElementById('search-query')?.value.trim() || '';

    if (tbody) {
      tbody.innerHTML = '<tr><td colspan="6" class="muted">Buscando...</td></tr>';
    }

    api('buscarVecino', query).then(rows => {
      APP.state.currentSearchResults = Array.isArray(rows) ? rows : [];

      setStatus(`Resultados búsqueda: ${APP.state.currentSearchResults.length}`, true);

      if (!tbody) return;

      if (!APP.state.currentSearchResults.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="muted">No se encontraron resultados.</td></tr>';
        return;
      }

      tbody.innerHTML = APP.state.currentSearchResults.map(r => `
        <tr>
          <td>${escapeHtml(r.solicitud_id || '')}</td>
          <td>${escapeHtml(r.nombre_completo || '')}</td>
          <td>${escapeHtml(r.direccion_original || '')}</td>

  function loadFicha(params) {
    APP.state.currentFicha = null;

    const container = document.getElementById('ficha-container');
    if (container) {
      container.innerHTML = '<div class="empty-state">Cargando ficha...</div>';
    }

    route('ficha');
    showContentLoading('Cargando ficha...');

    api('obtenerFicha', params).then(data => {
      if (!data || !data.summary) {
        throw new Error('La ficha no devolvió datos válidos.');
      }

      APP.state.currentFicha = data;
      renderFicha(data);
      setStatus('Ficha cargada correctamente.', true);
    }).catch(err => {
      if (container) {
        container.innerHTML = '<div class="empty-state">No fue posible cargar la ficha.</div>';
      }
      showError(err);
    }).finally(() => {
      hideContentLoading();
    });
  }

  function fichaBlock(icon, title, items) {

      <div class="ficha-block">

  function getFirstAllowedViewClient_() {
    const modules = APP.state.permissions.modules || {};
    const priority = [
      'inicio',
      'nuevo-ingreso',
      'buscar',
      'seguimiento',
      'organizacion',
      'socios',
      'instrumento',
      'requisito',
      'historial',
      'usuarios'
    ];
    return priority.find(view => modules[view]) || '';
  }

  function formatOrganizacionAntiguedad_(value) {
    const date = parseDateForAge_(value);
    if (!date) return 'Sin antigüedad disponible';

    const today = new Date();
    const diffMs = today.getTime() - date.getTime();
    const totalDays = Math.max(0, Math.floor(diffMs / 86400000));
    const totalMonths = Math.floor(totalDays / 30);
    const years = Math.floor(totalMonths / 12);
    const months = totalMonths % 12;
    const days = totalDays % 30;

    const yearText = `${years} ${years === 1 ? 'Año' : 'Años'}`;
    const monthText = `${months} ${months === 1 ? 'Mes' : 'Meses'}`;
    const dayText = `${days} ${days === 1 ? 'día' : 'días'}`;

    if (years > 0) {
      return `${yearText}, ${monthText} y ${dayText}`;
    }

    if (months > 0) {
      return `${monthText} y ${dayText}`;
    }

    return dayText;
  }

  function parseDateForAge_(value) {
    if (!value) return null;
    const raw = String(value).trim();
    if (!raw) return null;

    const iso = raw.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (iso) {
      const d = new Date(Number(iso[1]), Number(iso[2]) - 1, Number(iso[3]));
      return isNaN(d.getTime()) ? null : d;
    }

    const d = new Date(raw);
    return isNaN(d.getTime()) ? null : d;
  }

  function formatFechaHoraUi_(value) {
    if (!value) return '';

    if (value instanceof Date && !isNaN(value.getTime())) {
      const dd = `${value.getDate()}`.padStart(2, '0');
      const mm = `${value.getMonth() + 1}`.padStart(2, '0');
      const yyyy = value.getFullYear();
      const hh = `${value.getHours()}`.padStart(2, '0');
      const min = `${value.getMinutes()}`.padStart(2, '0');
      return `${dd}-${mm}-${yyyy} ${hh}:${min}`;
    }

    const raw = String(value || '').trim();
    if (!raw) return '';

    const isoDateTime = raw.match(/^(\d{4})-(\d{2})-(\d{2})[T\s](\d{2}):(\d{2})(?::\d{2})?/);
    if (isoDateTime) {
      return `${isoDateTime[3]}-${isoDateTime[2]}-${isoDateTime[1]} ${isoDateTime[4]}:${isoDateTime[5]}`;
    }

    const isoDate = raw.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if (isoDate) {
      return `${isoDate[3]}-${isoDate[2]}-${isoDate[1]}`;
    }

    return raw.replace('T', ' ');
  }

  function formatUiValue_(value) {
    if (value instanceof Date) return formatFechaHoraUi_(value);
    const raw = String(value == null ? '' : value);
    return /^\d{4}-\d{2}-\d{2}(?:[T\s]\d{2}:\d{2})?/.test(raw.trim())
      ? formatFechaHoraUi_(raw)
      : raw;
  }

  function serializeForm(form) {
    const fd = new FormData(form);
    const out = {};
    fd.forEach((v, k) => out[k] = v);
    return out;
  }

  function getIngresoPayload() {
    return serializeForm(document.getElementById('form-ingreso'));
  }

    if (!preview) return;

      {
        title: 'Vecino',
        items: [

  function validateIngresoField(el) {
    if (!el) return true;

    el.setCustomValidity('');
    const value = String(el.value || '').trim();

    if (el.required && !value) el.setCustomValidity('Este campo es obligatorio.');
    if (el.name === 'correo_contacto' && value && !/^\S+@\S+\.\S+$/.test(value)) {
      el.setCustomValidity('Ingresa un correo válido.');
    }
    if (el.name === 'telefono_contacto' && value && value.replace(/\D/g, '').length < 8) {
      el.setCustomValidity('Ingresa un teléfono válido.');
    }
    if (el.name === 'rut_vecino' && value && !/^[0-9.]+-[0-9kK]$/.test(value)) {
      el.setCustomValidity('Usa formato 12.345.678-9 o 12345678-9.');
    }

    el.reportValidity();
    return !el.validationMessage;
  }

  function validateIngresoForm() {
    const form = document.getElementById('form-ingreso');
    let ok = true;

    form.querySelectorAll('input, textarea, select').forEach(el => {
      if (!validateIngresoField(el)) ok = false;
    });

    return ok;
  }

  function saveIngresoFromForm(ev) {
    ev.preventDefault();

    if (!validateIngresoForm()) {
      return showError('Revisa los campos obligatorios antes de guardar.');
    }

    const payload = getIngresoPayload();

    payload.nombre_vecino = String(payload.nombre_vecino || '').trim();
    payload.apellido_vecino = String(payload.apellido_vecino || '').trim();
    payload.rut_vecino = String(payload.rut_vecino || '').trim();
    payload.telefono_contacto = String(payload.telefono_contacto || '').trim();
    payload.correo_contacto = String(payload.correo_contacto || '').trim();
    payload.direccion_original = String(payload.direccion_original || '').trim();
    payload.uv = String(payload.uv || '').trim();
    payload.sector = String(payload.sector || '').trim();
    payload.tipo_vivienda = String(payload.tipo_vivienda || '').trim();
    payload.fecha_solicitud = String(payload.fecha_solicitud || '').trim();
    payload.medio_solicitud = String(payload.medio_solicitud || '').trim();
    payload.unidad_origen = String(payload.unidad_origen || '').trim();
    payload.requerimiento_inicial = String(payload.requerimiento_inicial || '').trim();
    payload.observaciones_form = String(payload.observaciones_form || '').trim();

    const btn = ev.submitter || document.querySelector('#form-ingreso button[type="submit"], #form-ingreso .primary-btn');
    if (btn) {
      btn.disabled = true;
      btn.dataset.originalText = btn.innerHTML;
      btn.innerHTML = '<span class="material-symbols-outlined">progress_activity</span>Guardando...';
    }

    const proceed = () => {
      api('guardarIngreso', payload).then(res => {
        showSuccess(`Solicitud guardada: ${res.solicitud_id}`);
        clearIngresoForm(false);
        loadFicha({ solicitud_id: res.solicitud_id, organizacion_id: '' });
      }).catch(showError).finally(() => {
        if (btn) {
          btn.disabled = false;
          btn.innerHTML = btn.dataset.originalText || 'Guardar solicitud';
        }
      });
    };

    if (APP.state.ingresoMatches && APP.state.ingresoMatches.length) {
      const ok = window.confirm('Se detectaron coincidencias posibles. ¿Deseas guardar igualmente la nueva solicitud?');
      if (!ok) {
        if (btn) {
          btn.disabled = false;
          btn.innerHTML = btn.dataset.originalText || 'Guardar solicitud';
        }
        return;
      }
    }

    proceed();
  }

  function clearIngresoForm(showMessage = true) {
    const form = document.getElementById('form-ingreso');
    if (!form) return;

    form.reset();

    const fecha = document.getElementById('ing-fecha_solicitud');

    syncIngresoSectorOptions();
    renderIngresoPreview();

    const matches = document.getElementById('ingreso-matches');
    if (matches) {
      matches.innerHTML = 'Puedes revisar coincidencias por nombre, teléfono o dirección antes de crear la solicitud.';
      matches.className = 'ingreso-matches empty-state';
    }

    if (showMessage) showSuccess('Formulario limpio.');
  }

  function reviewIngresoMatches() {
    const payload = getIngresoPayload();
    const queries = [
      payload.telefono_contacto,
      payload.direccion_original,
      buildFullName(payload.nombre_vecino, payload.apellido_vecino)
    ].map(v => String(v || '').trim()).filter(Boolean);

    if (!queries.length) {
      showError('Completa al menos nombre, teléfono o dirección para revisar coincidencias.');
      return;
    }

    api('buscarCoincidenciasIngreso', payload).then(rows => {
      const matches = Array.isArray(rows) ? rows.slice(0, 10) : [];

      APP.state.ingresoMatches = matches;
      renderIngresoMatches(matches);

      if (matches.length) {
        showError('Se detectaron coincidencias posibles. Revisa antes de guardar.');
      } else {
        showSuccess('No se detectaron coincidencias evidentes. Puedes continuar.');
      }
    }).catch(showError);
  }

  function renderIngresoMatches(rows) {
    const el = document.getElementById('ingreso-matches');
    if (!el) return;

    if (!rows || !rows.length) {
      el.className = 'ingreso-matches empty-state';
      el.innerHTML = '<div class="empty-state">No se detectaron coincidencias con nombre, teléfono o dirección.</div>';
      return;
    }

    el.className = 'ingreso-matches';
    el.innerHTML = `<div class="matches-list">${rows.map(r => `
      <div class="match-card">
        <h4>${escapeHtml(r.nombre_completo || 'Vecino registrado')}</h4>

    form.reset();

      setFormFieldValue_(el, data[el.name] !== undefined ? data[el.name] : '');
    });
    const uv = form.querySelector('select[name="uv"]');
    const sector = form.querySelector('select[name="sector"]');
    if (uv && sector) {
      syncSectorOptions(sector, uv.value);
      if (data.sector) sector.value = data.sector;

    const socioId = String(document.getElementById('org-socio-cargo-id')?.value || '').trim();

  function parseSociosBulk(text, organizacionId, nombreComite) {
    const lines = text.split(/\r?\n/).map(x => x.trim()).filter(Boolean);
    return lines.map(line => {
      const parts = line.includes('\t') ? line.split('\t') : line.split(',');
      return {
        organizacion_id: organizacionId,
        run_socio: parts[0] || '',
        numero_registro: parts[1] || '',
        nombre_socio: parts[2] || '',
        edad: parts[3] || '',
        cargo: parts[4] || '',
        direccion_socio: parts[5] || '',
        ubicacion_socio: parts[6] || '',
        nombre_comite_origen: nombreComite || ''
      };
    }).filter(row => String(row.run_socio || '').toLowerCase() !== 'run_socio');
  }

  function validateSociosInput() {
    const selected = getSelectedSociosOrganizacion_('socios-bulk-organizacion');
    const text = document.getElementById('socios-bulk')?.value || '';
    const rows = parseSociosBulk(text, selected.organizacionId, selected.nombreComite);

    if (!selected.organizacionId) {
      showError('Debes seleccionar un comité.');
      return;
    }

    if (!rows.length) {
      showError('No hay filas para validar.');
      return;
    }

    const html = `<div class="panel"><h3>Vista previa</h3><p class="muted">Filas detectadas: ${rows.length}</p><div class="table-wrap"><table class="data-table"><thead><tr><th>RUN</th><th>Registro</th><th>Nombre</th><th>Cargo</th></tr></thead><tbody>${rows.slice(0, 20).map(r => `<tr><td>${escapeHtml(r.run_socio)}</td><td>${escapeHtml(r.numero_registro)}</td><td>${escapeHtml(r.nombre_socio)}</td><td>${escapeHtml(r.cargo)}</td></tr>`).join('')}</tbody></table></div></div>`;
    document.getElementById('socios-preview').innerHTML = html;
    APP.state.pendingSociosRows = rows;
    showSuccess('Carga validada visualmente. Revisa la vista previa y luego guarda.');
  }

  function saveSociosInput() {
    const rows = APP.state.pendingSociosRows || [];

      }
    }).catch(showError);

  function handleSociosBulkFile_(ev) {
    const file = ev.target.files && ev.target.files[0];
    if (!file) return;

    if (/\.(xlsx|xls)$/i.test(file.name)) {
      showError('Para esta carga usa Excel exportado como CSV o TSV.');
      ev.target.value = '';
      return;
    }

    const reader = new FileReader();
    reader.onload = () => {
      const textarea = document.getElementById('socios-bulk');
      if (textarea) textarea.value = String(reader.result || '');
      APP.state.pendingSociosRows = [];
      showSuccess('Archivo cargado. Valida la carga antes de guardar.');
    };
    reader.onerror = () => showError('No se pudo leer el archivo.');
    reader.readAsText(file);
  }

  function getSelectedSociosOrganizacion_(selectId) {
    const select = document.getElementById(selectId);
    const organizacionId = select ? String(select.value || '').trim() : '';
    const nombreComite = select && select.selectedOptions && select.selectedOptions[0]
      ? String(select.selectedOptions[0].textContent || '').trim()
      : '';
    return { organizacionId, nombreComite };
  }

  function saveSocioManual_(options = {}) {
    const keepOpen = !!options.keepOpen;
    clearSociosManualFeedback_();
    const selected = getSelectedSociosOrganizacion_('socios-manual-organizacion');
    if (!selected.organizacionId) {
      showSociosManualFeedback_('Debes seleccionar un comité.', 'error');
      return;
    }

    const direccionSocio = document.getElementById('socios-manual-direccion')?.value.trim() || '';
    const row = {
      organizacion_id: selected.organizacionId,
      run_socio: document.getElementById('socios-manual-run')?.value.trim() || '',
      numero_registro: document.getElementById('socios-manual-registro')?.value.trim() || '',
      nombre_socio: document.getElementById('socios-manual-nombre')?.value.trim() || '',
      edad: document.getElementById('socios-manual-edad')?.value.trim() || '',
      cargo: document.getElementById('socios-manual-cargo')?.value.trim() || '',
      direccion_socio: direccionSocio,
      ubicacion_socio: buildSocioUbicacionFromDireccion_(direccionSocio),
      nombre_comite_origen: selected.nombreComite
    };

    if (!row.nombre_socio) {
      showSociosManualFeedback_('Debes indicar el nombre del socio.', 'error');
      return;
    }
    if (!row.cargo || !ORGANIZACION_SOCIO_CARGOS.includes(row.cargo)) {
      showSociosManualFeedback_('Debes seleccionar un cargo válido.', 'error');
      return;
    }

    setSociosManualSubmitting_(true);
    if (keepOpen) {
      showSociosManualFeedback_('Guardando socio...', 'loading');
    } else {
      closeSociosModals_();
      showContentLoading('Guardando socio...');
    }

    api('importarSocios', { rows: [row] }).then(res => {
      if (!res || res.ok === false) {
        const detail = res && Array.isArray(res.errors) && res.errors[0] ? res.errors[0].error : 'No se pudo guardar el socio.';
        throw new Error(detail);
      }
      const saved = (res && Array.isArray(res.importedRows) && res.importedRows[0]) || row;
      if (keepOpen) {
        showSociosManualLastMessage_(saved);
        clearSociosManualFields_();
        clearSociosManualFeedback_();
      } else {
        showSuccess(`Socio guardado: ${res.imported} de ${res.total}`);
      }
      renderSociosManualSavedPreview_(saved);
    }).catch(err => {
      if (!keepOpen) {
        document.getElementById('socios-manual-modal')?.classList.remove('is-hidden');
      }
      showSociosManualFeedback_(getErrorMessage_(err), 'error');
    }).finally(() => {
      setSociosManualSubmitting_(false);
      if (!keepOpen) hideContentLoading();
    });
  }

  function loadUsers() {
    if (!APP.state.permissions.canManageUsers) return Promise.resolve([]);

    showContentLoading('Cargando usuarios...');
    return api('listUsers').then(rows => {
      const tbody = document.getElementById('users-results');
      if (!tbody) return [];

      const moduleLabel = user => user.superuser_flag
        ? 'Todos'
        : moduleLabelsFromKeys_(String(user.modulos_permitidos || '').split(','));

      rows = Array.isArray(rows) ? rows : (Array.isArray(rows?.users) ? rows.users : []);
      if (!rows.length) {

  function normalizeUiBool_(value, defaultValue) {
    if (value === true || value === false) return value;
    const normalized = String(value ?? '').trim().toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    if (!normalized) return defaultValue;
    if (['si', 'true', '1', 'activo', 'activa', 'active'].includes(normalized)) return true;
    if (['no', 'false', '0', 'inactivo', 'inactiva', 'inactive'].includes(normalized)) return false;
    return defaultValue;
  }

  function renderUserBooleanLabel_(value) {
    return normalizeUiBool_(value, false) ? 'S\u00ed' : 'No';
  }

  function renderUserActiveLabel_(value) {
    const active = normalizeUiBool_(value, false);
    return `<span class="user-status-pill ${active ? 'is-active' : 'is-inactive'}">${active ? 'S\u00ed' : 'No'}</span>`;
  }

  function markUserInactiveInTable_(email) {
    const normalizedEmail = String(email || '').trim().toLowerCase();
    if (!normalizedEmail) return;

    document.querySelectorAll('#users-results tr').forEach(row => {
      const firstCell = row.querySelector('td');
      if (!firstCell || firstCell.textContent.trim().toLowerCase() !== normalizedEmail) return;
      row.classList.add('is-inactive');
      const activeCell = row.children[3];
      if (activeCell) activeCell.innerHTML = renderUserActiveLabel_(false);
      row.querySelector('.js-delete-user')?.setAttribute('disabled', 'disabled');
    });
  }

  function moduleLabelsFromKeys_(keys) {
    const defs = APP.state.moduleDefinitions || [];
    const byKey = {};
    defs.forEach(m => byKey[m.key] = m.label || m.key);
    return (keys || [])
      .map(k => String(k || '').trim())
      .filter(Boolean)
      .filter(k => k !== 'inicio' && k !== 'ficha')
      .map(k => byKey[k] || k)
      .join(', ') || 'Sin módulos';
  }

  function showError(error) {

      : (error && error.message ? error.message : 'Ocurrió un error.');

  function initOrganizacionForm_() {
    const form = document.getElementById('form-organizacion');
    if (!form || form.dataset.orgInit === 'true') return;

    form.dataset.orgInit = 'true';

    const selector = form.querySelector('[name="organizacion_id"]');
    if (!selector) return;

    initOrganizacionImageField_();
    toggleOrganizacionFormLock_(true);

    selector.disabled = false;

    selector.addEventListener('change', () => {
      const orgId = String(selector.value || '').trim();

      if (!orgId) {
        clearOrganizacionFormExceptSelector_();
        toggleOrganizacionFormLock_(true);
        selector.disabled = false;
        return;
      }

      toggleOrganizacionFormLock_(true);
      hydrateOrganizacionForm_(orgId).then(() => {
        toggleOrganizacionFormLock_(false);
        selector.disabled = false;
      }).catch(showError);
    });
  }

  function toggleOrganizacionFormLock_(locked) {
    const form = document.getElementById('form-organizacion');
    if (!form) return;

    Array.from(form.elements).forEach(el => {
      if (!el.name && !el.dataset.orgImageAction) return;
      if (el.name === 'organizacion_id') return;

      const tag = String(el.tagName || '').toLowerCase();
      const type = String(el.type || '').toLowerCase();

      if (type === 'hidden') return;

      if (tag === 'select' || type === 'file' || tag === 'button' || type === 'submit') {
        el.disabled = locked;
      } else {
        el.readOnly = locked;
      }
    });

    form.querySelectorAll('[data-org-image-action]').forEach(btn => {
      btn.disabled = locked;
    });

    form.querySelectorAll('.image-upload__file').forEach(input => {
      input.disabled = locked;
    });
  }

  function clearOrganizacionFormExceptSelector_() {
    const form = document.getElementById('form-organizacion');
    if (!form) return;

    Array.from(form.elements).forEach(el => {
      if (!el.name || el.name === 'organizacion_id') return;
      setFormFieldValue_(el, '');
    });

    refreshOrganizacionImageField_();
  }

  function hydrateOrganizacionForm_(organizacionId) {
    const form = document.getElementById('form-organizacion');
    if (!form) return Promise.resolve();

    const data = (APP.state.catalogs.organizacionesById || {})[organizacionId];
    if (data) {
      applyOrganizacionFormData_(form, data);
      return Promise.resolve(data);
    }

    showContentLoading('Cargando organización...');

    return api('getOrganizacionClientById', { organizacion_id: organizacionId }).then(payload => {
      const snapshot = payload || {};
      APP.state.catalogs.organizacionesById = {
        ...(APP.state.catalogs.organizacionesById || {}),
        [organizacionId]: snapshot
      };
      applyOrganizacionFormData_(form, snapshot);
      return snapshot;
    }).finally(() => {
      hideContentLoading();
    });
  }

  function applyOrganizacionFormData_(form, data) {
    Array.from(form.elements).forEach(el => {
      if (!el.name || el.name === 'organizacion_id') return;
      const value = data[el.name] !== undefined ? data[el.name] : '';
      setFormFieldValue_(el, value);
    });

    const uvSelect = form.querySelector('[name="uv"]');
    const sectorSelect = form.querySelector('[name="sector"]');
    if (uvSelect && sectorSelect) {
      syncSectorOptions(sectorSelect, uvSelect.value);
      if (data.sector) sectorSelect.value = data.sector;
    }

    refreshOrganizacionImageField_();
  }

  function upsertOrganizacionCatalogEntry_(record) {
    if (!record || !record.organizacion_id) return;

    const orgId = String(record.organizacion_id || '').trim();
    const label = String(record.nombre_organizacion || '').trim();
    if (!orgId || !label) return;

    const list = Array.isArray(APP.state.catalogs.organizacionesList)
      ? APP.state.catalogs.organizacionesList.slice()
      : [];

    const nextEntry = { value: orgId, label: label };
    const index = list.findIndex(item => String(item && item.value || '') === orgId);

    if (index === -1) {
      list.push(nextEntry);
    } else {
      list[index] = nextEntry;
    }

    list.sort((a, b) => String(a.label || '').localeCompare(String(b.label || ''), 'es'));
    APP.state.catalogs.organizacionesList = list;
    APP.state.catalogs.organizacionesById = {
      ...(APP.state.catalogs.organizacionesById || {}),
      [orgId]: {
        ...((APP.state.catalogs.organizacionesById || {})[orgId] || {}),
        ...record
      }
    };

    const selector = document.querySelector('#form-organizacion [name="organizacion_id"]');
    if (selector) {
      const currentValue = String(selector.value || '').trim() || orgId;
      fillSelect(selector, list, 'Seleccionar organización');
      selector.value = currentValue;
    }
  }

  function setFormFieldValue_(el, value) {
    if (!el) return;

    let finalValue = value == null ? '' : value;

    if (String(el.type || '').toLowerCase() === 'date' && String(finalValue).trim()) {
      finalValue = String(finalValue).slice(0, 10);
    }

    el.value = finalValue;
  }

  function initOrganizacionImageField_() {
    const form = document.getElementById('form-organizacion');
    if (!form) return;

    const wrapper = form.querySelector('[data-image-field="imagen_logo_base64"]');
    if (!wrapper || wrapper.dataset.initialized === 'true') return;

    wrapper.dataset.initialized = 'true';

    const hidden = wrapper.querySelector('input[type="hidden"][name="imagen_logo_base64"]');
    const fileInput = wrapper.querySelector('.image-upload__file');
    const uploadBtn = wrapper.querySelector('[data-org-image-action="upload"]');
    const removeBtn = wrapper.querySelector('[data-org-image-action="remove"]');

    if (uploadBtn && fileInput) {
      uploadBtn.addEventListener('click', () => fileInput.click());
    }

    if (fileInput && hidden) {
      fileInput.addEventListener('change', ev => {
        const file = ev.target.files && ev.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = e => {
          hidden.value = String(e.target.result || '');
          refreshOrganizacionImageField_();
        };
        reader.readAsDataURL(file);
      });
    }

    if (removeBtn && hidden && fileInput) {
      removeBtn.addEventListener('click', () => {
        hidden.value = '';
        fileInput.value = '';
        refreshOrganizacionImageField_();
      });
    }

    refreshOrganizacionImageField_();
  }

  function refreshOrganizacionImageField_() {
    const form = document.getElementById('form-organizacion');
    if (!form) return;

    const wrapper = form.querySelector('[data-image-field="imagen_logo_base64"]');
    if (!wrapper) return;

    const hidden = wrapper.querySelector('input[type="hidden"][name="imagen_logo_base64"]');
    const preview = wrapper.querySelector('.image-upload__preview');

    if (!hidden || !preview) return;

    const value = String(hidden.value || '').trim();

    if (!value) {
      preview.innerHTML = '<div class="empty-state">Sin imagen</div>';
      return;
    }

    preview.innerHTML = `<img src="${escapeHtml(value)}" alt="Imagen organización" class="image-upload__img">`;
  }

        });
      }

      lockAvanceActions_(true);
    }).catch(showError);
  }

  function clampPct_(value) {
    const n = Number(value || 0);
    if (!isFinite(n)) return 0;
    return Math.max(0, Math.min(100, Math.round(n)));
  }

  function buildProgressBarHtml_(label, done, total) {
    const safeDone = Number(done || 0);
    const safeTotal = Number(total || 0);
    const pct = safeTotal > 0 ? clampPct_((safeDone / safeTotal) * 100) : 0;

    return `
      <div class="avance-resumen-bar">
        <div class="avance-resumen-bar__head">
          <div class="avance-resumen-bar__label">${escapeHtml(label)}</div>
          <div class="avance-resumen-bar__meta">${safeDone} de ${safeTotal}</div>
        </div>

        <div class="avance-resumen-bar__row">
          <div class="avance-resumen-bar__track">
            <div class="avance-resumen-bar__fill" style="width:${pct}%"></div>
          </div>
          <div class="avance-resumen-bar__pct">${pct}%</div>
        </div>
      </div>
    `;
  }

  function refreshAvanceViewOnRoute_() {
    const select = document.getElementById('avance-organizacion-select');
    const grupoSelect = document.getElementById('avance-grupo-select');
    if (!select && !grupoSelect) return;

    const now = Date.now();
    if (
      APP.state.avanceOrganizaciones.length &&
      APP.state.avanceGrupos.length &&
      APP.state.avanceOrganizacionesFetchedAt &&
      (now - APP.state.avanceOrganizacionesFetchedAt) < 30000
    ) {
      return;
    }

    const currentValue = String(select.value || '').trim();
    const currentGrupoValue = String(grupoSelect?.value || '').trim();

    Promise.all([
      api('getGruposVecinosAvanceClient'),
      api('getOrganizacionesAvanceClient')
    ]).then(([grupos, data]) => {
      APP.state.avanceGrupos = (grupos && grupos.gruposList) || [];
      APP.state.avanceGruposFetchedAt = Date.now();
      APP.state.avanceOrganizaciones = (data && data.organizacionesList) || [];
      APP.state.avanceOrganizacionesFetchedAt = Date.now();
      fillSelect(
        grupoSelect,
        APP.state.avanceGrupos.map(x => ({ value: x.value, label: x.label })),
        'Seleccionar Grupo de vecinos'
      );
      fillSelect(
        select,
        APP.state.avanceOrganizaciones.map(x => ({ value: x.value, label: x.label })),
        'Seleccionar organización'
      );

      if (currentValue && APP.state.avanceOrganizaciones.some(x => String(x.value) === currentValue)) {
        select.value = currentValue;
      }
      if (currentGrupoValue && APP.state.avanceGrupos.some(x => String(x.value) === currentGrupoValue)) {
        grupoSelect.value = currentGrupoValue;
      }
    }).catch(console.error);
  }

  function loadAvanceCatalogos_() {
    const now = Date.now();
    if (
      APP.state.avanceCatalogos &&
      APP.state.avanceOrganizaciones.length &&
      APP.state.avanceGrupos.length &&
      APP.state.avanceOrganizacionesFetchedAt &&
      APP.state.avanceGruposFetchedAt &&
      (now - APP.state.avanceOrganizacionesFetchedAt) < 30000 &&
      (now - APP.state.avanceGruposFetchedAt) < 30000
    ) {
      return Promise.resolve();
    }

    showContentLoading('Cargando módulo de avance...');

    return Promise.all([
      api('getCatalogosAvanceClient'),
      api('getGruposVecinosAvanceClient'),
      api('getOrganizacionesAvanceClient')
    ]).then(([catalogos, grupos, organizaciones]) => {
      APP.state.avanceCatalogos = catalogos || {};
      APP.state.avanceGrupos = (grupos && grupos.gruposList) || [];
      APP.state.avanceGruposFetchedAt = Date.now();
      APP.state.avanceOrganizaciones = (organizaciones && organizaciones.organizacionesList) || [];
      APP.state.avanceOrganizacionesFetchedAt = Date.now();
    }).finally(() => {
      hideContentLoading();
    });
  }

  function loadAvanceOrganizacion_(organizacionId) {
    showContentLoading('Cargando avance...');

    api('getAvanceOrganizacion', { organizacion_id: organizacionId }).then(data => {
      APP.state.currentAvance = data;
      renderAvanceResumen_(data);
      renderAvanceBotones_(data);
      renderAvanceTimeline_(data.timeline || []);
      lockAvanceActions_(false, data);
      setStatus('Avance cargado correctamente.', true);
    }).catch(err => {
      APP.state.currentAvance = null;
      clearAvanceView_();
      showError(err);
    }).finally(() => {
      hideContentLoading();
    });
  }

  function loadAvanceGrupoVecinos_(solicitudId) {
    showContentLoading('Cargando avance de Grupo de vecinos...');

    api('getAvanceGrupoVecinos', { solicitud_id: solicitudId }).then(data => {
      APP.state.currentAvance = data;
      renderAvanceResumen_(data);
      renderAvanceBotones_(data);
      renderAvanceTimeline_(data.timeline || []);
      lockAvanceActions_(true, data);
      setStatus('Avance de Grupo de vecinos cargado correctamente.', true);
    }).catch(err => {
      APP.state.currentAvance = null;
      clearAvanceView_();
      showError(err);
    }).finally(() => {
      hideContentLoading();
    });
  }

  function normalizeAvanceTramoKey_(value) {
    return String(value || '')
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '')
      .toLowerCase()
      .trim();
  }

  function isAvanceHitoCreacionOrganizacion_(item) {
    const current = APP.state.currentAvance || {};
    const isGrupo = String(current.context_type || '') === 'grupo_vecinos';
    const tramo = normalizeAvanceTramoKey_(item && item.tramo);
    const codigo = String(item && item.codigo_hito || '').trim().toUpperCase();
    const isHito5 = codigo ? codigo === 'PRE_05' : Number(item && item.orden_hito || 0) === 5;
    return isGrupo
      && isHito5
      && tramo.includes('preconstitucion');
  }

  function getAvanceTramoItems_(tramos, aliases) {
    const keys = (aliases || []).map(normalizeAvanceTramoKey_);
    const tramo = (tramos || []).find(t => keys.includes(normalizeAvanceTramoKey_(t && t.tramo)));
    return tramo && Array.isArray(tramo.items) ? tramo.items : [];
  }

  function renderAvanceResumen_(data) {
    const el = document.getElementById('avance-resumen');
    if (!el) return;

    const r = (data && data.resumen) || {};
    const estado = (data && data.estado && data.estado.estado_avance) || 'Activo';
    const tramos = (data && data.botones && data.botones.tramos) || [];
    const isGrupo = String(data && data.context_type || '') === 'grupo_vecinos';

    const tramoPreItems = getAvanceTramoItems_(tramos, ['Preconstitucion']);
    const tramoForItems = getAvanceTramoItems_(tramos, ['Formalizacion', 'Formalizacion posterior']);
    const catalogosAvance = APP.state.avanceCatalogos || {};
    const catalogoPreItems = ((catalogosAvance.hitosPorTramo || {}).preconstitucion || []);
    const catalogoForItems = ((catalogosAvance.hitosPorTramo || {}).formalizacion || []);

    const totalPre = Math.max(tramoPreItems.length, catalogoPreItems.length, Number(r.total_hitos_tramo_pre || 0));
    const donePre = tramoPreItems.filter(x => x.completed_flag).length;

    const totalFor = Math.max(tramoForItems.length, catalogoForItems.length, Number(r.total_hitos_tramo_for || 0));
    const doneFor = tramoForItems.filter(x => x.completed_flag).length;

    const totalGeneral = totalPre + totalFor;
    const doneGeneral = donePre + doneFor;

    el.className = 'avance-resumen';
    el.innerHTML = `
      <div class="avance-resumen-layout">
        <aside class="avance-resumen-card" aria-label="Resumen de organizacion">
          <div class="avance-resumen-card__title">Ficha de avance</div>

          <div class="avance-resumen-card__grid">
            <div class="avance-resumen-card__item"><strong>Estado</strong><span>${escapeHtml(estado)}</span></div>
            <div class="avance-resumen-card__item"><strong>${isGrupo ? 'Grupo de vecinos' : 'Organización'}</strong><span>${escapeHtml(r.nombre_organizacion || '')}</span></div>
            <div class="avance-resumen-card__item"><strong>Solicitud</strong><span>${escapeHtml(r.solicitud_id || '')}</span></div>
            <div class="avance-resumen-card__item"><strong>Último hito</strong><span>${escapeHtml(r.ultimo_hito_nombre || 'Sin registros')}</span></div>
            <div class="avance-resumen-card__item"><strong>Fecha último hito</strong><span>${escapeHtml(formatFechaHoraUi_(r.ultimo_hito_fecha || ''))}</span></div>
            <div class="avance-resumen-card__item"><strong>Usuario último hito</strong><span>${escapeHtml(r.usuario_ultimo_hito || '')}</span></div>
          </div>
        </aside>

        <section class="avance-resumen-progress" aria-label="Resumen de avance">
          <div class="avance-resumen-progress__title">Resumen de avance</div>
          <div class="avance-resumen-bars">
            ${buildProgressBarHtml_('Total hitos cumplidos', doneGeneral, totalGeneral)}
            ${buildProgressBarHtml_('Preconstitución', donePre, totalPre)}
            ${buildProgressBarHtml_('Formalización', doneFor, totalFor)}
          </div>
        </section>
      </div>
    `;
  }

  function renderAvanceBotones_(data) {
    const pre = document.getElementById('avance-pre-grid');
    const post = document.getElementById('avance-for-grid');
    if (!pre || !post) return;

    pre.className = 'avance-hitos-grid';
    post.className = 'avance-hitos-grid';
    pre.dataset.layout = 'grid';
    post.dataset.layout = 'grid';

    const tramos = (data && data.botones && data.botones.tramos) || [];
    const tramoPreItems = getAvanceTramoItems_(tramos, ['Preconstitucion']);
    const tramoForItems = getAvanceTramoItems_(tramos, ['Formalizacion', 'Formalizacion posterior']);

    pre.innerHTML = tramoPreItems.map(renderAvanceProgressRow_).join('');
    post.innerHTML = tramoForItems.map(renderAvanceProgressRow_).join('');

    document.querySelectorAll('.js-avance-hito').forEach(btn => {
      btn.addEventListener('click', () => registrarHitoAvanceUi_(btn.dataset.codigo));
    });
  }

  function renderAvanceProgressRow_(item) {
    const disabled = !item.enabled_flag ? 'disabled' : '';
    const completed = item.completed_flag ? 'is-completed' : '';
    const blocked = !item.enabled_flag && !item.completed_flag ? 'is-blocked' : '';
    const enabled = item.enabled_flag && !item.completed_flag ? 'is-enabled' : '';
    const icon = item.completed_flag
      ? 'check'
      : (!item.enabled_flag && !item.completed_flag ? 'remove' : 'radio_button_unchecked');
    const iconLabel = item.completed_flag
      ? 'Hito cumplido'
      : (!item.enabled_flag && !item.completed_flag ? 'Hito bloqueado' : 'Hito disponible');

    const statusText = item.completed_flag
      ? 'Cumplido'
      : (!item.enabled_flag && !item.completed_flag ? 'Bloqueado' : 'Disponible');
    const statusDetail = item.completed_flag
      ? escapeHtml(formatFechaHoraUi_(item.fecha_hito || 'Registrado'))
      : item.blocked_reason
        ? escapeHtml(item.blocked_reason)
        : 'Clic para registrar';
    const titleAttr = item.blocked_reason
      ? ` title="${escapeHtml(item.blocked_reason)}"`
      : '';

    return `
      <button
        type="button"
        class="avance-hito-card js-avance-hito ${completed} ${blocked} ${enabled}"
        data-codigo="${escapeHtml(item.codigo_hito || '')}"
        aria-label="${iconLabel}: ${escapeHtml(item.nombre_hito || '')}"
        aria-disabled="${disabled ? 'true' : 'false'}"
        data-estado="${escapeHtml(statusText)}"
        ${titleAttr}
        ${disabled}>
        <div class="avance-hito-card__icon" aria-hidden="true">
          <span class="material-symbols-outlined">${icon}</span>
        </div>
        <div class="avance-hito-card__body">
          <div class="avance-hito-card__title">${escapeHtml(item.nombre_hito || '')}</div>
          <div class="avance-hito-card__status">${statusText}</div>
          <div class="avance-hito-card__detail">${statusDetail}</div>
        </div>
      </button>
    `;
  }

  function renderAvanceTimeline_(rows) {
    const el = document.getElementById('avance-timeline');
    if (!el) return;

    if (!rows || !rows.length) {
      el.className = 'avance-timeline empty-state';
      el.innerHTML = 'No hay hitos registrados.';
      return;
    }

    el.className = 'avance-timeline';
    el.innerHTML = rows.map(r => `
      <div class="match-card">
        <h4>${escapeHtml(r.nombre_hito || '')}</h4>
        <p><strong>Tramo:</strong> ${escapeHtml(r.tramo || '')}</p>
        <p><strong>Fecha:</strong> ${escapeHtml(formatFechaHoraUi_(r.fecha_hito || ''))}</p>
        <p><strong>Usuario:</strong> ${escapeHtml(r.usuario_registro || '')}</p>
        <p><strong>Observación:</strong> ${escapeHtml(r.observacion || '')}</p>
      </div>
    `).join('');
  }

  function registrarHitoAvanceUi_(codigoHito) {
    const current = APP.state.currentAvance || {};
    const isGrupo = String(current.context_type || '') === 'grupo_vecinos';
    const select = document.getElementById(isGrupo ? 'avance-grupo-select' : 'avance-organizacion-select');
    const selectedId = String(select?.value || '').trim();

    if (!selectedId) {
      showError(isGrupo ? 'Debes seleccionar un Grupo de vecinos.' : 'Debes seleccionar una organización.');
      return;
    }

    const tramos = (((APP.state.currentAvance || {}).botones || {}).tramos || []);
    const items = tramos.flatMap(t => t.items || []);
    const item = items.find(x => String(x.codigo_hito || '') === String(codigoHito || ''));

    if (!item) {
      showError('No se encontró el hito seleccionado.');
      return;
    }

    if (!item.enabled_flag) {
      showError(item.blocked_reason || 'Este hito no está disponible.');
      return;
    }

    openAvanceHitoModal_(item);
  }

  function openAvanceHitoModal_(item) {
    const modal = document.getElementById('avance-hito-modal');
    const title = document.getElementById('avance-modal-title');
    const codigo = document.getElementById('avance-modal-codigo');
    const fecha = document.getElementById('avance-modal-fecha');
    const obs = document.getElementById('avance-modal-observacion');
    const orgNombreField = document.getElementById('avance-modal-org-nombre-field');
    const orgNombre = document.getElementById('avance-modal-org-nombre');
    const orgNombreError = document.getElementById('avance-modal-org-nombre-error');

    if (!modal || !title || !codigo || !fecha || !obs) return;

    title.textContent = item.nombre_hito || 'Registrar hito';
    codigo.value = item.codigo_hito || '';
    fecha.value = todayISO_();
    obs.value = '';
    if (orgNombreField && orgNombre) {
      const requiereNombre = isAvanceHitoCreacionOrganizacion_(item);
      orgNombreField.classList.toggle('is-hidden', !requiereNombre);
      orgNombre.required = requiereNombre;
      orgNombre.disabled = !requiereNombre;
      orgNombre.value = '';
      if (orgNombreError) orgNombreError.classList.add('is-hidden');
    }

    modal.classList.remove('is-hidden');
  }

  function closeAvanceHitoModal_() {
    const modal = document.getElementById('avance-hito-modal');
    if (!modal) return;
    modal.classList.add('is-hidden');
  }

  function submitAvanceHitoModal_() {
    const current = APP.state.currentAvance || {};
    const isGrupo = String(current.context_type || '') === 'grupo_vecinos';
    const orgSelect = document.getElementById('avance-organizacion-select');
    const grupoSelect = document.getElementById('avance-grupo-select');
    const codigo = document.getElementById('avance-modal-codigo');
    const fecha = document.getElementById('avance-modal-fecha');
    const obs = document.getElementById('avance-modal-observacion');
    const orgNombre = document.getElementById('avance-modal-org-nombre');
    const orgNombreError = document.getElementById('avance-modal-org-nombre-error');

    const organizacionId = String(orgSelect?.value || '').trim();
    const solicitudId = String(grupoSelect?.value || '').trim();
    const codigoHito = String(codigo?.value || '').trim();
    const fechaHito = String(fecha?.value || '').trim();
    const observacion = String(obs?.value || '').trim();
    const nombreOrganizacionVariable = String(orgNombre?.value || '').trim();

    if (isGrupo && !solicitudId) {
      showError('Debes seleccionar un Grupo de vecinos.');
      return;
    }

    if (!isGrupo && !organizacionId) {
      showError('Debes seleccionar una organización.');
      return;
    }

    if (!codigoHito) {
      showError('No se encontró el código del hito.');
      return;
    }

    if (!fechaHito) {
      showError('Debes indicar la fecha del hito.');
      return;
    }

    const tramos = (((APP.state.currentAvance || {}).botones || {}).tramos || []);
    const items = tramos.flatMap(t => t.items || []);
    const item = items.find(x => String(x.codigo_hito || '') === codigoHito);
    const requiereNombreOrganizacion = item && isAvanceHitoCreacionOrganizacion_(item);
    if (orgNombreError) orgNombreError.classList.add('is-hidden');
    if (requiereNombreOrganizacion && !nombreOrganizacionVariable) {
      if (orgNombreError) orgNombreError.classList.remove('is-hidden');
      if (orgNombre) orgNombre.focus();
      return;
    }

    const nombreOrganizacionAsamblea = requiereNombreOrganizacion
      ? `COMITE DE SEGURIDAD ${nombreOrganizacionVariable}`.replace(/\s+/g, ' ').trim()
      : '';

    closeAvanceHitoModal_();
    showContentLoading(requiereNombreOrganizacion ? 'Creando organización...' : 'Registrando hito...');

    api('registrarHitoAvance', {
      organizacion_id: isGrupo ? '' : organizacionId,
      solicitud_id: isGrupo ? solicitudId : '',
      codigo_hito: codigoHito,
      fecha_hito: fechaHito,
      observacion: observacion,
      nombre_organizacion_asamblea: nombreOrganizacionAsamblea
    }).then(res => {
      showSuccess(res && res.warning_nombre_duplicado
        ? `Hito registrado correctamente. Advertencia: ${res.warning_nombre_duplicado}`
        : 'Hito registrado correctamente.');
      if (isGrupo) {
        APP.state.avanceOrganizacionesFetchedAt = 0;
        APP.state.avanceGruposFetchedAt = 0;
        if (res && res.organizacion_id) {
          return loadAvanceCatalogos_().then(() => {
            fillSelect(
              document.getElementById('avance-organizacion-select'),
              APP.state.avanceOrganizaciones.map(x => ({ value: x.value, label: x.label })),
              'Seleccionar organización'
            );
            fillSelect(
              document.getElementById('avance-grupo-select'),
              APP.state.avanceGrupos.map(x => ({ value: x.value, label: x.label })),
              'Seleccionar Grupo de vecinos'
            );
            const orgSelect = document.getElementById('avance-organizacion-select');
            if (orgSelect) orgSelect.value = res.organizacion_id;
            return loadAvanceOrganizacion_(res.organizacion_id);
          });
        }
        return loadAvanceGrupoVecinos_(solicitudId);
      }
      return loadAvanceOrganizacion_(organizacionId);
    }).catch(showError).finally(() => {
      hideContentLoading();
    });
  }

  function cambiarEstadoAvanceUi_(nuevoEstado) {
    const select = document.getElementById('avance-organizacion-select');
    const organizacionId = String(select?.value || '').trim();

    if (!organizacionId) {
      showError('Debes seleccionar una organización.');
      return;
    }

    const fechaEstado = window.prompt('Ingresa la fecha del estado (YYYY-MM-DD)', todayISO_()) || '';
    if (!String(fechaEstado).trim()) {
      showError('Debes indicar una fecha.');
      return;
    }

    let motivo = '';
    if (nuevoEstado === 'Stand by' || nuevoEstado === 'Detenido') {
      motivo = window.prompt(`Indica el motivo para "${nuevoEstado}"`) || '';
      if (!String(motivo).trim()) {
        showError('Debes indicar un motivo.');
        return;
      }
    }

    showContentLoading('Actualizando estado de avance...');

    api('cambiarEstadoAvance', {
      organizacion_id: organizacionId,
      estado_avance: nuevoEstado,
      motivo_estado: motivo,
      fecha_estado: fechaEstado
    }).then(() => {
      showSuccess(`Estado actualizado a: ${nuevoEstado}`);
      loadAvanceOrganizacion_(organizacionId);
    }).catch(showError).finally(() => {
      hideContentLoading();
    });
  }

  function lockAvanceActions_(locked, data) {
    const standbyBtn = document.getElementById('avance-standby-btn');
    const detenerBtn = document.getElementById('avance-detener-btn');
    const reactivarBtn = document.getElementById('avance-reactivar-btn');

    if (standbyBtn) standbyBtn.disabled = !!locked;
    if (detenerBtn) detenerBtn.disabled = !!locked;
    if (reactivarBtn) reactivarBtn.disabled = !!locked;

    if (!locked && data && data.estado) {
      const estado = String(data.estado.estado_avance || 'Activo');
      if (standbyBtn) standbyBtn.disabled = estado !== 'Activo';
      if (detenerBtn) detenerBtn.disabled = estado !== 'Activo';
      if (reactivarBtn) reactivarBtn.disabled = estado === 'Activo';
    }
  }

  function clearAvanceView_() {
    APP.state.currentAvance = null;

    const badge = document.getElementById('avance-estado-badge');
    const resumen = document.getElementById('avance-resumen');
    const pre = document.getElementById('avance-pre-grid');
    const post = document.getElementById('avance-for-grid');
    const timeline = document.getElementById('avance-timeline');

    if (badge) badge.textContent = 'Sin selección';
    if (resumen) {
      resumen.className = 'avance-resumen empty-state';
      resumen.innerHTML = 'Selecciona una organización para visualizar su avance.';
    }
    if (pre) pre.innerHTML = '';
    if (post) post.innerHTML = '';
    if (timeline) {
      timeline.className = 'avance-timeline empty-state';
      timeline.innerHTML = 'No hay hitos registrados.';
    }

    closeAvanceHitoModal_();
    lockAvanceActions_(true);
  }
})();
</script>
