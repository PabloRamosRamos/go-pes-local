<script>
(() => {
  const root = document.getElementById('app');
  const BOOTSTRAP = root ? JSON.parse(root.dataset.bootstrap || '{}') : {};
  const TEMPLATE_SYSTEM_CONFIG =
    (window.GO_PES_TEMPLATE && window.GO_PES_TEMPLATE.systemConfig) || {};
  const THEME_STORAGE_KEY = 'goPesTheme';

  function normalizeModuleLookupKeyClient_(value) {
    return String(value == null ? '' : value)
      .trim()
      .toLowerCase()
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '')
      .replace(/[^a-z0-9]+/g, '_')
      .replace(/^_+|_+$/g, '');
  }

  function getClientModuleAliasMap_() {
    const aliasMap = Object.assign({}, (BOOTSTRAP && BOOTSTRAP.moduleAliasMap) || {});
    (BOOTSTRAP.moduleDefinitions || []).forEach(module => {
      const keyLookup = normalizeModuleLookupKeyClient_(module && module.key);
      const viewLookup = normalizeModuleLookupKeyClient_((module && (module.view || module.key)) || '');
      if (keyLookup) aliasMap[keyLookup] = module.key;
      if (viewLookup) aliasMap[viewLookup] = module.key;
    });
    return aliasMap;
  }

  const CLIENT_MODULE_ALIAS_MAP = getClientModuleAliasMap_();

  function normalizeModuleKey_(value) {
    const lookup = normalizeModuleLookupKeyClient_(value);
    if (!lookup) return '';
    return CLIENT_MODULE_ALIAS_MAP[lookup] || '';
  }

  const GLOBAL_MODAL_SELECTOR = [
    '.admin-reset-modal:not(.is-hidden)',
    '.user-modal:not(.is-hidden)',
    '.avance-modal:not(.is-hidden)',
    '.socios-modal:not(.is-hidden)',
    '.organizaciones-modal:not(.is-hidden)'
  ].join(', ');

  function hasOpenGlobalModal_() {
    return !!document.querySelector(GLOBAL_MODAL_SELECTOR);
  }

  function syncGlobalUiLayerState_() {
    const splash = document.getElementById('app-loading');
    const contentLoading = document.getElementById('content-loading');
    const hasModal = hasOpenGlobalModal_();
    const hasModalLoading = !!(
      contentLoading &&
      !contentLoading.classList.contains('is-hidden') &&
      contentLoading.classList.contains('content-loading--modal')
    );
    const hasSplash = !!(splash && !splash.classList.contains('is-hidden') && splash.style.display !== 'none');
    const shouldLock = hasModal || hasModalLoading || hasSplash;

    document.body.classList.toggle('app-has-modal', shouldLock);
    document.documentElement.classList.toggle('app-has-modal', shouldLock);
  }

  function setModalVisibility_(modalOrId, visible) {
    const modal = typeof modalOrId === 'string'
      ? document.getElementById(modalOrId)
      : modalOrId;
    if (!modal) return null;

    modal.classList.toggle('is-hidden', !visible);
    modal.setAttribute('aria-hidden', visible ? 'false' : 'true');
    syncGlobalUiLayerState_();
    return modal;
  }

  const APP = {
    state: {
      bootstrap: BOOTSTRAP,
      catalogs: {},
      user: BOOTSTRAP.user || {},
      theme: document.documentElement.dataset.theme || 'light',
      permissions: BOOTSTRAP.permissions || {},
      systemConfig: BOOTSTRAP.systemConfig || TEMPLATE_SYSTEM_CONFIG || {},
      moduleDefinitions: BOOTSTRAP.moduleDefinitions || [],
      activeView: normalizeModuleKey_(BOOTSTRAP.initialView || 'inicio') || 'inicio',
      inicioPanelData: null,
      inicioPanelFetchedAt: 0,
      currentFicha: null,
      currentSearchResults: [],
      searchRequestSeq: 0,
      currentAvance: null,
      avanceCatalogos: null,
      avanceGrupos: [],
      avanceGruposFetchedAt: 0,
      avanceOrganizaciones: [],
      avanceOrganizacionesFetchedAt: 0,
      organizacionesModulo: [],
      organizacionesModuloFetchedAt: 0,
      currentOrganizacionDetalle: null,
      currentBeneficiosDetalle: null,
      currentBeneficioCodigo: '',
      currentBeneficioOrganizacionId: '',
      historialRequestSeq: 0,
      sociosOrganizaciones: [],
      sociosOrganizacionesFetchedAt: 0,
      sociosModuleRows: [],
      sociosModuleFetchedAt: 0,
      sociosModuleQuery: '',
      currentSocioDetalle: null,
      pendingSociosRows: [],
      ingresoMatches: [],
      configSectionOrder: [],
      activeConfigSection: '',
      configLoadedAt: 0,
      renderedViews: {},
      catalogStatus: {
        app: false,
        ingreso: false,
        organizacion: false
      }
    }
  };

  const USER_ROLE_OPTIONS = [
    { value: 'visor', label: 'Visor' },
    { value: 'operador', label: 'Operador' },
    { value: 'coordinador', label: 'Coordinador' }
  ];

  const USER_ROLE_LABELS = {
    visor: 'Visor',
    operador: 'Operador',
    coordinador: 'Coordinador'
  };

  const ORGANIZACION_SOCIO_CARGOS = [
    'Presidente',
    'Tesorero',
    'Secretario',
    'Director',
    'Comisión electoral',
    'Comisión de finanzas',
    'Socio'
  ];

  const FORM_SCHEMAS = {
    organizacion: [
      { name: 'organizacion_id', label: 'Organización', type: 'select', optionsKey: 'organizacionesList', required: true, span: 2 },
      { name: 'solicitud_id', label: 'ID de solicitud', type: 'hidden' },
      { name: 'imagen_logo_base64', label: 'Imagen organización', type: 'image_upload_top' },
      { name: 'nombre_organizacion', label: 'Nombre organización', type: 'text', required: true, span: 2 },
      { name: 'uv', label: 'UV', type: 'select', optionsKey: 'uvList' },
      { name: 'direccion_referencia', label: 'Dirección', type: 'text', span: 2 },
      { name: 'fecha_inicio_acompanamiento', label: 'Fecha inicio acompañamiento', type: 'date' },
      { name: 'cantidad_socios_declarada', label: 'Cantidad de socios declarada', type: 'number' },
      { name: 'estado_constitucion', label: 'Estado de constitución', type: 'select', optionsKey: 'estado_constitucion' },
      { name: 'fecha_asamblea_constitucion', label: 'Fecha asamblea', type: 'date' },
      { name: 'fecha_ratificacion', label: 'Fecha ratificación', type: 'date' },
      { name: 'vigencia_directiva_hasta', label: 'Vigencia directiva hasta', type: 'date' },
      { name: 'personalidad_juridica_flag', label: 'Personalidad jurídica', type: 'select', options: ['Sí', 'No'] },
      { name: 'directiva_vigente_flag', label: 'Directiva vigente', type: 'select', options: ['Sí', 'No'] },
      { name: 'organizacion_constituida_flag', label: 'Organización constituida', type: 'select', options: ['Sí', 'No'] },
      { name: 'observacion_resumen', label: 'Observación resumen', type: 'textarea', span: 2 }
    ],
    instrumento: [
      { name: 'organizacion_id', label: 'ID de organización', type: 'text', required: true },
      { name: 'org_instrumento_id', label: 'ID de beneficio', type: 'text' },
      { name: 'instrumento_codigo_catalogo', label: 'Beneficio', type: 'select', optionsKey: 'instrumentosCodigo', required: true },
      { name: 'instrumento_nombre_otro', label: 'Nombre libre si es OTRO', type: 'text' },
      { name: 'instrumento_tipo', label: 'Tipo de beneficio', type: 'select', optionsKey: 'instrumentosTipo', required: true },
      { name: 'origen_instrumento', label: 'Origen', type: 'select', optionsKey: 'instrumentosOrigen', required: true },
      { name: 'anio_convocatoria', label: 'Año convocatoria', type: 'number', required: true },
      { name: 'nombre_convocatoria', label: 'Nombre convocatoria', type: 'text' },
      { name: 'numero_llamado', label: 'Número llamado', type: 'text' },
      { name: 'fecha_inicio_gestion', label: 'Fecha inicio gestión', type: 'date' },
      { name: 'fecha_apertura', label: 'Fecha apertura', type: 'date' },
      { name: 'fecha_cierre', label: 'Fecha cierre', type: 'date' },
      { name: 'fecha_habilitacion', label: 'Fecha habilitación', type: 'date' },
      { name: 'fecha_postulacion', label: 'Fecha postulación', type: 'date' },
      { name: 'fecha_resultado', label: 'Fecha resultado', type: 'date' },
      { name: 'fecha_cierre_instrumento', label: 'Fecha cierre beneficio', type: 'date' },
      { name: 'estado_instrumento', label: 'Estado beneficio', type: 'select', optionsKey: 'estado_instrumento' },
      { name: 'subestado_instrumento', label: 'Subestado', type: 'text' },
      { name: 'avance_instrumento_pct', label: 'Avance %', type: 'number' },
      { name: 'proximo_hito_instrumento', label: 'Próximo hito', type: 'textarea', span: 2 },
      { name: 'resultado_instrumento', label: 'Resultado', type: 'select', optionsKey: 'resultado_instrumento' },
      { name: 'monto_solicitado', label: 'Monto solicitado', type: 'number' },
      { name: 'monto_adjudicado', label: 'Monto adjudicado', type: 'number' },
      { name: 'monto_ejecutado', label: 'Monto ejecutado', type: 'number' },
      { name: 'responsable_instrumento', label: 'Responsable', type: 'select', optionsKey: 'responsables' },
      { name: 'contraparte', label: 'Contraparte', type: 'text' },
      { name: 'observacion_instrumento', label: 'Observación', type: 'textarea', span: 2 },
      { name: 'documento_respaldo_url', label: 'URL respaldo', type: 'text', span: 2 }
    ],
  };

  const CONFIG_SECTIONS = [
    { key: 'general', label: 'General', icon: 'tune' },
    { key: 'branding', label: 'Branding', icon: 'palette' },
    { key: 'accessModules', label: 'Acceso y módulos', icon: 'account_tree' },
    { key: 'socios', label: 'Socios', icon: 'badge' },
    { key: 'beneficios', label: 'Beneficios', icon: 'handshake' },
    { key: 'alertsInicio', label: 'Alertas e Inicio', icon: 'notifications_active' },
    { key: 'integrations', label: 'Integraciones', icon: 'hub' },
    { key: 'technical', label: 'Administración técnica', icon: 'admin_panel_settings' }
  ];

  document.addEventListener('DOMContentLoaded', init);

  function init() {
    hydrateTheme_();
    if (!APP.state.user || !APP.state.user.canAccess) {
      showAccessDenied_();
      hideAppLoading();
      hideContentLoading();
      return;
    }

    bindGlobalNav();
    initSidebarCollapse_();
    syncGlobalUiLayerState_();
    hydrateStaticUser();
    applySystemConfigUi_();
    applyModuleDefinitionsUi_();
    bindUserMenu_();
    hydrateAppVersion_();
    hydrateLogo();
    renderQuickActions();
    renderHomeTiles();
    toggleTopQuickActions_(APP.state.activeView);

    showAppLoading(getLoadingText_());

    Promise.resolve().then(() => {
      APP.state.user = BOOTSTRAP.user || APP.state.user;
      APP.state.permissions = BOOTSTRAP.permissions || APP.state.permissions;
      mergeCatalogs_(BOOTSTRAP.catalogs || {});
      hydrateStaticUser();
      applySystemConfigUi_();
      applyModuleDefinitionsUi_();
      applyPermissions();
      route(APP.state.activeView, BOOTSTRAP.query || {});

      if ((BOOTSTRAP.query || {}).solicitud_id || (BOOTSTRAP.query || {}).organizacion_id) {
        loadFicha(BOOTSTRAP.query);
      }

      setStatus('Listo.', null);
    }).catch(err => {
      console.error('Init fatal error:', err);
      setStatus('Ocurrió un error al iniciar la aplicación.', false);
    }).finally(() => {
      setTimeout(() => {
        hideAppLoading();
        hideContentLoading();
      }, 120);
    });
  }

  function showAccessDenied_() {
    const app = document.getElementById('app');
    const detectedEmail = APP.state.user && (APP.state.user.detected_email || APP.state.user.email)
      ? (APP.state.user.detected_email || APP.state.user.email)
      : '';
    const reason = APP.state.user && APP.state.user.reason
      ? APP.state.user.reason
      : 'Usuario no registrado o inactivo.';
    if (!app) return;
    app.innerHTML = `
      <section class="access-denied">
        <div class="access-denied__card">
          <span class="material-symbols-outlined">lock</span>
          <p class="eyebrow">Acceso denegado</p>
          <h1>No tienes acceso a esta aplicación</h1>
          <p>Tu usuario no está registrado o se encuentra inactivo. Contacta al administrador para solicitar acceso.</p>
          <p class="muted"><strong>Correo detectado:</strong> ${escapeHtml(detectedEmail || 'no disponible')}</p>
          <p class="muted"><strong>Motivo:</strong> ${escapeHtml(reason)}</p>
        </div>
      </section>
    `;
  }

  function initSidebarCollapse_() {
    const layout = document.querySelector('.layout');
    const toggle = document.getElementById('sidebar-toggle');
    const icon = document.getElementById('sidebar-toggle-icon');
    const label = document.getElementById('sidebar-toggle-label');
    if (!layout || !toggle) return;

    const applyState = collapsed => {
      layout.classList.toggle('is-sidebar-collapsed', collapsed);
      toggle.setAttribute('aria-expanded', String(!collapsed));
      toggle.setAttribute('aria-label', collapsed ? 'Expandir menú' : 'Contraer menú');
      toggle.title = collapsed ? 'Expandir menú' : 'Contraer menú';
      if (icon) icon.textContent = collapsed ? 'keyboard_double_arrow_right' : 'keyboard_double_arrow_left';
      if (label) label.textContent = 'Módulos';
    };

    let stored = false;
    try {
      stored = localStorage.getItem('goPesSidebarCollapsed') === 'true';
    } catch (err) {
      stored = false;
    }
    applyState(stored);

    toggle.addEventListener('click', () => {
      const collapsed = !layout.classList.contains('is-sidebar-collapsed');
      try {
        localStorage.setItem('goPesSidebarCollapsed', String(collapsed));
      } catch (err) {
        console.warn('No se pudo persistir el estado del menú lateral.', err);
      }
      applyState(collapsed);
    });
  }

  function readStoredTheme_() {
    try {
      const stored = localStorage.getItem(THEME_STORAGE_KEY);
      return stored === 'dark' || stored === 'light' ? stored : '';
    } catch (err) {
      return '';
    }
  }

  function isDarkTheme_() {
    return String(APP.state.theme || document.documentElement.dataset.theme || 'light') === 'dark';
  }

  function applyTheme_(theme, persist) {
    const nextTheme = theme === 'dark' ? 'dark' : 'light';
    APP.state.theme = nextTheme;
    document.documentElement.dataset.theme = nextTheme;
    if (document.body) {
      document.body.dataset.theme = nextTheme;
    }
    if (persist) {
      try {
        localStorage.setItem(THEME_STORAGE_KEY, nextTheme);
      } catch (err) {
        console.warn('No se pudo persistir el tema seleccionado.', err);
      }
    }
    updateThemeToggleUi_();
    applyBrandingRuntimeTheme_();
    hydrateLogo();
  }

  function hydrateTheme_() {
    const bootTheme = document.documentElement.dataset.theme === 'dark' ? 'dark' : 'light';
    applyTheme_(readStoredTheme_() || bootTheme, false);
  }

  function updateThemeToggleUi_() {
    const label = document.getElementById('theme-toggle-label');
    const icon = document.getElementById('theme-toggle-icon');
    const dark = isDarkTheme_();
    if (label) label.textContent = dark ? 'Ver modo claro' : 'Ver en modo oscuro';
    if (icon) icon.textContent = dark ? 'light_mode' : 'dark_mode';
  }

  function setUserMenuOpen_(open) {
    const trigger = document.getElementById('user-menu-trigger');
    const menu = document.getElementById('user-menu-dropdown');
    const chevron = document.getElementById('user-menu-chevron');
    if (!trigger || !menu) return;
    trigger.setAttribute('aria-expanded', String(!!open));
    menu.classList.toggle('is-hidden', !open);
    if (chevron) chevron.textContent = open ? 'expand_less' : 'expand_more';
  }

  function bindUserMenu_() {
    const trigger = document.getElementById('user-menu-trigger');
    const menu = document.getElementById('user-menu-dropdown');
    const toggleBtn = document.getElementById('theme-toggle-btn');
    if (!trigger || !menu || !toggleBtn || trigger.dataset.bound === '1') return;

    trigger.dataset.bound = '1';
    updateThemeToggleUi_();
    setUserMenuOpen_(false);

    trigger.addEventListener('click', ev => {
      ev.stopPropagation();
      setUserMenuOpen_(trigger.getAttribute('aria-expanded') !== 'true');
    });

    toggleBtn.addEventListener('click', ev => {
      ev.preventDefault();
      applyTheme_(isDarkTheme_() ? 'light' : 'dark', true);
      setUserMenuOpen_(false);
    });

    document.addEventListener('click', ev => {
      if (!menu.contains(ev.target) && !trigger.contains(ev.target)) {
        setUserMenuOpen_(false);
      }
    });

    document.addEventListener('keydown', ev => {
      if (ev.key === 'Escape') {
        setUserMenuOpen_(false);
      }
    });
  }

  function hydrateAppVersion_() {
    const el = document.getElementById('app-version');
    if (!el) return;
    if (!shouldShowVisibleVersionClient_()) {
      el.textContent = '';
      el.title = '';
      el.classList.add('is-hidden');
      return;
    }
    const buildInfo = BOOTSTRAP.buildInfo || {};
    const path = String(window.location.pathname || '').toLowerCase();
    const channel = path.endsWith('/dev')
      ? 'DEV'
      : path.endsWith('/exec')
        ? 'EXEC'
        : String(BOOTSTRAP.environment || '').trim().toUpperCase();
    const label = [
      buildInfo.baseVersion || BOOTSTRAP.version ? `v${buildInfo.baseVersion || BOOTSTRAP.version}` : '',
      channel,
      buildInfo.buildHash ? `build ${buildInfo.buildHash}` : '',
      buildInfo.updatedAtLabel || ''
    ].filter(Boolean).join(' · ') || BOOTSTRAP.versionLabel || '';
    el.textContent = label;
    el.title = buildInfo.updatedAtIso
      ? `Versión ${label} · actualizado ${buildInfo.updatedAtIso}`
      : (label ? `Versión ${label}` : '');
    el.classList.toggle('is-hidden', !label);
  }

  function hydrateAppVersionLegacy_() {
    const el = document.getElementById('app-version');
    if (!el) return;
    const label = BOOTSTRAP.versionLabel || (BOOTSTRAP.version ? `v${BOOTSTRAP.version}` : '');
    el.textContent = label;
    el.title = label ? `Versión ${label}` : '';
    el.classList.toggle('is-hidden', !label);
  }

  function api(fn, payload) {
    return new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(err => reject(err && err.message ? err.message : err))
        [fn](payload);
    });
  }

  function hydrateLogo() {
    const img = document.getElementById('appLogo');
    if (!img) return;

    const branding = (APP.state.systemConfig && APP.state.systemConfig.branding) || {};
    const logo = isDarkTheme_()
      ? (branding.logoDarkDataUri || branding.logoLightDataUri || (window.GO_PES_TEMPLATE && window.GO_PES_TEMPLATE.logoDarkDataUri) || (window.GO_PES_TEMPLATE && window.GO_PES_TEMPLATE.logoDataUri) || img.getAttribute('src') || '')
      : (branding.logoLightDataUri || branding.logoDarkDataUri || (window.GO_PES_TEMPLATE && window.GO_PES_TEMPLATE.logoDataUri) || img.getAttribute('src') || '');

    if (logo) {
      img.src = logo;
      img.style.display = 'block';
    }
  }

  function normalizeCatalogs(c) {
    return {
      ...c,
      estado_hito: (c.estadosPorTipo || {}).estado_hito || [],
      estado_constitucion: (c.estadosPorTipo || {}).estado_constitucion || [],
      estado_general_organizacion: (c.estadosPorTipo || {}).estado_general_organizacion || [],
      estado_instrumento: (c.estadosPorTipo || {}).estado_instrumento || [],
      resultado_instrumento: (c.estadosPorTipo || {}).resultado_instrumento || [],
      estado_requisito: (c.estadosPorTipo || {}).estado_requisito || [],
      estado_vecino: (c.estadosPorTipo || {}).estado_vecino || [],
      instrumentosCodigo: (c.instrumentos || []).map(i => i.instrumento_codigo_catalogo),
      instrumentosTipo: [...new Set((c.instrumentos || []).map(i => i.instrumento_tipo).filter(Boolean))],
      instrumentosOrigen: [...new Set((c.instrumentos || []).map(i => i.origen_instrumento).filter(Boolean))]
    };
  }

  function mergeCatalogs_(catalogs) {
    APP.state.catalogs = normalizeCatalogs({
      ...(APP.state.catalogs || {}),
      ...(catalogs || {})
    });
  }

  function ensureIngresoCatalogs_() {
    if (APP.state.catalogStatus.ingreso) return null;

    return api('getCatalogosNuevoIngresoClient').then(data => {
      mergeCatalogs_(data || {});
      APP.state.catalogStatus.ingreso = true;
    });
  }

  function ensureAppCatalogs_() {
    if (APP.state.catalogStatus.app) return null;

    return api('getCatalogosAppClient').then(data => {
      mergeCatalogs_(data || {});
      APP.state.catalogStatus.app = true;
    });
  }

  function ensureOrganizacionCatalogs_() {
    if (APP.state.catalogStatus.organizacion) return null;

    return api('getOrganizacionesModuloClient').then(data => {
      APP.state.organizacionesModulo = (data && data.organizaciones) || [];
      APP.state.organizacionesModuloFetchedAt = Date.now();
      mergeCatalogs_({
        organizacionesList: APP.state.organizacionesModulo
      });
      APP.state.catalogStatus.organizacion = true;
    });
  }

  function ensureSociosCatalogs_() {
    const now = Date.now();
    if (
      APP.state.sociosOrganizaciones.length &&
      APP.state.sociosOrganizacionesFetchedAt &&
      (now - APP.state.sociosOrganizacionesFetchedAt) < 30000
    ) {
      return Promise.resolve();
    }

    return api('getOrganizacionesAvanceClient').then(data => {
      APP.state.sociosOrganizaciones = (data && data.organizacionesList) || [];
      APP.state.sociosOrganizacionesFetchedAt = Date.now();
    });
  }

  function ensureOrganizacionesModuloList_() {
    const now = Date.now();
    if (
      APP.state.organizacionesModulo.length &&
      APP.state.organizacionesModuloFetchedAt &&
      (now - APP.state.organizacionesModuloFetchedAt) < 30000
    ) {
      return Promise.resolve();
    }

    return api('getOrganizacionesModuloClient').then(data => {
      APP.state.organizacionesModulo = (data && data.organizaciones) || [];
      APP.state.organizacionesModuloFetchedAt = Date.now();
    });
  }

  function ensureCatalogsForView_(view) {
    switch (view) {
      case 'inicio':
        return ensureInicioPanelData_();
      case 'nuevo-ingreso':
        return ensureIngresoCatalogs_();
      case 'organizacion': {
        const pending = [ensureAppCatalogs_(), ensureOrganizacionesModuloList_()].filter(Boolean);
        return pending.length ? Promise.all(pending) : null;
      }
      case 'instrumento': {
        const pending = [ensureAppCatalogs_(), ensureOrganizacionesModuloList_()].filter(Boolean);
        return pending.length ? Promise.all(pending) : null;
      }
      case 'socios':
        return ensureSociosCatalogs_();
      default:
        return null;
    }
  }

  function hydrateStaticUser() {
    const user = APP.state.user || {};
    const userName = document.getElementById('user-name');
    const userRole = document.getElementById('user-role');
    const badgeUser = document.getElementById('ingreso-current-user');
    const resetBtn = document.getElementById('admin-reset-open-btn');

    if (userName) userName.textContent = user.nombre_visible || user.email || 'Usuario';
    if (userRole) userRole.textContent = user.roleLabel || user.perfil || 'Sin perfil';
    if (badgeUser) badgeUser.textContent = user.nombre_visible || user.email || 'Usuario activo';
    if (resetBtn) {
      resetBtn.classList.toggle('is-visible', !!APP.state.permissions.canResetData);
      resetBtn.classList.toggle('is-hidden', !APP.state.permissions.canResetData);
    }
  }

  function bindGlobalNav() {
    document.querySelectorAll('[data-view]').forEach(btn =>
      btn.addEventListener('click', () => {
        const view = btn.dataset.view;
        if (!canOpenView_(view)) {
          showError('No tienes permisos para acceder a este módulo.');
          return;
        }
        route(view);
      })
    );

    const searchBtn = document.getElementById('search-btn');
    const saveUserBtn = document.getElementById('save-user-btn');
    const sociosValidateBtn = document.getElementById('socios-validate-btn');
    const sociosSaveBtn = document.getElementById('socios-save-btn');
    const adminResetOpenBtn = document.getElementById('admin-reset-open-btn');
    const adminResetForm = document.getElementById('admin-reset-form');
    const userEditForm = document.getElementById('user-edit-form');

  function populateSelectsInForm_(form) {
    form.querySelectorAll('select').forEach(select => {
      const key = select.dataset.optionsKey;
      if (key === 'sectorByUv') return;

      let options = [];
      if (key && APP.state.catalogs[key]) {
        options = APP.state.catalogs[key];
      } else {
        const schemaField = [...Object.values(FORM_SCHEMAS).flat()].find(f => f.name === select.name);
        if (schemaField && schemaField.options) options = schemaField.options;
      }

      fillSelect(select, options);
    });
  }

  function fieldTemplate(field) {
    const spanAttr = field.span === 2 ? ' data-span="2"' : '';
    const requiredAttr = field.required ? ' required' : '';

    if (field.type === 'hidden') {
      return `<input name="${field.name}" type="hidden">`;
    }

    if (field.type === 'image_upload_top') {
      return `
        <div class="field field--image-top"${spanAttr}>
          <label>${field.label}</label>
          <div class="image-upload image-upload--top" data-image-field="${field.name}">
            <input type="hidden" name="${field.name}" value="">
            <input type="file" class="image-upload__file" accept="image/*" hidden>
            <div class="image-upload__preview image-upload__preview--top empty-state">Sin imagen</div>
            <div class="image-upload__actions image-upload__actions--stack">
              <button type="button" class="secondary-btn" data-org-image-action="upload">
                <span class="material-symbols-outlined">upload</span>Subir imagen
              </button>
              <button type="button" class="secondary-btn" data-org-image-action="remove">
                <span class="material-symbols-outlined">delete</span>Eliminar
              </button>
            </div>
          </div>
        </div>
      `;
    }

    if (field.type === 'textarea') {
      return `<div class="field"${spanAttr}><label>${field.label}</label><textarea name="${field.name}"${requiredAttr}></textarea></div>`;
    }

    if (field.type === 'select') {
      return `<div class="field"${spanAttr}><label>${field.label}</label><select name="${field.name}" data-options-key="${field.optionsKey || ''}"${requiredAttr}></select></div>`;
    }

    return `<div class="field"${spanAttr}><label>${field.label}</label><input name="${field.name}" type="${field.type || 'text'}"${requiredAttr}></div>`;
  }

  function fillSelect(select, options, placeholder = 'Seleccionar') {
    if (!select) return;

    select.innerHTML = `<option value="">${placeholder}</option>` + (options || []).map(opt => {
      const value = typeof opt === 'string'
        ? opt
        : (opt.value || opt.codigo || opt.requisito_codigo || opt.instrumento_codigo_catalogo || '');
      const label = typeof opt === 'string'
        ? opt
        : (opt.label || opt.descripcion || opt.nombre || opt.requisito_nombre || opt.instrumento_nombre || opt.requisito_codigo || value);

      return `<option value="${escapeHtml(value)}">${escapeHtml(label)}</option>`;
    }).join('');
  }

  function normalizeEditableUserProfile_(value) {
    const normalized = String(value || '').trim().toLowerCase();
    if (normalized === 'visor') return 'visor';
    if (normalized === 'coordinador' || normalized === 'administrador' || normalized === 'superuser') return 'coordinador';
    return 'operador';
  }

  function getUserRoleLabel_(value) {
    return USER_ROLE_LABELS[normalizeEditableUserProfile_(value)] || 'Operador';
  }

  function roleAllowsManualModules_(value) {

  function bindUserRoleVisibility_(selectId, containerId, targetId) {
    const select = document.getElementById(selectId);

  function syncUserModulesVisibility_(selectId, containerId, targetId) {
    const select = document.getElementById(selectId);
    const container = document.getElementById(containerId);
    const target = targetId || 'user-modules-input';
    const role = normalizeEditableUserProfile_(select?.value || '');
    const allowManual = roleAllowsManualModules_(role);
    const previousSelection = container?.dataset.manualModules || '';
    const layout = container?.closest('.user-edit-layout');

    if (container) container.classList.toggle('is-hidden', !allowManual);
    if (layout && target === 'user-edit-modules-input') {
      layout.classList.toggle('is-single-column', !allowManual);
    }
    if (!allowManual) {
      if (container) {
        container.dataset.manualModules = getCheckedUserModules_(target).join(',');
      }
      renderUserModuleOptions_(['inicio'], target);
      return;
    }

    const selectionToRender = previousSelection || getCheckedUserModules_(target).join(',');
    renderUserModuleOptions_(selectionToRender, target);
  }

  function canOpenView_(view) {
    if (!APP.state.user || !APP.state.user.canAccess) return false;
    const normalizedView = normalizeModuleKey_(view);
    if (!normalizedView) return false;
    if (normalizedView === 'usuarios') return !!APP.state.permissions.canManageUsers;
    if (normalizedView === 'configuracion') return !!APP.state.permissions.canManageConfig;
    if (normalizedView === 'ficha') return !!((APP.state.permissions.modules || {}).ficha);
    return !!((APP.state.permissions.modules || {})[normalizedView]);
  }

  function initUserEmailField_() {
    const input = document.getElementById('user-email-local');
    if (!input || input.dataset.bound === '1') return;
    input.dataset.bound = '1';

    const normalizeLocal = () => {
      const raw = String(input.value || '').trim().toLowerCase().replace(/\s+/g, '');
      if (!raw) {
        input.value = '';
        return;
      }

      const parts = raw.split('@').filter(Boolean);
      if (parts.length === 1) {
        input.value = parts[0];
        return;
      }

      if (parts.length === 2 && parts[1] === 'providencia.cl') {
        input.value = parts[0];
        return;
      }
    };

    input.addEventListener('blur', normalizeLocal);
    input.addEventListener('paste', () => setTimeout(normalizeLocal, 0));
  }

  function buildProvidenciaEmailFromInput_() {
    const input = document.getElementById('user-email-local');
    const raw = String(input?.value || '').trim().toLowerCase().replace(/\s+/g, '');
    if (!raw) throw new Error('Debes ingresar el email del usuario.');

    let localPart = raw;
    if (raw.includes('@')) {
      const parts = raw.split('@').filter(Boolean);
      if (parts.length !== 2 || parts[1] !== 'providencia.cl') {
        throw new Error('Solo se permiten usuarios con correo @providencia.cl.');
      }
      localPart = parts[0];
    }

    if (!/^[a-z0-9._-]+$/.test(localPart)) {
      throw new Error('El correo solo puede contener letras, números, puntos, guiones y guion bajo.');
    }

    if (input) input.value = localPart;
    return `${localPart}@providencia.cl`;
  }

  function renderUserModuleOptions_(selectedModules, targetId) {
    const root = document.getElementById(targetId || 'user-modules-input');
    if (!root) return;
    const selected = Array.isArray(selectedModules)
      ? selectedModules
      : String(selectedModules || '').split(',').map(x => x.trim()).filter(Boolean);
    const allowAll = selected.includes('*');
    const defs = getAssignableModuleDefinitions_();
    root.innerHTML = defs.map(m => `
      <label class="module-check">
        <input
          class="module-check__input"
          type="checkbox"
          value="${escapeHtml(m.key)}"
          ${allowAll || selected.includes(m.key) || m.required ? 'checked' : ''}
          ${m.required ? 'disabled' : ''}>
        <span class="module-check__box">
          <span class="module-check__title">${escapeHtml(m.label || m.key)}</span>
          <span class="module-check__meta">${escapeHtml(m.required ? 'Siempre visible' : 'Visible en menú')}</span>
        </span>
      </label>
    `).join('');
  }

  function submitAdminReset_(ev) {
    ev.preventDefault();
    if (!APP.state.permissions.canResetData) {
      showError('Solo un SUPERUSER puede limpiar datos de prueba.');
      return;
    }

    const pin = String(document.getElementById('admin-reset-pin')?.value || '').trim();
    const confirmacion = String(document.getElementById('admin-reset-confirm')?.value || '').trim();

    if (!pin) {
      showError('Debes ingresar el PIN de seguridad.');
      return;
    }

    if (confirmacion.toUpperCase() !== 'LIMPIAR') {
      showError('Debes escribir LIMPIAR para confirmar.');
      return;
    }

    showContentLoading('Limpiando datos de prueba...');
    api('limpiarDatosPruebaAdmin', { pin, confirmacion }).then(res => {
      closeAdminResetModal_();
      const totalRows = (res.cleared || []).reduce((sum, item) => sum + Number(item.rows_cleared || 0), 0);
      showSuccess(`Datos de prueba limpiados. Hojas: ${(res.cleared || []).length}. Filas: ${totalRows}.`);
      APP.state.catalogStatus = { app: false, ingreso: false, organizacion: false };
      APP.state.currentFicha = null;
      APP.state.currentAvance = null;
      APP.state.avanceCatalogos = null;
      APP.state.avanceGrupos = [];
      APP.state.avanceGruposFetchedAt = 0;
      APP.state.avanceOrganizaciones = [];
      APP.state.avanceOrganizacionesFetchedAt = 0;
      APP.state.organizacionesModulo = [];
      APP.state.organizacionesModuloFetchedAt = 0;
      APP.state.currentBeneficiosDetalle = null;
      APP.state.currentBeneficioCodigo = '';
      APP.state.sociosOrganizaciones = [];
      APP.state.sociosOrganizacionesFetchedAt = 0;
      APP.state.renderedViews = {};
      route('inicio');
    }).catch(showError).finally(() => {
      hideContentLoading();
    });
  }

  function toggleTopQuickActions_(view) {
    const quick = document.getElementById('quick-actions');
    if (!quick) return;
    quick.style.display = view === 'inicio' ? 'grid' : 'none';
  }

  function route(view, params = {}) {
    view = normalizeModuleKey_(view) || view;
    if (!canOpenView_(view)) {
      showError('No tienes permisos para acceder a este módulo.');
      view = getFirstAllowedViewClient_();
      if (!view || !canOpenView_(view)) return;
    }

    APP.state.activeView = view;
    const wasRendered = !!APP.state.renderedViews[view];

    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(`view-${view}`)?.classList.add('active');

    document.querySelectorAll('.nav-btn').forEach(btn =>
      btn.classList.toggle('is-active', btn.dataset.view === view)
    );

    toggleTopQuickActions_(view);
    const finalizeRoute = () => {
      hideContentLoading();
      ensureViewRendered_(view);

      if (view === 'ficha' && APP.state.currentFicha && APP.state.currentFicha.summary) {
        renderFicha(APP.state.currentFicha);
      }

      if (view === 'avance' && wasRendered) {
        refreshAvanceViewOnRoute_();
      }

      if (view === 'organizacion' && wasRendered) {
        refreshOrganizacionesModuloList_();
      }

      if (view === 'instrumento' && wasRendered) {
        refreshBeneficiosModuloMinimo_();
      }

      if (view === 'inicio') {
        renderInicioView_();
      }

      if (view === 'socios' && wasRendered) {
        refreshSociosComites_();
        loadSociosModuleData_().catch(() => {});
      }

      if (view === 'historial') loadHistorial();
      if (view === 'usuarios' && APP.state.permissions.canManageUsers) loadUsers();
      if (view === 'configuracion' && APP.state.permissions.canManageConfig) loadConfiguracionView_();
      if (view === 'nuevo-ingreso') {
        renderNuevoIngresoView_();
      }

      setStatus(`Vista actual: ${friendlyViewName_(view)}`);
    };

    const catalogPromise = ensureCatalogsForView_(view);
    if (catalogPromise) {
      showContentLoading(view === 'socios' ? 'Cargando socios' : `Cargando ${friendlyViewName_(view)}...`);
      catalogPromise.then(finalizeRoute).catch(showError).finally(hideContentLoading);
      return;
    }

    finalizeRoute();
  }

  function runSearch() {
    const query = document.getElementById('search-query')?.value.trim() || '';
    const tbody = document.getElementById('search-results');
    const btn = document.getElementById('search-btn');
    const requestSeq = (APP.state.searchRequestSeq || 0) + 1;
    APP.state.searchRequestSeq = requestSeq;

    if (tbody) {
      tbody.innerHTML = '<tr><td colspan="6" class="muted">Buscando...</td></tr>';
    }
    if (btn) btn.disabled = true;
    showContentLoading('Buscando vecino...');

    api('buscarVecino', query).then(rows => {
      if (requestSeq !== APP.state.searchRequestSeq) return;
      APP.state.currentSearchResults = Array.isArray(rows) ? rows : [];

      setStatus(`Resultados búsqueda: ${APP.state.currentSearchResults.length}`, true);

      if (!tbody) return;

      if (!APP.state.currentSearchResults.length) {

      if (!data || !data.summary) {

      APP.state.currentFicha = data;

  function formatOrganizacionAntiguedad_(value) {
    const date = parseDateForAge_(value);
    if (!date) return 'Sin antigüedad disponible';

    const today = new Date();
    const diffMs = today.getTime() - date.getTime();
    const totalDays = Math.max(0, Math.floor(diffMs / 86400000));
    const totalMonths = Math.floor(totalDays / 30);
    const years = Math.floor(totalMonths / 12);
    const months = totalMonths % 12;
    const days = totalDays % 30;

    const yearText = `${years} ${years === 1 ? 'Año' : 'Años'}`;
    const monthText = `${months} ${months === 1 ? 'Mes' : 'Meses'}`;
    const dayText = `${days} ${days === 1 ? 'día' : 'días'}`;

    if (years > 0) {
      return `${yearText}, ${monthText} y ${dayText}`;
    }

    if (months > 0) {
      return `${monthText} y ${dayText}`;
    }

    return dayText;
  }

  function parseDateForAge_(value) {
    if (!value) return null;
    const raw = String(value).trim();
    if (!raw) return null;

    const iso = raw.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (iso) {
      const d = new Date(Number(iso[1]), Number(iso[2]) - 1, Number(iso[3]));
      return isNaN(d.getTime()) ? null : d;
    }

    const d = new Date(raw);
    return isNaN(d.getTime()) ? null : d;
  }

  function formatFechaHoraUi_(value) {
    if (!value) return '';

    if (value instanceof Date && !isNaN(value.getTime())) {
      const dd = `${value.getDate()}`.padStart(2, '0');
      const mm = `${value.getMonth() + 1}`.padStart(2, '0');
      const yyyy = value.getFullYear();
      const hh = `${value.getHours()}`.padStart(2, '0');
      const min = `${value.getMinutes()}`.padStart(2, '0');
      return `${dd}-${mm}-${yyyy} ${hh}:${min}`;
    }

    const raw = String(value || '').trim();
    if (!raw) return '';

    const isoDateTime = raw.match(/^(\d{4})-(\d{2})-(\d{2})[T\s](\d{2}):(\d{2})(?::\d{2})?/);
    if (isoDateTime) {
      return `${isoDateTime[3]}-${isoDateTime[2]}-${isoDateTime[1]} ${isoDateTime[4]}:${isoDateTime[5]}`;
    }

    const isoDate = raw.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if (isoDate) {
      return `${isoDate[3]}-${isoDate[2]}-${isoDate[1]}`;
    }

    return raw.replace('T', ' ');
  }

  function formatUiValue_(value) {
    if (value instanceof Date) return formatFechaHoraUi_(value);
    const raw = String(value == null ? '' : value);
    const trimmed = raw.trim();
    if (trimmed === 'Constituida sin instrumentos') return 'Constituida sin beneficios';
    const beneficioLabel = friendlyBeneficioLabel_(trimmed);
    if (beneficioLabel !== trimmed) return beneficioLabel;
    return /^\d{4}-\d{2}-\d{2}(?:[T\s]\d{2}:\d{2})?/.test(raw.trim())
      ? formatFechaHoraUi_(raw)
      : raw;
  }

  function validateIngresoField(el) {
    if (!el) return true;

    el.setCustomValidity('');
    const value = String(el.value || '').trim();

    if (el.required && !value) el.setCustomValidity('Este campo es obligatorio.');
    if (el.name === 'correo_contacto' && value && !/^\S+@\S+\.\S+$/.test(value)) {
      el.setCustomValidity('Ingresa un correo válido.');
    }
    if (el.name === 'telefono_contacto' && value && value.replace(/\D/g, '').length < 8) {
      el.setCustomValidity('Ingresa un teléfono válido.');
    }
    if (el.name === 'rut_vecino' && value && !/^[0-9.]+-[0-9kK]$/.test(value)) {
      el.setCustomValidity('Usa formato 12.345.678-9 o 12345678-9.');
    }

    el.reportValidity();
    return !el.validationMessage;
  }

    const form = document.getElementById('form-ingreso');
    let ok = true;

    form.querySelectorAll('input, textarea, select').forEach(el => {
      if (!validateIngresoField(el)) ok = false;
    });

    return ok;

  function saveIngresoFromForm(ev) {
    ev.preventDefault();

    if (!validateIngresoForm()) {
      return showError('Revisa los campos obligatorios antes de guardar.');
    }

    const payload = getIngresoPayload();

    payload.nombre_vecino = String(payload.nombre_vecino || '').trim();
    payload.apellido_vecino = String(payload.apellido_vecino || '').trim();
    payload.rut_vecino = String(payload.rut_vecino || '').trim();
    payload.telefono_contacto = String(payload.telefono_contacto || '').trim();
    payload.correo_contacto = String(payload.correo_contacto || '').trim();
    payload.direccion_original = String(payload.direccion_original || '').trim();
    payload.uv = String(payload.uv || '').trim();
    payload.sector = String(payload.sector || '').trim();
    payload.tipo_vivienda = String(payload.tipo_vivienda || '').trim();
    payload.fecha_solicitud = String(payload.fecha_solicitud || '').trim();
    payload.medio_solicitud = String(payload.medio_solicitud || '').trim();
    payload.unidad_origen = String(payload.unidad_origen || '').trim();
    payload.requerimiento_inicial = String(payload.requerimiento_inicial || '').trim();
    payload.observaciones_form = String(payload.observaciones_form || '').trim();

    const btn = ev.submitter || document.querySelector('#form-ingreso button[type="submit"], #form-ingreso .primary-btn');
    if (btn) {
      btn.disabled = true;
      btn.dataset.originalText = btn.innerHTML;
      btn.innerHTML = '<span class="material-symbols-outlined">progress_activity</span>Guardando...';
    }

    const proceed = () => {
      api('guardarIngreso', payload).then(res => {
        showSuccess(`Solicitud guardada: ${res.solicitud_id}`);
        clearIngresoForm(false);
        loadFicha({ solicitud_id: res.solicitud_id, organizacion_id: '' });
      }).catch(showError).finally(() => {
        if (btn) {
          btn.disabled = false;
          btn.innerHTML = btn.dataset.originalText || 'Guardar solicitud';
        }
      });
    };

    if (APP.state.ingresoMatches && APP.state.ingresoMatches.length) {
      const ok = window.confirm('Se detectaron coincidencias posibles. ¿Deseas guardar igualmente la nueva solicitud?');
      if (!ok) {
        if (btn) {
          btn.disabled = false;
          btn.innerHTML = btn.dataset.originalText || 'Guardar solicitud';
        }
        return;
      }
    }

    proceed();
  }

  function reviewIngresoMatches() {
    const payload = getIngresoPayload();
    const queries = [
      payload.telefono_contacto,
      payload.direccion_original,
      buildFullName(payload.nombre_vecino, payload.apellido_vecino)
    ].map(v => String(v || '').trim()).filter(Boolean);

    if (!queries.length) {
      showError('Completa al menos nombre, teléfono o dirección para revisar coincidencias.');
      return;
    }

    api('buscarCoincidenciasIngreso', payload).then(rows => {
      const matches = Array.isArray(rows) ? rows.slice(0, 10) : [];

      APP.state.ingresoMatches = matches;
      renderIngresoMatches(matches);

      if (matches.length) {
        showError('Se detectaron coincidencias posibles. Revisa antes de guardar.');
      } else {
        showSuccess('No se detectaron coincidencias evidentes. Puedes continuar.');
      }
    }).catch(showError);
  }

    const el = document.getElementById('ingreso-matches');

      el.innerHTML = '<div class="empty-state">No se detectaron coincidencias con nombre, teléfono o dirección.</div>';

  function openOrganizacionEditModal_(data = {}) {
    const modal = document.getElementById('org-edit-modal');
    const form = document.getElementById('org-edit-form');
    const title = document.getElementById('org-edit-title');
    if (!modal || !form) return;
    if (!data || !data.organizacion_id) {
      showError('Selecciona una organización existente para editar.');
      return;
    }

    form.reset();
    if (title) title.textContent = 'Editar organización';
    Array.from(form.elements).forEach(el => {
      if (!el.name) return;
      setFormFieldValue_(el, data[el.name] !== undefined ? data[el.name] : '');
    });
    const uv = form.querySelector('select[name="uv"]');
    const sector = form.querySelector('select[name="sector"]');
    if (uv && sector) {
      syncSectorOptions(sector, uv.value);
      if (data.sector) sector.value = data.sector;
    }
    setModalVisibility_(modal, true);
  }

  function closeOrganizacionEditModal_() {
    setModalVisibility_('org-edit-modal', false);
  }

  function openOrganizacionSocioCargoModal_(socioId) {
    const detalle = APP.state.currentOrganizacionDetalle || {};
    const socio = (detalle.socios || []).find(row => String(row.socio_id || '') === String(socioId || ''));
    if (!socio) {
      showError('No se encontró el socio seleccionado.');
      return;
    }

    const modal = document.getElementById('org-socio-cargo-modal');
    const id = document.getElementById('org-socio-cargo-id');
    const nombre = document.getElementById('org-socio-cargo-nombre');
    const run = document.getElementById('org-socio-cargo-run');
    const actual = document.getElementById('org-socio-cargo-actual');
    const select = document.getElementById('org-socio-cargo-select');
    if (!modal || !id || !select) return;

    id.value = socio.socio_id || '';
    if (nombre) nombre.textContent = socio.nombre_socio || 'Socio';
    if (run) run.textContent = socio.run_socio || '';
    if (actual) actual.textContent = socio.cargo || 'Sin cargo';
    const cargos = getSocioCargoOptions_();
    fillSelect(select, cargos, 'Seleccionar cargo');
    select.value = cargos.includes(socio.cargo) ? socio.cargo : 'Socio';

    setModalVisibility_(modal, true);
  }

  function closeOrganizacionSocioCargoModal_() {
    setModalVisibility_('org-socio-cargo-modal', false);
  }

  function saveOrganizacionSocioCargo_(ev) {
    ev.preventDefault();
    const org = APP.state.currentOrganizacionDetalle && APP.state.currentOrganizacionDetalle.organizacion;
    const socioId = String(document.getElementById('org-socio-cargo-id')?.value || '').trim();
    const cargo = String(document.getElementById('org-socio-cargo-select')?.value || '').trim();

    if (!org || !org.organizacion_id || !socioId) {
      showError('No se encontró el socio u organización seleccionada.');
      return;
    }

    if (!getSocioCargoOptions_().includes(cargo)) {
      showError('Debes seleccionar un cargo válido.');
      return;
    }

    showContentLoading('Actualizando cargo...');
    api('actualizarCargoSocioOrganizacion', {
      organizacion_id: org.organizacion_id,
      socio_id: socioId,
      cargo: cargo
    }).then(() => {
      closeOrganizacionSocioCargoModal_();
      showSuccess('Cargo de socio actualizado.');
      return loadOrganizacionDetalle_(org.organizacion_id);
    }).catch(showError).finally(() => {
      hideContentLoading();
    });
  }

  function saveOrganizacionDesdeModulo_(ev) {
    ev.preventDefault();
    const payload = serializeForm(ev.target);
    if (!String(payload.organizacion_id || '').trim()) {
      showError('El módulo Organizaciones solo permite editar organizaciones existentes.');
      return;
    }
    api('guardarOrganizacion', payload).then(res => {
      showSuccess(`Organización guardada: ${res.organizacion_id}`);
      closeOrganizacionEditModal_();
      APP.state.organizacionesModuloFetchedAt = 0;
      return ensureOrganizacionesModuloList_().then(() => {
        fillOrganizacionesSelect_();
        const select = document.getElementById('organizaciones-select');
        if (select) select.value = res.organizacion_id;
        return loadOrganizacionDetalle_(res.organizacion_id);
      });
    }).catch(showError);
  }

  function cambiarEstadoOrganizacionUi_(fn, actionLabel) {
    const org = APP.state.currentOrganizacionDetalle && APP.state.currentOrganizacionDetalle.organizacion;
    if (!org || !org.organizacion_id) return;

    const motivo = window.prompt(`Indica el motivo para ${actionLabel} la organización:`, '');
    if (motivo === null) return;

    api(fn, { organizacion_id: org.organizacion_id, motivo }).then(res => {
      showSuccess(`Organización actualizada: ${res.estado_general_organizacion}`);
      APP.state.organizacionesModuloFetchedAt = 0;
      return ensureOrganizacionesModuloList_().then(() => {
        fillOrganizacionesSelect_();
        const select = document.getElementById('organizaciones-select');
        if (select) select.value = org.organizacion_id;
        return loadOrganizacionDetalle_(org.organizacion_id);
      });
    }).catch(showError);
  }

  function copyTextToClipboard_(value, successMessage) {
    const text = String(value || '');
    if (!text.trim()) {
      showError('No hay contenido para copiar.');
      return;
    }

    const fallback = () => {
      const area = document.createElement('textarea');
      area.value = text;
      document.body.appendChild(area);
      area.select();
      document.execCommand('copy');
      area.remove();
      showSuccess(successMessage || 'Contenido copiado.');
    };

    if (!navigator.clipboard || typeof navigator.clipboard.writeText !== 'function') {
      fallback();
      return;
    }

    navigator.clipboard.writeText(text).then(() => {
      showSuccess(successMessage || 'Contenido copiado.');
    }).catch(() => {
      fallback();
    });
  }

    window.open(href, '_blank');

      hito_codigo: row.querySelector('input[name="hito_codigo"]')?.value || '',

  function saveBeneficioConfigFromFormLegacyInactive_(ev) {
    ev.preventDefault();
    return;
    ev.preventDefault();
    const form = ev.target;
    const payload = serializeForm(form);
    if ((APP.state.currentBeneficioCodigo || '') === 'FONDESE') {
      payload.hitos = collectFondeseConfigRows_();
    }

    const submitBtn = form.querySelector('button[type="submit"]');
    if (submitBtn) {
      submitBtn.disabled = true;
      submitBtn.dataset.originalText = submitBtn.innerHTML;
      submitBtn.innerHTML = '<span class="material-symbols-outlined">progress_activity</span>Guardando...';
    }

    api('guardarConfiguracionBeneficio', payload).then(res => {
      APP.state.currentBeneficioCodigo = res.beneficio_codigo || payload.beneficio_codigo || '';
      APP.state.currentBeneficioOrganizacionId = '';
      showSuccess(`Configuración guardada: ${friendlyBeneficioLabel_(APP.state.currentBeneficioCodigo)}`);
      return Promise.resolve();
    }).catch(showError).finally(() => {
      if (submitBtn) {
        submitBtn.disabled = false;
        submitBtn.innerHTML = submitBtn.dataset.originalText || 'Guardar configuración';
      }
    });
  }

  function saveBeneficioOrgFromFormLegacyInactive_(ev) {
    ev.preventDefault();
    return;
    ev.preventDefault();
    const form = ev.target;
    const payload = serializeForm(form);
    payload.tracking_fields = Array.from(form.querySelectorAll('[data-tracking-code]')).map((input, index) => ({
      hito_codigo: input.dataset.trackingCode || '',
      hito_nombre: input.dataset.trackingName || '',
      alerta_clave_flag: input.dataset.trackingAlert || 'No',
      fecha_referencia: input.value || '',
      orden_visual: String((index + 1) * 10)
    }));

    const submitBtn = form.querySelector('button[type="submit"]');
    if (submitBtn) {
      submitBtn.disabled = true;
      submitBtn.dataset.originalText = submitBtn.innerHTML;
      submitBtn.innerHTML = '<span class="material-symbols-outlined">progress_activity</span>Guardando...';
    }

    api('guardarBeneficioOrganizacion', payload).then(() => {
      showSuccess('Avance del beneficio guardado.');
      APP.state.currentBeneficioOrganizacionId = payload.organizacion_id || '';
      return Promise.resolve();
    }).catch(showError).finally(() => {
      if (submitBtn) {
        submitBtn.disabled = false;
        submitBtn.innerHTML = submitBtn.dataset.originalText || 'Guardar avance';
      }
    });
  }

  function deactivateBenefitOrgLegacyInactive_(organizacionId) {
    return;
    const orgId = String(organizacionId || '').trim();
    if (!orgId || !APP.state.currentBeneficioCodigo) return;
    const ok = window.confirm('Se retirará esta organización del beneficio y se conservará su historial. ¿Continuar?');
    if (!ok) return;
    api('desactivarBeneficioOrganizacion', {
      beneficio_codigo: APP.state.currentBeneficioCodigo,
      organizacion_id: orgId
    }).then(() => {
      showSuccess('Organizacion retirada del beneficio.');
      if (APP.state.currentBeneficioOrganizacionId === orgId) {
        APP.state.currentBeneficioOrganizacionId = '';
      }
      return Promise.resolve();
    }).catch(showError);
  }

  function beneficioModoFechaLabel_(mode) {
    const map = {
      rango: 'Rango de fechas',
      hasta: 'Fecha limite',
      fecha: 'Fecha unica',
      texto: 'Texto operativo'
    };
    return map[mode] || mode;
  }

  function beneficiosMetricHtml_(label, value) {
    return `<div class="beneficios-metric"><strong>${escapeHtml(String(value))}</strong><span>${escapeHtml(label)}</span></div>`;
  }

  function beneficioBadgeClass_(tone) {
    const map = {
      ok: 'beneficio-chip--ok',
      warning: 'beneficio-chip--warning',
      info: 'beneficio-chip--info',
      muted: 'beneficio-chip--muted'
    };
    return map[tone] || map.muted;
  }

  function renderSelectOptionsHtml_(options, currentValue, placeholder) {
    const current = String(currentValue || '').trim();
    const rows = Array.isArray(options) ? options : [];
    const items = rows.map(option => {
      const value = typeof option === 'string' ? option : (option.value || option.codigo || option.instrumento_codigo_catalogo || '');
      const label = typeof option === 'string' ? option : (option.label || option.descripcion || option.nombre || value);
      return `<option value="${escapeHtml(value)}" ${String(value) === current ? 'selected' : ''}>${escapeHtml(label)}</option>`;
    }).join('');
    return `<option value="">${escapeHtml(placeholder || 'Seleccionar')}</option>${items}`;
  }
  function parseSociosBulk(text, organizacionId, nombreComite) {
    const lines = text.split(/\r?\n/).map(x => x.trim()).filter(Boolean);
    return lines.map(line => {
      const parts = line.includes('\t') ? line.split('\t') : line.split(',');
      return {
        organizacion_id: organizacionId,
        run_socio: parts[0] || '',
        numero_registro: parts[1] || '',
        nombre_socio: parts[2] || '',
        edad: parts[3] || '',
        cargo: parts[4] || '',
        direccion_socio: parts[5] || '',
        ubicacion_socio: parts[6] || '',
        nombre_comite_origen: nombreComite || ''
      };
    }).filter(row => String(row.run_socio || '').toLowerCase() !== 'run_socio');
  }

  function validateSociosInput() {
    const selected = getSelectedSociosOrganizacion_('socios-bulk-organizacion');
    const text = document.getElementById('socios-bulk')?.value || '';
    const rows = parseSociosBulk(text, selected.organizacionId, selected.nombreComite);

    if (!selected.organizacionId) {
      showError('Debes seleccionar un comité.');
      return;
    }

    if (!rows.length) {
      showError('No hay filas para validar.');
      return;
    }

    const html = `<div class="panel"><h3>Vista previa</h3><p class="muted">Filas detectadas: ${rows.length}</p><div class="table-wrap"><table class="data-table"><thead><tr><th>RUN</th><th>Registro</th><th>Nombre</th><th>Cargo</th></tr></thead><tbody>${rows.slice(0, 20).map(r => `<tr><td>${escapeHtml(r.run_socio)}</td><td>${escapeHtml(r.numero_registro)}</td><td>${escapeHtml(r.nombre_socio)}</td><td>${escapeHtml(r.cargo)}</td></tr>`).join('')}</tbody></table></div></div>`;
    document.getElementById('socios-preview').innerHTML = html;
    APP.state.pendingSociosRows = rows;
    showSuccess('Carga validada visualmente. Revisa la vista previa y luego guarda.');
  }

  function saveSociosInput() {
    const rows = APP.state.pendingSociosRows || [];
    if (!rows.length) {
      showError('Primero valida la carga.');
      return;
    }

    api('importarSocios', { rows }).then(res => {
      showSuccess(`Socios importados: ${res.imported} de ${res.total}`);
      closeSociosModals_();
      APP.state.sociosModuleFetchedAt = 0;
      loadSociosModuleData_({ force: true }).catch(() => {});
      if (res.errors && res.errors.length) {
        document.getElementById('socios-preview').insertAdjacentHTML('beforeend', `<div class="message error">Errores: ${escapeHtml(JSON.stringify(res.errors))}</div>`);
      }
    }).catch(showError);
  }

  function getSociosComiteOptions_() {
    return (APP.state.sociosOrganizaciones || []).map(item => ({
      value: item.value,
      label: item.label
    }));
  }

  function getSociosOrganizacionLabelById_(organizacionId) {
    const key = String(organizacionId || '').trim();
    if (!key) return '';
    const found = (APP.state.sociosOrganizaciones || []).find(item => String(item.value || '').trim() === key);
    return found ? String(found.label || '').trim() : '';
  }

  function getSocioTelefonoDisplay_(row) {
    return String(row && row.telefono_contacto || '').trim() || 'Sin teléfono';
  }

  function normalizeSociosSearchText_(value) {
    return String(value == null ? '' : value)
      .toLowerCase()
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '')
      .replace(/\s+/g, ' ')
      .trim();
  }

  function filterSociosModuleRows_(rows, query) {
    const terms = normalizeSociosSearchText_(query).split(' ').filter(Boolean);
    if (!terms.length) return rows;

    return rows.filter(row => {
      const haystack = normalizeSociosSearchText_([
        row.nombre_socio,
        getSocioTelefonoDisplay_(row),
        row.nombre_comite,
        row.nombre_comite_origen,
        row.nombre_organizacion,
        row.cargo
      ].join(' '));
      return terms.every(term => haystack.includes(term));
    });
  }

  function getSociosTableSummaryText_(filteredCount, totalCount, query) {
    const hasQuery = !!normalizeSociosSearchText_(query);
    if (!totalCount) return 'No hay socios cargados.';
    if (!hasQuery) return `${totalCount} socio${totalCount === 1 ? '' : 's'} cargado${totalCount === 1 ? '' : 's'}.`;
    if (!filteredCount) return 'Sin resultados para la b\u00fasqueda actual.';
    return `${filteredCount} de ${totalCount} socio${totalCount === 1 ? '' : 's'}.`;
  }

  function updateSociosTableView_(rows) {
    const sourceRows = Array.isArray(rows) ? rows : (APP.state.sociosModuleRows || []);
    const queryInput = document.getElementById('socios-table-search');
    const query = queryInput ? queryInput.value : (APP.state.sociosModuleQuery || '');
    const filteredRows = filterSociosModuleRows_(sourceRows, query);
    const body = document.getElementById('socios-table-body');
    const count = document.querySelector('.socios-panel__count');
    const summary = document.getElementById('socios-table-summary');
    const hasQuery = !!normalizeSociosSearchText_(query);

    APP.state.sociosModuleQuery = query;

    if (body) {
      const emptyMessage = sourceRows.length
        ? 'Sin resultados para la b\u00fasqueda actual.'
        : 'No hay socios cargados.';
      body.innerHTML = renderSociosTableRows_(filteredRows, { emptyMessage });
    }
    if (count) count.textContent = hasQuery ? `${filteredRows.length}/${sourceRows.length}` : String(sourceRows.length || 0);
    if (summary) summary.textContent = getSociosTableSummaryText_(filteredRows.length, sourceRows.length, query);
    bindSociosTableActions_();
    return filteredRows;
  }

  function getSocioDetailFields_(row) {
    const socio = row || {};
    const comiteLabel = String(socio.nombre_comite || socio.nombre_comite_origen || getSociosOrganizacionLabelById_(socio.organizacion_id) || socio.nombre_organizacion || '').trim();
    return [
      ['RUN', socio.run_socio],
      ['Número de registro', socio.numero_registro],
      ['Nombre', socio.nombre_socio],
      ['Edad', socio.edad],
      ['Cargo', socio.cargo],
      ['Dirección', socio.direccion_socio],
      ['Ubicación', socio.ubicacion_socio],
      ['Comité asociado', comiteLabel],
      ['Organización', socio.nombre_organizacion],
      ['Organización ID', socio.organizacion_id],
      ['Solicitud ID', socio.solicitud_id],
      ['Teléfono contacto', socio.telefono_contacto],
      ['Correo contacto', socio.correo_contacto],
      ['Estado de carga', socio.status_carga],
      ['Actualizado por', socio.updated_by],
      ['Última actualización', socio.updated_at]
    ].filter(item => item[1] !== undefined && item[1] !== null && String(item[1]).trim() !== '');
  }

  function renderSociosTableEmptyRow_(message) {
    return `<tr><td colspan="3" class="socios-table__empty">${escapeHtml(message || 'No hay socios cargados.')}</td></tr>`;
  }

  function renderSociosTableRows_(rows, options = {}) {
    if (!rows.length) {
      return renderSociosTableEmptyRow_(options.emptyMessage || 'No hay socios cargados.');
    }

    return rows.map(row => `
      <tr>
        <td>
          <div class="socios-table__name">${escapeHtml(row.nombre_socio || 'Sin nombre')}</div>
          <small>${escapeHtml(String(row.cargo || row.nombre_comite || row.nombre_comite_origen || '').trim() || 'Sin cargo')}</small>
        </td>
        <td>${escapeHtml(getSocioTelefonoDisplay_(row))}</td>
        <td class="socios-table__action-cell">
          <button
            type="button"
            class="table-action-btn socios-table__action-btn"
            data-socio-detail-open="${escapeHtml(row.socio_id || '')}"
            aria-label="Ver detalle de ${escapeHtml(row.nombre_socio || 'socio')}"
            title="Ver detalle"
          >
            <span class="material-symbols-outlined">search</span>
          </button>
        </td>
      </tr>
    `).join('');
  }

  function renderSociosTableSection_(rows) {
    const totalRows = rows.length || 0;
    return `
      <section class="socios-data-panel socios-table-panel">

  function loadSociosModuleData_(options = {}) {
    const force = !!options.force;
    const now = Date.now();
    const body = document.getElementById('socios-table-body');
    const count = document.querySelector('.socios-panel__count');
    const canReuse = !force
      && APP.state.sociosModuleRows.length
      && APP.state.sociosModuleFetchedAt
      && (now - APP.state.sociosModuleFetchedAt) < 30000;

    if (canReuse) {
      updateSociosTableView_(APP.state.sociosModuleRows);
      return Promise.resolve(APP.state.sociosModuleRows);
    }

    if (body) {
      body.innerHTML = '<tr><td colspan="3" class="socios-table__empty">Cargando socios...</td></tr>';
    }
    if (count) count.textContent = '...';

    return api('getSociosModuloClient').then(data => {
      APP.state.sociosModuleRows = (data && data.rows) || [];
      APP.state.sociosModuleFetchedAt = Date.now();
      updateSociosTableView_(APP.state.sociosModuleRows);
      return APP.state.sociosModuleRows;
    }).catch(err => {
      if (body) {
        body.innerHTML = '<tr><td colspan="3" class="socios-table__empty">No fue posible cargar los socios.</td></tr>';
      }
      if (count) count.textContent = '0';
      showError(err);
      throw err;
    });
  }

  function openSocioDetailModal_(socioId) {
    const id = String(socioId || '').trim();
    const row = (APP.state.sociosModuleRows || []).find(item => String(item.socio_id || '').trim() === id);
    if (!row) {
      showError('No se encontró el detalle del socio seleccionado.');
      return;
    }

    APP.state.currentSocioDetalle = row;
    const modal = document.getElementById('socios-detail-modal');
    const title = document.getElementById('socios-detail-title');
    const subtitle = document.getElementById('socios-detail-subtitle');
    const content = document.getElementById('socios-detail-content');
    if (!modal || !title || !subtitle || !content) return;

    const comiteLabel = String(row.nombre_comite || row.nombre_comite_origen || getSociosOrganizacionLabelById_(row.organizacion_id) || row.nombre_organizacion || '').trim();
    title.textContent = row.nombre_socio || 'Ficha de socio';
    subtitle.textContent = comiteLabel
      ? `Comité asociado: ${comiteLabel}`
      : 'Información completa del registro seleccionado.';
    content.innerHTML = renderSocioDetailContent_(row);
    setModalVisibility_(modal, true);
  }

  function closeSocioDetailModal_() {
    setModalVisibility_('socios-detail-modal', false);
  }

  function handleSociosBulkFile_(ev) {
    const file = ev.target.files && ev.target.files[0];
    if (!file) return;

    if (/\.(xlsx|xls)$/i.test(file.name)) {
      showError('Para esta carga usa Excel exportado como CSV o TSV.');
      ev.target.value = '';
      return;
    }

    const reader = new FileReader();
    reader.onload = () => {
      const textarea = document.getElementById('socios-bulk');
      if (textarea) textarea.value = String(reader.result || '');
      APP.state.pendingSociosRows = [];
      showSuccess('Archivo cargado. Valida la carga antes de guardar.');
    };
    reader.onerror = () => showError('No se pudo leer el archivo.');
    reader.readAsText(file);
  }

  function getSelectedSociosOrganizacion_(selectId) {
    const select = document.getElementById(selectId);
    const organizacionId = select ? String(select.value || '').trim() : '';
    const nombreComite = select && select.selectedOptions && select.selectedOptions[0]
      ? String(select.selectedOptions[0].textContent || '').trim()
      : '';
    return { organizacionId, nombreComite };
  }

  function saveSocioManual_(options = {}) {
    const keepOpen = !!options.keepOpen;
    clearSociosManualFeedback_();
    const selected = getSelectedSociosOrganizacion_('socios-manual-organizacion');
    if (!selected.organizacionId) {
      showSociosManualFeedback_('Debes seleccionar un comité.', 'error');
      return;
    }

    const direccionSocio = document.getElementById('socios-manual-direccion')?.value.trim() || '';
    const row = {
      organizacion_id: selected.organizacionId,
      run_socio: document.getElementById('socios-manual-run')?.value.trim() || '',
      numero_registro: document.getElementById('socios-manual-registro')?.value.trim() || '',
      nombre_socio: document.getElementById('socios-manual-nombre')?.value.trim() || '',
      edad: document.getElementById('socios-manual-edad')?.value.trim() || '',
      cargo: document.getElementById('socios-manual-cargo')?.value.trim() || '',
      direccion_socio: direccionSocio,
      ubicacion_socio: buildSocioUbicacionFromDireccion_(direccionSocio),
      nombre_comite_origen: selected.nombreComite
    };

    if (!row.nombre_socio) {
      showSociosManualFeedback_('Debes indicar el nombre del socio.', 'error');
      return;
    }
    if (!row.cargo || !getSocioCargoOptions_().includes(row.cargo)) {
      showSociosManualFeedback_('Debes seleccionar un cargo válido.', 'error');
      return;
    }

    setSociosManualSubmitting_(true);
    if (keepOpen) {
      showSociosManualFeedback_('Guardando socio...', 'loading');
    } else {
      closeSociosModals_();
      showContentLoading('Guardando socio...');
    }

    api('importarSocios', { rows: [row] }).then(res => {
      if (!res || res.ok === false) {
        const detail = res && Array.isArray(res.errors) && res.errors[0] ? res.errors[0].error : 'No se pudo guardar el socio.';
        throw new Error(detail);
      }
      const saved = (res && Array.isArray(res.importedRows) && res.importedRows[0]) || row;
      APP.state.sociosModuleFetchedAt = 0;
      loadSociosModuleData_({ force: true }).catch(() => {});
      if (keepOpen) {
        showSociosManualLastMessage_(saved);
        clearSociosManualFields_();
        clearSociosManualFeedback_();
      } else {
        showSuccess(`Socio guardado: ${res.imported} de ${res.total}`);
      }
      renderSociosManualSavedPreview_(saved);
    }).catch(err => {
      if (!keepOpen) {
        setModalVisibility_('socios-manual-modal', true);
      }
      showSociosManualFeedback_(getErrorMessage_(err), 'error');
    }).finally(() => {
      setSociosManualSubmitting_(false);
      if (!keepOpen) hideContentLoading();
    });
  }

  function clearSociosManualFields_() {
    [
      'socios-manual-run',
      'socios-manual-registro',
      'socios-manual-nombre',
      'socios-manual-edad',
      'socios-manual-cargo',
      'socios-manual-direccion'
    ].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = '';
    });
    document.getElementById('socios-manual-run')?.focus();
  }

  function buildSocioUbicacionFromDireccion_(direccion) {
    const value = String(direccion || '').trim();
    return value ? `${value}, Providencia` : '';
  }

  function showSociosManualLastMessage_(socio) {
    const el = document.getElementById('socios-manual-last-message');
    if (!el) return;
    const nombre = socio && socio.nombre_socio ? socio.nombre_socio : 'Socio';
    const numero = socio && (socio.numero_registro || socio.socio_id) ? ` · Socio N° ${socio.numero_registro || socio.socio_id}` : '';
    el.textContent = `Último socio agregado: ${nombre}${numero}`;
    el.classList.remove('is-hidden');
  }

  function showSociosManualFeedback_(message, type = 'error') {
    const el = document.getElementById('socios-manual-feedback');
    if (!el) return;
    el.className = `socios-manual-feedback socios-manual-feedback--${type}`;
    el.textContent = message || '';
    el.classList.toggle('is-hidden', !message);
  }

  function clearSociosManualFeedback_() {
    showSociosManualFeedback_('', 'error');
  }

  function setSociosManualSubmitting_(isSubmitting) {
    ['socios-manual-save-btn', 'socios-manual-save-add-btn'].forEach(id => {
      const btn = document.getElementById(id);
      if (btn) btn.disabled = !!isSubmitting;
    });
  }

  function getErrorMessage_(err) {
    return err && err.message ? err.message : String(err || 'No se pudo completar la operación.');
  }

  function renderSociosManualSavedPreview_(row) {
    const preview = document.getElementById('socios-preview');
    if (!preview) return;

    preview.innerHTML = `
      <div class="panel">
        <h3>Último socio guardado</h3>
        <p class="muted">${escapeHtml(row.nombre_socio)} asociado a ${escapeHtml(row.nombre_comite_origen || row.organizacion_id)}</p>
      </div>
    `;
  }

  function loadHistorial() {
    const rangeSelect = document.getElementById('history-range-filter');
    const tbody = document.getElementById('history-results');
    if (rangeSelect && !rangeSelect.dataset.bound) {
      rangeSelect.dataset.bound = 'true';
      rangeSelect.addEventListener('change', loadHistorial);
    }

    const selectedPeriod = rangeSelect && rangeSelect.value ? rangeSelect.value : 'last_month';
    const selectedLabel = rangeSelect && rangeSelect.options && rangeSelect.selectedIndex >= 0
      ? String(rangeSelect.options[rangeSelect.selectedIndex].text || '').trim()
      : 'este período';
    const requestSeq = (APP.state.historialRequestSeq || 0) + 1;
    APP.state.historialRequestSeq = requestSeq;

    if (rangeSelect) rangeSelect.disabled = true;
    if (tbody) {
      tbody.innerHTML = `<tr><td colspan="8" class="muted">Cargando historial para ${escapeHtml(selectedLabel.toLowerCase())}...</td></tr>`;
    }
    showContentLoading('Cargando historial...');

    api('listarHistorial', { periodo: selectedPeriod }).then(rows => {
      if (requestSeq !== APP.state.historialRequestSeq || !tbody) return;

      rows = Array.isArray(rows) ? rows : [];
      if (!rows.length) {
        tbody.innerHTML = `<tr><td colspan="8" class="muted">No hay registros para ${escapeHtml(selectedLabel.toLowerCase())}.</td></tr>`;
        setStatus(`Historial cargado: 0 registros para ${selectedLabel.toLowerCase()}.`, true);
        return;
      }

      tbody.innerHTML = rows.map(r => `
        <tr>
          <td>${escapeHtml(formatFechaHoraUi_(r.timestamp || ''))}</td>
          <td><span class="badge">${escapeHtml(r.source_label || '')}</span></td>
          <td>${escapeHtml(r.email || '')}</td>
          <td>${escapeHtml(r.action || '')}</td>
          <td>${escapeHtml(r.entity_type || '')}</td>
          <td>${escapeHtml(r.entity_id || '')}</td>
          <td>${escapeHtml(r.result || '')}</td>
          <td class="history-detail-cell">${escapeHtml(r.detail_text || 'Sin detalle')}</td>
        </tr>
      `).join('');
      setStatus(`Historial cargado: ${rows.length} registros para ${selectedLabel.toLowerCase()}.`, true);
    }).catch(err => {
      if (requestSeq === APP.state.historialRequestSeq && tbody) {
        tbody.innerHTML = `<tr><td colspan="8" class="muted">No fue posible cargar el historial para ${escapeHtml(selectedLabel.toLowerCase())}.</td></tr>`;
      }
      showError(err);
    }).finally(() => {
      if (requestSeq !== APP.state.historialRequestSeq) return;
      if (rangeSelect) rangeSelect.disabled = false;
      hideContentLoading();
    });
  }
  function loadUsers() {
    if (!APP.state.permissions.canManageUsers) return Promise.resolve([]);

    showContentLoading('Cargando usuarios...');
    return api('listUsers').then(rows => {

      if (!tbody) return [];

      const moduleLabel = user => user.superuser_flag

      if (!rows.length) {
        tbody.innerHTML = '<tr><td colspan="7" class="muted">No hay usuarios registrados para mostrar.</td></tr>';
        return rows;
      }
      tbody.innerHTML = rows.map(r => `

              </button>
              <button class="table-action-btn table-action-btn--danger js-delete-user" type="button" title="Desactivar usuario" aria-label="Desactivar usuario" data-email="${escapeHtml(r.email)}" data-name="${escapeHtml(r.nombre_visible || r.email)}" ${normalizeUiBool_(r.activo_flag, false) ? '' : 'disabled'}>

              </button>

      tbody.querySelectorAll('.js-edit-user').forEach(btn => {

      tbody.querySelectorAll('.js-delete-user').forEach(btn => {
        btn.addEventListener('click', () => openUserDeleteModal_(btn));
      });
      return rows;
    }).catch(showError).finally(hideContentLoading);
  }

  function normalizeUiBool_(value, defaultValue) {
    if (value === true || value === false) return value;
    const normalized = String(value ?? '').trim().toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    if (!normalized) return defaultValue;
    if (['si', 'true', '1', 'activo', 'activa', 'active'].includes(normalized)) return true;
    if (['no', 'false', '0', 'inactivo', 'inactiva', 'inactive'].includes(normalized)) return false;
    return defaultValue;
  }

  function renderUserBooleanLabel_(value) {
    return normalizeUiBool_(value, false) ? 'S\u00ed' : 'No';
  }

  function renderUserActiveLabel_(value) {
    const active = normalizeUiBool_(value, false);
    return `<span class="user-status-pill ${active ? 'is-active' : 'is-inactive'}">${active ? 'S\u00ed' : 'No'}</span>`;
  }

  function markUserInactiveInTable_(email) {
    const normalizedEmail = String(email || '').trim().toLowerCase();
    if (!normalizedEmail) return;

    document.querySelectorAll('#users-results tr').forEach(row => {
      const firstCell = row.querySelector('td');
      if (!firstCell || firstCell.textContent.trim().toLowerCase() !== normalizedEmail) return;
      row.classList.add('is-inactive');
      const activeCell = row.children[3];
      if (activeCell) activeCell.innerHTML = renderUserActiveLabel_(false);
      row.querySelector('.js-delete-user')?.setAttribute('disabled', 'disabled');
    });
  }

  function moduleLabelsFromKeys_(keys) {
    const defs = getAssignableModuleDefinitions_();
    const byKey = {};
    const hiddenKeys = new Set((APP.state.moduleDefinitions || [])
      .filter(module => module.assignable === false)
      .map(module => module.key));
    defs.forEach(m => byKey[m.key] = m.label || m.key);
    return (keys || [])
      .map(k => String(k || '').trim())
      .filter(Boolean)
      .filter(k => !hiddenKeys.has(k))
      .map(k => byKey[k] || k)
      .join(', ') || 'Sin módulos';
  }

  function saveUserFromForm() {
    const btn = document.getElementById('save-user-btn');
    let payload;
    try {
      const profile = normalizeEditableUserProfile_(document.getElementById('user-role-input')?.value || '');
      payload = {
        email: buildProvidenciaEmailFromInput_(),
        nombre_visible: document.getElementById('user-name-input')?.value.trim() || '',
        perfil: profile,
        activo_flag: document.getElementById('user-active-input')?.value === 'true',
        superuser_flag: false,
        modulos_permitidos: collectUserModules_('user-modules-input', profile)
      };
    } catch (err) {
      showError(err);
      return;
    }

    if (btn) btn.disabled = true;
    showContentLoading('Guardando usuario...');
    api('updateUser', payload).then(() => {
      showSuccess('Usuario actualizado.');
      const emailInput = document.getElementById('user-email-local');
      const nameInput = document.getElementById('user-name-input');
      const roleInput = document.getElementById('user-role-input');
      if (emailInput) emailInput.value = '';
      if (nameInput) nameInput.value = '';
      if (roleInput) roleInput.value = 'operador';
      renderUserModuleOptions_();
      syncUserModulesVisibility_('user-role-input', 'user-modules-field', 'user-modules-input');
      loadUsers();
    }).catch(showError).finally(() => {
      if (btn) btn.disabled = false;
      hideContentLoading();
    });
  }

  function collectUserModules_(targetId, roleValue) {
    const role = normalizeEditableUserProfile_(roleValue || document.getElementById(targetId === 'user-edit-modules-input' ? 'user-edit-role-input' : 'user-role-input')?.value || '');
    if (!roleAllowsManualModules_(role)) {
      return ['inicio'];
    }
    const selected = getCheckedUserModules_(targetId);
    getAssignableModuleDefinitions_()
      .filter(module => module.required)
      .forEach(module => {
        if (!selected.includes(module.key)) selected.unshift(module.key);
      });
    return selected;
  }

  function showError(error) {
    const message = typeof error === 'string'

      : (error && error.message ? error.message : 'Ocurrió un error.');
    setStatus(message, false);

  function setStatus(message, ok) {
    const el = document.getElementById('status-message');

    el.textContent = message;

  function friendlyBeneficioLabel_(value) {
    const raw = String(value || '').trim();
    if (!raw) return '';

    const fromCatalog = (APP.state.catalogs.beneficiosBase || []).find(item =>
      String(item.beneficio_codigo || '').trim() === raw

    if (fromCatalog && fromCatalog.beneficio_nombre) return fromCatalog.beneficio_nombre;

    const fallback = {
      CHARLAS_CAPACITACIONES: 'CAPACITACIONES',
      FONDESE: 'FONDESE',
      CAMARAS_1414: 'Cámaras 1414'
    };
    return fallback[raw] || raw;

  function buildFullName(name, last) {

  function todayISO_() {
    const d = new Date();
    const m = `${d.getMonth() + 1}`.padStart(2, '0');
    const day = `${d.getDate()}`.padStart(2, '0');
    return `${d.getFullYear()}-${m}-${day}`;
