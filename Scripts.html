  function escapeHtml(value) {

  function initOrganizacionForm_() {
    const form = document.getElementById('form-organizacion');
    if (!form || form.dataset.orgInit === 'true') return;

    form.dataset.orgInit = 'true';

    const selector = form.querySelector('[name="organizacion_id"]');
    if (!selector) return;

    initOrganizacionImageField_();
    toggleOrganizacionFormLock_(true);

    selector.disabled = false;

    selector.addEventListener('change', () => {
      const orgId = String(selector.value || '').trim();

      if (!orgId) {
        clearOrganizacionFormExceptSelector_();
        toggleOrganizacionFormLock_(true);
        selector.disabled = false;
        return;
      }

      toggleOrganizacionFormLock_(true);
      hydrateOrganizacionForm_(orgId).then(() => {
        toggleOrganizacionFormLock_(false);
        selector.disabled = false;
      }).catch(showError);
    });

  function toggleOrganizacionFormLock_(locked) {
    const form = document.getElementById('form-organizacion');
    if (!form) return;

    Array.from(form.elements).forEach(el => {
      if (!el.name && !el.dataset.orgImageAction) return;
      if (el.name === 'organizacion_id') return;

      const tag = String(el.tagName || '').toLowerCase();
      const type = String(el.type || '').toLowerCase();

      if (type === 'hidden') return;

      if (tag === 'select' || type === 'file' || tag === 'button' || type === 'submit') {
        el.disabled = locked;
      } else {
        el.readOnly = locked;
      }
    });

    form.querySelectorAll('[data-org-image-action]').forEach(btn => {
      btn.disabled = locked;
    });

    form.querySelectorAll('.image-upload__file').forEach(input => {
      input.disabled = locked;
    });
  }

  function clearOrganizacionFormExceptSelector_() {
    const form = document.getElementById('form-organizacion');
    if (!form) return;

    Array.from(form.elements).forEach(el => {
      if (!el.name || el.name === 'organizacion_id') return;
      setFormFieldValue_(el, '');
    });

    refreshOrganizacionImageField_();
  }

  function hydrateOrganizacionForm_(organizacionId) {
    const form = document.getElementById('form-organizacion');
    if (!form) return Promise.resolve();

    const data = (APP.state.catalogs.organizacionesById || {})[organizacionId];
    if (data) {
      applyOrganizacionFormData_(form, data);
      return Promise.resolve(data);
    }

    showContentLoading('Cargando organización...');

    return api('getOrganizacionClientById', { organizacion_id: organizacionId }).then(payload => {
      const snapshot = payload || {};
      APP.state.catalogs.organizacionesById = {
        ...(APP.state.catalogs.organizacionesById || {}),
        [organizacionId]: snapshot
      };
      applyOrganizacionFormData_(form, snapshot);
      return snapshot;
    }).finally(() => {
      hideContentLoading();
    });
  }

  function applyOrganizacionFormData_(form, data) {
    Array.from(form.elements).forEach(el => {
      if (!el.name || el.name === 'organizacion_id') return;
      const value = data[el.name] !== undefined ? data[el.name] : '';
      setFormFieldValue_(el, value);
    });

    const uvSelect = form.querySelector('[name="uv"]');
    const sectorSelect = form.querySelector('[name="sector"]');
    if (uvSelect && sectorSelect) {
      syncSectorOptions(sectorSelect, uvSelect.value);
      if (data.sector) sectorSelect.value = data.sector;
    }

    refreshOrganizacionImageField_();
  }

  function upsertOrganizacionCatalogEntry_(record) {
    if (!record || !record.organizacion_id) return;

    const orgId = String(record.organizacion_id || '').trim();
    const label = String(record.nombre_organizacion || '').trim();
    if (!orgId || !label) return;

    const list = Array.isArray(APP.state.catalogs.organizacionesList)
      ? APP.state.catalogs.organizacionesList.slice()
      : [];

    const nextEntry = { value: orgId, label: label };
    const index = list.findIndex(item => String(item && item.value || '') === orgId);

    if (index === -1) {
      list.push(nextEntry);
    } else {
      list[index] = nextEntry;
    }

    list.sort((a, b) => String(a.label || '').localeCompare(String(b.label || ''), 'es'));
    APP.state.catalogs.organizacionesList = list;
    APP.state.catalogs.organizacionesById = {
      ...(APP.state.catalogs.organizacionesById || {}),
      [orgId]: {
        ...((APP.state.catalogs.organizacionesById || {})[orgId] || {}),
        ...record
      }
    };

    const selector = document.querySelector('#form-organizacion [name="organizacion_id"]');
    if (selector) {
      const currentValue = String(selector.value || '').trim() || orgId;
      fillSelect(selector, list, 'Seleccionar organización');
      selector.value = currentValue;
    }
  }

  function setFormFieldValue_(el, value) {
    if (!el) return;

    let finalValue = value == null ? '' : value;

    if (String(el.type || '').toLowerCase() === 'date' && String(finalValue).trim()) {
      finalValue = String(finalValue).slice(0, 10);
    }

    el.value = finalValue;
  }

  function initOrganizacionImageField_() {
    const form = document.getElementById('form-organizacion');
    if (!form) return;

    const wrapper = form.querySelector('[data-image-field="imagen_logo_base64"]');
    if (!wrapper || wrapper.dataset.initialized === 'true') return;

    wrapper.dataset.initialized = 'true';

    const hidden = wrapper.querySelector('input[type="hidden"][name="imagen_logo_base64"]');
    const fileInput = wrapper.querySelector('.image-upload__file');
    const uploadBtn = wrapper.querySelector('[data-org-image-action="upload"]');
    const removeBtn = wrapper.querySelector('[data-org-image-action="remove"]');

    if (uploadBtn && fileInput) {
      uploadBtn.addEventListener('click', () => fileInput.click());
    }

    if (fileInput && hidden) {
      fileInput.addEventListener('change', ev => {
        const file = ev.target.files && ev.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = e => {
          hidden.value = String(e.target.result || '');
          refreshOrganizacionImageField_();
        };
        reader.readAsDataURL(file);
      });
    }

    if (removeBtn && hidden && fileInput) {
      removeBtn.addEventListener('click', () => {
        hidden.value = '';
        fileInput.value = '';
        refreshOrganizacionImageField_();
      });
    }

    refreshOrganizacionImageField_();
  }

  function refreshOrganizacionImageField_() {
    const form = document.getElementById('form-organizacion');
    if (!form) return;

    const wrapper = form.querySelector('[data-image-field="imagen_logo_base64"]');
    if (!wrapper) return;

    const hidden = wrapper.querySelector('input[type="hidden"][name="imagen_logo_base64"]');
    const preview = wrapper.querySelector('.image-upload__preview');

    if (!hidden || !preview) return;

    const value = String(hidden.value || '').trim();

    if (!value) {
      preview.innerHTML = '<div class="empty-state">Sin imagen</div>';
      return;
    }

    preview.innerHTML = `<img src="${escapeHtml(value)}" alt="Imagen organización" class="image-upload__img">`;
  }

    if (standbyBtn && !standbyBtn.dataset.bound) {

      standbyBtn.addEventListener('click', () => cambiarEstadoAvanceUi_('Stand by'));
    }

    if (detenerBtn && !detenerBtn.dataset.bound) {
      detenerBtn.dataset.bound = 'true';
      detenerBtn.addEventListener('click', () => cambiarEstadoAvanceUi_('Detenido'));
    }

    if (reactivarBtn && !reactivarBtn.dataset.bound) {
      reactivarBtn.dataset.bound = 'true';
      reactivarBtn.addEventListener('click', () => cambiarEstadoAvanceUi_('Activo'));
    }

    if (modalCloseBtn && !modalCloseBtn.dataset.bound) {
      modalCloseBtn.dataset.bound = 'true';
      modalCloseBtn.addEventListener('click', closeAvanceHitoModal_);
    }

    if (modalCancelBtn && !modalCancelBtn.dataset.bound) {
      modalCancelBtn.dataset.bound = 'true';
      modalCancelBtn.addEventListener('click', closeAvanceHitoModal_);
    }

    if (modalSaveBtn && !modalSaveBtn.dataset.bound) {
      modalSaveBtn.dataset.bound = 'true';
      modalSaveBtn.addEventListener('click', submitAvanceHitoModal_);
    }

    const orgNombre = document.getElementById('avance-modal-org-nombre');
    const orgNombreError = document.getElementById('avance-modal-org-nombre-error');
    if (orgNombre && !orgNombre.dataset.bound) {
      orgNombre.dataset.bound = 'true';
      orgNombre.addEventListener('input', () => {
        if (orgNombreError) orgNombreError.classList.add('is-hidden');
      });
    }

    if (modal && !modal.dataset.bound) {
      modal.dataset.bound = 'true';
      modal.addEventListener('click', ev => {
        if (ev.target && ev.target.dataset && ev.target.dataset.avanceModalClose === 'true') {
          closeAvanceHitoModal_();
        }
      });
    }

    if (reminderCloseBtn && !reminderCloseBtn.dataset.bound) {
      reminderCloseBtn.dataset.bound = 'true';
      reminderCloseBtn.addEventListener('click', closeAvanceBeneficioReminderModal_);
    }

    if (reminderDismissBtn && !reminderDismissBtn.dataset.bound) {
      reminderDismissBtn.dataset.bound = 'true';
      reminderDismissBtn.addEventListener('click', closeAvanceBeneficioReminderModal_);
    }

    if (reminderOpenBtn && !reminderOpenBtn.dataset.bound) {
      reminderOpenBtn.dataset.bound = 'true';
      reminderOpenBtn.addEventListener('click', openCamaras1414FromReminder_);
    }

    if (reminderModal && !reminderModal.dataset.bound) {
      reminderModal.dataset.bound = 'true';
      reminderModal.addEventListener('click', ev => {
        if (ev.target && ev.target.dataset && ev.target.dataset.avanceBeneficioClose === 'true') {
          closeAvanceBeneficioReminderModal_();
        }
      });
    }

    loadAvanceCatalogos_().then(() => {
      fillSelect(
        grupoSelect,
        APP.state.avanceGrupos.map(x => ({
          value: x.value,
          label: x.label
        })),
        'Seleccionar Grupo de vecinos'
      );

      fillSelect(
        select,
        APP.state.avanceOrganizaciones.map(x => ({
          value: x.value,
          label: x.label
        })),
        'Seleccionar organización'
      );

      if (grupoSelect && !grupoSelect.dataset.bound) {
        grupoSelect.dataset.bound = 'true';
        grupoSelect.addEventListener('change', () => {
          const solicitudId = String(grupoSelect.value || '').trim();
          if (select) select.value = '';
          if (!solicitudId) {
            clearAvanceView_();
            return;
          }
          loadAvanceGrupoVecinos_(solicitudId);
        });
      }

      if (select && !select.dataset.bound) {
        select.dataset.bound = 'true';
        select.addEventListener('change', () => {
          const orgId = String(select.value || '').trim();
          if (grupoSelect) grupoSelect.value = '';
          if (!orgId) {
            clearAvanceView_();
            return;
          }
          loadAvanceOrganizacion_(orgId);
        });
      }

      lockAvanceActions_(true);
    }).catch(showError);
  }

  function clampPct_(value) {
    const n = Number(value || 0);
    if (!isFinite(n)) return 0;
    return Math.max(0, Math.min(100, Math.round(n)));
  }

  function buildProgressBarHtml_(label, done, total) {
    const safeDone = Number(done || 0);
    const safeTotal = Number(total || 0);
    const pct = safeTotal > 0 ? clampPct_((safeDone / safeTotal) * 100) : 0;

    return `
      <div class="avance-resumen-bar">
        <div class="avance-resumen-bar__head">
          <div class="avance-resumen-bar__label">${escapeHtml(label)}</div>
          <div class="avance-resumen-bar__meta">${safeDone} de ${safeTotal}</div>
        </div>

        <div class="avance-resumen-bar__row">
          <div class="avance-resumen-bar__track">
            <div class="avance-resumen-bar__fill" style="width:${pct}%"></div>
          </div>
          <div class="avance-resumen-bar__pct">${pct}%</div>
        </div>
      </div>
    `;
  }

  function refreshAvanceViewOnRoute_() {
    const select = document.getElementById('avance-organizacion-select');
    const grupoSelect = document.getElementById('avance-grupo-select');
    if (!select && !grupoSelect) return;

    const now = Date.now();
    if (
      APP.state.avanceOrganizaciones.length &&
      APP.state.avanceGrupos.length &&
      APP.state.avanceOrganizacionesFetchedAt &&
      (now - APP.state.avanceOrganizacionesFetchedAt) < 30000
    ) {
      return;
    }

    const currentValue = String(select.value || '').trim();
    const currentGrupoValue = String(grupoSelect?.value || '').trim();

    Promise.all([
      api('getGruposVecinosAvanceClient'),
      api('getOrganizacionesAvanceClient')
    ]).then(([grupos, data]) => {
      APP.state.avanceGrupos = (grupos && grupos.gruposList) || [];
      APP.state.avanceGruposFetchedAt = Date.now();
      APP.state.avanceOrganizaciones = (data && data.organizacionesList) || [];
      APP.state.avanceOrganizacionesFetchedAt = Date.now();
      fillSelect(
        grupoSelect,
        APP.state.avanceGrupos.map(x => ({ value: x.value, label: x.label })),
        'Seleccionar Grupo de vecinos'
      );
      fillSelect(
        select,
        APP.state.avanceOrganizaciones.map(x => ({ value: x.value, label: x.label })),
        'Seleccionar organización'
      );

      if (currentValue && APP.state.avanceOrganizaciones.some(x => String(x.value) === currentValue)) {
        select.value = currentValue;
      }
      if (currentGrupoValue && APP.state.avanceGrupos.some(x => String(x.value) === currentGrupoValue)) {
        grupoSelect.value = currentGrupoValue;
      }
    }).catch(console.error);
  }

  function loadAvanceCatalogos_() {
    const now = Date.now();
    if (
      APP.state.avanceCatalogos &&
      APP.state.avanceOrganizaciones.length &&
      APP.state.avanceGrupos.length &&
      APP.state.avanceOrganizacionesFetchedAt &&
      APP.state.avanceGruposFetchedAt &&
      (now - APP.state.avanceOrganizacionesFetchedAt) < 30000 &&
      (now - APP.state.avanceGruposFetchedAt) < 30000
    ) {
      return Promise.resolve();
    }

    showContentLoading('Cargando módulo de avance...');

    return Promise.all([
      api('getCatalogosAvanceClient'),
      api('getGruposVecinosAvanceClient'),
      api('getOrganizacionesAvanceClient')
    ]).then(([catalogos, grupos, organizaciones]) => {
      APP.state.avanceCatalogos = catalogos || {};
      APP.state.avanceGrupos = (grupos && grupos.gruposList) || [];
      APP.state.avanceGruposFetchedAt = Date.now();
      APP.state.avanceOrganizaciones = (organizaciones && organizaciones.organizacionesList) || [];
      APP.state.avanceOrganizacionesFetchedAt = Date.now();
    }).finally(() => {
      hideContentLoading();
    });
  }

  function loadAvanceOrganizacion_(organizacionId) {
    showContentLoading('Cargando avance...');

    return api('getAvanceOrganizacion', { organizacion_id: organizacionId }).then(data => {
      APP.state.currentAvance = data;
      renderAvanceResumen_(data);
      renderAvanceBotones_(data);
      renderAvanceTimeline_(data.timeline || []);
      lockAvanceActions_(false, data);
      setStatus('Avance cargado correctamente.', true);
    }).catch(err => {
      APP.state.currentAvance = null;
      clearAvanceView_();
      showError(err);
    }).finally(() => {
      hideContentLoading();
    });
  }

  function loadAvanceGrupoVecinos_(solicitudId) {
    showContentLoading('Cargando avance de Grupo de vecinos...');

    return api('getAvanceGrupoVecinos', { solicitud_id: solicitudId }).then(data => {
      APP.state.currentAvance = data;
      renderAvanceResumen_(data);
      renderAvanceBotones_(data);
      renderAvanceTimeline_(data.timeline || []);
      lockAvanceActions_(true, data);
      setStatus('Avance de Grupo de vecinos cargado correctamente.', true);
    }).catch(err => {
      APP.state.currentAvance = null;
      clearAvanceView_();
      showError(err);
    }).finally(() => {
      hideContentLoading();
    });
  }

  function normalizeAvanceTramoKey_(value) {
    return String(value || '')
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '')
      .toLowerCase()
      .trim();
  }

  function isAvanceHitoCreacionOrganizacion_(item) {
    const tramo = normalizeAvanceTramoKey_(item && item.tramo);
    const nombre = normalizeAvanceTramoKey_(item && item.nombre_hito);
    const codigo = String(item && item.codigo_hito || '').trim().toUpperCase();
    const isHito5 = codigo === 'PRE_05' || Number(item && item.orden_hito || 0) === 5;
    return isHito5
      && tramo.includes('preconstitucion')
      && (nombre.includes('ingreso') || nombre.includes('documentacion'));
  }

  function getAvanceTramoItems_(tramos, aliases) {
    const keys = (aliases || []).map(normalizeAvanceTramoKey_);
    const tramo = (tramos || []).find(t => keys.includes(normalizeAvanceTramoKey_(t && t.tramo)));
    return tramo && Array.isArray(tramo.items) ? tramo.items : [];
  }

  function renderAvanceResumen_(data) {
    const el = document.getElementById('avance-resumen');
    if (!el) return;

    const r = (data && data.resumen) || {};
    const estado = (data && data.estado && data.estado.estado_avance) || 'Activo';
    const tramos = (data && data.botones && data.botones.tramos) || [];
    const isGrupo = String(data && data.context_type || '') === 'grupo_vecinos';

    const tramoPreItems = getAvanceTramoItems_(tramos, ['Preconstitucion']);
    const tramoForItems = getAvanceTramoItems_(tramos, ['Formalizacion', 'Formalizacion posterior']);
    const catalogosAvance = APP.state.avanceCatalogos || {};
    const catalogoPreItems = ((catalogosAvance.hitosPorTramo || {}).preconstitucion || []);
    const catalogoForItems = ((catalogosAvance.hitosPorTramo || {}).formalizacion || []);

    const totalPre = Math.max(tramoPreItems.length, catalogoPreItems.length, Number(r.total_hitos_tramo_pre || 0));
    const donePre = tramoPreItems.filter(x => x.completed_flag).length;

    const totalFor = Math.max(tramoForItems.length, catalogoForItems.length, Number(r.total_hitos_tramo_for || 0));
    const doneFor = tramoForItems.filter(x => x.completed_flag).length;

    const totalGeneral = totalPre + totalFor;
    const doneGeneral = donePre + doneFor;

    el.className = 'avance-resumen';
    el.innerHTML = `
      <div class="avance-resumen-layout">
        <aside class="avance-resumen-card" aria-label="Resumen de organizacion">
          <div class="avance-resumen-card__title">Ficha de avance</div>

          <div class="avance-resumen-card__grid">
            <div class="avance-resumen-card__item"><strong>Estado</strong><span>${escapeHtml(estado)}</span></div>
            <div class="avance-resumen-card__item"><strong>${isGrupo ? 'Grupo de vecinos' : 'Organización'}</strong><span>${escapeHtml(r.nombre_organizacion || '')}</span></div>
            <div class="avance-resumen-card__item"><strong>Solicitud</strong><span>${escapeHtml(r.solicitud_id || '')}</span></div>
            <div class="avance-resumen-card__item"><strong>Último hito</strong><span>${escapeHtml(r.ultimo_hito_nombre || 'Sin registros')}</span></div>
            <div class="avance-resumen-card__item"><strong>Fecha último hito</strong><span>${escapeHtml(formatFechaHoraUi_(r.ultimo_hito_fecha || ''))}</span></div>
            <div class="avance-resumen-card__item"><strong>Usuario último hito</strong><span>${escapeHtml(r.usuario_ultimo_hito || '')}</span></div>
          </div>
        </aside>

        <section class="avance-resumen-progress" aria-label="Resumen de avance">
          <div class="avance-resumen-progress__title">Resumen de avance</div>
          <div class="avance-resumen-bars">
            ${buildProgressBarHtml_('Total hitos cumplidos', doneGeneral, totalGeneral)}
            ${buildProgressBarHtml_('Preconstitución', donePre, totalPre)}
            ${buildProgressBarHtml_('Formalización', doneFor, totalFor)}
          </div>
        </section>
      </div>
    `;
  }

  function renderAvanceBotones_(data) {
    const pre = document.getElementById('avance-pre-grid');
    const post = document.getElementById('avance-for-grid');
    if (!pre || !post) return;

    pre.className = 'avance-hitos-grid';
    post.className = 'avance-hitos-grid';
    pre.dataset.layout = 'grid';
    post.dataset.layout = 'grid';

    const tramos = (data && data.botones && data.botones.tramos) || [];
    const tramoPreItems = getAvanceTramoItems_(tramos, ['Preconstitucion']);
    const tramoForItems = getAvanceTramoItems_(tramos, ['Formalizacion', 'Formalizacion posterior']);

    pre.innerHTML = tramoPreItems.map(renderAvanceProgressRow_).join('');
    post.innerHTML = tramoForItems.map(renderAvanceProgressRow_).join('');

    document.querySelectorAll('.js-avance-hito').forEach(btn => {
      btn.addEventListener('click', () => registrarHitoAvanceUi_(btn.dataset.codigo));
    });
  }

  function renderAvanceProgressRow_(item) {
    const disabled = !item.enabled_flag ? 'disabled' : '';
    const completed = item.completed_flag ? 'is-completed' : '';
    const blocked = !item.enabled_flag && !item.completed_flag ? 'is-blocked' : '';
    const enabled = item.enabled_flag && !item.completed_flag ? 'is-enabled' : '';
    const icon = item.completed_flag
      ? 'check'
      : (!item.enabled_flag && !item.completed_flag ? 'remove' : 'radio_button_unchecked');
    const iconLabel = item.completed_flag
      ? 'Hito cumplido'
      : (!item.enabled_flag && !item.completed_flag ? 'Hito bloqueado' : 'Hito disponible');

    const statusText = item.completed_flag
      ? 'Cumplido'
      : (!item.enabled_flag && !item.completed_flag ? 'Bloqueado' : 'Disponible');
    const statusDetail = item.completed_flag
      ? escapeHtml(formatFechaHoraUi_(item.fecha_hito || 'Registrado'))
      : item.blocked_reason
        ? escapeHtml(item.blocked_reason)
        : 'Clic para registrar';
    const titleAttr = item.blocked_reason
      ? ` title="${escapeHtml(item.blocked_reason)}"`
      : '';
    const hitoLabel = `Hito ${Number(item.orden_hito || 0) || ''}`.trim();

    return `
      <button
        type="button"
        class="avance-hito-card js-avance-hito ${completed} ${blocked} ${enabled}"
        data-codigo="${escapeHtml(item.codigo_hito || '')}"
        aria-label="${iconLabel}: ${escapeHtml(item.nombre_hito || '')}"
        aria-disabled="${disabled ? 'true' : 'false'}"
        data-estado="${escapeHtml(statusText)}"
        ${titleAttr}
        ${disabled}>
        <div class="avance-hito-card__head">
          <div class="avance-hito-card__eyebrow">${escapeHtml(hitoLabel)}</div>
          <div class="avance-hito-card__icon" aria-hidden="true">
            <span class="material-symbols-outlined">${icon}</span>
          </div>
        </div>
        <div class="avance-hito-card__body">
          <div class="avance-hito-card__title">${escapeHtml(item.nombre_hito || '')}</div>
          <div class="avance-hito-card__status">${escapeHtml(statusText)}</div>
          <div class="avance-hito-card__detail">${statusDetail}</div>
        </div>
      </button>
    `;
  }

  function renderAvanceTimeline_(rows) {
    const el = document.getElementById('avance-timeline');
    if (!el) return;

    if (!rows || !rows.length) {
      el.className = 'avance-timeline empty-state';
      el.innerHTML = 'No hay hitos registrados.';
      return;
    }

    el.className = 'avance-timeline';
    el.innerHTML = rows.map(r => `
      <div class="match-card">
        <h4>${escapeHtml(r.nombre_hito || '')}</h4>
        <p><strong>Tramo:</strong> ${escapeHtml(r.tramo || '')}</p>
        <p><strong>Fecha:</strong> ${escapeHtml(formatFechaHoraUi_(r.fecha_hito || ''))}</p>
        <p><strong>Usuario:</strong> ${escapeHtml(r.usuario_registro || '')}</p>
        <p><strong>Observación:</strong> ${escapeHtml(r.observacion || '')}</p>
      </div>
    `).join('');
  }

  function registrarHitoAvanceUi_(codigoHito) {
    const current = APP.state.currentAvance || {};
    const isGrupo = String(current.context_type || '') === 'grupo_vecinos';
    const select = document.getElementById(isGrupo ? 'avance-grupo-select' : 'avance-organizacion-select');
    const selectedId = String(select?.value || '').trim();

    if (!selectedId) {
      showError(isGrupo ? 'Debes seleccionar un Grupo de vecinos.' : 'Debes seleccionar una organización.');
      return;
    }

    const tramos = (((APP.state.currentAvance || {}).botones || {}).tramos || []);
    const items = tramos.flatMap(t => t.items || []);
    const item = items.find(x => String(x.codigo_hito || '') === String(codigoHito || ''));

    if (!item) {
      showError('No se encontró el hito seleccionado.');
      return;
    }

    if (!item.enabled_flag) {
      showError(item.blocked_reason || 'Este hito no está disponible.');
      return;
    }

    openAvanceHitoModal_(item);
  }

  function openAvanceHitoModal_(item) {
    const modal = document.getElementById('avance-hito-modal');
    const title = document.getElementById('avance-modal-title');
    const codigo = document.getElementById('avance-modal-codigo');
    const fecha = document.getElementById('avance-modal-fecha');
    const obs = document.getElementById('avance-modal-observacion');
    const orgNombreField = document.getElementById('avance-modal-org-nombre-field');
    const orgNombre = document.getElementById('avance-modal-org-nombre');
    const orgNombreError = document.getElementById('avance-modal-org-nombre-error');

    if (!modal || !title || !codigo || !fecha || !obs) return;

    title.textContent = item.nombre_hito || 'Registrar hito';
    codigo.value = item.codigo_hito || '';
    fecha.value = todayISO_();
    obs.value = '';
    if (orgNombreField && orgNombre) {
      const requiereNombre = isAvanceHitoCreacionOrganizacion_(item);
      orgNombreField.classList.toggle('is-hidden', !requiereNombre);
      orgNombre.required = requiereNombre;
      orgNombre.disabled = !requiereNombre;
      orgNombre.value = '';
      if (orgNombreError) orgNombreError.classList.add('is-hidden');
    }

    setModalVisibility_(modal, true);
  }

  function closeAvanceHitoModal_() {
    setModalVisibility_('avance-hito-modal', false);
  }

  function openAvanceBeneficioReminderModal_(payload) {
    const data = payload || {};
    const title = document.getElementById('avance-beneficio-reminder-title');
    const message = document.getElementById('avance-beneficio-reminder-message');
    const org = document.getElementById('avance-beneficio-reminder-org');
    const openBtn = document.getElementById('avance-beneficio-reminder-open-btn');
    if (title) title.textContent = data.beneficio_nombre || 'CAMARAS 1414';
    if (message) message.textContent = data.message || 'La organización ya es elegible para CAMARAS 1414.';
    if (org) {
      org.textContent = [data.organizacion_nombre || '', data.organizacion_id || ''].filter(Boolean).join(' · ');
    }
    if (openBtn) {
      openBtn.dataset.organizacionId = data.organizacion_id || '';
      openBtn.dataset.beneficioCodigo = data.beneficio_codigo || 'CAMARAS_1414';
    }
    setModalVisibility_('avance-beneficio-reminder-modal', true);
  }

  function closeAvanceBeneficioReminderModal_() {
    setModalVisibility_('avance-beneficio-reminder-modal', false);
  }

  function openCamaras1414FromReminder_() {
    const btn = document.getElementById('avance-beneficio-reminder-open-btn');
    APP.state.currentBeneficioCodigo = btn?.dataset.beneficioCodigo || 'CAMARAS_1414';
    APP.state.currentBeneficioOrganizacionId = btn?.dataset.organizacionId || '';
    closeAvanceBeneficioReminderModal_();
    route('instrumento');
  }

  function submitAvanceHitoModal_() {
    const current = APP.state.currentAvance || {};
    const isGrupo = String(current.context_type || '') === 'grupo_vecinos';
    const orgSelect = document.getElementById('avance-organizacion-select');
    const grupoSelect = document.getElementById('avance-grupo-select');
    const codigo = document.getElementById('avance-modal-codigo');
    const fecha = document.getElementById('avance-modal-fecha');
    const obs = document.getElementById('avance-modal-observacion');
    const orgNombre = document.getElementById('avance-modal-org-nombre');
    const orgNombreError = document.getElementById('avance-modal-org-nombre-error');

    const organizacionId = String(orgSelect?.value || '').trim();
    const solicitudId = String(grupoSelect?.value || '').trim();
    const codigoHito = String(codigo?.value || '').trim();
    const fechaHito = String(fecha?.value || '').trim();
    const observacion = String(obs?.value || '').trim();
    const nombreOrganizacionVariable = String(orgNombre?.value || '').trim();

    if (isGrupo && !solicitudId) {
      showError('Debes seleccionar un Grupo de vecinos.');
      return;
    }

    if (!isGrupo && !organizacionId) {
      showError('Debes seleccionar una organización.');
      return;
    }

    if (!codigoHito) {
      showError('No se encontró el código del hito.');
      return;
    }

    if (!fechaHito) {
      showError('Debes indicar la fecha del hito.');
      return;
    }

    const tramos = (((APP.state.currentAvance || {}).botones || {}).tramos || []);
    const items = tramos.flatMap(t => t.items || []);
    const item = items.find(x => String(x.codigo_hito || '') === codigoHito);
    const requiereNombreOrganizacion = item && isAvanceHitoCreacionOrganizacion_(item);
    if (orgNombreError) orgNombreError.classList.add('is-hidden');
    if (requiereNombreOrganizacion && !nombreOrganizacionVariable) {
      if (orgNombreError) orgNombreError.classList.remove('is-hidden');
      if (orgNombre) orgNombre.focus();
      return;
    }

    const nombreOrganizacionAsamblea = requiereNombreOrganizacion
      ? `COMITE DE SEGURIDAD ${nombreOrganizacionVariable}`.replace(/\s+/g, ' ').trim()
      : '';

    closeAvanceHitoModal_();
    showContentLoading(requiereNombreOrganizacion ? 'Creando organización...' : 'Registrando hito...');

    api('registrarHitoAvance', {
      organizacion_id: isGrupo ? '' : organizacionId,
      solicitud_id: isGrupo ? solicitudId : '',
      codigo_hito: codigoHito,
      fecha_hito: fechaHito,
      observacion: observacion,
      nombre_organizacion_asamblea: nombreOrganizacionAsamblea
    }).then(res => {
      showSuccess(res && res.warning_nombre_duplicado
        ? `Hito registrado correctamente. Advertencia: ${res.warning_nombre_duplicado}`
        : 'Hito registrado correctamente.');
      const benefitReminder = res && res.beneficio_recordatorio ? res.beneficio_recordatorio : null;
      if (isGrupo) {
        APP.state.avanceOrganizacionesFetchedAt = 0;
        APP.state.avanceGruposFetchedAt = 0;
        if (res && res.organizacion_id) {
          return loadAvanceCatalogos_().then(() => {
            fillSelect(
              document.getElementById('avance-organizacion-select'),
              APP.state.avanceOrganizaciones.map(x => ({ value: x.value, label: x.label })),
              'Seleccionar organización'

  function initUserEmailField_() {
    const input = document.getElementById('user-email-local');
    if (!input || input.dataset.bound === '1') return;
    input.dataset.bound = '1';

    const normalizeLocal = () => {
      const raw = String(input.value || '').trim().toLowerCase().replace(/\s+/g, '');
      const domain = getAllowedUserDomain_();
      if (!raw) {
        input.value = '';
        return;
      }

      const parts = raw.split('@').filter(Boolean);
      if (parts.length === 1) {
        input.value = parts[0];
        return;
      }

      if (parts.length === 2 && parts[1] === domain) {
        input.value = parts[0];
      }
    };

    input.addEventListener('blur', normalizeLocal);
    input.addEventListener('paste', () => setTimeout(normalizeLocal, 0));
  }

  function buildProvidenciaEmailFromInput_() {
    const input = document.getElementById('user-email-local');
    const raw = String(input?.value || '').trim().toLowerCase().replace(/\s+/g, '');
    const domain = getAllowedUserDomain_();
    if (!raw) throw new Error('Debes ingresar el email del usuario.');

    let localPart = raw;
    if (raw.includes('@')) {
      const parts = raw.split('@').filter(Boolean);
      if (parts.length !== 2 || parts[1] !== domain) {
        throw new Error(`Solo se permiten usuarios con correo @${domain}.`);
      }
      localPart = parts[0];
    }

    if (!/^[a-z0-9._-]+$/.test(localPart)) {
      throw new Error('El correo solo puede contener letras, números, puntos, guiones y guion bajo.');
    }

    if (input) input.value = localPart;
    return `${localPart}@${domain}`;
  }

    const defs = getNavigableModuleDefinitions_().slice().sort((a, b) => Number(a.order || 0) - Number(b.order || 0));

      return acc;

  function submitConfiguracionSection_(ev) {
    ev.preventDefault();
    const form = ev.currentTarget;
    const section = form.dataset.configSection;
    if (!section) return;

    if (section === 'branding') {
      const validation = validateConfiguracionBrandingForm_(form);
      if (!validation.ok) {
        showError(validation.message || 'Revisa los datos de branding antes de guardar.');
        return;
      }
    }

    const payload = collectConfiguracionSectionPayload_(section, form);
    const submitBtn = form.querySelector('button[type="submit"]');
    if (submitBtn) {
      submitBtn.disabled = true;
    }

    showContentLoading('Guardando configuración...');
    api('saveSystemConfigSection', { section, data: payload }).then(res => {
      APP.state.systemConfig = (res && res.config) || APP.state.systemConfig || {};
      APP.state.moduleDefinitions = (res && res.moduleDefinitions) || APP.state.moduleDefinitions || [];
      BOOTSTRAP.systemConfig = (res && res.clientConfig) || BOOTSTRAP.systemConfig || {};
      APP.state.activeConfigSection = section;
      applySystemConfigUi_();
      applyModuleDefinitionsUi_();
      renderConfiguracionSections_();
      showSuccess('Configuración guardada.');
    }).catch(showError).finally(() => {
      if (submitBtn) submitBtn.disabled = false;
      hideContentLoading();
    });

  function normalizeHexColor_(value) {
    const text = String(value == null ? '' : value).trim();
    if (!/^#([0-9a-fA-F]{3}|[0-9a-fA-F]{6})$/.test(text)) return '';
    const compact = text.length === 4
      ? `#${text[1]}${text[1]}${text[2]}${text[2]}${text[3]}${text[3]}`
      : text;
    return compact.toUpperCase();
  }

  function normalizeBrandingLogoDataUri_(value) {
    const text = String(value == null ? '' : value).trim();
    if (!text) return '';
    if (/^data:image\/[a-zA-Z0-9.+-]+;base64,[A-Za-z0-9+/=\s]+$/i.test(text)) return text.replace(/\s+/g, '');
    if (/^[A-Za-z0-9+/=\s]+$/.test(text) && text.replace(/\s+/g, '').length > 64) {
      return `data:image/png;base64,${text.replace(/\s+/g, '')}`;
    }
    return '';
  }

  function bindConfiguracionBrandingSection_() {
    const form = document.querySelector('#config-section-branding form[data-config-section="branding"]');
    if (!form || form.dataset.boundBranding === '1') return;
    form.dataset.boundBranding = '1';

    form.querySelectorAll('[data-branding-logo-input]').forEach(input => {
      input.addEventListener('input', () => {
        updateConfiguracionBrandingLogoCard_(input.closest('[data-branding-logo-card]'), form);
      });
    });

    form.querySelectorAll('[data-branding-color-card]').forEach(card => {
      const textInput = card.querySelector('[data-branding-color-text]');
      const pickerInput = card.querySelector('[data-branding-color-picker]');
      if (pickerInput) {
        pickerInput.addEventListener('input', () => {
          if (textInput) textInput.value = pickerInput.value.toUpperCase();
          updateConfiguracionBrandingColorCard_(card, form, true);
        });
      }
      if (textInput) {
        textInput.addEventListener('input', () => updateConfiguracionBrandingColorCard_(card, form, false));
        textInput.addEventListener('blur', () => {
          const normalized = normalizeHexColor_(textInput.value);
          if (normalized) {
            textInput.value = normalized;
            updateConfiguracionBrandingColorCard_(card, form, false);
          }
        });
      }
      updateConfiguracionBrandingColorCard_(card, form, false);
    });

    form.querySelectorAll('[data-branding-logo-card]').forEach(card => {
      updateConfiguracionBrandingLogoCard_(card, form);
    });

    bindConfiguracionVisualKit_(form);
    updateConfiguracionBrandingPreviewPanel_(form);
  }

  function bindConfiguracionVisualKit_(form) {
    const kit = form.querySelector('[data-branding-visual-kit]');
    if (!kit || kit.dataset.boundVisualKit === '1') return;
    kit.dataset.boundVisualKit = '1';
    kit.querySelectorAll('[data-ui-kit-mode-btn]').forEach(btn => {
      btn.addEventListener('click', () => setConfiguracionVisualKitMode_(kit, btn.dataset.uiKitModeBtn || 'both'));
    });
    setConfiguracionVisualKitMode_(kit, kit.dataset.uiKitMode || 'both');
  }

  function setConfiguracionVisualKitMode_(kit, mode) {
    if (!kit) return;
    const normalized = ['light', 'dark', 'both'].includes(mode) ? mode : 'both';
    kit.dataset.uiKitMode = normalized;
    kit.querySelectorAll('[data-ui-kit-mode-btn]').forEach(btn => {
      const active = (btn.dataset.uiKitModeBtn || '') === normalized;
      btn.classList.toggle('is-active', active);
      btn.setAttribute('aria-pressed', active ? 'true' : 'false');
    });
    kit.querySelectorAll('[data-ui-kit-canvas]').forEach(canvas => {
      const key = canvas.dataset.uiKitCanvas || '';
      canvas.classList.toggle('is-hidden', normalized !== 'both' && key !== normalized);
    });
  }

  function updateConfiguracionBrandingColorCard_(card, form, fromPicker) {
    if (!card) return;
    const textInput = card.querySelector('[data-branding-color-text]');
    const pickerInput = card.querySelector('[data-branding-color-picker]');
    const swatch = card.querySelector('[data-branding-color-swatch]');
    const valueLabel = card.querySelector('[data-branding-color-label]');
    const hint = card.querySelector('[data-branding-color-hint]');
    const fallback = card.dataset.colorFallback || '#000000';
    const role = card.dataset.colorRole || '';

    if (fromPicker && pickerInput && textInput) {
      textInput.value = pickerInput.value.toUpperCase();
    }

    const normalized = normalizeHexColor_(textInput ? textInput.value : '');
    if (normalized) {
      card.dataset.colorValid = 'true';
      card.classList.remove('is-invalid');
      if (pickerInput) pickerInput.value = normalized;
      if (swatch) swatch.style.background = normalized;
      if (valueLabel) valueLabel.textContent = normalized;
      if (hint) hint.textContent = role;
    } else {
      card.dataset.colorValid = 'false';
      card.classList.add('is-invalid');
      if (swatch) swatch.style.background = 'linear-gradient(135deg, rgba(161,42,42,.14) 0%, rgba(161,42,42,.14) 44%, rgba(255,255,255,.85) 44%, rgba(255,255,255,.85) 56%, rgba(161,42,42,.14) 56%, rgba(161,42,42,.14) 100%)';
      if (valueLabel) valueLabel.textContent = String((textInput && textInput.value) || fallback || '').trim() || fallback;
      if (hint) hint.textContent = 'Valor inválido. Usa formato #RRGGBB o #RGB.';
    }

    updateConfiguracionBrandingPreviewPanel_(form);
  }

  function updateConfiguracionBrandingLogoCard_(card, form) {
    if (!card) return;
    const input = card.querySelector('[data-branding-logo-input]');
    const preview = card.querySelector('[data-branding-logo-preview]');
    const image = card.querySelector('[data-branding-logo-image]');
    const empty = card.querySelector('[data-branding-logo-empty]');
    const chip = card.querySelector('[data-branding-logo-chip]');
    const status = card.querySelector('[data-branding-logo-status]');
    const rawValue = String(input && input.value || '').trim();
    const normalized = normalizeBrandingLogoDataUri_(rawValue);

    const setState = (state, chipText, title, body) => {
      card.dataset.logoState = state;
      if (chip) chip.textContent = chipText;
      if (status) status.textContent = body;
      if (preview) preview.dataset.logoState = state;
      if (empty) {
        const titleEl = empty.querySelector('strong');
        const bodyEl = empty.querySelector('p');
        if (titleEl) titleEl.textContent = title;
        if (bodyEl) bodyEl.textContent = body;
      }
    };

    if (!rawValue) {
      if (image) {
        image.hidden = true;
        image.removeAttribute('src');
      }
      if (empty) empty.hidden = false;
      setState('empty', 'Sin logo', 'Sin logo cargado', 'Pega un data URI válido para ver la vista previa.');
      updateConfiguracionBrandingPreviewPanel_(form);
      return;
    }

    if (!normalized) {
      if (image) {
        image.hidden = true;
        image.removeAttribute('src');
      }
      if (empty) empty.hidden = false;
      setState('invalid', 'Inválido', 'Logo no válido', 'El valor debe ser un data URI de imagen base64 o base64 puro compatible.');
      updateConfiguracionBrandingPreviewPanel_(form);
      return;
    }

    if (!image) return;
    if (empty) empty.hidden = false;
    image.hidden = true;
    setState('loading', 'Validando', 'Validando logo', 'Verificando que la imagen pueda renderizarse sin romper la UI.');
    image.onload = () => {
      if (String(input && input.value || '').trim() !== rawValue) return;
      image.hidden = false;
      if (empty) empty.hidden = true;
      setState('valid', 'Valido', 'Logo listo', 'Vista previa cargada correctamente.');
      updateConfiguracionBrandingPreviewPanel_(form);
    };
    image.onerror = () => {
      if (String(input && input.value || '').trim() !== rawValue) return;
      image.hidden = true;
      image.removeAttribute('src');
      if (empty) empty.hidden = false;
      setState('invalid', 'Inválido', 'Logo no válido', 'El contenido parece imagen, pero no pudo renderizarse.');
      updateConfiguracionBrandingPreviewPanel_(form);
    };
    image.src = normalized;
  }

  function updateConfiguracionBrandingPreviewLogo_(slot, sourceCard, fallbackText) {
    if (!slot) return;
    const image = slot.querySelector('[data-branding-preview-logo-image]');
    const empty = slot.querySelector('[data-branding-preview-logo-empty]');
    const sourceImage = sourceCard ? sourceCard.querySelector('[data-branding-logo-image]') : null;
    const isValid = sourceCard && sourceCard.dataset.logoState === 'valid' && sourceImage && sourceImage.getAttribute('src');

    if (isValid) {
      if (image) {
        image.src = sourceImage.getAttribute('src');
        image.hidden = false;
      }
      if (empty) empty.hidden = true;
      return;
    }

    if (image) {
      image.hidden = true;
      image.removeAttribute('src');
    }
    if (empty) {
      empty.hidden = false;
      empty.textContent = fallbackText;
    }
  }

  function updateConfiguracionBrandingPreviewPanel_(form) {
    if (!form) return;
    const preview = form.querySelector('[data-branding-mini-preview]');
    if (!preview) return;

    const getValue = name => {
      const field = form.querySelector(`[name="${name}"]`);
      return field ? field.value : '';
    };

    const definitions = getBrandingColorDefinitions_();
    definitions.forEach(def => {
      const normalized = normalizeHexColor_(getValue(def.name)) || normalizeHexColor_(def.fallback) || '#000000';
      const previewValue = preview.querySelector(`[data-branding-preview-value="${def.name}"]`);
      const previewDot = preview.querySelector(`[data-branding-preview-dot="${def.name}"]`);
      if (previewValue) previewValue.textContent = normalized;
      if (previewDot) previewDot.style.background = normalized;
    });

    preview.style.setProperty('--branding-primary', normalizeHexColor_(getValue('primaryColor')) || '#214E8A');
    preview.style.setProperty('--branding-secondary', normalizeHexColor_(getValue('secondaryColor')) || '#007C4A');
    preview.style.setProperty('--branding-accent', normalizeHexColor_(getValue('accentColor')) || '#03C2AE');
    preview.style.setProperty('--branding-progress', normalizeHexColor_(getValue('loadingProgressColor')) || '#8CC63F');
    preview.style.setProperty('--branding-light', normalizeHexColor_(getValue('lightBackground')) || '#F7FAFC');
    preview.style.setProperty('--branding-dark', normalizeHexColor_(getValue('darkBackground')) || '#0D2940');

    updateConfiguracionBrandingPreviewLogo_(
      preview.querySelector('[data-branding-preview-logo="light"]'),
      form.querySelector('[data-logo-input-name="logoLightDataUri"]'),
      'Logo claro'
    );
    updateConfiguracionBrandingPreviewLogo_(
      preview.querySelector('[data-branding-preview-logo="dark"]'),
      form.querySelector('[data-logo-input-name="logoDarkDataUri"]'),
      'Logo oscuro'
    );

    updateConfiguracionVisualKitPreview_(form);
  }

  function updateConfiguracionVisualKitPreview_(form) {
    if (!form) return;
    const kit = form.querySelector('[data-branding-visual-kit]');
    if (!kit) return;

    const getValue = name => {
      const field = form.querySelector(`[name="${name}"]`);
      return field ? field.value : '';
    };

    const tokenMap = {
      '--runtime-brand-primary': normalizeHexColor_(getValue('primaryColor')) || '#214E8A',
      '--runtime-brand-secondary': normalizeHexColor_(getValue('secondaryColor')) || '#007C4A',
      '--runtime-brand-accent': normalizeHexColor_(getValue('accentColor')) || '#03C2AE',
      '--runtime-brand-progress': normalizeHexColor_(getValue('loadingProgressColor')) || '#8CC63F',
      '--runtime-brand-light': normalizeHexColor_(getValue('lightBackground')) || '#F7FAFC',
      '--runtime-brand-dark': normalizeHexColor_(getValue('darkBackground')) || '#0D2940'
    };

    kit.querySelectorAll('[data-ui-kit-theme-surface]').forEach(surface => {
      Object.keys(tokenMap).forEach(key => surface.style.setProperty(key, tokenMap[key]));
    });

    kit.querySelectorAll('[data-ui-kit-font-family]').forEach(node => {
      const family = node.dataset.uiKitFontFamily === 'heading' ? '--font-heading' : '--font-base';
      const scope = node.closest('[data-ui-kit-theme-surface]') || kit;
      const value = getComputedStyle(scope).getPropertyValue(family).trim();
      node.textContent = value || family;
    });

    kit.querySelectorAll('[data-ui-kit-font-var]').forEach(node => {
      const scope = node.closest('[data-ui-kit-theme-surface]') || kit;
      const value = getComputedStyle(scope).getPropertyValue(node.dataset.uiKitFontVar || '').trim();
      node.textContent = value || '--';
    });

    kit.querySelectorAll('[data-ui-kit-color-card]').forEach(card => {
      const token = card.dataset.uiKitColorVar || '';
      const scope = card.closest('[data-ui-kit-theme-surface]') || kit;
      const value = getComputedStyle(scope).getPropertyValue(token).trim();
      const swatch = card.querySelector('[data-ui-kit-color-swatch]');
      const label = card.querySelector('[data-ui-kit-color-value]');
      if (swatch) swatch.style.background = value || '#000000';
      if (label) label.textContent = value || token;
    });
  }

  function validateConfiguracionBrandingForm_(form) {
    const invalidLogoCard = Array.from(form.querySelectorAll('[data-branding-logo-card]')).find(card => {
      const input = card.querySelector('[data-branding-logo-input]');
      return !!String(input && input.value || '').trim() && card.dataset.logoState !== 'valid';
    });
    if (invalidLogoCard) {
      return {
        ok: false,
        message: `Revisa ${invalidLogoCard.dataset.logoLabel || 'el logo'}: el data URI no es válido o no pudo renderizarse.`
      };
    }

    const invalidColorCard = Array.from(form.querySelectorAll('[data-branding-color-card]')).find(card => card.dataset.colorValid === 'false');
    if (invalidColorCard) {
      return {
        ok: false,
        message: `Revisa ${invalidColorCard.dataset.colorLabel || 'un color'}: usa un hexadecimal válido como #214E8A.`
      };
    }

    return { ok: true };
  }

  function getOrderedConfigSections_() {
    const available = new Map(CONFIG_SECTIONS.map(section => [section.key, section]));
    const orderedKeys = (APP.state.configSectionOrder || []).filter(key => available.has(key));
    const fallbackKeys = CONFIG_SECTIONS
      .map(section => section.key)
      .filter(key => orderedKeys.indexOf(key) === -1);

    return orderedKeys
      .concat(fallbackKeys)
      .map(key => available.get(key))
      .filter(Boolean);
  }

  function getActiveConfigSectionKey_() {
    const current = String(APP.state.activeConfigSection || '').trim();
    const sections = getOrderedConfigSections_();
    if (current && sections.some(section => section.key === current)) return current;
    return sections[0] ? sections[0].key : 'general';
  }

  function renderConfiguracionSectionByKey_(sectionKey, config) {
    switch (String(sectionKey || '').trim()) {
      case 'general':

      case 'branding':

      case 'technical':
        return renderConfigTechnicalSection_(config.technical || {});
      default:
        return renderConfigGeneralSection_(config.general || {});
    }
  }

  function configInput_(name, label, value, type, extraClass) {
    return `
      <div class="field ${extraClass || ''}">
        <label>${escapeHtml(label)}</label>
        <input name="${escapeHtml(name)}" type="${escapeHtml(type || 'text')}" value="${escapeHtml(String(value == null ? '' : value))}">
      </div>
    `;
  }

  function configSelect_(name, label, value, options) {
    return `
      <div class="field">
        <label>${escapeHtml(label)}</label>
        <select name="${escapeHtml(name)}">
          ${(options || []).map(option => {
            const optValue = typeof option === 'string' ? option : option.value;
            const optLabel = typeof option === 'string' ? option : option.label;
            return `<option value="${escapeHtml(String(optValue || ''))}" ${String(optValue || '') === String(value || '') ? 'selected' : ''}>${escapeHtml(String(optLabel || optValue || ''))}</option>`;
          }).join('')}
        </select>
      </div>
    `;
  }

  function configTextarea_(name, label, value, extraClass, rows) {
    return `
      <div class="field ${extraClass || ''}">
        <label>${escapeHtml(label)}</label>
        <textarea name="${escapeHtml(name)}" rows="${escapeHtml(String(rows || 4))}">${escapeHtml(String(value == null ? '' : value))}</textarea>
      </div>
    `;
  }

  function configCheckbox_(name, label, checked) {
    return `
      <label class="config-check">
        <input name="${escapeHtml(name)}" type="checkbox" ${checked ? 'checked' : ''}>
        <span>${escapeHtml(label)}</span>
      </label>
    `;
  }

  function splitLines_(value) {
    return String(value || '')
      .split(/\r?\n|,/)
      .map(item => item.trim())
      .filter(Boolean);
  }

  function joinLines_(values) {
    return (values || []).join('\n');
  }

  function parseKeyValueText_(value) {
    return String(value || '').split(/\r?\n/).reduce((acc, line) => {
      const parts = String(line || '').split('=');
      const key = String(parts.shift() || '').trim();
      const val = parts.join('=').trim();
      if (key) acc[key] = val;
      return acc;
    }, {});
  }

  function joinKeyValueLines_(value) {
    return Object.keys(value || {}).map(key => `${key}=${value[key] || ''}`).join('\n');
  }

  function parseKeyDateLines_(value) {
    return String(value || '').split(/\r?\n/).map(line => {
      const parts = String(line || '').split('|').map(item => item.trim());
      if (!parts[0] && !parts[1] && !parts[2]) return null;
      return {
        key: parts[0] || '',
        label: parts[1] || parts[0] || '',
        date: parts[2] || ''
      };
    }).filter(Boolean);
  }

  function joinKeyDateLines_(values) {
    return (values || []).map(item => [
      item && item.key || '',
      item && item.label || '',
      item && item.date || ''
    ].join('|')).join('\n');
  }

  function friendlyViewName_(view) {
    const def = getViewDefinition_(view);
    if (def && def.label) return def.label;
    const names = {
      inicio: 'Inicio',
      buscar: 'Buscar vecino',
      ficha: 'Ficha',
      'nuevo-ingreso': 'Nuevo ingreso',
      avance: 'Avance',
      organizacion: 'Organizaciones',
      instrumento: 'Beneficios',
      socios: 'Socios',
      historial: 'Historial',
      usuarios: 'Gestión de usuarios',
      configuracion: 'Configuración'
    };
    return names[view] || view;
  }
})();
</script>
