<style>
  @import url('https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600;700;800&display=swap');

  :root {
    --brand-blue: #3D96B4;
    --brand-blue-dark: #247892;
    --brand-blue-soft: #EAF7FB;
    --brand-green: #8CC63F;
    --brand-green-dark: #5F8F25;
    --brand-green-soft: #F3FAEA;
    --brand-teal: #03C2AE;
    --brand-teal-dark: #028D80;
    --brand-teal-soft: #E7FBF8;

    --text: #24364B;
    --text-secondary: #4F6278;
    --text-muted: #64748B;
    --border: #BFD9E7;
    --border-strong: #3D96B4;
    --bg: #F7FAFC;
    --surface: #FFFFFF;
    --surface-alt: #F1F6FA;
    --surface-soft: #FCFDFF;

    --success: #8CC63F;
    --success-dark: #587A24;
    --success-soft: #F3FAEA;
    --info: #3D96B4;
    --info-soft: #EAF7FB;
    --disabled: #AAB4BF;
    --disabled-soft: #F8FAFC;
    --danger: #B42318;
    --danger-soft: #FFF0F0;
    --warning: #B7791F;
    --warning-soft: #FFF7E6;

    --font-family-base: 'Raleway', 'Segoe UI', Roboto, Arial, sans-serif;
    --font-family-heading: 'Raleway', 'Segoe UI', Roboto, Arial, sans-serif;
    --font-base: var(--font-family-base);
    --font-heading: var(--font-family-heading);
    --font-size-xs: 11px;
    --font-size-sm: 12px;
    --font-size-md: 13px;
    --font-size-base: 14px;
    --font-size-lg: 16px;
    --font-size-xl: 20px;
    --font-size-2xl: 28px;
    --font-size-display: 34px;
    --icon-md: 24px;
    --icon-lg: 34px;
    --font-weight-regular: 400;
    --font-weight-medium: 500;
    --font-weight-semibold: 600;
    --font-weight-bold: 700;
    --font-weight-extrabold: 800;
    --line-tight: 1.1;
    --line-normal: 1.35;
    --line-relaxed: 1.5;

    --space-1: 4px;
    --space-2: 8px;
    --space-3: 10px;
    --space-4: 12px;
    --space-5: 14px;
    --space-6: 16px;
    --space-7: 18px;
    --space-8: 22px;
    --space-9: 28px;
    --space-10: 32px;

    --radius-sm: 8px;
    --radius-md: 10px;
    --radius-lg: 12px;
    --radius-xl: 14px;
    --radius-2xl: 16px;
    --radius-pill: 999px;
    --shadow-sm: 0 4px 12px rgba(36, 54, 75, 0.05);
    --shadow-md: 0 8px 20px rgba(26, 49, 80, 0.08);
    --shadow-lg: 0 18px 40px rgba(36, 54, 75, 0.14);
    --container-max: 1440px;
    --sidebar-width: 280px;
    --sidebar-width-collapsed: 96px;
    --sidebar-compact-button-size: 48px;

  }

  * { box-sizing: border-box; }

  .is-hidden {
    display: none !important;
  }

  body {
    margin: 0;
    font-family: var(--font-base);
    font-size: var(--font-size-base);
    line-height: var(--line-normal);
    color: var(--text);
    background: linear-gradient(180deg, var(--surface) 0%, var(--bg) 100%);
  }

  h1,
  h2,
  h3,
  h4 {
    font-family: var(--font-heading);
    color: var(--brand-blue);
    line-height: var(--line-tight);
  }

  p {
    line-height: var(--line-relaxed);
  }

  button,
  input,
  select,
  textarea {
    font-family: inherit;
  }

  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    vertical-align: middle;
    color: var(--brand-blue);
  }

  .hero {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: var(--space-2);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .hero__brand {
    display: flex;
    gap: var(--space-7);
    align-items: center;
  }

  .hero__logo {
    width: 124px;
    height: 124px;
    border-radius: var(--radius-2xl);
    color: var(--surface);
    display: grid;
    place-items: center;
    font-size: var(--font-size-2xl);
    font-weight: var(--font-weight-bold);
  }

  .eyebrow {
    margin: 0 0 4px;
    color: var(--brand-green);
    font-size: var(--font-size-sm);
    font-weight: var(--font-weight-bold);
    letter-spacing: .08em;
    text-transform: uppercase;
  }

  .hero__title {
    margin: 0;
    font-size: var(--font-size-display);
    line-height: var(--line-tight);
    color: var(--brand-blue);
  }

  .hero__subtitle {
    margin: 6px 0 0;
    color: var(--text-muted);
  }

  .hero__user {
    display: flex;
    align-items: center;
    gap: var(--space-4);
    flex-wrap: wrap;
  }

  .hero__user-menu {
    position: relative;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: var(--space-3) var(--space-5);
    border: 1px solid var(--border);
    background: var(--bg);
    border-radius: var(--radius-pill);
    font-size: var(--font-size-base);
    color: var(--text);
  }

  .pill--button {
    appearance: none;
    cursor: pointer;
    font: inherit;
    transition: border-color .18s ease, box-shadow .18s ease, transform .18s ease, background .18s ease;
  }

  .pill--button:hover,
  .pill--button[aria-expanded="true"] {
    border-color: var(--border-strong);
    box-shadow: var(--shadow-sm);
    transform: translateY(-1px);
  }

  .pill__chevron {
    margin-left: 2px;
    font-size: 20px;
  }

  .user-menu-dropdown {
    position: absolute;
    top: calc(100% + 10px);
    right: 0;
    z-index: 120;
    min-width: 244px;
    display: grid;
    gap: var(--space-2);
    padding: var(--space-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    background: var(--surface);
    box-shadow: var(--shadow-lg);
  }

  .user-menu-dropdown__item {
    width: 100%;
    display: inline-flex;
    align-items: center;
    gap: var(--space-3);
    padding: var(--space-4) var(--space-4);
    border: 0;
    border-radius: var(--radius-lg);
    background: transparent;
    color: var(--text);
    font: inherit;
    font-weight: var(--font-weight-semibold);
    cursor: pointer;
    text-align: left;
  }

  .user-menu-dropdown__item:hover,
  .user-menu-dropdown__item:focus-visible {
    outline: none;
    background: var(--surface-alt);
    color: var(--brand-blue);
  }

  .user-menu-dropdown__item .material-symbols-outlined {
    color: var(--brand-blue);
  }

  .app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-8);
    padding: var(--space-8) var(--space-9);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .app-header__left {
    display: flex;
    align-items: center;
    gap: var(--space-7);
    min-width: 0;
  }

  .app-header__right {
    display: flex;
    align-items: center;
    gap: var(--space-4);
  }

  .brand-mark {
    width: 124px;
    height: 124px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    border: 0 solid var(--border);
    border-radius: var(--radius-2xl);
    padding: 0;
    box-sizing: border-box;
    flex: 0 0 auto;
  }

  .brand-logo {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  .brand-copy__eyebrow {
    font-size: var(--font-size-sm);
    font-weight: var(--font-weight-semibold);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--brand-green-dark);
    margin-bottom: 4px;
  }

  .brand-copy__title {
    margin: 0;
    font-size: var(--font-size-2xl);
    line-height: var(--line-tight);
    font-weight: var(--font-weight-bold);
    color: var(--brand-blue-dark);
  }

  .brand-copy__subtitle {
    margin: 6px 0 0;
    font-size: var(--font-size-base);
    color: var(--text-secondary);
  }

  .user-chip {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    padding: var(--space-3) var(--space-5);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    background: var(--bg);
    color: var(--brand-blue-dark);
  }

  .user-chip .material-symbols-outlined {
    font-size: var(--icon-md);
    color: var(--brand-blue-dark);
  }

  .user-chip__meta {
    display: flex;
    flex-direction: column;
    line-height: 1.15;
  }

  .user-chip__meta strong {
    font-size: var(--font-size-md);
    color: var(--text);
  }

  .user-chip__meta small {
    font-size: var(--font-size-xs);
    color: var(--text-muted);
  }

  .quick-actions {
    padding: var(--space-7) var(--space-10) 0;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    gap: var(--space-5);
  }

  .quick-card {
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: var(--radius-xl);
    padding: var(--space-7);
    cursor: pointer;
    transition: .18s ease;
    box-shadow: var(--shadow-md);
    text-align: left;
  }

  .quick-card:hover {
    transform: translateY(-1px);
  }

  .quick-card h3 {
    margin: 8px 0 4px;
    font-size: var(--font-size-lg);
  }

  .quick-card p {
    margin: 0;
    font-size: var(--font-size-md);
    color: var(--text-muted);
  }

  .toolbar {
    text-align: right;
    justify-content: space-between;
    gap: var(--space-6);
    align-items: center;
    margin: var(--space-7) var(--space-10);
    padding: var(--space-4) var(--space-6);
    background: var(--surface-alt);
    border-radius: var(--radius-lg);
  }

  .toolbar__left {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-2);
  }

  .link-btn {
    background: transparent;
    border: none;
    color: var(--brand-blue);
    padding: var(--space-2) var(--space-3);
    cursor: pointer;
    font-weight: var(--font-weight-semibold);
  }

  .layout {
    display: grid;
    grid-template-columns: var(--sidebar-width) 1fr;
    gap: var(--space-8);
    padding: 0 var(--space-10) var(--space-10);
    transition: grid-template-columns .2s ease;
  }

  .layout.is-sidebar-collapsed {
    grid-template-columns: var(--sidebar-width-collapsed) 1fr;
  }

  .sidebar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    padding: var(--space-6);
    height: fit-content;
    box-shadow: var(--shadow-md);
    display: grid;
    gap: var(--space-3);
    overflow: hidden;
    transition: padding .2s ease;
  }

  .sidebar-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-3);
    width: 100%;
    min-width: 0;
    min-height: 48px;
    border: 1px solid var(--border);
    background: var(--surface-alt);
    color: var(--brand-blue-dark);
    padding: var(--space-3) var(--space-4);
    border-radius: var(--radius-lg);
    cursor: pointer;
    font-weight: var(--font-weight-bold);
    transition: background .18s ease, border-color .18s ease;
  }

  .sidebar-toggle:hover {
    background: var(--brand-blue-soft);
    border-color: var(--border-strong);
  }

  .sidebar-toggle .material-symbols-outlined {
    flex: 0 0 auto;
  }

  .sidebar-toggle__label,
  .nav-label {
    min-width: 0;
    overflow: hidden;
    white-space: nowrap;
    opacity: 1;
    font-size: 16px;
    transition: opacity .16s ease, width .2s ease;
  }

  .nav-btn {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    width: 100%;
    min-height: 48px;
    padding: var(--space-4) var(--space-5);
    border-radius: var(--radius-lg);
    cursor: pointer;
    text-align: left;
    font-weight: var(--font-weight-semibold);
    min-width: 0;
    transition: background .18s ease, border-color .18s ease, padding .2s ease;
  }

  .nav-btn .material-symbols-outlined {
    flex: 0 0 auto;
  }

  .layout.is-sidebar-collapsed .sidebar {
    padding: var(--space-4);
    align-items: center;
  }

  .layout.is-sidebar-collapsed .nav-btn,
  .layout.is-sidebar-collapsed .sidebar-toggle {
    width: var(--sidebar-compact-button-size);
    min-width: var(--sidebar-compact-button-size);
    height: var(--sidebar-compact-button-size);
    min-height: var(--sidebar-compact-button-size);
    place-self: center;
    justify-content: center;
    padding: 0;
    gap: 0;
    overflow: hidden;
  }

  .layout.is-sidebar-collapsed .nav-label,
  .layout.is-sidebar-collapsed .sidebar-toggle__label {
    position: absolute;
    width: 1px;
    height: 1px;
    margin: -1px;
    padding: 0;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    clip-path: inset(50%);
    white-space: nowrap;
    border: 0;
    opacity: 0;
  }

  .nav-btn.is-active,
  .nav-btn:hover {
    background: var(--brand-blue-soft);
    border-color: var(--border-strong);
  }

  .app-version {
    margin-top: var(--space-3);
    padding-top: var(--space-3);
    border-top: 1px solid var(--border);
    color: var(--text-muted);
    font-size: var(--font-size-xs);
    font-weight: var(--font-weight-semibold);
    letter-spacing: .04em;
    text-align: center;
    opacity: .78;
    white-space: nowrap;
  }

  .app-version.is-hidden {
    display: none;
  }

  .layout.is-sidebar-collapsed .app-version {
    display: none;
  }

  .content {
    position: relative;
    min-height: 320px;
  }

  .content-loading {
    position: absolute;
    inset: 0;
    z-index: 40;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    isolation: isolate;
    background: linear-gradient(180deg, #f7fafc 0%, #eef4f8 100%);
    opacity: 1;
    visibility: visible;
    transition: opacity 0.22s ease, visibility 0.22s ease;
  }

  .content-loading.is-hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  .content-loading--modal {
    position: fixed;
    z-index: 1400;
  }

  .content-loading__box,
  .app-loading__box {
    position: relative;
    z-index: 1;
    display: grid;
    justify-items: center;
    gap: 14px;
    text-align: center;
    width: min(420px, calc(100% - 40px));
    padding: 28px 28px 24px;
    border-radius: 28px;
    border: 1px solid rgba(191, 217, 231, 0.85);
    background: #ffffff;
    box-shadow:
      0 20px 60px rgba(36, 54, 75, 0.14),
      inset 0 1px 0 rgba(255, 255, 255, 0.8);
  }

  .loading-shell {
    position: relative;
  }

  .loading-shell::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background:
      linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.58), transparent);
    transform: translateX(-120%);
    animation: loadingPanelGlow 2.8s ease-in-out infinite;
    pointer-events: none;
  }

  .content-loading__text {
    font-size: var(--font-size-lg);
    font-weight: var(--font-weight-bold);
    color: var(--brand-blue-dark);
    letter-spacing: 0.02em;
  }

  .loading-shell__subtext {
    max-width: 280px;
    font-size: var(--font-size-base);
    line-height: var(--line-relaxed);
    color: var(--text-muted);
  }

  .loading-shell__visual {
    width: 112px;
    height: 112px;
    border-radius: 34px;
    position: relative;
    display: grid;
    place-items: center;
    overflow: hidden;
    border: 1px solid rgba(61, 150, 180, 0.18);
    background:
      linear-gradient(145deg, rgba(61, 150, 180, 0.14), rgba(255, 255, 255, 0.78)),
      radial-gradient(circle at center, rgba(140, 198, 63, 0.14), transparent 64%);
    box-shadow:
      0 18px 36px rgba(36, 54, 75, 0.12),
      inset 0 1px 0 rgba(255, 255, 255, 0.72);
  }

  .app-loading__spinner.loading-shell__visual {
    width: 124px;
    height: 124px;
  }

  .loading-shell__visual::before {
    content: '';
    position: absolute;
    inset: 12px;
    border-radius: 26px;
    border: 1px solid rgba(61, 150, 180, 0.12);
    background:
      linear-gradient(180deg, rgba(255, 255, 255, 0.66), rgba(255, 255, 255, 0.18));
  }

  .loading-shell__halo,
  .loading-shell__ring,
  .loading-shell__ring--reverse,
  .loading-shell__pulse,
  .loading-shell__beam,
  .loading-shell__dot {
    position: absolute;
    border-radius: 999px;
  }

  .loading-shell__halo {
    width: 74px;
    height: 74px;
    background: radial-gradient(circle, rgba(61, 150, 180, 0.22), rgba(61, 150, 180, 0));
    animation: loadingHaloPulse 2.2s ease-in-out infinite;
  }

  .loading-shell__ring {
    width: 76px;
    height: 76px;
    border: 3px solid rgba(61, 150, 180, 0.14);
    border-top-color: var(--brand-blue);
    border-right-color: rgba(61, 150, 180, 0.58);
    animation: loadingOrbitSpin 1.5s linear infinite;
  }

  .loading-shell__ring--reverse {
    width: 56px;
    height: 56px;
    border: 3px solid rgba(140, 198, 63, 0.16);
    border-bottom-color: var(--brand-green);
    border-left-color: rgba(140, 198, 63, 0.58);
    animation-direction: reverse;
    animation-duration: 1.15s;
  }

  .loading-shell__pulse {
    width: 22px;
    height: 22px;
    background: linear-gradient(135deg, var(--brand-blue), var(--brand-green));
    box-shadow: 0 0 0 0 rgba(61, 150, 180, 0.28);
    animation: loadingCorePulse 1.8s ease-in-out infinite;
  }

  .loading-shell__beam {
    width: 140px;
    height: 140px;
    background: conic-gradient(
      from 0deg,
      rgba(255, 255, 255, 0) 0deg 280deg,
      rgba(255, 255, 255, 0.72) 318deg,
      rgba(255, 255, 255, 0) 360deg
    );
    animation: loadingOrbitSpin 2.4s linear infinite;
    opacity: 0.72;
  }

  .loading-shell__dot {
    width: 8px;
    height: 8px;
    background: var(--brand-blue);
    top: 18px;
    left: 52px;
    transform-origin: 4px 38px;
    animation: loadingOrbitSpin 1.55s linear infinite;
  }

  .loading-shell__dot--two {
    background: var(--brand-green);
    animation-duration: 2.05s;
    animation-direction: reverse;
  }

  .loading-shell__dot--three {
    width: 6px;
    height: 6px;
    background: var(--brand-teal);
    top: 22px;
    left: 53px;
    transform-origin: 3px 32px;
    animation-duration: 1.2s;
  }

  @keyframes loadingPanelGlow {
    0%, 100% { transform: translateX(-120%); opacity: 0; }
    25%, 70% { opacity: 1; }
    55% { transform: translateX(120%); opacity: 0.72; }
  }

  @keyframes loadingOrbitSpin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  @keyframes loadingCorePulse {
    0%, 100% { transform: scale(0.92); box-shadow: 0 0 0 0 rgba(61, 150, 180, 0.18); }
    50% { transform: scale(1.08); box-shadow: 0 0 0 14px rgba(61, 150, 180, 0); }
  }

  @keyframes loadingHaloPulse {
    0%, 100% { transform: scale(0.96); opacity: 0.54; }
    50% { transform: scale(1.08); opacity: 0.9; }
  }

  @media (prefers-reduced-motion: reduce) {
    .splash-screen__ambient-orb,
    .splash-screen__ambient-grid,
    .splash-screen__logo-wrap,
    .splash-screen__logo,
    .splash-screen__logo-ring,
    .splash-screen__logo-core::after,
    .splash-screen__progress-bar::after,
    .loading-shell::before,
    .loading-shell__halo,
    .loading-shell__ring,
    .loading-shell__ring--reverse,
    .loading-shell__pulse,
    .loading-shell__beam,
    .loading-shell__dot {
      animation: none !important;
    }
  }

  .view { display: none; }
  .view.active { display: block; }

  .section-head {
    display: flex;
    justify-content: space-between;
    align-items: start;
    margin: 4px 0 5px;
    gap: 16px;
  }

  .section-head--stacked {
    align-items: flex-start;
  }

  .section-head h2 {
    margin: 0;
    color: var(--brand-blue);
  }

  .section-head h3 {
    margin: 0;
    color: var(--brand-blue);
  }

  .section-head__meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .muted {
    color: var(--text-muted);
  }

  .tile-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
    gap: 14px;
  }

  .tile {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    box-shadow: var(--shadow-md);
    padding: 18px;
    cursor: pointer;
    text-align: left;
  }

  .tile h3 {
    margin: 10px 0 8px;
  }

  .tile p {
    margin: 0;
    color: var(--text-muted);
    font-size: var(--font-size-md);
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    padding: var(--space-7);
    box-shadow: var(--shadow-md);
  }

  /* Modulo Inicio */
  .inicio-shell {
    display: grid;
    gap: var(--space-1);
  }

  .inicio-head {
    align-items: center;
  }

  .inicio-layout {
    display: grid;
    grid-template-columns: minmax(280px, 34%) minmax(0, 1fr);
    gap: var(--space-6);
    align-items: stretch;
  }

  .inicio-alerts-panel {
    display: grid;
    gap: var(--space-5);
    align-content: start;
  }

  .inicio-summary-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: var(--space-3);
  }

  .inicio-metric,
  .inicio-card,
  .inicio-dashboard-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    box-shadow: var(--shadow-md);
  }

  .inicio-metric {
    min-height: 108px;
    padding: var(--space-4);
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 4px;
    text-align: center;
  }

  .inicio-metric .material-symbols-outlined {
    color: var(--brand-blue);
    font-size: 26px;
    margin: 0 auto;
  }

  .inicio-metric strong {
    color: var(--text);
    font-size: var(--font-size-2xl);
    line-height: 1;
  }

  .inicio-metric small {
    color: var(--text-muted);
    font-weight: var(--font-weight-semibold);
    line-height: 1.25;
  }

  .inicio-card {
    padding: var(--space-5);
  }

  .inicio-card__head {
    display: flex;
    gap: var(--space-3);
    align-items: flex-start;
    margin-bottom: var(--space-4);
  }

  .inicio-card__head > .material-symbols-outlined {
    color: var(--brand-blue);
    font-size: 28px;
  }

  .inicio-card__head h3,
  .inicio-dashboard-head h3 {
    margin: 0;
    color: var(--text);
  }

  .inicio-card__head p {
    margin: 4px 0 0;
    color: var(--text-muted);
    font-size: var(--font-size-sm);
  }

  .inicio-alert-list,
  .inicio-reminder-list {
    display: grid;
    gap: var(--space-3);
  }

  .inicio-alert-item,
  .inicio-reminder-item {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: var(--space-3);
    align-items: flex-start;
    padding: var(--space-4);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    background: var(--bg);
  }

  .inicio-alert-item .material-symbols-outlined,
  .inicio-reminder-item .material-symbols-outlined {
    font-size: 24px;
    color: var(--brand-blue);
  }

  .inicio-alert-item small {
    display: inline-block;
    margin-bottom: 3px;
    color: var(--text-muted);
    font-size: var(--font-size-xs);
    font-weight: var(--font-weight-bold);
    text-transform: uppercase;
    letter-spacing: .04em;
  }

  .inicio-alert-item strong,
  .inicio-reminder-item strong {
    display: block;
    color: var(--text);
    font-weight: var(--font-weight-bold);
    line-height: 1.25;
  }

  .inicio-alert-item p,
  .inicio-reminder-item p {
    margin: 4px 0 0;
    color: var(--text-muted);
    font-size: var(--font-size-sm);
    line-height: 1.35;
  }

  .inicio-alert-item--danger {
    border-color: rgba(180, 35, 24, .28);
    background: var(--danger-soft);
  }

  .inicio-alert-item--danger .material-symbols-outlined {
    color: var(--danger);
  }

  .inicio-alert-item--warning {
    border-color: rgba(191, 123, 0, .28);
    background: #FFF7E8;
  }

  .inicio-alert-item--warning .material-symbols-outlined {
    color: #B76E00;
  }

  .inicio-alert-item--info {
    border-color: rgba(61, 150, 180, .26);
    background: var(--brand-blue-soft);
  }

  .inicio-dashboard-panel {
    --inicio-dashboard-height: 660px;
    display: grid;
    grid-template-rows: auto 1fr;
    overflow: hidden;
    min-height: var(--inicio-dashboard-height);
  }

  .inicio-dashboard-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: var(--space-4);
    padding: var(--space-5) var(--space-6);
    border-bottom: 1px solid var(--border);
    background: linear-gradient(135deg, var(--surface), var(--brand-blue-soft));
  }

  .inicio-dashboard-pill {
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-pill);
    padding: 6px 10px;
    color: var(--brand-blue-dark);
    background: var(--surface);
    font-size: var(--font-size-xs);
    font-weight: var(--font-weight-bold);
    text-transform: uppercase;
    letter-spacing: .04em;
  }

  .inicio-dashboard-embed,
  .inicio-dashboard-empty {
    display: block;
    width: 100%;
    height: calc(var(--inicio-dashboard-height) - 86px);
    min-height: calc(var(--inicio-dashboard-height) - 86px);
    border: 0;
    overflow: hidden;
  }

  .inicio-dashboard-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: var(--space-3);
    padding: var(--space-7);
    text-align: center;
    color: var(--text-muted);
    background: var(--bg);
  }

  .inicio-dashboard-empty .material-symbols-outlined {
    color: var(--brand-blue);
    font-size: 44px;
  }

  .inicio-dashboard-empty strong {
    color: var(--text);
  }

  .search-panel {
    display: flex;
    gap: 16px;
    align-items: end;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 4px;
    min-width: 0;
  }

  .field--grow {
    flex: 1;
  }

  .field--auto {
    width: 180px;
  }

  .field--half {
    width: calc(50% - 8px);
    display: inline-flex;
  }

  .field--third {
    width: calc(33.33% - 8px);
    display: inline-flex;
  }

  .field--full {
    width: 100%;
  }

  label {
    font-size: var(--font-size-md);
    font-weight: var(--font-weight-semibold);
    color: var(--text);
  }

  input,
  select,
  textarea {
    width: 100%;
    padding: 11px var(--space-4);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    font: inherit;
    color: var(--text);
    background: var(--surface);
  }

  textarea {
    resize: vertical;
  }

  input:focus,
  select:focus,
  textarea:focus {
    outline: 2px solid rgba(61, 150, 180, .18);
    border-color: var(--brand-blue);
  }

  .primary-btn,
  .secondary-btn,
  .danger-btn,
  .admin-reset-btn {
    display: inline-flex;
    align-items: center;
    gap: var(--space-2);
    border-radius: var(--radius-lg);
    padding: var(--space-4) var(--space-6);
    font-weight: var(--font-weight-bold);
    cursor: pointer;
    border: 1px solid transparent;
  }

  .primary-btn {
    background: var(--brand-green);
    color: var(--surface);
  }

  .primary-btn .material-symbols-outlined {
    color: var(--surface);
  }

  .secondary-btn {
    background: var(--surface);
    border-color: var(--border);
    color: var(--brand-blue);
  }

  .danger-btn,
  .admin-reset-btn {
    background: #fff5f5;
    border-color: #fecaca;
    color: #b42318;
  }

  .admin-reset-btn {
    display: none;
    padding: var(--space-3) var(--space-5);
  }

  .admin-reset-btn.is-visible {
    display: inline-flex;
  }

  .actions {
    display: flex;
    gap: var(--space-3);
    flex-wrap: wrap;
    margin-top: 8px;
  }

  .form-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 0 var(--space-6);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    padding: var(--space-7);
    box-shadow: var(--shadow-md);
  }

  .form-grid--dense {
    background: transparent;
    border: 0;
    border-radius: 0;
    padding: 0;
    box-shadow: none;
    gap: 0 var(--space-6);
  }

  .form-grid .field[data-span="2"] {
    grid-column: 1 / -1;
  }

  .table-wrap {
    overflow: auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    box-shadow: var(--shadow-md);
    margin-top: 10px;
  }

  .data-table {
    width: 100%;
    border-collapse: collapse;
  }

  .data-table th,
  .data-table td {
    padding: var(--space-4) var(--space-5);
    border-bottom: 1px solid var(--border);
    font-size: var(--font-size-base);
    text-align: left;
    vertical-align: top;
  }

  .data-table thead th {
    color: var(--brand-blue);
    background: var(--surface-soft);
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 10px;
    border-radius: var(--radius-pill);
    background: var(--brand-blue-soft);
    color: var(--brand-blue-dark);
    font-size: var(--font-size-sm);
    font-weight: var(--font-weight-bold);
  }

  .history-detail-cell {
    min-width: 240px;
    max-width: 420px;
    color: var(--text-secondary);
    white-space: normal;
  }

  .history-filter {
    min-width: 220px;
    margin-bottom: 0;
  }

  .history-filter label {
    color: var(--text-secondary);
  }

  .ficha-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: var(--space-6);
  }

  .ficha-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    padding: var(--space-7);
    box-shadow: var(--shadow-md);
  }

  .ficha-block h3 {
    margin: 0 0 12px;
    color: var(--brand-blue);
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .kv {
    display: grid;
    grid-template-columns: 170px 1fr;
    gap: var(--space-2);
    font-size: var(--font-size-base);
    margin-bottom: 8px;
  }

  .kv strong {
    color: var(--text);
  }

  .empty-state {
    padding: 20px;
    text-align: center;
    color: var(--text-muted);
  }

  .is-admin {
    display: none;
  }

  .show-admin {
    display: inline-flex !important;
  }

  .message {
    padding: 10px 12px;
    border-radius: var(--radius-md);
    margin-bottom: 14px;
    font-size: var(--font-size-base);
  }

  .message.success {
    background: var(--success-soft);
    color: var(--success-dark);
  }

  .message.error {
    background: var(--danger-soft);
    color: var(--danger);
  }

  /* Nuevo ingreso */
  .ingreso-layout {
    display: grid;
    grid-template-columns: minmax(0, 1.6fr) minmax(320px, .9fr);
    gap: 16px;
    align-items: start;
  }

  .ingreso-form {
    display: grid;
    gap: 16px;
  }

  .module-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    padding: var(--space-7);
    box-shadow: var(--shadow-md);
  }

  .module-card__head {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: flex-start;
    margin-bottom: 14px;
  }

  .module-card__head h3 {
    margin: 0;
    color: var(--brand-blue);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .module-card__head p {
    margin: 0;
  }

  .module-card--actions {
    padding-bottom: 10px;
  }

  .form-actions-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .ingreso-side {
    display: grid;
    gap: 16px;
  }

  .sticky-card {
    position: sticky;
    top: 16px;
  }

  .sticky-card + .sticky-card {
    position: static;
  }

  .ingreso-preview {
    display: grid;
    gap: 10px;
  }

  .preview-block {
    display: grid;
    gap: 8px;
  }

  .preview-block__title {
    text-align: center;
    font-size: var(--font-size-sm);
    font-weight: var(--font-weight-bold);
    color: var(--brand-green);
    text-transform: uppercase;
    letter-spacing: .06em;
  }

  .preview-grid {
    text-align: left;
    display: grid;
    gap: 8px;
  }

  .preview-item {
    display: grid;
    grid-template-columns: 120px 1fr;
    gap: 8px;
    font-size: var(--font-size-base);
  }

  .preview-item strong {
    color: var(--text);
  }

  .matches-list {
    display: grid;
    gap: 10px;
  }

  .match-card {
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 12px;
    background: var(--surface-soft);
  }

  .match-card h4 {
    margin: 0 0 6px;
    color: var(--brand-blue);
    font-size: var(--font-size-base);
  }

  .match-card p {
    margin: 0;
    font-size: var(--font-size-md);
    color: var(--text-muted);
  }

  .tips-list {
    margin: 0;
    padding-left: 18px;
    display: grid;
    gap: 10px;
    color: var(--text-muted);
    font-size: var(--font-size-base);
  }

  .field-help {
    font-size: var(--font-size-sm);
    color: var(--text-muted);
    margin-top: -2px;
  }

  .app-loading {
    position: fixed;
    inset: 0;
    z-index: 99999;
    display: grid;
    place-items: center;
    overflow: hidden;
    isolation: isolate;
    background: linear-gradient(145deg, #0b2140 0%, #143d69 52%, #145b65 100%);
    opacity: 1;
    visibility: visible;
    transition: opacity 0.26s ease, visibility 0.26s ease;
  }

  .app-loading::before,
  .app-loading::after {
    display: none;
  }

  .app-loading.is-hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  .access-denied {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: var(--space-10);
    background: linear-gradient(180deg, var(--surface) 0%, var(--bg) 100%);
  }

  .access-denied__card {
    max-width: 560px;
    padding: var(--space-10);
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    background: var(--surface);
    box-shadow: var(--shadow-lg);
    text-align: center;
  }

  .access-denied__card .material-symbols-outlined {
    color: var(--danger);
    font-size: 44px;
  }

  .module-check-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: var(--space-4);
  }

  .module-check {
    position: relative;
    display: block;
    min-width: 0;
    cursor: pointer;
  }

  .module-check__input {
    position: absolute;
    opacity: 0;
    pointer-events: none;
  }

  .module-check__box {
    min-height: 88px;
    display: grid;
    align-content: center;
    gap: 6px;
    padding: 14px 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    background:
      linear-gradient(180deg, var(--surface) 0%, var(--surface-soft) 100%);
    box-shadow: var(--shadow-sm);
    transition: border-color .18s ease, box-shadow .18s ease, transform .18s ease, background .18s ease;
  }

  .module-check:hover .module-check__box {
    transform: translateY(-1px);
    border-color: rgba(33, 78, 138, 0.26);
    box-shadow: var(--shadow-md);
  }

  .module-check__input:checked + .module-check__box {
    border-color: var(--brand-blue);
    background:
      linear-gradient(180deg, rgba(33, 78, 138, 0.1) 0%, rgba(33, 78, 138, 0.04) 100%);
    box-shadow:
      0 0 0 2px rgba(33, 78, 138, 0.08),
      var(--shadow-md);
  }

  .module-check__input:disabled + .module-check__box {
    border-color: rgba(12, 104, 68, 0.26);
    background:
      linear-gradient(180deg, rgba(0, 124, 74, 0.08) 0%, rgba(0, 124, 74, 0.03) 100%);
  }

  .module-check__title {
    color: var(--brand-blue-dark);
    font-weight: var(--font-weight-bold);
    line-height: 1.2;
  }

  .module-check__meta {
    color: var(--text-muted);
    font-size: var(--font-size-sm);
    line-height: 1.4;
  }

  .admin-form__head {
    display: grid;
    gap: 4px;
    margin-bottom: var(--space-6);
  }

  .admin-form__title {
    margin: 0;
    color: var(--brand-blue);
  }

  .config-shell {
    display: grid;
    gap: var(--space-6);
  }

  .config-layout {
    display: grid;
    grid-template-columns: 260px minmax(0, 1fr);
    gap: var(--space-6);
    align-items: start;
  }

  .config-nav {
    position: sticky;
    top: var(--space-6);
    display: grid;
    gap: var(--space-3);
    padding: var(--space-4);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    background: var(--surface);
    box-shadow: var(--shadow-sm);
  }

  .config-nav__item {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    width: 100%;
    padding: 12px 14px;
    border: 1px solid transparent;
    border-radius: var(--radius-md);
    background: transparent;
    color: var(--text);
    text-align: left;
    cursor: pointer;
    transition: background .18s ease, border-color .18s ease, transform .18s ease;
  }

  .config-nav__item:hover {
    background: var(--surface-alt);
    border-color: var(--border);
    transform: translateY(-1px);
  }

  .config-content {
    display: grid;
    gap: var(--space-6);
  }

  .config-section {
    padding: var(--space-6);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    background: var(--surface);
    box-shadow: var(--shadow-sm);
  }

  .config-section__head {
    display: grid;
    gap: 4px;
    margin-bottom: var(--space-5);
  }

  .config-section__head h3,
  .config-subcard h4 {
    margin: 0;
  }

  .config-form,
  .config-subgrid,
  .config-content {
    min-width: 0;
  }

  .config-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: var(--space-4);
  }

  .config-grid .field--full {
    grid-column: 1 / -1;
  }

  .config-inline-checks {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-4);
    margin-top: var(--space-4);
  }

  .config-check {
    display: inline-flex;
    align-items: center;
    gap: var(--space-2);
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    background: var(--surface-soft);
  }

  .config-subgrid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: var(--space-4);
  }

  .config-subcard {
    padding: var(--space-5);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    background: var(--surface-soft);
  }

  .config-table-wrap {
    margin-top: var(--space-5);
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
  }

  .config-table {
    width: 100%;
    border-collapse: collapse;
    min-width: 760px;
  }

  .config-table th,
  .config-table td {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    text-align: left;
    vertical-align: middle;
    background: var(--surface);
  }

  .config-table thead th {
    background: var(--surface-alt);
    color: var(--text-secondary);
    font-size: var(--font-size-sm);
  }

  .config-table td input,
  .config-table td select {
    min-width: 0;
  }

  .config-table__check {
    text-align: center;
  }

  @media (max-width: 1180px) {
    .config-layout {
      grid-template-columns: 1fr;
    }

    .config-nav {
      position: static;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }

    .config-subgrid {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 760px) {
    .config-grid {
      grid-template-columns: 1fr;
    }

    .config-nav {
      grid-template-columns: 1fr;
    }
  }

  .user-email-field {
    align-self: start;
  }

  .email-input-group {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    width: 100%;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    overflow: hidden;
    background: var(--surface);
  }

  .email-input-group:focus-within {
    outline: 2px solid rgba(61, 150, 180, .18);
    border-color: var(--brand-blue);
  }

  .email-input-group input {
    border: 0;
    border-radius: 0;
    min-width: 0;
  }

  .email-input-group input:focus {
    outline: 0;
    border-color: transparent;
  }

  .email-input-group__suffix {
    display: inline-flex;
    align-items: center;
    padding: 0 14px;
    border-left: 1px solid var(--border);
    background: var(--surface-soft);
    color: var(--brand-blue-dark);
    font-size: var(--font-size-md);
    font-weight: var(--font-weight-semibold);
    white-space: nowrap;
  }

  .app-loading__text {
    margin: 0;
    font-size: clamp(1rem, 1.35vw, 1.16rem);
    font-weight: var(--font-weight-bold);
    color: rgba(235, 244, 252, 0.96);
    letter-spacing: 0.02em;
  }

  .splash-screen {
    position: relative;
    width: min(1080px, calc(100vw - 64px));
    min-height: min(720px, calc(100vh - 64px));
    padding: clamp(28px, 4vw, 44px);
    border-radius: 36px;
    overflow: hidden;
    border: 1px solid rgba(186, 214, 235, 0.16);
    background:
      radial-gradient(circle at top left, rgba(56, 144, 176, 0.28), transparent 34%),
      radial-gradient(circle at bottom right, rgba(0, 192, 168, 0.22), transparent 30%),
      linear-gradient(155deg, #0d2940 0%, #154f69 48%, #11453f 100%);
    box-shadow:
      0 36px 80px rgba(4, 14, 31, 0.34),
      inset 0 1px 0 rgba(255, 255, 255, 0.08);
  }

  .splash-screen__ambient,
  .splash-screen__ambient-orb,
  .splash-screen__ambient-grid {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .splash-screen__ambient-orb {
    filter: blur(6px);
    opacity: 0.8;
  }

  .splash-screen__ambient-orb--one {
    inset: -12% auto auto -8%;
    width: 360px;
    height: 360px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(56, 144, 176, 0.28), rgba(56, 144, 176, 0));
    animation: splashOrbFloatOne 12s ease-in-out infinite alternate;
  }

  .splash-screen__ambient-orb--two {
    inset: auto -8% -18% auto;
    width: 420px;
    height: 420px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0, 192, 168, 0.24), rgba(0, 192, 168, 0));
    animation: splashOrbFloatTwo 14s ease-in-out infinite alternate;
  }

  .splash-screen__ambient-grid {
    background:
      linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
    background-size: 42px 42px;
    mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.45), transparent 88%);
    opacity: 0.18;
    animation: splashGridDrift 20s linear infinite;
  }

  .splash-screen__content {
    position: relative;
    z-index: 1;
    min-height: min(632px, calc(100vh - 160px));
    display: grid;
    align-content: space-between;
    gap: clamp(28px, 4vw, 48px);
  }

  .splash-screen__brand {
    display: grid;
    justify-items: center;
    gap: clamp(24px, 3vw, 34px);
    text-align: center;
    padding-top: clamp(22px, 3vw, 38px);
  }

  .splash-screen__logo-wrap {
    position: relative;
    width: clamp(180px, 24vw, 248px);
    height: clamp(180px, 24vw, 248px);
    display: grid;
    place-items: center;
    animation: splashLogoFloat 5.4s ease-in-out infinite;
  }

  .splash-screen__logo-ring,
  .splash-screen__logo-sheen,
  .splash-screen__logo-core {
    position: absolute;
    inset: 0;
    border-radius: 50%;
  }

  .splash-screen__logo-ring--outer {
    border: 1px solid rgba(120, 196, 220, 0.24);
    box-shadow:
      0 0 0 1px rgba(255, 255, 255, 0.04) inset,
      0 0 0 18px rgba(255, 255, 255, 0.02);
    animation: splashRingSpin 16s linear infinite;
  }

  .splash-screen__logo-ring--inner {
    inset: 16px;
    border: 1px solid rgba(0, 192, 168, 0.34);
    animation: splashRingSpinReverse 10s linear infinite;
  }

  .splash-screen__logo-sheen {
    inset: 12px;
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.22), rgba(255, 255, 255, 0) 42%);
    transform: rotate(-18deg);
  }

  .splash-screen__logo-core {
    inset: 26px;
    display: grid;
    place-items: center;
    overflow: hidden;
    border: 1px solid rgba(201, 229, 244, 0.22);
    background:
      radial-gradient(circle at top, rgba(255, 255, 255, 0.18), transparent 50%),
      linear-gradient(180deg, rgba(56, 144, 176, 0.12), rgba(0, 192, 168, 0.04));
    box-shadow:
      0 18px 36px rgba(3, 12, 28, 0.18),
      inset 0 1px 0 rgba(255, 255, 255, 0.14);
    backdrop-filter: blur(10px);
  }

  .splash-screen__logo-core::after {
    content: '';
    position: absolute;
    inset: -18%;
    background: linear-gradient(105deg, transparent 38%, rgba(255, 255, 255, 0.24) 50%, transparent 62%);
    transform: translateX(-120%) rotate(8deg);
    animation: splashLogoSweep 2.9s ease-in-out infinite;
  }

  .splash-screen__logo {
    width: 64%;
    max-height: 64%;
    object-fit: contain;
    filter: drop-shadow(0 12px 18px rgba(3, 12, 28, 0.22));
    animation: splashLogoPulse 4.2s ease-in-out infinite;
  }

  .splash-screen__copy {
    display: grid;
    gap: 12px;
    max-width: 760px;
  }

  .splash-screen__eyebrow {
    margin: 0;
    font-size: var(--font-size-sm);
    font-weight: var(--font-weight-bold);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: rgba(151, 226, 215, 0.9);
  }

  .splash-screen__title {
    margin: 0;
    font-size: clamp(2.2rem, 5vw, 4.1rem);
    line-height: 1.03;
    color: #f6fbff;
    letter-spacing: -0.04em;
  }

  .splash-screen__meta {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 14px;
    color: rgba(222, 237, 248, 0.84);
    font-size: var(--font-size-base);
  }

  .splash-screen__version {
    padding: 9px 14px;
    border-radius: var(--radius-pill);
    border: 1px solid rgba(122, 197, 220, 0.2);
    background: rgba(56, 144, 176, 0.12);
    font-weight: var(--font-weight-semibold);
  }

  .splash-screen__divider {
    width: 42px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(136, 192, 56, 0.76), transparent);
  }

  .splash-screen__institution {
    font-weight: var(--font-weight-medium);
  }

  .splash-screen__progress-block {
    display: grid;
    gap: 16px;
    padding: clamp(22px, 2.5vw, 28px);
    border-radius: 28px;
    border: 1px solid rgba(120, 196, 220, 0.16);
    background:
      linear-gradient(180deg, rgba(56, 144, 176, 0.16), rgba(255, 255, 255, 0.04));
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
  }

  .splash-screen__progress-head,
  .splash-screen__progress-footer {
    display: flex;
    justify-content: space-between;
    gap: 18px;
    align-items: end;
  }

  .splash-screen__progress-label,
  .splash-screen__status,
  .splash-screen__powered {
    margin: 0;
  }

  .splash-screen__progress-label {
    font-size: var(--font-size-xs);
    font-weight: var(--font-weight-bold);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: rgba(151, 226, 215, 0.8);
    margin-bottom: 8px;
  }

  .splash-screen__percent {
    min-width: 74px;
    padding: 10px 14px;
    border-radius: var(--radius-pill);
    background: rgba(56, 144, 176, 0.14);
    border: 1px solid rgba(122, 197, 220, 0.18);
    text-align: center;
    color: #f6fbff;
    font-weight: var(--font-weight-bold);
    font-size: clamp(1rem, 1.8vw, 1.22rem);
  }

  .splash-screen__progress-track {
    position: relative;
    height: 14px;
    border-radius: 999px;
    overflow: hidden;
    background: rgba(9, 29, 40, 0.48);
    border: 1px solid rgba(122, 197, 220, 0.16);
  }

  .splash-screen__progress-track::before {
    content: '';
    position: absolute;
    inset: 2px;
    border-radius: inherit;
    background: linear-gradient(90deg, rgba(56, 144, 176, 0.1), rgba(255, 255, 255, 0.01));
  }

  .splash-screen__progress-bar {
    position: absolute;
    inset: 0 auto 0 0;
    width: 0%;
    border-radius: inherit;
    background:
      linear-gradient(90deg, #3890B0 0%, #00C0A8 58%, #88C038 100%);
    box-shadow:
      0 0 22px rgba(0, 192, 168, 0.28),
      inset 0 1px 0 rgba(255, 255, 255, 0.22);
    transition: width 0.18s linear;
  }

  .splash-screen__progress-bar::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(120deg, transparent 20%, rgba(255, 255, 255, 0.38) 50%, transparent 80%);
    animation: splashProgressSweep 1.8s linear infinite;
  }

  .splash-screen__status {
    color: rgba(226, 238, 247, 0.82);
    font-size: var(--font-size-sm);
  }

  .splash-screen__powered {
    color: rgba(151, 226, 215, 0.74);
    font-size: var(--font-size-xs);
    font-weight: var(--font-weight-bold);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    text-align: right;
  }

  @keyframes splashOrbFloatOne {
    0% { transform: translate3d(0, 0, 0) scale(1); }
    100% { transform: translate3d(32px, 18px, 0) scale(1.08); }
  }

  @keyframes splashOrbFloatTwo {
    0% { transform: translate3d(0, 0, 0) scale(1); }
    100% { transform: translate3d(-28px, -16px, 0) scale(1.09); }
  }

  @keyframes splashGridDrift {
    from { transform: translate3d(0, 0, 0); }
    to { transform: translate3d(24px, 16px, 0); }
  }

  @keyframes splashLogoFloat {
    0%, 100% { transform: translate3d(0, 0, 0); }
    50% { transform: translate3d(0, -10px, 0); }
  }

  @keyframes splashLogoPulse {
    0%, 100% { transform: scale(0.97); }
    50% { transform: scale(1.02); }
  }

  @keyframes splashRingSpin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  @keyframes splashRingSpinReverse {
    from { transform: rotate(360deg); }
    to { transform: rotate(0deg); }
  }

  @keyframes splashLogoSweep {
    0%, 100% { transform: translateX(-120%) rotate(8deg); opacity: 0; }
    26%, 72% { opacity: 1; }
    52% { transform: translateX(130%) rotate(8deg); opacity: 0.78; }
  }

  @keyframes splashProgressSweep {
    from { transform: translateX(-28%); }
    to { transform: translateX(28%); }
  }

  @media (max-width: 760px) {
    .splash-screen {
      width: calc(100vw - 24px);
      min-height: calc(100vh - 24px);
      padding: 22px 18px;
      border-radius: 28px;
    }

    .splash-screen__content {
      min-height: calc(100vh - 120px);
    }

    .splash-screen__progress-head,
    .splash-screen__progress-footer,
    .splash-screen__meta {
      flex-direction: column;
      align-items: flex-start;
    }

    .splash-screen__percent {
      min-width: 0;
    }

    .splash-screen__powered {
      text-align: left;
    }
  }

  .admin-reset-modal {
    position: fixed;
    inset: 0;
    z-index: 1300;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .admin-reset-modal.is-hidden {
    display: none;
  }

  .admin-reset-modal__backdrop {
    position: absolute;
    inset: 0;
    background: rgba(17, 24, 39, 0.48);
  }

  .admin-reset-modal__dialog {
    position: relative;
    z-index: 2;
    width: min(560px, calc(100vw - 32px));
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    box-shadow: var(--shadow-lg);
    padding: var(--space-7);
  }

  .admin-reset-modal__head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: var(--space-4);
    margin-bottom: var(--space-5);
  }

  .admin-reset-modal__head h3 {
    margin: 0;
    color: var(--brand-blue);
  }

  .user-modal {
    position: fixed;
    inset: 0;
    z-index: 1300;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .user-modal.is-hidden {
    display: none;
  }

  .user-modal__backdrop {
    position: absolute;
    inset: 0;
    background: rgba(17, 24, 39, 0.48);
  }

  .user-modal__dialog {
    position: relative;
    z-index: 2;
    width: min(720px, calc(100vw - 32px));
    max-height: calc(100vh - 48px);
    overflow: auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    box-shadow: var(--shadow-lg);
    padding: var(--space-7);
  }

  .user-modal__dialog--sm {
    width: min(520px, calc(100vw - 32px));
  }

  .user-modal__dialog--user-edit {
    width: min(1180px, calc(100vw - 32px));
  }

  .user-modal__head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: var(--space-4);
    margin-bottom: var(--space-5);
  }

  .user-modal__head h3 {
    margin: 0;
    color: var(--brand-blue);
  }

  .user-edit-layout {
    display: grid;
    grid-template-columns: minmax(260px, 320px) minmax(0, 1fr);
    gap: var(--space-6);
    align-items: start;
  }

  .user-edit-layout.is-single-column {
    grid-template-columns: minmax(260px, 360px);
  }

  .user-edit-layout__main,
  .user-edit-layout__modules {
    min-width: 0;
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    background: var(--surface);
    box-shadow: var(--shadow-md);
    padding: var(--space-6);
  }

  .user-edit-layout__main {
    display: grid;
    gap: var(--space-5);
  }

  .user-edit-layout__main-fields {
    display: grid;
    gap: var(--space-4);
  }

  .user-edit-layout__main-fields .field {
    width: 100%;
  }

  .user-edit-layout__modules {
    display: grid;
    gap: var(--space-5);
    align-content: start;
  }

  .user-edit-layout__modules-head {
    display: grid;
    gap: 4px;
  }

  .user-edit-layout__modules-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: var(--space-4);
  }

  .user-edit-layout__actions {
    margin-top: 0;
    justify-content: flex-start;
  }

  .user-delete-warning {
    border: 1px solid #fecaca;
    border-radius: var(--radius-lg);
    background: #fff5f5;
    color: #7a271a;
    padding: var(--space-4);
    margin-bottom: var(--space-5);
    font-size: var(--font-size-base);
    line-height: var(--line-normal);
  }

  .admin-reset-warning {
    border: 1px solid #fecaca;
    border-radius: var(--radius-lg);
    background: #fff5f5;
    color: #7a271a;
    padding: var(--space-4);
    margin-bottom: var(--space-5);
    font-size: var(--font-size-base);
    line-height: var(--line-normal);
  }

  .ficha-layout-v2 {
    display: flex;
    flex-direction: column;
    gap: 22px;
  }

  .ficha-universe {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .ficha-universe__head {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .ficha-universe__head h3 {
    margin: 0;
    font-size: var(--font-size-2xl);
    font-weight: var(--font-weight-extrabold);
    color: var(--brand-blue);
  }

  .ficha-grid {
    display: grid;
    gap: 16px;
  }

  .ficha-grid--main {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .ficha-grid--org {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .ficha-block {
    border: 1.5px solid var(--border-strong);
    border-radius: var(--radius-2xl);
    background: var(--surface);
    padding: 18px 18px 14px;
    box-shadow: var(--shadow-sm);
  }

  .ficha-block h3 {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 0 0 14px 0;
    font-size: var(--font-size-lg);
    font-weight: var(--font-weight-extrabold);
    color: var(--brand-blue);
  }

  .ficha-block .material-symbols-outlined {
    font-size: var(--font-size-xl);
  }

  .kv {
    display: grid;
    grid-template-columns: 150px 1fr;
    gap: 10px;
    padding: 3px 0;
  }

  .kv strong {
    color: var(--text);
    font-weight: var(--font-weight-bold);
  }

  .kv span {
    color: var(--text);
  }

  .field--image-upload .image-upload {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .image-upload__preview {
    min-height: 180px;
    border: 1px dashed var(--border);
    border-radius: var(--radius-xl);
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    padding: 12px;
  }

  .image-upload__img {
    max-width: 100%;
    max-height: 260px;
    object-fit: contain;
    display: block;
  }

  .image-upload__actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .form-grid--organizacion {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 260px;
    gap: 16px;
    align-items: start;
  }

  .form-grid--organizacion .field[data-span="2"] {
    grid-column: 1 / -1;
  }

  .form-grid--organizacion .field--org-selector {
    grid-column: 1 / 2;
  }

  .form-grid--organizacion .field--org-image {
    grid-column: 2 / 3;
    grid-row: 1 / span 3;
    align-self: start;
  }

  .field--image-top .image-upload--top {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .image-upload__preview--top {
    min-height: 180px;
    border: 1px dashed var(--border);
    border-radius: var(--radius-xl);
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    padding: 10px;
  }

  .image-upload__actions--stack {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .image-upload__preview--top img,
  .image-upload__img {
    max-width: 100%;
    max-height: 220px;
    object-fit: contain;
    display: block;
  }

  @media (max-width: 1280px) {
    .ingreso-layout {
      grid-template-columns: 1fr;
    }

    .sticky-card {
      position: static;
    }
  }

  @media (max-width: 1100px) {
    .layout {
      grid-template-columns: 1fr;
    }

    .layout.is-sidebar-collapsed {
      grid-template-columns: 1fr;
    }

    .sidebar {
      order: 2;
    }

    .layout.is-sidebar-collapsed .sidebar {
      padding: var(--space-6);
      align-items: stretch;
    }

    .layout.is-sidebar-collapsed .sidebar-toggle {
      width: 100%;
      min-width: 0;
      height: auto;
      min-height: 48px;
      place-self: stretch;
      justify-content: flex-start;
      padding: var(--space-4) var(--space-5);
      gap: var(--space-3);
    }

    .layout.is-sidebar-collapsed .nav-label,
    .layout.is-sidebar-collapsed .sidebar-toggle__label {
      position: static;
      width: auto;
      height: auto;

      border: 0;

      grid-template-columns: 1fr;

      --inicio-dashboard-height: 560px;
    }

    .form-grid {
      grid-template-columns: 1fr;
    }

    .field--third {
      width: 100%;
    }

    .ficha-grid {
      grid-template-columns: 1fr;
    }

    .toolbar,
    .hero {
      flex-direction: column;
      align-items: flex-start;
    }
  }

  @media (max-width: 980px) {
    .ficha-grid--main,
    .ficha-grid--org,
    .form-grid--organizacion,
    .avance-header,
    .avance-topbar {
      grid-template-columns: 1fr;
    }

    .form-grid--organizacion .field--org-image {
      grid-column: 1 / -1;
      grid-row: auto;
    }

    .kv {
      grid-template-columns: 1fr;
      gap: 2px;
    }

    .user-modal__dialog--user-edit {
      width: min(960px, calc(100vw - 24px));
    }

    .user-edit-layout {
      grid-template-columns: minmax(240px, 300px) minmax(0, 1fr);
    }
  }

  @media (max-width: 840px) {
    .user-edit-layout {
      grid-template-columns: 1fr;
    }

    .user-edit-layout__modules-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }

  @media (max-width: 640px) {
    .user-modal__dialog--user-edit {
      width: min(100vw - 16px, 100%);
      padding: var(--space-5);
    }

    .user-edit-layout__modules-grid {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 900px) {
    .app-header {
      flex-direction: column;
      align-items: stretch;
    }

    .app-header__left {
      align-items: center;
    }

    .brand-mark {
      width: 78px;
      height: 78px;
    }

    .brand-copy__title {
      font-size: var(--icon-md);
    }

    .app-header__right {
      justify-content: flex-end;
    }
  }

  /* Avance como barras de progreso */
  .avance-shell {
    display: flex;
    flex-direction: column;
    gap: var(--space-7);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    padding: var(--space-7);
    box-shadow: var(--shadow-md);
  }

  .avance-header {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: var(--space-6);
    align-items: end;
  }

  .avance-section {
    display: flex;
    flex-direction: column;
    gap: var(--space-4);
  }

  .avance-hitos-grid,
  #avance-pre-grid,
  #avance-for-grid {
    display: grid;
    grid-template-columns: repeat(8, minmax(0, 1fr));
    gap: var(--space-4);
    align-items: stretch;
    align-content: start;
    grid-auto-rows: 1fr;
  }

  .avance-hito-card {
    width: auto;
    min-height: 160px;
    aspect-ratio: 1 / 1;
    border: 1.5px solid var(--border-strong);
    border-radius: var(--radius-xl);
    background: var(--surface);
    padding: var(--space-5) var(--space-4);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    text-align: center;
    cursor: pointer;
    transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
    box-shadow: var(--shadow-sm);
    min-width: 0;
    max-width: none;
    grid-column: auto;
    justify-self: stretch;
    align-self: stretch;
    appearance: none;
  }

  .avance-hitos-grid > *,
  #avance-pre-grid > *,
  #avance-for-grid > * {
    display: flex;
    width: auto;
    grid-column: auto;
    min-width: 0;
    max-width: none;
    justify-self: stretch;
    align-self: stretch;
  }

  .avance-hito-card:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
  }

  .avance-hito-card:disabled {
    cursor: not-allowed;
  }

  .avance-hito-card__icon {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .avance-hito-card__icon .material-symbols-outlined {
    font-size: var(--icon-lg);
    line-height: 1;
  }

  .avance-hito-card__body {
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: center;
    width: 100%;
    min-width: 0;
  }

  .avance-hito-card__title {
    font-size: var(--font-size-md);
    font-weight: var(--font-weight-bold);
    line-height: 1.25;
    color: var(--text);
    max-width: 16ch;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .avance-hito-card__status {
    font-size: var(--font-size-sm);
    font-weight: var(--font-weight-bold);
    line-height: 1.2;
    color: var(--text-muted);
  }

  .avance-hito-card__detail {
    font-size: var(--font-size-xs);
    line-height: 1.2;
    color: var(--text-muted);
    min-height: 26px;
    max-width: 16ch;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .avance-hito-card.is-completed {
    border-color: var(--brand-green);
    background: var(--brand-green-soft);
  }

  .avance-hito-card.is-completed .avance-hito-card__icon .material-symbols-outlined {
    color: var(--brand-green);
  }

  .avance-hito-card.is-completed .avance-hito-card__status {
    color: var(--success-dark);
  }

  .avance-hito-card.is-enabled {
    border-color: var(--brand-blue);
    background: var(--surface);
  }

  .avance-hito-card.is-enabled .avance-hito-card__icon .material-symbols-outlined {
    color: var(--brand-blue);
  }

  .avance-hito-card.is-enabled .avance-hito-card__status {
    color: var(--brand-blue);
  }

  .avance-hito-card.is-blocked {
    border-color: var(--border);
    background: var(--disabled-soft);
  }

  .avance-hito-card.is-blocked .avance-hito-card__icon .material-symbols-outlined {
    color: var(--disabled);
  }

  .avance-hito-card.is-blocked .avance-hito-card__status {
    color: var(--text-muted);
  }

  .avance-timeline {
    display: flex;
    flex-direction: column;
    gap: var(--space-4);
  }

  .avance-resumen {
    display: block;
  }

  .avance-resumen-layout {
    display: grid;
    grid-template-columns: minmax(260px, 0.32fr) minmax(0, 1fr);
    gap: var(--space-5);
    align-items: stretch;
  }

  .avance-resumen-card,
  .avance-resumen-progress {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-sm);
  }

  .avance-resumen-card {
    padding: var(--space-5);
    min-width: 0;
  }

  .avance-resumen-card__title,
  .avance-resumen-progress__title {
    color: var(--brand-green);
    font-size: var(--font-size-sm);
    font-weight: var(--font-weight-bold);
    letter-spacing: .06em;
    text-transform: uppercase;
  }

  .avance-resumen-card__title {
    margin-bottom: var(--space-4);
  }

  .avance-resumen-card__grid {
    display: grid;
    gap: var(--space-3);
  }

  .avance-resumen-card__item {
    display: grid;
    grid-template-columns: 112px minmax(0, 1fr);
    gap: var(--space-3);
    align-items: start;
    font-size: var(--font-size-sm);
    line-height: var(--line-height-tight);
  }

  .avance-resumen-card__item strong {
    color: var(--text);
    font-weight: var(--font-weight-bold);
  }

  .avance-resumen-card__item span {
    color: var(--text-secondary);
    overflow-wrap: anywhere;
  }

  .avance-resumen-progress {
    min-width: 0;
    padding: var(--space-5) var(--space-6);
  }

  .avance-resumen-progress__title {
    text-align: center;
    margin-bottom: var(--space-4);
  }

  /* Modal de hito */
  .avance-modal {
    position: fixed;
    inset: 0;
    z-index: 1200;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .avance-modal.is-hidden {
    display: none;
  }

  .avance-modal__backdrop {
    position: absolute;
    inset: 0;
    background: rgba(17, 24, 39, 0.4);
  }

  .avance-modal__dialog {
    position: relative;
    z-index: 2;
    width: min(560px, calc(100vw - 32px));
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    box-shadow: var(--shadow-lg);
    padding: 20px;
  }

  .avance-modal__head {
    display: flex;
    justify-content: space-between;
    align-items: start;
    gap: 12px;
    margin-bottom: 14px;
  }

  .avance-modal__head h3 {
    margin: 0;
    color: var(--brand-blue);
  }

  #avance-modal-org-nombre-field.is-hidden {
    display: none;
  }

  .avance-org-name-input {
    display: grid;
    grid-template-columns: auto minmax(0, 1fr);
    align-items: center;
    gap: var(--space-2);
  }

  .avance-org-name-prefix {
    min-height: 40px;
    display: inline-flex;
    align-items: center;
    padding: 0 var(--space-3);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    background: var(--surface-alt);
    color: var(--text-strong);
    font-size: var(--font-size-sm);
    font-weight: var(--font-weight-bold);
    white-space: nowrap;
  }

  .avance-modal-error {
    margin: var(--space-2) 0 0;
    color: var(--danger);
    font-size: var(--font-size-sm);
    font-weight: var(--font-weight-semibold);
  }

  .avance-modal-error.is-hidden {
    display: none;
  }

  @media (max-width: 1600px) {
    .avance-hitos-grid,
    #avance-pre-grid,
    #avance-for-grid {
      grid-template-columns: repeat(6, minmax(0, 1fr));
    }
  }

  @media (max-width: 1280px) {
    .avance-header {
      grid-template-columns: 1fr;
    }

    .avance-resumen-layout {
      grid-template-columns: minmax(240px, 0.36fr) minmax(0, 1fr);
    }

    .avance-hitos-grid,
    #avance-pre-grid,
    #avance-for-grid {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }
  }

  @media (max-width: 900px) {
    .avance-resumen-layout {
      grid-template-columns: 1fr;
    }

    .avance-hitos-grid,
    #avance-pre-grid,
    #avance-for-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }

  @media (max-width: 640px) {
    .avance-resumen-card,
    .avance-resumen-progress {
      padding: var(--space-4);
    }

    .avance-resumen-card__item {
      grid-template-columns: 1fr;
      gap: 2px;
    }

    .avance-hitos-grid,
    #avance-pre-grid,
    #avance-for-grid {
      grid-template-columns: 1fr;
    }

    .avance-hito-card {
      aspect-ratio: auto;
      min-height: 144px;
    }

    .avance-org-name-input {
      grid-template-columns: 1fr;
    }
  }

  .avance-resumen-bars {
    display: grid;
    gap: var(--space-4);
  }

  .avance-resumen-bar {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    padding: var(--space-4) var(--space-5);
  }

  .avance-resumen-bar__head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: var(--space-4);
    margin-bottom: 8px;
  }

  .avance-resumen-bar__label {
    font-weight: var(--font-weight-bold);
    color: var(--text);
  }

  .avance-resumen-bar__meta {
    font-size: var(--font-size-sm);
    color: var(--text-muted);
  }

  .avance-resumen-bar__row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: var(--space-4);
    align-items: center;
  }

  .avance-resumen-bar__track {
    position: relative;
    width: 100%;
    height: 12px;
    border-radius: var(--radius-pill);
    background: var(--surface-alt);
    overflow: hidden;
  }

  .avance-resumen-bar__fill {
    height: 100%;
    border-radius: var(--radius-pill);
    background: linear-gradient(90deg, var(--brand-green) 0%, var(--brand-blue) 100%);
    transition: width .25s ease;
  }

  .avance-resumen-bar__pct {
    min-width: 48px;
    text-align: right;
    font-weight: var(--font-weight-bold);
    color: var(--text);
  }

  /* Modulo Socios */
  .socios-shell {
    display: grid;
    gap: var(--space-6);
  }

  .socios-head {
    align-items: center;
  }

  .socios-actions {
    display: flex;
    gap: var(--space-3);
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .socios-embed-panel {
    --socios-embed-height: 90vh;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    box-shadow: var(--shadow-md);
    overflow: hidden;
    height: var(--socios-embed-height);
    min-height: var(--socios-embed-height);
    margin-top: -20px;
  }

  .socios-embed {
    display: block;
    width: 100%;
    height: var(--socios-embed-height);
    min-height: var(--socios-embed-height);
    border: 0;
    overflow: hidden;
  }

  .socios-embed--empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: var(--space-3);
    padding: var(--space-7);
    text-align: center;
    color: var(--text-muted);
    background: linear-gradient(135deg, var(--brand-blue-soft), var(--surface));
  }

  .socios-embed--empty .material-symbols-outlined {
    color: var(--brand-blue);
    font-size: 44px;
  }

  .socios-embed--empty strong {
    color: var(--text);
  }

  .socios-preview {
    display: grid;
    gap: var(--space-4);
  }

  .socios-modal {
    position: fixed;
    inset: 0;
    z-index: 1200;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .socios-modal.is-hidden {
    display: none;
  }

  .socios-modal__backdrop {
    position: absolute;
    inset: 0;
    background: rgba(17, 24, 39, 0.4);
  }

  .socios-modal__dialog {
    position: relative;
    z-index: 2;
    width: min(720px, calc(100vw - 32px));
    max-height: calc(100vh - 32px);
    overflow: auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    box-shadow: var(--shadow-lg);
    padding: var(--space-7);
  }

  .socios-modal__head {
    display: flex;
    justify-content: space-between;
    align-items: start;
    gap: var(--space-4);
    margin-bottom: var(--space-5);
  }

  .socios-modal__head h3 {
    margin: 0;
    color: var(--brand-blue);
  }

  .socios-manual-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: var(--space-4);
  }

  .socios-manual-grid .field--half,
  .socios-manual-grid .field--full {
    width: 100%;
    display: flex;
  }

  .socios-manual-grid .field--full {
    grid-column: 1 / -1;
  }

  .socios-manual-message {
    margin: var(--space-4) 0 0;
    padding: var(--space-3) var(--space-4);
    border: 1px solid var(--success);
    border-radius: var(--radius-lg);
    background: var(--success-soft);
    color: var(--success-dark);
    font-weight: var(--font-weight-bold);
  }

  .socios-manual-message.is-hidden {
    display: none;
  }

  .socios-manual-feedback {
    margin: var(--space-4) 0 0;
    padding: var(--space-3) var(--space-4);
    border-radius: var(--radius-lg);
    font-weight: var(--font-weight-bold);
  }

  .socios-manual-feedback--error {
    border: 1px solid var(--danger);
    background: var(--danger-soft);
    color: var(--danger);
  }

  .socios-manual-feedback--loading {
    border: 1px solid var(--brand-blue);
    background: var(--brand-blue-soft);
    color: var(--brand-blue-dark);
  }

  .socios-manual-feedback.is-hidden {
    display: none;
  }

  @media (max-width: 900px) {
    .socios-head {
      align-items: flex-start;
    }

    .socios-actions {
      width: 100%;
      justify-content: flex-start;
    }

    .socios-embed-panel {
      --socios-embed-height: 443px;
    }
  }

  @media (max-width: 640px) {
    .inicio-summary-grid {
      grid-template-columns: 1fr;
    }

    .inicio-dashboard-head {
      align-items: flex-start;
      flex-direction: column;
    }

    .inicio-dashboard-panel {
      --inicio-dashboard-height: 500px;
    }

    .socios-modal__dialog {
      padding: var(--space-5);
    }

    .socios-manual-grid {
      grid-template-columns: 1fr;
    }
  }

  /* Modulo Organizaciones */
  .organizaciones-shell {
    display: grid;
    gap: var(--space-6);
  }

  .organizaciones-head,
  .organizaciones-summary {
    align-items: center;
  }

  .organizaciones-actions {
    display: flex;
    gap: var(--space-3);
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .organizaciones-age-card {
    justify-self: end;
    min-width: 190px;
    padding: var(--space-4) var(--space-5);
    text-align: right;
  }

  .organizaciones-age-card span {
    display: block;
    color: var(--text-muted);
    font-size: var(--font-size-xs);
    font-weight: var(--font-weight-bold);
    letter-spacing: .06em;
    text-transform: uppercase;
  }

  .organizaciones-age-card strong {
    display: block;
    margin-top: 4px;
    color: var(--brand-blue-dark);
    font-size: var(--font-size-xl);
    line-height: var(--line-tight);
  }

  .organizaciones-selector-panel {
    display: flex;
    align-items: end;
    gap: var(--space-4);
  }

  .organizaciones-detail {
    display: grid;
    gap: var(--space-5);
  }

  .organizaciones-summary,
  .organizaciones-block,
  .organizaciones-metric {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    box-shadow: var(--shadow-sm);
    padding: var(--space-6);
  }

  .organizaciones-summary {
    display: flex;
    justify-content: space-between;
  }

  .organizaciones-summary h3,
  .organizaciones-block h4,
  .organizaciones-modal__head h3 {
    margin: 0;
    color: var(--brand-blue);
  }

  .organizaciones-metrics {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: var(--space-4);
  }

  .organizaciones-metric {
    text-align: center;
  }

  .organizaciones-metric strong {
    display: block;
    color: var(--brand-blue);
    font-size: var(--font-size-2xl);
  }

  .organizaciones-metric span {
    color: var(--text-muted);
    font-size: var(--font-size-sm);
    font-weight: var(--font-weight-semibold);
  }

  .organizaciones-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: var(--space-5);
  }

  .organizaciones-block {
    min-width: 0;
  }

  .organizaciones-block h4 {
    margin-bottom: var(--space-4);
  }

  .organizaciones-kv {
    display: grid;
    gap: var(--space-3);
  }

  .organizaciones-kv > div {
    display: grid;
    grid-template-columns: 160px minmax(0, 1fr);
    gap: var(--space-3);
    align-items: start;
    font-size: var(--font-size-sm);
  }

  .organizaciones-kv span {
    color: var(--text-secondary);
    overflow-wrap: anywhere;
  }

  .organizaciones-modal {
    position: fixed;
    inset: 0;
    z-index: 1200;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .organizaciones-modal.is-hidden {
    display: none;
  }

  .organizaciones-modal__backdrop {
    position: absolute;
    inset: 0;
    background: rgba(17, 24, 39, 0.4);
  }

  .organizaciones-modal__dialog {
    position: relative;
    z-index: 2;
    width: min(900px, calc(100vw - 32px));
    max-height: calc(100vh - 32px);
    overflow: auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    box-shadow: var(--shadow-lg);
    padding: var(--space-7);
  }

  .organizaciones-modal__dialog--sm {
    width: min(520px, calc(100vw - 32px));
  }

  .organizaciones-modal__head {
    display: flex;
    justify-content: space-between;
    align-items: start;
    gap: var(--space-4);
    margin-bottom: var(--space-5);
  }

  .organizaciones-form-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: var(--space-4);
  }

  .organizaciones-form-grid .field--half,
  .organizaciones-form-grid .field--full {
    width: 100%;
    display: flex;
  }

  .organizaciones-form-grid .field--full {
    grid-column: 1 / -1;
  }

  .organizacion-socio-cargo-cell {
    display: inline-flex;
    align-items: center;
    gap: var(--space-2);
  }

  .table-action-btn {
    width: 30px;
    height: 30px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    background: var(--surface);
    color: var(--brand-blue);
    cursor: pointer;
  }

  .table-action-btn .material-symbols-outlined {
    font-size: 18px;
  }

  .table-action-btn--danger {
    color: var(--danger);
    border-color: #fecaca;
  }

  .user-row-actions {
    display: inline-flex;
    align-items: center;
    gap: var(--space-2);
  }

  .data-table tr.is-inactive {
    opacity: 0.68;
    background: var(--surface-soft);
  }

  .user-status-pill {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 42px;
    border-radius: 999px;
    padding: 3px 9px;
    font-size: var(--font-size-xs);
    font-weight: var(--font-weight-bold);
  }

  .user-status-pill.is-active {
    color: var(--success);
    background: var(--success-soft);
  }

  .user-status-pill.is-inactive {
    color: var(--text-muted);
    background: var(--surface-alt);
  }

  .organizacion-socio-modal-summary {
    display: grid;
    gap: 4px;
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    background: var(--surface-soft);
    padding: var(--space-4);
    margin-bottom: var(--space-5);
  }

  .organizacion-socio-modal-summary span,
  .organizacion-socio-modal-summary small {
    color: var(--text-muted);
  }

  /* Modulo Beneficios */
  .beneficios-shell {
    display: grid;
    gap: var(--space-6);
  }

  .beneficios-head {
    align-items: center;
  }

  .beneficios-summary,
  .beneficio-card,
  .beneficios-detail,
  .beneficios-block,
  .beneficios-metric {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    box-shadow: var(--shadow-md);
  }

  .beneficios-actions {
    display: flex;
    gap: var(--space-3);
    flex-wrap: wrap;
    justify-content: flex-end;
