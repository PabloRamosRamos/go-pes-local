<style>
  :root {
    --green: #8BB844;
    --blue: #3E96B4;
    --ink: #24364B;
    --muted: #64748B;
    --bg: #F7FAFC;
    --slate: #EAF0F5;
    --border: #3E96B4;
    --white: #ffffff;
    --radius: 14px;
    --shadow: 0 8px 20px rgba(26, 49, 80, 0.08);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    color: var(--ink);
    background: linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
  }

  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    vertical-align: middle;
    color: var(--blue);
  }

  .hero {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 8px 8px;
    background: var(--white);
    border-bottom: 1px solid var(--border);
  }

  .hero__brand {
    display: flex;
    gap: 18px;
    align-items: center;
  }

  .hero__logo {
    width: 124px;
    height: 124px;
    border-radius: 18px;
    color: white;
    display: grid;
    place-items: center;
    font-size: 28px;
    font-weight: 700;
  }

  .eyebrow {
    margin: 0 0 4px;
    color: var(--green);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
  }

  .hero__title {
    margin: 0;
    font-size: 34px;
    line-height: 1.1;
    color: var(--blue);
  }

  .hero__subtitle {
    margin: 6px 0 0;
    color: var(--muted);
  }

  .hero__user {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border: 1px solid var(--border);
    background: var(--bg);
    border-radius: 999px;
    font-size: 14px;
    color: var(--ink);
  }

  .app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    padding: 22px 28px;
    background: #ffffff;
    border-bottom: 1px solid #d6e0ea;
  }

  .app-header__left {
    display: flex;
    align-items: center;
    gap: 18px;
    min-width: 0;
  }

  .app-header__right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .brand-mark {
    width: 124px;
    height: 124px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #ffffff;
    border: 0 solid #dfe7ef;
    border-radius: 18px;
    padding: 0;
    box-sizing: border-box;
    flex: 0 0 auto;
  }

  .brand-logo {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  .brand-copy__eyebrow {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #007c4a;
    margin-bottom: 4px;
  }

  .brand-copy__title {
    margin: 0;
    font-size: 28px;
    line-height: 1.1;
    font-weight: 700;
    color: #214e8a;
  }

  .brand-copy__subtitle {
    margin: 6px 0 0;
    font-size: 14px;
    color: #4f6278;
  }

  .user-chip {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border: 1px solid #d6e0ea;
    border-radius: 14px;
    background: #f7fafc;
    color: #214e8a;
  }

  .user-chip .material-symbols-outlined {
    font-size: 24px;
    color: #214e8a;
  }

  .user-chip__meta {
    display: flex;
    flex-direction: column;
    line-height: 1.15;
  }

  .user-chip__meta strong {
    font-size: 13px;
    color: #24364b;
  }

  .user-chip__meta small {
    font-size: 11px;
    color: #62758b;
  }

  .quick-actions {
    padding: 18px 32px 0;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    gap: 14px;
  }

  .quick-card {
    border: 1px solid var(--border);
    background: var(--white);
    border-radius: var(--radius);
    padding: 18px;
    cursor: pointer;
    transition: .18s ease;
    box-shadow: var(--shadow);
    text-align: left;
  }

  .quick-card:hover {
    transform: translateY(-1px);
  }

  .quick-card h3 {
    margin: 8px 0 4px;
    font-size: 16px;
  }

  .quick-card p {
    margin: 0;
    font-size: 13px;
    color: var(--muted);
  }

  .toolbar {
    text-align: right;
    justify-content: space-between;
    gap: 16px;
    align-items: center;
    margin: 18px 32px;
    padding: 12px 16px;
    background: var(--slate);
    border-radius: 12px;
  }

  .toolbar__left {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .link-btn {
    background: transparent;
    border: none;
    color: var(--blue);
    padding: 8px 10px;
    cursor: pointer;
    font-weight: 600;
  }

  .layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 22px;
    padding: 0 32px 32px;
  }

  .sidebar {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    height: fit-content;
    box-shadow: var(--shadow);
    display: grid;
    gap: 10px;
  }

  .nav-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--ink);
    padding: 12px 14px;
    border-radius: 12px;
    cursor: pointer;
    text-align: left;
    font-weight: 600;
  }

  .nav-btn.is-active,
  .nav-btn:hover {
    background: var(--slate);
    border-color: #bfcfe0;
  }

  .content {
    position: relative;
    min-height: 320px;
  }

  .content-loading {
    position: absolute;
    inset: 0;
    z-index: 40;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255, 255, 255, 0.96);
    opacity: 1;
    visibility: visible;
    transition: opacity 0.22s ease, visibility 0.22s ease;
  }

  .content-loading.is-hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  .content-loading__box {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    text-align: center;
  }

  .content-loading__spinner {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    position: relative;
    background: conic-gradient(
      from 0deg,
      #8BB844 0deg 180deg,
      #3E96B4 180deg 360deg
    );
    animation: contentLoadingSpin 0.9s linear infinite;
    box-shadow: 0 8px 20px rgba(36, 54, 75, 0.12);
  }

  .content-loading__spinner::after {
    content: '';
    position: absolute;
    inset: 10px;
    border-radius: 50%;
    background: #ffffff;
  }

  .content-loading__text {
    font-size: 15px;
    font-weight: 700;
    color: #24364B;
    letter-spacing: 0.02em;
  }

  @keyframes contentLoadingSpin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .view { display: none; }
  .view.active { display: block; }

  .section-head {
    display: flex;
    justify-content: space-between;
    align-items: start;
    margin: 4px 0 18px;
    gap: 16px;
  }

  .section-head--stacked {
    align-items: flex-start;
  }

  .section-head h2 {
    margin: 0;
    color: var(--blue);
  }

  .section-head h3 {
    margin: 0;
    color: var(--blue);
  }

  .section-head__meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .muted {
    color: var(--muted);
  }

  .tile-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
    gap: 14px;
  }

  .tile {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: var(--shadow);
    padding: 18px;
    cursor: pointer;
    text-align: left;
  }

  .tile h3 {
    margin: 10px 0 8px;
  }

  .tile p {
    margin: 0;
    color: var(--muted);
    font-size: 13px;
  }

  .panel {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px;
    box-shadow: var(--shadow);
  }

  .search-panel {
    display: flex;
    gap: 16px;
    align-items: end;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 14px;
    min-width: 0;
  }

  .field--grow {
    flex: 1;
  }

  .field--auto {
    width: 180px;
  }

  .field--half {
    width: calc(50% - 8px);
    display: inline-flex;
  }

  .field--third {
    width: calc(33.33% - 8px);
    display: inline-flex;
  }

  .field--full {
    width: 100%;
  }

  label {
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
  }

  input,
  select,
  textarea {
    width: 100%;
    padding: 11px 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font: inherit;
    color: var(--ink);
    background: #fff;
  }

  textarea {
    resize: vertical;
  }

  input:focus,
  select:focus,
  textarea:focus {
    outline: 2px solid rgba(33, 78, 138, .15);
    border-color: var(--blue);
  }

  .primary-btn,
  .secondary-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border-radius: 12px;
    padding: 12px 16px;
    font-weight: 700;
    cursor: pointer;
    border: 1px solid transparent;
  }

  .primary-btn {
    background: var(--green);
    color: white;
  }

  .primary-btn .material-symbols-outlined {
    color: white;
  }

  .secondary-btn {
    background: var(--white);
    border-color: var(--border);
    color: var(--blue);
  }

  .actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 8px;
  }

  .form-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 0 16px;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px;
    box-shadow: var(--shadow);
  }

  .form-grid--dense {
    background: transparent;
    border: 0;
    border-radius: 0;
    padding: 0;
    box-shadow: none;
    gap: 0 16px;
  }

  .form-grid .field[data-span="2"] {
    grid-column: 1 / -1;
  }

  .table-wrap {
    overflow: auto;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: var(--shadow);
  }

  .data-table {
    width: 100%;
    border-collapse: collapse;
  }

  .data-table th,
  .data-table td {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    text-align: left;
    vertical-align: top;
  }

  .data-table thead th {
    color: var(--blue);
    background: #fcfdff;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 10px;
    border-radius: 999px;
    background: var(--slate);
    color: var(--blue);
    font-size: 12px;
    font-weight: 700;
  }

  .ficha-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 16px;
  }

  .ficha-block {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px;
    box-shadow: var(--shadow);
  }

  .ficha-block h3 {
    margin: 0 0 12px;
    color: var(--blue);
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .kv {
    display: grid;
    grid-template-columns: 170px 1fr;
    gap: 8px;
    font-size: 14px;
    margin-bottom: 8px;
  }

  .kv strong {
    color: var(--ink);
  }

  .empty-state {
    padding: 20px;
    text-align: center;
    color: var(--muted);
  }

  .is-admin {
    display: none;
  }

  .show-admin {
    display: inline-flex !important;
  }

  .message {
    padding: 10px 12px;
    border-radius: 10px;
    margin-bottom: 14px;
    font-size: 14px;
  }

  .message.success {
    background: #EAF7F1;
    color: #0C6844;
  }

  .message.error {
    background: #FFF0F0;
    color: #A12A2A;
  }

  /* Nuevo ingreso */
  .ingreso-layout {
    display: grid;
    grid-template-columns: minmax(0, 1.6fr) minmax(320px, .9fr);
    gap: 16px;
    align-items: start;
  }

  .ingreso-form {
    display: grid;
    gap: 16px;
  }

  .module-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px;
    box-shadow: var(--shadow);
  }

  .module-card__head {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: flex-start;
    margin-bottom: 14px;
  }

  .module-card__head h3 {
    margin: 0;
    color: var(--blue);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .module-card__head p {
    margin: 0;
  }

  .module-card--actions {
    padding-bottom: 10px;
  }

  .form-actions-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .ingreso-side {
    display: grid;
    gap: 16px;
  }

  .sticky-card {
    position: sticky;
    top: 16px;
  }

  .sticky-card + .sticky-card {
    position: static;
  }

  .ingreso-preview {
    display: grid;
    gap: 10px;
  }

  .preview-block {
    display: grid;
    gap: 8px;
  }

  .preview-block__title {
    text-align: center;
    font-size: 12px;
    font-weight: 700;
    color: var(--green);
    text-transform: uppercase;
    letter-spacing: .06em;
  }

  .preview-grid {
    text-align: left;
    display: grid;
    gap: 8px;
  }

  .preview-item {
    display: grid;
    grid-template-columns: 120px 1fr;
    gap: 8px;
    font-size: 14px;
  }

  .preview-item strong {
    color: var(--ink);
  }

  .matches-list {
    display: grid;
    gap: 10px;
  }

  .match-card {
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    background: #fcfdff;
  }

  .match-card h4 {
    margin: 0 0 6px;
    color: var(--blue);
    font-size: 14px;
  }

  .match-card p {
    margin: 0;
    font-size: 13px;
    color: var(--muted);
  }

  .tips-list {
    margin: 0;
    padding-left: 18px;
    display: grid;
    gap: 10px;
    color: var(--muted);
    font-size: 14px;
  }

  .field-help {
    font-size: 12px;
    color: var(--muted);
    margin-top: -2px;
  }

  .app-loading {
    position: fixed;
    inset: 0;
    z-index: 99999;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255, 255, 255, 0.96);
    opacity: 1;
    visibility: visible;
    transition: opacity 0.28s ease, visibility 0.28s ease;
  }

  .app-loading.is-hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  .app-loading__box {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    text-align: center;
  }

  .app-loading__spinner {
    width: 84px;
    height: 84px;
    border-radius: 50%;
    position: relative;
    background: conic-gradient(
      from 0deg,
      #8BB844 0deg 180deg,
      #3E96B4 180deg 360deg
    );
    animation: appLoadingSpin 0.9s linear infinite;
    box-shadow: 0 8px 20px rgba(36, 54, 75, 0.12);
  }

  .app-loading__spinner::after {
    content: '';
    position: absolute;
    inset: 11px;
    border-radius: 50%;
    background: #ffffff;
  }

  .app-loading__text {
    font-size: 15px;
    font-weight: 700;
    color: #24364B;
    letter-spacing: 0.02em;
  }

  @keyframes appLoadingSpin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .ficha-layout-v2 {
    display: flex;
    flex-direction: column;
    gap: 22px;
  }

  .ficha-universe {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .ficha-universe__head {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .ficha-universe__head h3 {
    margin: 0;
    font-size: 28px;
    font-weight: 800;
    color: #3E96B4;
  }

  .ficha-grid {
    display: grid;
    gap: 16px;
  }

  .ficha-grid--main {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .ficha-grid--org {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .ficha-block {
    border: 1.5px solid #3E96B4;
    border-radius: 18px;
    background: #ffffff;
    padding: 18px 18px 14px;
    box-shadow: 0 6px 16px rgba(36, 54, 75, 0.05);
  }

  .ficha-block h3 {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 0 0 14px 0;
    font-size: 15px;
    font-weight: 800;
    color: #3E96B4;
  }

  .ficha-block .material-symbols-outlined {
    font-size: 20px;
  }

  .kv {
    display: grid;
    grid-template-columns: 150px 1fr;
    gap: 10px;
    padding: 3px 0;
  }

  .kv strong {
    color: #24364B;
    font-weight: 700;
  }

  .kv span {
    color: #24364B;
  }

  .field--image-upload .image-upload {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .image-upload__preview {
    min-height: 180px;
    border: 1px dashed var(--border);
    border-radius: 14px;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    padding: 12px;
  }

  .image-upload__img {
    max-width: 100%;
    max-height: 260px;
    object-fit: contain;
    display: block;
  }

  .image-upload__actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .form-grid--organizacion {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 260px;
    gap: 16px;
    align-items: start;
  }

  .form-grid--organizacion .field[data-span="2"] {
    grid-column: 1 / -1;
  }

  .form-grid--organizacion .field--org-selector {
    grid-column: 1 / 2;
  }

  .form-grid--organizacion .field--org-image {
    grid-column: 2 / 3;
    grid-row: 1 / span 3;
    align-self: start;
  }

  .field--image-top .image-upload--top {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .image-upload__preview--top {
    min-height: 180px;
    border: 1px dashed var(--border);
    border-radius: 14px;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    padding: 10px;
  }

  .image-upload__actions--stack {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .image-upload__preview--top img,
  .image-upload__img {
    max-width: 100%;
    max-height: 220px;
    object-fit: contain;
    display: block;
  }

  /* Avance */
  .avance-shell {
    display: flex;
    flex-direction: column;
    gap: 18px;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px;
    box-shadow: var(--shadow);
  }

  .avance-header {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 16px;
    align-items: end;
  }

  .avance-header__actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .avance-topbar {
    display: grid;
    grid-template-columns: 220px 180px minmax(0, 1fr);
    gap: 16px;
    align-items: start;
  }

  .avance-status-card {
    border: 1px solid var(--border);
    border-radius: 14px;
    background: #fff;
    padding: 14px;
    box-shadow: var(--shadow);
  }

  .avance-section {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .avance-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 12px;
  }

  .avance-card {
    text-align: left;
    border: 1px solid var(--border);
    border-radius: 14px;
    background: #fff;
    padding: 14px;
    cursor: pointer;
    transition: transform .15s ease, box-shadow .15s ease, opacity .15s ease;
    box-shadow: var(--shadow);
  }

  .avance-card:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 8px 20px rgba(0, 0, 0, .06);
  }

  .avance-card:disabled {
