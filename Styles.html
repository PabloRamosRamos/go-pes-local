<style>
  @import url('https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600;700;800&display=swap');

  :root {
    --brand-blue: #3D96B4;
    --brand-blue-dark: #247892;
    --brand-blue-soft: #EAF7FB;
    --brand-green: #8CC63F;
    --brand-green-dark: #5F8F25;
    --brand-green-soft: #F3FAEA;
    --brand-teal: #03C2AE;
    --brand-teal-dark: #028D80;
    --brand-teal-soft: #E7FBF8;

    --text: #24364B;
    --text-secondary: #4F6278;
    --text-muted: #64748B;
    --border: #BFD9E7;
    --border-strong: #3D96B4;
    --bg: #F7FAFC;
    --surface: #FFFFFF;
    --surface-alt: #F1F6FA;
    --surface-soft: #FCFDFF;

    --success: #8CC63F;
    --success-dark: #587A24;
    --success-soft: #F3FAEA;
    --info: #3D96B4;
    --info-soft: #EAF7FB;
    --disabled: #AAB4BF;
    --disabled-soft: #F8FAFC;
    --danger: #B42318;
    --danger-soft: #FFF0F0;
    --warning: #B7791F;
    --warning-soft: #FFF7E6;
    --accent: var(--runtime-brand-primary, var(--brand-blue));
    --accent-strong: color-mix(in srgb, var(--runtime-brand-primary, var(--brand-blue-dark)) 78%, #173148);
    --accent-soft: color-mix(in srgb, var(--runtime-brand-primary, var(--brand-blue)) 14%, var(--surface));
    --success-accent: var(--runtime-brand-secondary, var(--brand-green));
    --highlight-accent: var(--runtime-brand-accent, var(--brand-teal));
    --highlight-soft: color-mix(in srgb, var(--runtime-brand-accent, var(--brand-teal)) 12%, var(--surface));
    --app-bg-start: color-mix(in srgb, var(--runtime-brand-light, var(--surface)) 82%, #ffffff);
    --app-bg-end: color-mix(in srgb, var(--runtime-brand-light, var(--bg)) 42%, var(--bg));
    --heading-color: var(--accent-strong);
    --eyebrow-color: color-mix(in srgb, var(--success-accent) 82%, #8cc63f);
    --interactive-surface: var(--surface-alt);
    --interactive-hover: var(--accent-soft);
    --interactive-border-strong: color-mix(in srgb, var(--accent) 62%, var(--border));
    --focus-ring: color-mix(in srgb, var(--accent) 18%, transparent);
    --input-bg: var(--surface);
    --input-border: var(--border);
    --input-placeholder: var(--text-muted);
    --table-header-bg: var(--surface-soft);
    --table-header-fg: var(--accent);
    --table-row-hover: color-mix(in srgb, var(--accent) 6%, var(--surface));
    --badge-bg: var(--accent-soft);
    --badge-fg: var(--accent-strong);
    --primary-btn-bg: var(--success-accent);
    --primary-btn-bg-hover: color-mix(in srgb, var(--success-accent) 82%, #274014);
    --primary-btn-fg: #ffffff;
    --secondary-btn-bg: var(--surface);
    --secondary-btn-bg-hover: var(--interactive-hover);
    --secondary-btn-border: var(--border);
    --secondary-btn-fg: var(--accent-strong);
    --danger-btn-bg: color-mix(in srgb, var(--danger) 8%, #ffffff);
    --danger-btn-bg-hover: color-mix(in srgb, var(--danger) 14%, #ffffff);
    --danger-btn-border: color-mix(in srgb, var(--danger) 22%, #ffffff);
    --danger-btn-fg: var(--danger);
    --sidebar-toggle-bg: var(--interactive-surface);
    --sidebar-toggle-bg-hover: var(--interactive-hover);
    --sidebar-accent-fg: var(--accent-strong);
    --nav-fg: var(--text);
    --nav-hover-bg: var(--interactive-hover);
    --nav-active-bg: color-mix(in srgb, var(--accent) 16%, var(--surface));
    --nav-active-border: var(--interactive-border-strong);
    --alert-danger-bg: color-mix(in srgb, var(--danger) 8%, #ffffff);
    --alert-danger-border: color-mix(in srgb, var(--danger) 26%, #ffffff);
    --alert-danger-fg: var(--danger);
    --alert-warning-bg: color-mix(in srgb, var(--warning) 10%, #ffffff);
    --alert-warning-border: color-mix(in srgb, var(--warning) 30%, #ffffff);
    --alert-warning-fg: color-mix(in srgb, var(--warning) 82%, #462500);
    --alert-info-bg: var(--accent-soft);
    --alert-info-border: color-mix(in srgb, var(--accent) 28%, #ffffff);
    --alert-info-fg: var(--accent-strong);
    --reminder-bg: var(--highlight-soft);
    --reminder-border: color-mix(in srgb, var(--highlight-accent) 22%, #ffffff);
    --reminder-icon: var(--highlight-accent);

    --font-family-base: 'Raleway', 'Segoe UI', Roboto, Arial, sans-serif;
    --font-family-heading: 'Raleway', 'Segoe UI', Roboto, Arial, sans-serif;
    --font-base: var(--font-family-base);
    --font-heading: var(--font-family-heading);
    --font-size-xs: 11px;
    --font-size-sm: 12px;
    --font-size-md: 13px;
    --font-size-base: 14px;
    --font-size-lg: 16px;
    --font-size-xl: 20px;
    --font-size-2xl: 28px;
    --font-size-display: 34px;
    --icon-md: 24px;
    --icon-lg: 34px;
    --font-weight-regular: 400;
    --font-weight-medium: 500;
    --font-weight-semibold: 600;
    --font-weight-bold: 700;
    --font-weight-extrabold: 800;
    --line-tight: 1.1;
    --line-normal: 1.35;
    --line-relaxed: 1.5;

    --space-1: 4px;
    --space-2: 8px;
    --space-3: 10px;
    --space-4: 12px;
    --space-5: 14px;
    --space-6: 16px;
    --space-7: 18px;
    --space-8: 22px;
    --space-9: 28px;
    --space-10: 32px;

    --radius-sm: 8px;
    --radius-md: 10px;
    --radius-lg: 12px;
    --radius-xl: 14px;
    --radius-2xl: 16px;
    --radius-pill: 999px;
    --layer-dropdown: 120;
    --layer-content-loading: 40;
    --layer-modal: 1300;
    --layer-modal-loading: 1400;
    --layer-splash: 99999;
    --panel-padding: var(--space-7);
    --panel-gap: var(--space-5);
    --field-gap: var(--space-2);
    --field-row-gap: var(--space-4);
    --action-gap: var(--space-3);
    --control-min-height: 42px;
    --empty-state-padding: 20px;
    --empty-state-min-height: 96px;
    --shadow-sm: 0 4px 12px rgba(36, 54, 75, 0.05);
    --shadow-md: 0 8px 20px rgba(26, 49, 80, 0.08);
    --shadow-lg: 0 18px 40px rgba(36, 54, 75, 0.14);
    --container-max: 1440px;
    --sidebar-width: 280px;
    --sidebar-width-collapsed: 96px;
    --sidebar-compact-button-size: 48px;

  }

  * { box-sizing: border-box; }

  .is-hidden {
    display: none !important;
  }

  body {
    margin: 0;
    font-family: var(--font-base);
    font-size: var(--font-size-base);
    line-height: var(--line-normal);
    color: var(--text);
    background: linear-gradient(180deg, var(--app-bg-start) 0%, var(--app-bg-end) 100%);
  }

  body.app-has-modal {
    overflow: hidden;
  }

  #app {
    position: relative;
    min-height: 100vh;
  }

  h1,
  h2,
  h3,
  h4 {
    font-family: var(--font-heading);
    color: var(--heading-color);
    line-height: var(--line-tight);
  }

  p {
    line-height: var(--line-relaxed);
  }

  button,
  input,
  select,
  textarea {
    font-family: inherit;
  }

  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    vertical-align: middle;
    color: var(--accent);
  }

  .hero {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: var(--space-2);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .hero__brand {
    display: flex;
    gap: var(--space-7);
    align-items: center;
  }

  .hero__logo {
    width: 124px;
    height: 124px;
    border-radius: var(--radius-2xl);
    color: var(--surface);
    display: grid;
    place-items: center;
    font-size: var(--font-size-2xl);
    font-weight: var(--font-weight-bold);
  }

  .eyebrow {
    margin: 0 0 4px;
    color: var(--eyebrow-color);
    font-size: var(--font-size-sm);
    font-weight: var(--font-weight-bold);
    letter-spacing: .08em;
    text-transform: uppercase;
  }

  .hero__title {
    margin: 0;
    font-size: var(--font-size-display);
    line-height: var(--line-tight);
    color: var(--brand-blue);
  }

  .hero__subtitle {
    margin: 6px 0 0;
    color: var(--text-muted);
  }

  .hero__user {
    display: flex;
    align-items: center;
    gap: var(--space-4);
    flex-wrap: wrap;
  }

  .hero__user-menu {
    position: relative;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: var(--space-3) var(--space-5);
    border: 1px solid var(--border);
    background: var(--interactive-surface);
    border-radius: var(--radius-pill);
    font-size: var(--font-size-base);
    color: var(--text);
  }

  .pill--button {
    appearance: none;
    cursor: pointer;
    font: inherit;
    transition: border-color .18s ease, box-shadow .18s ease, transform .18s ease, background .18s ease;
  }

  .pill--button:hover,
  .pill--button[aria-expanded="true"] {
    border-color: var(--interactive-border-strong);
    box-shadow: var(--shadow-sm);
    transform: translateY(-1px);
  }

  .pill__chevron {
    margin-left: 2px;
    font-size: 20px;
  }

  .user-menu-dropdown {
    position: absolute;
    top: calc(100% + 10px);
    right: 0;
    z-index: var(--layer-dropdown);
    min-width: 244px;
    display: grid;
    gap: var(--space-2);
    padding: var(--space-2);
    border: 1px solid var(--input-border);
    border-radius: var(--radius-xl);
    background: var(--surface);
    box-shadow: var(--shadow-lg);
  }

  .user-menu-dropdown__item {
    width: 100%;
    display: inline-flex;
    align-items: center;
    gap: var(--space-3);
    padding: var(--space-4) var(--space-4);
    border: 0;
    border-radius: var(--radius-lg);
    background: transparent;
    color: var(--text);
    font: inherit;
    font-weight: var(--font-weight-semibold);
    cursor: pointer;
    text-align: left;
  }

  .user-menu-dropdown__item:hover,
  .user-menu-dropdown__item:focus-visible {
    outline: none;
    background: var(--interactive-hover);
    color: var(--accent-strong);
  }

  .user-menu-dropdown__item .material-symbols-outlined {
    color: var(--accent);
  }

  .app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-8);
    padding: var(--space-8) var(--space-9);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .app-header__left {
    display: flex;
    align-items: center;
    gap: var(--space-7);
    min-width: 0;
  }

  .app-header__right {
    display: flex;
    align-items: center;
    gap: var(--space-4);
  }

  .brand-mark {
    width: 124px;
    height: 124px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    border: 0 solid var(--border);
    border-radius: var(--radius-2xl);
    padding: 0;
    box-sizing: border-box;
    flex: 0 0 auto;
  }

  .brand-logo {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  .brand-copy__eyebrow {
    font-size: var(--font-size-sm);
    font-weight: var(--font-weight-semibold);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--eyebrow-color);
    margin-bottom: 4px;
  }

  .brand-copy__title {
    margin: 0;
    font-size: var(--font-size-2xl);
    line-height: var(--line-tight);
    font-weight: var(--font-weight-bold);
    color: var(--heading-color);
  }

  .brand-copy__subtitle {
    margin: 6px 0 0;
    font-size: var(--font-size-base);
    color: var(--text-secondary);
  }

  .user-chip {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    padding: var(--space-3) var(--space-5);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    background: var(--interactive-surface);
    color: var(--accent-strong);
  }

  .user-chip .material-symbols-outlined {
    font-size: var(--icon-md);
    color: var(--accent-strong);
  }

  .user-chip__meta {
    display: flex;
    flex-direction: column;
    line-height: 1.15;
  }

  .user-chip__meta strong {
    font-size: var(--font-size-md);
    color: var(--text);
  }

  .user-chip__meta small {
    font-size: var(--font-size-xs);
    color: var(--text-muted);
  }

  .quick-actions {
    padding: var(--space-7) var(--space-10) 0;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    gap: var(--space-5);
  }

  .quick-card {
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: var(--radius-xl);
    padding: var(--space-7);
    cursor: pointer;
    transition: .18s ease;
    box-shadow: var(--shadow-md);
    text-align: left;
  }

  .quick-card:hover {
    transform: translateY(-1px);
  }

  .quick-card h3 {
    margin: 8px 0 4px;
    font-size: var(--font-size-lg);
  }

  .quick-card p {
    margin: 0;
    font-size: var(--font-size-md);
    color: var(--text-muted);
  }

  .toolbar {
    text-align: right;
    justify-content: space-between;
    gap: var(--space-6);
    align-items: center;
    margin: var(--space-7) var(--space-10);
    padding: var(--space-4) var(--space-6);
    background: var(--surface-alt);
    border-radius: var(--radius-lg);
  }

  .toolbar__left {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-2);
  }

  .link-btn {
    background: transparent;
    border: none;
    color: var(--accent);
    padding: var(--space-2) var(--space-3);
    cursor: pointer;
    font-weight: var(--font-weight-semibold);
  }

  .layout {
    display: grid;
    grid-template-columns: var(--sidebar-width) 1fr;
    gap: var(--space-8);
    padding: 0 var(--space-10) var(--space-10);
    transition: grid-template-columns .2s ease;
  }

  .layout.is-sidebar-collapsed {
    grid-template-columns: var(--sidebar-width-collapsed) 1fr;
  }

  .sidebar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    padding: var(--space-6);
    height: fit-content;
    box-shadow: var(--shadow-md);
    display: grid;
    gap: var(--space-3);
    overflow: hidden;
    transition: padding .2s ease;
  }

  .sidebar-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-3);
    width: 100%;
    min-width: 0;
    min-height: 48px;
    border: 1px solid var(--secondary-btn-border);
    background: var(--sidebar-toggle-bg);
    color: var(--sidebar-accent-fg);
    padding: var(--space-3) var(--space-4);
    border-radius: var(--radius-lg);
    cursor: pointer;
    font-weight: var(--font-weight-bold);
    transition: background .18s ease, border-color .18s ease;
  }

  .sidebar-toggle:hover {
    background: var(--sidebar-toggle-bg-hover);
    border-color: var(--nav-active-border);
  }

  .sidebar-toggle .material-symbols-outlined {
    flex: 0 0 auto;
  }

  .sidebar-toggle__label,
  .nav-label {
    min-width: 0;
    overflow: hidden;
    white-space: nowrap;
    opacity: 1;
    font-size: 16px;
    transition: opacity .16s ease, width .2s ease;
  }

  .nav-btn {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--nav-fg);
    width: 100%;
    min-height: 48px;
    padding: var(--space-4) var(--space-5);
    border-radius: var(--radius-lg);
    cursor: pointer;
    text-align: left;
    font-weight: var(--font-weight-semibold);
    min-width: 0;
    transition: background .18s ease, border-color .18s ease, padding .2s ease;
  }

  .nav-btn .material-symbols-outlined {
    flex: 0 0 auto;
  }

  .layout.is-sidebar-collapsed .sidebar {
    padding: var(--space-4);
    align-items: center;
  }

  .layout.is-sidebar-collapsed .nav-btn,
  .layout.is-sidebar-collapsed .sidebar-toggle {
    width: var(--sidebar-compact-button-size);
    min-width: var(--sidebar-compact-button-size);
    height: var(--sidebar-compact-button-size);
    min-height: var(--sidebar-compact-button-size);
    place-self: center;
    justify-content: center;
    padding: 0;
    gap: 0;
    overflow: hidden;
  }

  .layout.is-sidebar-collapsed .nav-label,
  .layout.is-sidebar-collapsed .sidebar-toggle__label {
    position: absolute;
    width: 1px;
    height: 1px;
    margin: -1px;
    padding: 0;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    clip-path: inset(50%);
    white-space: nowrap;
    border: 0;
    opacity: 0;
  }

  .nav-btn.is-active,
  .nav-btn:hover {
    background: var(--nav-active-bg);
    border-color: var(--nav-active-border);
  }

  .app-version {
    margin-top: var(--space-3);
    padding-top: var(--space-3);
    border-top: 1px solid var(--border);
    color: var(--text-muted);
    font-size: var(--font-size-xs);
    font-weight: var(--font-weight-semibold);
    letter-spacing: .04em;
    text-align: center;
    opacity: .78;
    white-space: nowrap;
  }

  .app-version.is-hidden {
    display: none;
  }

  .layout.is-sidebar-collapsed .app-version {
    display: none;
  }

  .content {
    position: relative;
    min-height: 320px;
    min-width: 0;
    overflow: hidden;
    isolation: isolate;
  }

  .content > .view {
    min-width: 0;
    width: 100%;
  }

  .content-loading {
    position: absolute;
    inset: 0;
    z-index: var(--layer-content-loading);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    isolation: isolate;
    background:
      radial-gradient(circle at top left, rgba(56, 144, 176, 0.12), transparent 34%),
      radial-gradient(circle at bottom right, rgba(0, 192, 168, 0.1), transparent 30%),
      linear-gradient(180deg, #f7fafc 0%, #eef4f8 100%);
    background-size: 140% 140%, 140% 140%, 100% 100%;
    animation: contentLoadingSurfaceDrift 14s ease-in-out infinite alternate;
    opacity: 1;
    visibility: visible;
    transition: opacity 0.22s ease, visibility 0.22s ease;
    pointer-events: auto;
    backdrop-filter: blur(4px);
  }

  .content-loading.is-hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  .content-loading--content {
    position: absolute;
  }

  .content-loading--modal {
    position: fixed;
    z-index: var(--layer-modal-loading);
    padding: 24px;
  }

  .content-loading__box,
  .app-loading__box {
    position: relative;
    z-index: 1;
    display: grid;
    justify-items: center;
    gap: 14px;
    text-align: center;
    width: min(420px, calc(100% - 40px));
    padding: 28px 28px 24px;
    border-radius: 28px;
    border: 1px solid rgba(191, 217, 231, 0.85);
    background: #ffffff;
    box-shadow:
      0 20px 60px rgba(36, 54, 75, 0.14),
      inset 0 1px 0 rgba(255, 255, 255, 0.8);
  }

  .loading-shell {
    position: relative;
  }

  .loading-shell::before {
    display: none;
  }

  .content-loading__text {
    font-size: var(--font-size-lg);
    font-weight: var(--font-weight-bold);
    color: var(--runtime-brand-primary, var(--brand-blue-dark));
    letter-spacing: 0.02em;
  }

  .loading-shell__subtext {
    max-width: 280px;
    font-size: var(--font-size-base);
    line-height: var(--line-relaxed);
    color: var(--text-muted);
  }

  .loading-shell__visual {
    width: 112px;
    height: 112px;
    border-radius: 34px;
    position: relative;
    display: grid;
    place-items: center;
    overflow: hidden;
    border: 1px solid rgba(61, 150, 180, 0.18);
    background:
      linear-gradient(145deg, color-mix(in srgb, var(--runtime-brand-primary, var(--brand-blue)) 14%, rgba(255,255,255,.86)), rgba(255, 255, 255, 0.78)),
      radial-gradient(circle at center, color-mix(in srgb, var(--runtime-brand-progress, var(--brand-green)) 14%, transparent), transparent 64%);
    box-shadow:
      0 18px 36px rgba(36, 54, 75, 0.12),
      inset 0 1px 0 rgba(255, 255, 255, 0.72);
  }

  .app-loading__spinner.loading-shell__visual {
    width: 124px;
    height: 124px;
  }

  .loading-shell__visual::before {
    content: '';
    position: absolute;
    inset: 12px;
    border-radius: 26px;
    border: 1px solid rgba(61, 150, 180, 0.12);
    background:
      radial-gradient(circle at 30% 30%, rgba(56, 144, 176, 0.16), transparent 62%),
      linear-gradient(180deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.04));
  }

  .loading-shell__halo,
  .loading-shell__ring,
  .loading-shell__ring--reverse,
  .loading-shell__pulse,
  .loading-shell__beam,
  .loading-shell__dot {
    position: absolute;
    border-radius: 999px;
  }

  .loading-shell__halo {
    width: 74px;
    height: 74px;
    background: radial-gradient(circle, rgba(61, 150, 180, 0.22), rgba(61, 150, 180, 0));
    animation: loadingHaloPulse 2.2s ease-in-out infinite;
  }

  .loading-shell__ring {
    width: 76px;
    height: 76px;
    border: 3px solid rgba(61, 150, 180, 0.14);
    border-top-color: var(--runtime-brand-primary, var(--brand-blue));
    border-right-color: rgba(61, 150, 180, 0.58);
    animation: loadingOrbitSpin 1.5s linear infinite;
  }

  .loading-shell__ring--reverse {
    width: 56px;
    height: 56px;
    border: 3px solid rgba(140, 198, 63, 0.16);
    border-bottom-color: var(--runtime-brand-secondary, var(--brand-green));
    border-left-color: rgba(140, 198, 63, 0.58);
    animation-direction: reverse;
    animation-duration: 1.15s;
  }

  .loading-shell__pulse {
    width: 22px;
    height: 22px;
    background: linear-gradient(135deg, var(--runtime-brand-primary, var(--brand-blue)), var(--runtime-brand-secondary, var(--brand-green)));
    box-shadow: 0 0 0 0 rgba(61, 150, 180, 0.28);
    animation: loadingCorePulse 1.8s ease-in-out infinite;
  }

  .loading-shell__beam {
    width: 140px;
    height: 140px;
    background: conic-gradient(
      from 0deg,
      rgba(255, 255, 255, 0) 0deg 280deg,
      rgba(255, 255, 255, 0.72) 318deg,
      rgba(255, 255, 255, 0) 360deg
    );
    animation: loadingOrbitSpin 2.4s linear infinite;
    opacity: 0.72;
  }

  .loading-shell__dot {
    width: 8px;
    height: 8px;
    background: var(--runtime-brand-primary, var(--brand-blue));
    top: 18px;
    left: 52px;
    transform-origin: 4px 38px;
    animation: loadingOrbitSpin 1.55s linear infinite;
  }

  .loading-shell__dot--two {
    background: var(--runtime-brand-secondary, var(--brand-green));
    animation-duration: 2.05s;
    animation-direction: reverse;
  }

  .loading-shell__dot--three {
    width: 6px;
    height: 6px;
    background: var(--runtime-brand-accent, var(--brand-teal));
    top: 22px;
    left: 53px;
    transform-origin: 3px 32px;
    animation-duration: 1.2s;
  }

  @keyframes loadingPanelGlow {
    0%, 100% { transform: translateX(-120%); opacity: 0; }
    25%, 70% { opacity: 1; }
    55% { transform: translateX(120%); opacity: 0.72; }
  }

  @keyframes contentLoadingSurfaceDrift {
    0% { background-position: 0% 0%, 100% 100%, 0 0; }
    100% { background-position: 14% 10%, 86% 92%, 0 0; }
  }

  @keyframes loadingOrbitSpin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  @keyframes loadingCorePulse {
    0%, 100% { transform: scale(0.92); box-shadow: 0 0 0 0 rgba(61, 150, 180, 0.18); }
    50% { transform: scale(1.08); box-shadow: 0 0 0 14px rgba(61, 150, 180, 0); }
  }

  @keyframes loadingHaloPulse {
    0%, 100% { transform: scale(0.96); opacity: 0.54; }
    50% { transform: scale(1.08); opacity: 0.9; }
  }

  @media (prefers-reduced-motion: reduce) {
    .splash-screen__ambient-orb,
    .splash-screen__ambient-grid,
    .splash-screen__logo-wrap,
    .splash-screen__logo,
    .splash-screen__logo-ring,
    .splash-screen__logo-core::after,
    .splash-screen__progress-bar::after,
    .loading-shell::before,
    .loading-shell__halo,
    .loading-shell__ring,
    .loading-shell__ring--reverse,
    .loading-shell__pulse,
    .loading-shell__beam,
    .loading-shell__dot {
      animation: none !important;
    }
  }

  .view { display: none; }
  .view.active { display: block; }

  .section-head {
    display: flex;
    justify-content: space-between;
    align-items: start;
    margin: 4px 0 5px;
    gap: 16px;
  }

  .section-head--stacked {
    align-items: flex-start;
  }

  .section-head h2 {
    margin: 0;
    color: var(--brand-blue);
  }

  .section-head h3 {
    margin: 0;
    color: var(--brand-blue);
  }

  .section-head__meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .muted {
    color: var(--text-muted);
  }

  .tile-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
    gap: 14px;
  }

  .tile {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    box-shadow: var(--shadow-md);
    padding: 18px;
    cursor: pointer;
    text-align: left;
  }

  .tile h3 {
    margin: 10px 0 8px;
  }

  .tile p {
    margin: 0;
    color: var(--text-muted);
    font-size: var(--font-size-md);
  }

  .panel {
    display: grid;
    gap: var(--panel-gap);
    width: 100%;
    min-width: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    padding: var(--panel-padding);
    box-shadow: var(--shadow-md);
  }

  /* Modulo Inicio */
  .inicio-shell {
    display: grid;
    gap: var(--space-1);
  }

  .inicio-head {
    align-items: center;
  }

  .inicio-layout {
    display: grid;
    grid-template-columns: minmax(280px, 34%) minmax(0, 1fr);
    gap: var(--space-6);
    align-items: stretch;
  }

  .inicio-alerts-panel {
    display: grid;
    gap: var(--space-5);
    align-content: start;
  }

  .inicio-summary-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: var(--space-3);
  }

  .inicio-metric,
  .inicio-card,
  .inicio-dashboard-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    box-shadow: var(--shadow-md);
  }

  .inicio-metric {
    min-height: 108px;
    padding: var(--space-4);
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 4px;
    text-align: center;
  }

  .inicio-metric .material-symbols-outlined {
    color: var(--accent);
    font-size: 26px;
    margin: 0 auto;
  }

  .inicio-metric strong {
    color: var(--text);
    font-size: var(--font-size-2xl);
    line-height: 1;
  }

  .inicio-metric small {
    color: var(--text-muted);
    font-weight: var(--font-weight-semibold);
    line-height: 1.25;
  }

  .inicio-card {
    padding: var(--space-5);
  }

  .inicio-card__head {
    display: flex;
    gap: var(--space-3);
    align-items: flex-start;
    margin-bottom: var(--space-4);
  }

  .inicio-card__head > .material-symbols-outlined {
    color: var(--accent);
    font-size: 28px;
  }

  .inicio-card__head h3,
  .inicio-dashboard-head h3 {
    margin: 0;
    color: var(--text);
  }

  .inicio-card__head p {
    margin: 4px 0 0;
    color: var(--text-muted);
    font-size: var(--font-size-sm);
  }

  .inicio-alert-list,
  .inicio-reminder-list {
    display: grid;
    gap: var(--space-3);
  }

  .inicio-alert-item,
  .inicio-reminder-item {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: var(--space-3);
    align-items: flex-start;
    padding: var(--space-4);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    background: var(--bg);
  }

  .inicio-alert-item .material-symbols-outlined,
  .inicio-reminder-item .material-symbols-outlined {
    font-size: 24px;
    color: var(--accent);
  }

  .inicio-alert-item small {
    display: inline-block;
    margin-bottom: 3px;
    color: var(--text-muted);
    font-size: var(--font-size-xs);
    font-weight: var(--font-weight-bold);
    text-transform: uppercase;
    letter-spacing: .04em;
  }

  .inicio-reminder-item small {
    display: inline-block;
    margin-bottom: 3px;
    color: var(--text-muted);
    font-size: var(--font-size-xs);
    font-weight: var(--font-weight-bold);
    text-transform: uppercase;
    letter-spacing: .04em;
  }

  .inicio-alert-item strong,
  .inicio-reminder-item strong {
    display: block;
    color: var(--text);
    font-weight: var(--font-weight-bold);
    line-height: 1.25;
  }

  .inicio-alert-item p,
  .inicio-reminder-item p {
    margin: 4px 0 0;
    color: var(--text-muted);
    font-size: var(--font-size-sm);
    line-height: 1.35;
  }

  .inicio-alert-item--danger {
    border-color: var(--alert-danger-border);
    background: var(--alert-danger-bg);
  }

  .inicio-alert-item--danger .material-symbols-outlined {
    color: var(--alert-danger-fg);
  }

  .inicio-alert-item--warning {
    border-color: var(--alert-warning-border);
    background: var(--alert-warning-bg);
  }

  .inicio-alert-item--warning .material-symbols-outlined {
    color: var(--alert-warning-fg);
  }

  .inicio-alert-item--info {
    border-color: var(--alert-info-border);
    background: var(--alert-info-bg);
  }

  .inicio-alert-item--info .material-symbols-outlined {
    color: var(--alert-info-fg);
  }

  .inicio-reminder-item {
    border-color: var(--reminder-border);
    background: var(--reminder-bg);
  }

  .inicio-reminder-item .material-symbols-outlined {
    color: var(--reminder-icon);
  }

  .inicio-dashboard-panel {
    --inicio-dashboard-height: 660px;
    display: grid;
    grid-template-rows: auto 1fr;
    overflow: hidden;
    min-height: var(--inicio-dashboard-height);
  }

  .inicio-dashboard-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: var(--space-4);
    padding: var(--space-5) var(--space-6);
    border-bottom: 1px solid var(--border);
    background: linear-gradient(135deg, var(--surface), var(--accent-soft));
  }

  .inicio-dashboard-pill {
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-pill);
    padding: 6px 10px;
    color: var(--accent-strong);
    background: var(--surface);
    font-size: var(--font-size-xs);
    font-weight: var(--font-weight-bold);
    text-transform: uppercase;
    letter-spacing: .04em;
  }

  .inicio-dashboard-embed,
  .inicio-dashboard-empty {
    display: block;
    width: 100%;
    height: calc(var(--inicio-dashboard-height) - 86px);
    min-height: calc(var(--inicio-dashboard-height) - 86px);
    border: 0;
    overflow: hidden;
  }

  .inicio-dashboard-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: var(--space-3);
    padding: var(--space-7);
    text-align: center;
    color: var(--text-muted);
    background: var(--bg);
  }

  .inicio-dashboard-empty .material-symbols-outlined {
    color: var(--brand-blue);
    font-size: 44px;
  }

  .inicio-dashboard-empty strong {
    color: var(--text);
  }

  .search-panel {
    display: flex;
    gap: 16px;
    align-items: end;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: var(--field-gap);
    margin-bottom: 4px;
    width: 100%;
    min-width: 0;
    align-self: start;
  }

  .field--grow {
    flex: 1;
  }

  .field--auto {
    width: 180px;
  }

  .field--half {
    width: calc(50% - 8px);
    display: inline-flex;
  }

  .field--third {
    width: calc(33.33% - 8px);
    display: inline-flex;
  }

  .field--full {
    width: 100%;
  }

  label {
    font-size: var(--font-size-md);
    font-weight: var(--font-weight-semibold);
    color: var(--text);
  }

  input,
  select,
  textarea {
    width: 100%;
    min-height: var(--control-min-height);
    padding: 11px var(--space-4);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    font: inherit;
    color: var(--text);
    background: var(--surface);
  }

  textarea {
    min-height: calc(var(--control-min-height) * 2.2);
    resize: vertical;
  }

  input::placeholder,
  textarea::placeholder {
    color: var(--input-placeholder);
  }

  input:focus,
  select:focus,
  textarea:focus {
    outline: 2px solid var(--focus-ring);
    border-color: var(--interactive-border-strong);
  }

  .primary-btn,
  .secondary-btn,
  .danger-btn,
  .admin-reset-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: var(--space-2);
    min-height: var(--control-min-height);
    border-radius: var(--radius-lg);
    padding: var(--space-4) var(--space-6);
    font-weight: var(--font-weight-bold);
    font-size: 12px;
    line-height: 1;
    white-space: nowrap;
    cursor: pointer;
    border: 1px solid transparent;
    transition: background .18s ease, border-color .18s ease, color .18s ease, transform .18s ease, box-shadow .18s ease;
  }

  .primary-btn {
    background: var(--primary-btn-bg);
    color: var(--primary-btn-fg);
  }

  .primary-btn .material-symbols-outlined {
    color: var(--primary-btn-fg);
  }

  .secondary-btn {
    background: var(--secondary-btn-bg);
    border-color: var(--secondary-btn-border);
    color: var(--secondary-btn-fg);
  }

  .danger-btn,
  .admin-reset-btn {
    background: var(--danger-btn-bg);
    border-color: var(--danger-btn-border);
    color: var(--danger-btn-fg);
  }

  .primary-btn:hover,
  .secondary-btn:hover,
  .danger-btn:hover,
  .admin-reset-btn:hover {
    transform: translateY(-1px);
    box-shadow: var(--shadow-sm);
  }

  .primary-btn:hover {
    background: var(--primary-btn-bg-hover);
  }

  .secondary-btn:hover {
    background: var(--secondary-btn-bg-hover);
    border-color: var(--interactive-border-strong);
  }

  .danger-btn:hover,
  .admin-reset-btn:hover {
    background: var(--danger-btn-bg-hover);
  }

  .admin-reset-btn {
    display: none;
    padding: var(--space-3) var(--space-5);
  }

  .admin-reset-btn.is-visible {
    display: inline-flex;
  }

  .actions {
    display: flex;
    align-items: center;
    width: 100%;
    gap: var(--action-gap);
    flex-wrap: wrap;
    margin-top: var(--space-2);
    justify-content: flex-end;
  }

  .actions > * {
    flex: 0 0 auto;
  }

  .actions--start {
    justify-content: flex-start;
  }

  .actions--between {
    justify-content: space-between;
  }

  .form-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: var(--field-row-gap) var(--space-6);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    padding: var(--panel-padding);
    box-shadow: var(--shadow-md);
  }

  .form-grid--dense {
    background: transparent;
    border: 0;
    border-radius: 0;
    padding: 0;
    box-shadow: none;
    gap: var(--field-row-gap) var(--space-6);
  }

  .form-grid .field[data-span="2"] {
    grid-column: 1 / -1;
  }

  .table-wrap {
    overflow: auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    box-shadow: var(--shadow-md);
    margin-top: 10px;
  }

  .data-table {
    width: 100%;
    border-collapse: collapse;
  }

  .data-table th,
  .data-table td {
    padding: var(--space-4) var(--space-5);
    border-bottom: 1px solid var(--border);
    font-size: var(--font-size-base);
    text-align: left;
    vertical-align: top;
  }

  .data-table thead th {
    color: var(--table-header-fg);
    background: var(--table-header-bg);
  }

  .data-table tbody tr:hover {
    background: var(--table-row-hover);
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 10px;
    border-radius: var(--radius-pill);
    background: var(--badge-bg);
    color: var(--badge-fg);
    font-size: var(--font-size-sm);
    font-weight: var(--font-weight-bold);
  }

  .history-detail-cell {
    min-width: 240px;
    max-width: 420px;
    color: var(--text-secondary);
    white-space: normal;
  }

  .history-filter {
    min-width: 220px;
    margin-bottom: 0;
  }

  .history-filter label {
    color: var(--text-secondary);
  }

  .ficha-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: var(--space-6);
  }

  .ficha-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    padding: var(--space-7);
    box-shadow: var(--shadow-md);
  }

  .ficha-block h3 {
    margin: 0 0 12px;
    color: var(--brand-blue);
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .kv {
    display: grid;
    grid-template-columns: 170px 1fr;
    gap: var(--space-2);
    font-size: var(--font-size-base);
    margin-bottom: 8px;
  }

  .kv strong {
    color: var(--text);
  }

  .empty-state {
    padding: var(--empty-state-padding);
    text-align: center;
    color: var(--text-muted);
    min-width: 0;
  }

  .empty-state:not(.image-upload__preview):not(.inicio-dashboard-empty) {
    display: grid;
    place-items: center;
    gap: var(--space-2);
    min-height: var(--empty-state-min-height);
    border: 1px dashed var(--border);
    border-radius: var(--radius-xl);
    background: var(--surface-soft);
  }

  .empty-state strong {
    color: var(--text);
  }

  .empty-state .empty-state {
    min-height: auto;
    padding: 0;
    border: 0;
    border-radius: 0;
    background: transparent;
  }

  .is-admin {
    display: none;
  }

  .show-admin {
    display: inline-flex !important;
  }

  .message {
    padding: 10px 12px;
    border-radius: var(--radius-md);
    margin-bottom: 14px;
    font-size: var(--font-size-base);
  }

  .message.success {
    background: var(--success-soft);
    color: var(--success-dark);
  }

  .message.error {
    background: var(--danger-soft);
    color: var(--danger);
  }

  /* Nuevo ingreso */
  .ingreso-layout {
    display: grid;
    grid-template-columns: minmax(0, 1.6fr) minmax(320px, .9fr);
    gap: 16px;
    align-items: start;
  }

  .ingreso-form {
    display: grid;
    gap: 16px;
  }

  .module-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    padding: var(--space-7);
    box-shadow: var(--shadow-md);
  }

  .module-card__head {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: flex-start;
    margin-bottom: 14px;
  }

  .module-card__head h3 {
    margin: 0;
    color: var(--brand-blue);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .module-card__head p {
    margin: 0;
  }

  .module-card--actions {
    padding-bottom: 10px;
  }

  .form-actions-row {
    display: flex;
    align-items: center;
    width: 100%;
    gap: var(--action-gap);
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .ingreso-side {
    display: grid;
    gap: 16px;
  }

  .sticky-card {
    position: sticky;
    top: 16px;
  }

  .sticky-card + .sticky-card {
    position: static;
  }

  .ingreso-preview {
    display: grid;
    gap: 10px;
  }

  .preview-block {
    display: grid;
    gap: 8px;
  }

  .preview-block__title {
    text-align: center;
    font-size: var(--font-size-sm);
    font-weight: var(--font-weight-bold);
    color: var(--success-accent);
    text-transform: uppercase;
    letter-spacing: .06em;
  }

  .preview-grid {
    text-align: left;
    display: grid;
    gap: 8px;
  }

  .preview-item {
    display: grid;
    grid-template-columns: 120px 1fr;
    gap: 8px;
    font-size: var(--font-size-base);
  }

  .preview-item strong {
    color: var(--text);
  }

  .matches-list {
    display: grid;
    gap: 10px;
  }

  .match-card {
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 12px;
    background: var(--surface-soft);
  }

  .match-card h4 {
    margin: 0 0 6px;
    color: var(--brand-blue);
    font-size: var(--font-size-base);
  }

  .match-card p {
    margin: 0;
    font-size: var(--font-size-md);
    color: var(--text-muted);
  }

  .tips-list {
    margin: 0;
    padding-left: 18px;
    display: grid;
    gap: 10px;
    color: var(--text-muted);
    font-size: var(--font-size-base);
  }

  .field-help {
    font-size: var(--font-size-sm);
    color: var(--text-muted);
    margin-top: -2px;
  }

  .app-loading {
    position: fixed;
    inset: 0;
    z-index: var(--layer-splash);
    display: grid;
    place-items: center;
    overflow: hidden;
    isolation: isolate;
    background: linear-gradient(145deg, #0b2140 0%, #143d69 52%, #145b65 100%);
    opacity: 1;
    visibility: visible;
    transition: opacity 0.26s ease, visibility 0.26s ease;
  }

  .app-loading::before,
  .app-loading::after {
    display: none;
  }

  .app-loading.is-hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  .access-denied {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: var(--space-10);
    background: linear-gradient(180deg, var(--surface) 0%, var(--bg) 100%);
  }

  .access-denied__card {
    max-width: 560px;
    padding: var(--space-10);
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    background: var(--surface);
    box-shadow: var(--shadow-lg);
    text-align: center;
  }

  .access-denied__card .material-symbols-outlined {
    color: var(--danger);
    font-size: 44px;
  }

  .module-check-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: var(--space-4);
  }

  .module-check {
    position: relative;
    display: block;
    min-width: 0;
    cursor: pointer;
  }

  .module-check__input {
    position: absolute;
    opacity: 0;
    pointer-events: none;
  }

  .module-check__box {
    min-height: 88px;
    display: grid;
    align-content: center;
    gap: 6px;
    padding: 14px 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    background:
      linear-gradient(180deg, var(--surface) 0%, var(--surface-soft) 100%);
    box-shadow: var(--shadow-sm);
    transition: border-color .18s ease, box-shadow .18s ease, transform .18s ease, background .18s ease;
  }

  .module-check:hover .module-check__box {
    transform: translateY(-1px);
    border-color: rgba(33, 78, 138, 0.26);
    box-shadow: var(--shadow-md);
  }

  .module-check__input:checked + .module-check__box {
    border-color: var(--brand-blue);
    background:
      linear-gradient(180deg, rgba(33, 78, 138, 0.1) 0%, rgba(33, 78, 138, 0.04) 100%);
    box-shadow:
      0 0 0 2px rgba(33, 78, 138, 0.08),
      var(--shadow-md);
  }

  .module-check__input:disabled + .module-check__box {
    border-color: rgba(12, 104, 68, 0.26);
    background:
      linear-gradient(180deg, rgba(0, 124, 74, 0.08) 0%, rgba(0, 124, 74, 0.03) 100%);
  }

  .module-check__title {
    color: var(--accent-strong);
    font-weight: var(--font-weight-bold);
    line-height: 1.2;
  }

  .module-check__meta {
    color: var(--text-muted);
    font-size: var(--font-size-sm);
    line-height: 1.4;
  }

  .admin-form__head {
    display: grid;
    gap: 4px;
    margin-bottom: var(--space-6);
  }

  .admin-form__title {
    margin: 0;
    color: var(--heading-color);
  }

  .config-shell {
    display: grid;
    gap: var(--space-6);
    width: 100%;
    min-width: 0;
  }

  .config-layout {
    display: grid;
    grid-template-columns: 260px minmax(0, 1fr);
    gap: var(--space-6);
    align-items: start;
    width: 100%;
    min-width: 0;
  }

  .config-nav {
    position: relative;
    top: auto;
    display: grid;
    gap: var(--space-3);
    padding: var(--space-4);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    background: var(--surface);
    box-shadow: var(--shadow-sm);
  }

  .config-nav__item {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    width: 100%;
    padding: 12px 14px;
    border: 1px solid transparent;
    border-radius: var(--radius-md);
    background: transparent;
    color: var(--text);
    text-align: left;
    cursor: pointer;
    transition: background .18s ease, border-color .18s ease, transform .18s ease;
  }

  .config-nav__item:hover {
    background: var(--surface-alt);
    border-color: var(--border);
    transform: translateY(-1px);
  }

  .config-nav__item.is-active {
    background: var(--surface-alt);
    border-color: var(--brand-blue);
    color: var(--brand-blue-dark);
    box-shadow: var(--shadow-sm);
    transform: none;
  }

  .config-nav__item.is-active .material-symbols-outlined {
    color: var(--brand-blue);
  }

  .config-content {
    display: grid;
    gap: 0;
    min-width: 0;
    align-content: start;
    width: 100%;
  }

  .config-section {
    padding: var(--space-6);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    background: var(--surface);
    box-shadow: var(--shadow-sm);
    min-width: 0;
    overflow: hidden;
  }

  #view-configuracion,
  #configuracion-root {
    min-width: 0;
    width: 100%;
  }

  .config-section__head {
    display: grid;
    gap: 4px;
    margin-bottom: var(--space-5);
  }

  .config-section__head h3,
  .config-subcard h4 {
    margin: 0;
  }

  .config-form,
  .config-subgrid,
  .config-content {
    min-width: 0;
  }

  .config-form {
    display: grid;
    gap: var(--space-5);
  }

  .config-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: var(--space-4);
  }

  .config-grid .field--full {
    grid-column: 1 / -1;
  }

  .config-inline-checks {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-4);
    margin-top: var(--space-4);
  }

  .config-check {
    display: inline-flex;
    align-items: center;
    gap: var(--space-2);
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    background: var(--surface-soft);
  }

  .config-subgrid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: var(--space-4);
  }

  .config-subcard {
    padding: var(--space-5);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    background: var(--surface-soft);
  }

  .config-table-wrap {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
  }

  .config-table {
    width: 100%;
    border-collapse: collapse;
    min-width: 760px;
  }

  .config-table th,
  .config-table td {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    text-align: left;
    vertical-align: middle;
    background: var(--input-bg);
  }

  .config-table thead th {
    background: var(--surface-alt);
    color: var(--text-secondary);
    font-size: var(--font-size-sm);
  }

  .config-table td input,
  .config-table td select {
    min-width: 0;
  }

  .config-table__check {
    text-align: center;
  }

  .config-branding-layout {
    display: grid;
    grid-template-columns: minmax(0, 1.5fr) minmax(320px, .9fr);
    gap: var(--space-5);
    align-items: start;
  }

  .config-branding-stack {
    display: grid;
    gap: var(--space-5);
  }

  .config-branding-block,
  .config-branding-preview-panel {
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    background:
      linear-gradient(180deg, rgba(255,255,255,.96) 0%, rgba(252,253,255,.98) 100%);
    padding: var(--space-5);
    min-width: 0;
  }

  .config-branding-card__head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: var(--space-3);
    margin-bottom: var(--space-4);
  }

  .config-branding-card__head h4,
  .config-branding-mini__legend-item strong {
    margin: 0;
  }

  .config-branding-state-pill {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 28px;
    padding: 4px 10px;
    border-radius: 999px;
    background: rgba(33, 78, 138, .08);
    color: var(--brand-blue);
    font-size: var(--font-size-sm);
    font-weight: var(--font-weight-semibold);
    white-space: nowrap;
  }

  .config-branding-state-pill--preview {
    background: rgba(0, 124, 74, .1);
    color: var(--eyebrow-color);
  }

  .config-branding-logo-grid,
  .config-branding-palette-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: var(--space-4);
  }

  .config-branding-logo-card,
  .config-branding-color-card {
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    background: var(--surface);
    padding: var(--space-4);
    min-width: 0;
  }

  .config-branding-logo-preview {
    min-height: 200px;
    border-radius: var(--radius-lg);
    border: 1px solid rgba(36, 54, 75, .08);
    display: grid;
    place-items: center;
    overflow: hidden;
    padding: var(--space-5);
    margin-bottom: var(--space-3);
    position: relative;
  }

  .config-branding-logo-preview--light {
    background:
      linear-gradient(180deg, rgba(247,250,252,1) 0%, rgba(255,255,255,1) 100%);
  }

  .config-branding-logo-preview--dark {
    background:
      radial-gradient(circle at top left, rgba(3,194,174,.18), transparent 42%),
      linear-gradient(180deg, #16334f 0%, #0d2940 100%);
  }

  .config-branding-logo-preview img,
  .config-branding-mini__logo img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    display: block;
  }

  .config-branding-logo-empty {
    display: grid;
    justify-items: center;
    gap: var(--space-2);
    text-align: center;
    color: var(--text-muted);
  }

  .config-branding-logo-empty strong {
    color: var(--text);
  }

  .config-branding-logo-empty p,
  .config-branding-logo-status,
  .config-branding-mini__card p,
  .config-branding-mini__legend-item span {
    margin: 0;
  }

  .config-branding-logo-preview--dark .config-branding-logo-empty strong,
  .config-branding-logo-preview--dark .config-branding-logo-empty,
  .config-branding-mini__surface--dark,
  .config-branding-mini__card--dark p {
    color: #f8fafc;
  }

  .config-branding-logo-card[data-logo-state="invalid"] {
    border-color: rgba(161, 42, 42, .35);
  }

  .config-branding-logo-card[data-logo-state="valid"] {
    border-color: rgba(0, 124, 74, .28);
  }

  .config-branding-source {
    margin-top: var(--space-3);
    border-top: 1px solid var(--border);
    padding-top: var(--space-3);
  }

  .config-branding-source summary {
    cursor: pointer;
    font-weight: var(--font-weight-semibold);
    color: var(--brand-blue);
  }

  .config-branding-source__body {
    display: grid;
    gap: var(--space-3);
    margin-top: var(--space-3);
  }

  .config-branding-source textarea {
    min-height: 120px;
  }

  .config-branding-color-card.is-invalid {
    border-color: rgba(161, 42, 42, .35);
    box-shadow: inset 0 0 0 1px rgba(161, 42, 42, .08);
  }

  .config-branding-color-card__value {
    font-size: var(--font-size-sm);
    font-weight: var(--font-weight-bold);
    color: var(--brand-blue);
  }

  .config-branding-color-card__swatch {
    height: 78px;
    border-radius: var(--radius-lg);
    border: 1px solid rgba(36, 54, 75, .08);
    margin-bottom: var(--space-3);
  }

  .config-branding-color-card__controls {
    display: grid;
    grid-template-columns: 68px minmax(0, 1fr);
    gap: var(--space-3);
    align-items: center;
    margin-bottom: var(--space-2);
  }

  .config-branding-color-card__controls input[type="color"] {
    padding: 0;
    width: 68px;
    height: 48px;
    border-radius: var(--radius-md);
    overflow: hidden;
    cursor: pointer;
  }

  .config-branding-color-card__controls input[type="text"] {
    font-weight: var(--font-weight-semibold);
    letter-spacing: .04em;
    text-transform: uppercase;
  }

  .config-branding-preview-panel {
    position: sticky;
    top: var(--space-4);
  }

  .config-branding-mini {
    display: grid;
    gap: var(--space-4);
  }

  .config-branding-mini__surface {
    border-radius: var(--radius-xl);
    padding: var(--space-4);
    border: 1px solid rgba(36, 54, 75, .08);
    display: grid;
    gap: var(--space-4);
  }

  .config-branding-mini__surface--light {
    background: var(--branding-light, #F7FAFC);
    color: var(--text);
  }

  .config-branding-mini__surface--dark {
    background:
      radial-gradient(circle at top left, rgba(255,255,255,.12), transparent 36%),
      var(--branding-dark, #0D2940);
  }

  .config-branding-mini__top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-3);
  }

  .config-branding-mini__logo {
    min-height: 48px;
    max-width: 180px;
    display: grid;
    place-items: center start;
    font-weight: var(--font-weight-semibold);
  }

  .config-branding-mini__logo--dark {
    color: #f8fafc;
  }

  .config-branding-mini__badge,
  .config-branding-mini__chip {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 999px;
    padding: 6px 10px;
    font-size: var(--font-size-sm);
    font-weight: var(--font-weight-semibold);
  }

  .config-branding-mini__badge {
    background: rgba(255,255,255,.82);
    border: 1px solid rgba(36, 54, 75, .08);
    color: var(--branding-primary, #214E8A);
  }

  .config-branding-mini__badge--dark {
    background: rgba(255,255,255,.12);
    color: #f8fafc;
  }

  .config-branding-mini__card {
    border-radius: var(--radius-lg);
    background: rgba(255,255,255,.82);
    padding: var(--space-4);
    display: grid;
    gap: var(--space-3);
  }

  .config-branding-mini__card strong {
    font-size: var(--font-size-lg);
  }

  .config-branding-mini__card--dark {
    background: rgba(15, 23, 42, .32);
  }

  .config-branding-mini__chips {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-2);
  }

  .config-branding-mini__chip {
    background: var(--branding-accent, #03C2AE);
    color: #083344;
  }

  .config-branding-mini__chip--soft {
    background: rgba(255,255,255,.72);
    color: var(--branding-secondary, #007C4A);
  }

  .config-branding-mini__chip--inverse {
    background: var(--branding-primary, #214E8A);
    color: #f8fafc;
  }

  .config-branding-mini__chip--outline {
    background: transparent;
    color: #f8fafc;
    border: 1px solid rgba(255,255,255,.28);
  }

  .config-branding-mini__progress {
    height: 10px;
    border-radius: 999px;
    background: rgba(36, 54, 75, .12);
    overflow: hidden;
  }

  .config-branding-mini__progress span {
    display: block;
    width: 64%;
    height: 100%;
    border-radius: inherit;
    background: linear-gradient(90deg, var(--branding-secondary, #007C4A) 0%, var(--branding-progress, #8CC63F) 100%);
  }

  .config-branding-mini__legend {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: var(--space-3);
  }

  .config-branding-mini__legend-item {
    display: grid;
    grid-template-columns: 14px minmax(0, 1fr);
    gap: var(--space-3);
    align-items: center;
    padding: 10px 12px;
    border-radius: var(--radius-lg);
    background: var(--surface-soft);
  }

  .config-branding-mini__legend-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 1px solid rgba(36, 54, 75, .08);
  }

  @media (max-width: 1180px) {
    .config-layout {
      grid-template-columns: 1fr;
    }

    .config-nav {
      position: static;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }

    .config-subgrid {
      grid-template-columns: 1fr;
    }

    .config-branding-layout {
      grid-template-columns: 1fr;
    }

    .config-branding-preview-panel {
      position: static;
    }
  }

  @media (max-width: 760px) {
    .config-grid {
      grid-template-columns: 1fr;
    }

    .config-nav {
      grid-template-columns: 1fr;
    }

    .config-branding-logo-grid,
    .config-branding-palette-grid,
    .config-branding-mini__legend {
      grid-template-columns: 1fr;
    }
  }

  .user-email-field {
    align-self: start;
  }

  .email-input-group {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    width: 100%;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    overflow: hidden;
    background: var(--surface);
  }

  .email-input-group:focus-within {
    outline: 2px solid rgba(61, 150, 180, .18);
    border-color: var(--brand-blue);
  }

  .email-input-group input {
    border: 0;
    border-radius: 0;
    min-width: 0;
  }

  .email-input-group input:focus {
    outline: 0;
    border-color: transparent;
  }

  .email-input-group__suffix {
    display: inline-flex;
    align-items: center;
    padding: 0 14px;
    border-left: 1px solid var(--border);
    background: var(--surface-soft);
    color: var(--brand-blue-dark);
    font-size: var(--font-size-md);
    font-weight: var(--font-weight-semibold);
    white-space: nowrap;
  }

  .app-loading__text {
    margin: 0;
    font-size: clamp(1rem, 1.35vw, 1.16rem);
    font-weight: var(--font-weight-bold);
    color: rgba(235, 244, 252, 0.96);
    letter-spacing: 0.02em;
  }

  .splash-screen {
    position: relative;
    width: min(1080px, calc(100vw - 64px));
    min-height: min(720px, calc(100vh - 64px));
    padding: clamp(28px, 4vw, 44px);
    border-radius: 36px;
    overflow: hidden;
    border: 1px solid rgba(186, 214, 235, 0.16);
    background:
      radial-gradient(circle at top left, color-mix(in srgb, var(--runtime-brand-primary, #3890B0) 28%, transparent), transparent 34%),
      radial-gradient(circle at bottom right, color-mix(in srgb, var(--runtime-brand-accent, #00C0A8) 22%, transparent), transparent 30%),
      linear-gradient(155deg, var(--runtime-brand-dark, #0d2940) 0%, color-mix(in srgb, var(--runtime-brand-primary, #154f69) 58%, var(--runtime-brand-dark, #0d2940)) 48%, color-mix(in srgb, var(--runtime-brand-secondary, #11453f) 68%, var(--runtime-brand-dark, #0d2940)) 100%);
    box-shadow:
      0 36px 80px rgba(4, 14, 31, 0.34),
      inset 0 1px 0 rgba(255, 255, 255, 0.08);
  }

  .splash-screen__ambient,
  .splash-screen__ambient-orb,
  .splash-screen__ambient-grid {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .splash-screen__ambient-orb {
    filter: blur(6px);
    opacity: 0.8;
  }

  .splash-screen__ambient-orb--one {
    inset: -12% auto auto -8%;
    width: 360px;
    height: 360px;
    border-radius: 50%;
    background: radial-gradient(circle, color-mix(in srgb, var(--runtime-brand-primary, #3890B0) 28%, transparent), transparent);
    animation: splashOrbFloatOne 12s ease-in-out infinite alternate;
  }

  .splash-screen__ambient-orb--two {
    inset: auto -8% -18% auto;
    width: 420px;
    height: 420px;
    border-radius: 50%;
    background: radial-gradient(circle, color-mix(in srgb, var(--runtime-brand-accent, #00C0A8) 24%, transparent), transparent);
    animation: splashOrbFloatTwo 14s ease-in-out infinite alternate;
  }

  .splash-screen__ambient-grid {
    background:
      linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
    background-size: 42px 42px;
    mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.45), transparent 88%);
    opacity: 0.18;
    animation: splashGridDrift 20s linear infinite;
  }

  .splash-screen__content {
    position: relative;
    z-index: 1;
    min-height: min(632px, calc(100vh - 160px));
    display: grid;
    align-content: space-between;
    gap: clamp(28px, 4vw, 48px);
  }

  .splash-screen__brand {
    display: grid;
    justify-items: center;
    gap: clamp(24px, 3vw, 34px);
    text-align: center;
    padding-top: clamp(22px, 3vw, 38px);
  }

  .splash-screen__logo-wrap {
    position: relative;
    width: clamp(180px, 24vw, 248px);
    height: clamp(180px, 24vw, 248px);
    display: grid;
    place-items: center;
    animation: splashLogoFloat 5.4s ease-in-out infinite;
  }

  .splash-screen__logo-ring,
  .splash-screen__logo-sheen,
  .splash-screen__logo-core {
    position: absolute;
    inset: 0;
    border-radius: 50%;
  }

  .splash-screen__logo-ring--outer {
    border: 1px solid color-mix(in srgb, var(--runtime-brand-primary, #7CC4DC) 24%, transparent);
    box-shadow:
      0 0 0 1px rgba(255, 255, 255, 0.04) inset,
      0 0 0 18px rgba(255, 255, 255, 0.02);
    animation: splashRingSpin 16s linear infinite;
  }

  .splash-screen__logo-ring--inner {
    inset: 16px;
    border: 1px solid color-mix(in srgb, var(--runtime-brand-accent, #00C0A8) 34%, transparent);
    animation: splashRingSpinReverse 10s linear infinite;
  }

  .splash-screen__logo-sheen {
    display: none;
  }

  .splash-screen__logo-core {
    inset: 26px;
    display: grid;
    place-items: center;
    overflow: hidden;
    border: 0;
    background: transparent;
    box-shadow: none;
    backdrop-filter: none;
  }

  .splash-screen__logo-core::after {
    display: none;
  }

  .splash-screen__logo {
    width: 64%;
    max-height: 64%;

  .splash-screen__copy {

  .splash-screen__eyebrow {

  .splash-screen__title {

    line-height: 1.03;
    color: #f6fbff;
    letter-spacing: -0.04em;
  }

  .splash-screen__meta {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 14px;
    color: rgba(222, 237, 248, 0.84);

  }

  .splash-screen__version {
    padding: 9px 14px;

  .splash-screen__divider {

  }

  .splash-screen__progress-block {
    display: grid;
    gap: 16px;
    padding: clamp(22px, 2.5vw, 28px);
    border-radius: 28px;
    border: 1px solid color-mix(in srgb, var(--runtime-brand-primary, #7CC4DC) 16%, transparent);
    background:
      linear-gradient(180deg, color-mix(in srgb, var(--runtime-brand-primary, #3890B0) 16%, transparent), rgba(255, 255, 255, 0.04));
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
  }

  .splash-screen__progress-head,
  .splash-screen__progress-footer {
    display: flex;
    justify-content: space-between;
    gap: 18px;
    align-items: end;
  }

  .splash-screen__progress-label,
  .splash-screen__status,
  .splash-screen__powered {
    margin: 0;
  }

  .splash-screen__progress-label {
    font-size: var(--font-size-xs);
    font-weight: var(--font-weight-bold);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: color-mix(in srgb, var(--runtime-brand-accent, #97E2D7) 80%, white);
    margin-bottom: 8px;
  }

  .splash-screen__percent {
    min-width: 74px;
    padding: 10px 14px;
    border-radius: var(--radius-pill);
    background: color-mix(in srgb, var(--runtime-brand-primary, #3890B0) 14%, transparent);
    border: 1px solid color-mix(in srgb, var(--runtime-brand-primary, #7AC5DC) 18%, transparent);
    text-align: center;
    color: #f6fbff;
    font-weight: var(--font-weight-bold);
    font-size: clamp(1rem, 1.8vw, 1.22rem);
  }

  .splash-screen__progress-track {
    position: relative;
    height: 14px;
    border-radius: 999px;
    overflow: hidden;
    background: rgba(9, 29, 40, 0.48);
    border: 1px solid color-mix(in srgb, var(--runtime-brand-primary, #7AC5DC) 16%, transparent);
  }

  .splash-screen__progress-track::before {
    content: '';
    position: absolute;
    inset: 2px;
    border-radius: inherit;
    background: linear-gradient(90deg, color-mix(in srgb, var(--runtime-brand-primary, #3890B0) 10%, transparent), rgba(255, 255, 255, 0.01));
  }

  .splash-screen__progress-bar {
    position: absolute;
    inset: 0 auto 0 0;
    width: 0%;
    border-radius: inherit;
    background:
      linear-gradient(90deg, var(--runtime-brand-primary, #3890B0) 0%, var(--runtime-brand-accent, #00C0A8) 58%, var(--runtime-brand-progress, #88C038) 100%);
    box-shadow:
      0 0 22px color-mix(in srgb, var(--runtime-brand-accent, #00C0A8) 28%, transparent),
      inset 0 1px 0 rgba(255, 255, 255, 0.22);
    transition: width 0.18s linear;
  }

  .splash-screen__progress-bar::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(120deg, transparent 20%, rgba(255, 255, 255, 0.38) 50%, transparent 80%);
    animation: splashProgressSweep 1.8s linear infinite;
  }

  .splash-screen__status {
    color: rgba(226, 238, 247, 0.82);
    font-size: var(--font-size-sm);
  }

  .splash-screen__powered {
    color: rgba(151, 226, 215, 0.74);
    font-size: var(--font-size-xs);
    font-weight: var(--font-weight-bold);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    text-align: right;
  }

  @keyframes splashOrbFloatOne {
    0% { transform: translate3d(0, 0, 0) scale(1); }
    100% { transform: translate3d(32px, 18px, 0) scale(1.08); }
  }

  @keyframes splashOrbFloatTwo {
    0% { transform: translate3d(0, 0, 0) scale(1); }
    100% { transform: translate3d(-28px, -16px, 0) scale(1.09); }
  }

  @keyframes splashGridDrift {
    from { transform: translate3d(0, 0, 0); }
    to { transform: translate3d(24px, 16px, 0); }
  }

  @keyframes splashLogoFloat {
    0%, 100% { transform: translate3d(0, 0, 0); }
    50% { transform: translate3d(0, -10px, 0); }
  }

  @keyframes splashLogoPulse {
    0%, 100% { transform: scale(0.97); }
    50% { transform: scale(1.02); }
  }

  @keyframes splashRingSpin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  @keyframes splashRingSpinReverse {
    from { transform: rotate(360deg); }
    to { transform: rotate(0deg); }
  }

  @keyframes splashLogoSweep {
    0%, 100% { transform: translateX(-120%) rotate(8deg); opacity: 0; }
    26%, 72% { opacity: 1; }
    52% { transform: translateX(130%) rotate(8deg); opacity: 0.78; }
  }

  @keyframes splashProgressSweep {
    from { transform: translateX(-28%); }
    to { transform: translateX(28%); }
  }

  @media (max-width: 760px) {

      width: calc(100vw - 24px);

      min-width: 0;
    }

    }
