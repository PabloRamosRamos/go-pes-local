<style>
  :root {
    --brand-blue: #3D96B4;
    --brand-blue-dark: #247892;
    --brand-blue-soft: #EAF7FB;
    --brand-green: #8CC63F;
    --brand-green-dark: #5F8F25;
    --brand-green-soft: #F3FAEA;
    --brand-teal: #03C2AE;
    --brand-teal-dark: #028D80;
    --brand-teal-soft: #E7FBF8;

    --text: #24364B;
    --text-secondary: #4F6278;
    --text-muted: #64748B;
    --border: #BFD9E7;
    --border-strong: #3D96B4;
    --bg: #F7FAFC;
    --surface: #FFFFFF;
    --surface-alt: #F1F6FA;
    --surface-soft: #FCFDFF;

    --success: #8CC63F;
    --success-dark: #587A24;
    --success-soft: #F3FAEA;
    --info: #3D96B4;
    --info-soft: #EAF7FB;
    --disabled: #AAB4BF;
    --disabled-soft: #F8FAFC;
    --danger: #B42318;
    --danger-soft: #FFF0F0;
    --warning: #B7791F;
    --warning-soft: #FFF7E6;

    --font-base: 'Inter', sans-serif;
    --font-heading: 'Inter', sans-serif;
    --font-size-xs: 11px;
    --font-size-sm: 12px;
    --font-size-md: 13px;
    --font-size-base: 14px;
    --font-size-lg: 16px;
    --font-size-xl: 20px;
    --font-size-2xl: 28px;
    --font-size-display: 34px;
    --icon-md: 24px;
    --icon-lg: 34px;
    --font-weight-regular: 400;
    --font-weight-medium: 500;
    --font-weight-semibold: 600;
    --font-weight-bold: 700;
    --font-weight-extrabold: 800;
    --line-tight: 1.1;
    --line-normal: 1.35;
    --line-relaxed: 1.5;

    --space-1: 4px;
    --space-2: 8px;
    --space-3: 10px;
    --space-4: 12px;
    --space-5: 14px;
    --space-6: 16px;
    --space-7: 18px;
    --space-8: 22px;
    --space-9: 28px;
    --space-10: 32px;

    --radius-sm: 8px;
    --radius-md: 10px;
    --radius-lg: 12px;
    --radius-xl: 14px;
    --radius-2xl: 16px;
    --radius-pill: 999px;
    --shadow-sm: 0 4px 12px rgba(36, 54, 75, 0.05);
    --shadow-md: 0 8px 20px rgba(26, 49, 80, 0.08);
    --shadow-lg: 0 18px 40px rgba(36, 54, 75, 0.14);
    --container-max: 1440px;
    --sidebar-width: 280px;

  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: var(--font-base);
    font-size: var(--font-size-base);
    line-height: var(--line-normal);
    color: var(--text);
    background: linear-gradient(180deg, var(--surface) 0%, var(--bg) 100%);
  }

  h1,
  h2,
  h3,
  h4 {
    font-family: var(--font-heading);
    color: var(--brand-blue);
    line-height: var(--line-tight);
  }

  p {
    line-height: var(--line-relaxed);
  }

  button,
  input,
  select,
  textarea {
    font-family: inherit;
  }

  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    vertical-align: middle;
    color: var(--brand-blue);
  }

  .hero {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: var(--space-2);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .hero__brand {
    display: flex;
    gap: var(--space-7);
    align-items: center;
  }

  .hero__logo {
    width: 124px;
    height: 124px;
    border-radius: var(--radius-2xl);
    color: var(--surface);
    display: grid;
    place-items: center;
    font-size: var(--font-size-2xl);
    font-weight: var(--font-weight-bold);
  }

  .eyebrow {
    margin: 0 0 4px;
    color: var(--brand-green);
    font-size: var(--font-size-sm);
    font-weight: var(--font-weight-bold);
    letter-spacing: .08em;
    text-transform: uppercase;
  }

  .hero__title {
    margin: 0;
    font-size: var(--font-size-display);
    line-height: var(--line-tight);
    color: var(--brand-blue);
  }

  .hero__subtitle {
    margin: 6px 0 0;
    color: var(--text-muted);
  }

  .hero__user {
    display: flex;
    gap: var(--space-4);
    flex-wrap: wrap;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: var(--space-3) var(--space-5);
    border: 1px solid var(--border);
    background: var(--bg);
    border-radius: var(--radius-pill);
    font-size: var(--font-size-base);
    color: var(--text);
  }

  .app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-8);
    padding: var(--space-8) var(--space-9);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .app-header__left {
    display: flex;
    align-items: center;
    gap: var(--space-7);
    min-width: 0;
  }

  .app-header__right {
    display: flex;
    align-items: center;
    gap: var(--space-4);
  }

  .brand-mark {
    width: 124px;
    height: 124px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    border: 0 solid var(--border);
    border-radius: var(--radius-2xl);
    padding: 0;
    box-sizing: border-box;
    flex: 0 0 auto;
  }

  .brand-logo {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  .brand-copy__eyebrow {
    font-size: var(--font-size-sm);
    font-weight: var(--font-weight-semibold);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--brand-green-dark);
    margin-bottom: 4px;
  }

  .brand-copy__title {
    margin: 0;
    font-size: var(--font-size-2xl);
    line-height: var(--line-tight);
    font-weight: var(--font-weight-bold);
    color: var(--brand-blue-dark);
  }

  .brand-copy__subtitle {
    margin: 6px 0 0;
    font-size: var(--font-size-base);
    color: var(--text-secondary);
  }

  .user-chip {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    padding: var(--space-3) var(--space-5);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    background: var(--bg);
    color: var(--brand-blue-dark);
  }

  .user-chip .material-symbols-outlined {
    font-size: var(--icon-md);
    color: var(--brand-blue-dark);
  }

  .user-chip__meta {
    display: flex;
    flex-direction: column;
    line-height: 1.15;
  }

  .user-chip__meta strong {
    font-size: var(--font-size-md);
    color: var(--text);
  }

  .user-chip__meta small {
    font-size: var(--font-size-xs);
    color: var(--text-muted);
  }

  .quick-actions {
    padding: var(--space-7) var(--space-10) 0;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    gap: var(--space-5);
  }

  .quick-card {
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: var(--radius-xl);
    padding: var(--space-7);
    cursor: pointer;
    transition: .18s ease;
    box-shadow: var(--shadow-md);
    text-align: left;
  }

  .quick-card:hover {
    transform: translateY(-1px);
  }

  .quick-card h3 {
    margin: 8px 0 4px;
    font-size: var(--font-size-lg);
  }

  .quick-card p {
    margin: 0;
    font-size: var(--font-size-md);
    color: var(--text-muted);
  }

  .toolbar {
    text-align: right;
    justify-content: space-between;
    gap: var(--space-6);
    align-items: center;
    margin: var(--space-7) var(--space-10);
    padding: var(--space-4) var(--space-6);
    background: var(--surface-alt);
    border-radius: var(--radius-lg);
  }

  .toolbar__left {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-2);
  }

  .link-btn {
    background: transparent;
    border: none;
    color: var(--brand-blue);
    padding: var(--space-2) var(--space-3);
    cursor: pointer;
    font-weight: var(--font-weight-semibold);
  }

  .layout {
    display: grid;
    grid-template-columns: var(--sidebar-width) 1fr;
    gap: var(--space-8);
    padding: 0 var(--space-10) var(--space-10);
  }

  .sidebar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    padding: var(--space-6);
    height: fit-content;
    box-shadow: var(--shadow-md);
    display: grid;
    gap: var(--space-3);
  }

  .nav-btn {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    padding: var(--space-4) var(--space-5);
    border-radius: var(--radius-lg);
    cursor: pointer;
    text-align: left;
    font-weight: var(--font-weight-semibold);
  }

  .nav-btn.is-active,
  .nav-btn:hover {
    background: var(--brand-blue-soft);
    border-color: var(--border-strong);
  }

  .content {
    position: relative;
    min-height: 320px;
  }

  .content-loading {
    position: absolute;
    inset: 0;
    z-index: 40;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255, 255, 255, 0.96);
    opacity: 1;
    visibility: visible;
    transition: opacity 0.22s ease, visibility 0.22s ease;
  }

  .content-loading.is-hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  .content-loading__box {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    text-align: center;
  }

  .content-loading__spinner {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    position: relative;
    background: conic-gradient(
      from 0deg,
      var(--brand-green) 0deg 180deg,
      var(--brand-blue) 180deg 360deg
    );
    animation: contentLoadingSpin 0.9s linear infinite;
    box-shadow: var(--shadow-md);
  }

  .content-loading__spinner::after {
    content: '';
    position: absolute;
    inset: 10px;
    border-radius: 50%;
    background: var(--surface);
  }

  .content-loading__text {
    font-size: var(--font-size-lg);
    font-weight: var(--font-weight-bold);
    color: var(--text);
    letter-spacing: 0.02em;
  }

  @keyframes contentLoadingSpin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .view { display: none; }
  .view.active { display: block; }

  .section-head {
    display: flex;
    justify-content: space-between;
    align-items: start;
    margin: 4px 0 18px;
    gap: 16px;
  }

  .section-head--stacked {
    align-items: flex-start;
  }

  .section-head h2 {
    margin: 0;
    color: var(--brand-blue);
  }

  .section-head h3 {
    margin: 0;
    color: var(--brand-blue);
  }

  .section-head__meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .muted {
    color: var(--text-muted);
  }

  .tile-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
    gap: 14px;
  }

  .tile {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    box-shadow: var(--shadow-md);
    padding: 18px;
    cursor: pointer;
    text-align: left;
  }

  .tile h3 {
    margin: 10px 0 8px;
  }

  .tile p {
    margin: 0;
    color: var(--text-muted);
    font-size: var(--font-size-md);
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    padding: var(--space-7);
    box-shadow: var(--shadow-md);
  }

  .search-panel {
    display: flex;
    gap: 16px;
    align-items: end;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 14px;
    min-width: 0;
  }

  .field--grow {
    flex: 1;
  }

  .field--auto {
    width: 180px;
  }

  .field--half {
    width: calc(50% - 8px);
    display: inline-flex;
  }

  .field--third {
    width: calc(33.33% - 8px);
    display: inline-flex;
  }

  .field--full {
    width: 100%;
  }

  label {
    font-size: var(--font-size-md);
    font-weight: var(--font-weight-semibold);
    color: var(--text);
  }

  input,
  select,
  textarea {
    width: 100%;
    padding: 11px var(--space-4);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    font: inherit;
    color: var(--text);
    background: var(--surface);
  }

  textarea {
    resize: vertical;
  }

  input:focus,
  select:focus,
  textarea:focus {
    outline: 2px solid rgba(61, 150, 180, .18);
    border-color: var(--brand-blue);
  }

  .primary-btn,
  .secondary-btn {
    display: inline-flex;
    align-items: center;
    gap: var(--space-2);
    border-radius: var(--radius-lg);
    padding: var(--space-4) var(--space-6);
    font-weight: var(--font-weight-bold);
    cursor: pointer;
    border: 1px solid transparent;
  }

  .primary-btn {
    background: var(--brand-green);
    color: var(--surface);
  }

  .primary-btn .material-symbols-outlined {
    color: var(--surface);
  }

  .secondary-btn {
    background: var(--surface);
    border-color: var(--border);
    color: var(--brand-blue);
  }

  .actions {
    display: flex;
    gap: var(--space-3);
    flex-wrap: wrap;
    margin-top: 8px;
  }

  .form-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 0 var(--space-6);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    padding: var(--space-7);
    box-shadow: var(--shadow-md);
  }

  .form-grid--dense {
    background: transparent;
    border: 0;
    border-radius: 0;
    padding: 0;
    box-shadow: none;
    gap: 0 var(--space-6);
  }

  .form-grid .field[data-span="2"] {
    grid-column: 1 / -1;
  }

  .table-wrap {
    overflow: auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    box-shadow: var(--shadow-md);
  }

  .data-table {
    width: 100%;
    border-collapse: collapse;
  }

  .data-table th,
  .data-table td {
    padding: var(--space-4) var(--space-5);
    border-bottom: 1px solid var(--border);
    font-size: var(--font-size-base);
    text-align: left;
    vertical-align: top;
  }

  .data-table thead th {
    color: var(--brand-blue);
    background: var(--surface-soft);
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 10px;
    border-radius: var(--radius-pill);
    background: var(--brand-blue-soft);
    color: var(--brand-blue-dark);
    font-size: var(--font-size-sm);
    font-weight: var(--font-weight-bold);
  }

  .ficha-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: var(--space-6);
  }

  .ficha-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    padding: var(--space-7);
    box-shadow: var(--shadow-md);
  }

  .ficha-block h3 {
    margin: 0 0 12px;
    color: var(--brand-blue);
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .kv {
    display: grid;
    grid-template-columns: 170px 1fr;
    gap: var(--space-2);
    font-size: var(--font-size-base);
    margin-bottom: 8px;
  }

  .kv strong {
    color: var(--text);
  }

  .empty-state {
    padding: 20px;
    text-align: center;
    color: var(--text-muted);
  }

  .is-admin {
    display: none;
  }

  .show-admin {
    display: inline-flex !important;
  }

  .message {
    padding: 10px 12px;
    border-radius: var(--radius-md);
    margin-bottom: 14px;
    font-size: var(--font-size-base);
  }

  .message.success {
    background: var(--success-soft);
    color: var(--success-dark);
  }

  .message.error {
    background: var(--danger-soft);
    color: var(--danger);
  }

  /* Nuevo ingreso */
  .ingreso-layout {
    display: grid;
    grid-template-columns: minmax(0, 1.6fr) minmax(320px, .9fr);
    gap: 16px;
    align-items: start;
  }

  .ingreso-form {
    display: grid;
    gap: 16px;
  }

  .module-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    padding: var(--space-7);
    box-shadow: var(--shadow-md);
  }

  .module-card__head {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: flex-start;
    margin-bottom: 14px;
  }

  .module-card__head h3 {
    margin: 0;
    color: var(--brand-blue);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .module-card__head p {
    margin: 0;
  }

  .module-card--actions {
    padding-bottom: 10px;
  }

  .form-actions-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .ingreso-side {
    display: grid;
    gap: 16px;
  }

  .sticky-card {
    position: sticky;
    top: 16px;
  }

  .sticky-card + .sticky-card {
    position: static;
  }

  .ingreso-preview {
    display: grid;
    gap: 10px;
  }

  .preview-block {
    display: grid;
    gap: 8px;
  }

  .preview-block__title {
    text-align: center;
    font-size: var(--font-size-sm);
    font-weight: var(--font-weight-bold);
    color: var(--brand-green);
    text-transform: uppercase;
    letter-spacing: .06em;
  }

  .preview-grid {
    text-align: left;
    display: grid;
    gap: 8px;
  }

  .preview-item {
    display: grid;
    grid-template-columns: 120px 1fr;
    gap: 8px;
    font-size: var(--font-size-base);
  }

  .preview-item strong {
    color: var(--text);
  }

  .matches-list {
    display: grid;
    gap: 10px;
  }

  .match-card {
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 12px;
    background: var(--surface-soft);
  }

  .match-card h4 {
    margin: 0 0 6px;
    color: var(--brand-blue);
    font-size: var(--font-size-base);
  }

  .match-card p {
    margin: 0;
    font-size: var(--font-size-md);
    color: var(--text-muted);
  }

  .tips-list {
    margin: 0;
    padding-left: 18px;
    display: grid;
    gap: 10px;
    color: var(--text-muted);
    font-size: var(--font-size-base);
  }

  .field-help {
    font-size: var(--font-size-sm);
    color: var(--text-muted);
    margin-top: -2px;
  }

  .app-loading {
    position: fixed;
    inset: 0;
    z-index: 99999;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255, 255, 255, 0.96);
    opacity: 1;
    visibility: visible;
    transition: opacity 0.28s ease, visibility 0.28s ease;
  }

  .app-loading.is-hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  .app-loading__box {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    text-align: center;
  }

  .app-loading__spinner {
    width: 84px;
    height: 84px;
    border-radius: 50%;
    position: relative;
    background: conic-gradient(
      from 0deg,
      var(--brand-green) 0deg 180deg,
      var(--brand-blue) 180deg 360deg
    );
    animation: appLoadingSpin 0.9s linear infinite;
    box-shadow: var(--shadow-md);
  }

  .app-loading__spinner::after {
    content: '';
    position: absolute;
    inset: 11px;
    border-radius: 50%;
    background: var(--surface);
  }

  .app-loading__text {
    font-size: var(--font-size-lg);
    font-weight: var(--font-weight-bold);
    color: var(--text);
    letter-spacing: 0.02em;
  }

  @keyframes appLoadingSpin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .ficha-layout-v2 {
    display: flex;
    flex-direction: column;
    gap: 22px;
  }

  .ficha-universe {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .ficha-universe__head {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .ficha-universe__head h3 {
    margin: 0;
    font-size: var(--font-size-2xl);
    font-weight: var(--font-weight-extrabold);
    color: var(--brand-blue);
  }

  .ficha-grid {
    display: grid;
    gap: 16px;
