<style>
  @import url('https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600;700;800&display=swap');

  :root {
    --brand-blue: #3D96B4;
    --brand-blue-dark: #247892;
    --brand-blue-soft: #EAF7FB;
    --brand-green: #8CC63F;
    --brand-green-dark: #5F8F25;
    --brand-green-soft: #F3FAEA;
    --brand-teal: #03C2AE;
    --brand-teal-dark: #028D80;
    --brand-teal-soft: #E7FBF8;

    --text: #24364B;
    --text-secondary: #4F6278;
    --text-muted: #64748B;
    --border: #BFD9E7;
    --border-strong: #3D96B4;
    --bg: #F7FAFC;
    --surface: #FFFFFF;
    --surface-alt: #F1F6FA;
    --surface-soft: #FCFDFF;

    --success: #8CC63F;
    --success-dark: #587A24;
    --success-soft: #F3FAEA;
    --info: #3D96B4;
    --info-soft: #EAF7FB;
    --disabled: #AAB4BF;
    --disabled-soft: #F8FAFC;
    --danger: #B42318;
    --danger-soft: #FFF0F0;
    --warning: #B7791F;
    --warning-soft: #FFF7E6;

    --font-family-base: 'Raleway', 'Segoe UI', Roboto, Arial, sans-serif;
    --font-family-heading: 'Raleway', 'Segoe UI', Roboto, Arial, sans-serif;
    --font-base: var(--font-family-base);
    --font-heading: var(--font-family-heading);
    --font-size-xs: 11px;
    --font-size-sm: 12px;
    --font-size-md: 13px;
    --font-size-base: 14px;
    --font-size-lg: 16px;
    --font-size-xl: 20px;
    --font-size-2xl: 28px;
    --font-size-display: 34px;
    --icon-md: 24px;
    --icon-lg: 34px;
    --font-weight-regular: 400;
    --font-weight-medium: 500;
    --font-weight-semibold: 600;
    --font-weight-bold: 700;
    --font-weight-extrabold: 800;
    --line-tight: 1.1;
    --line-normal: 1.35;
    --line-relaxed: 1.5;

    --space-1: 4px;
    --space-2: 8px;
    --space-3: 10px;
    --space-4: 12px;
    --space-5: 14px;
    --space-6: 16px;
    --space-7: 18px;
    --space-8: 22px;
    --space-9: 28px;
    --space-10: 32px;

    --radius-sm: 8px;
    --radius-md: 10px;
    --radius-lg: 12px;
    --radius-xl: 14px;
    --radius-2xl: 16px;
    --radius-pill: 999px;
    --shadow-sm: 0 4px 12px rgba(36, 54, 75, 0.05);
    --shadow-md: 0 8px 20px rgba(26, 49, 80, 0.08);
    --shadow-lg: 0 18px 40px rgba(36, 54, 75, 0.14);
    --container-max: 1440px;
    --sidebar-width: 280px;
    --sidebar-width-collapsed: 88px;

  }

  * { box-sizing: border-box; }

  .is-hidden {
    display: none !important;
  }

  body {
    margin: 0;
    font-family: var(--font-base);
    font-size: var(--font-size-base);
    line-height: var(--line-normal);
    color: var(--text);
    background: linear-gradient(180deg, var(--surface) 0%, var(--bg) 100%);
  }

  h1,
  h2,
  h3,
  h4 {
    font-family: var(--font-heading);
    color: var(--brand-blue);
    line-height: var(--line-tight);
  }

  p {
    line-height: var(--line-relaxed);
  }

  button,
  input,
  select,
  textarea {
    font-family: inherit;
  }

  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    vertical-align: middle;
    color: var(--brand-blue);
  }

  .hero {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: var(--space-2);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .hero__brand {
    display: flex;
    gap: var(--space-7);
    align-items: center;
  }

  .hero__logo {
    width: 124px;
    height: 124px;
    border-radius: var(--radius-2xl);
    color: var(--surface);
    display: grid;
    place-items: center;
    font-size: var(--font-size-2xl);
    font-weight: var(--font-weight-bold);
  }

  .eyebrow {
    margin: 0 0 4px;
    color: var(--brand-green);
    font-size: var(--font-size-sm);
    font-weight: var(--font-weight-bold);
    letter-spacing: .08em;
    text-transform: uppercase;
  }

  .hero__title {
    margin: 0;
    font-size: var(--font-size-display);
    line-height: var(--line-tight);
    color: var(--brand-blue);
  }

  .hero__subtitle {
    margin: 6px 0 0;
    color: var(--text-muted);
  }

  .hero__user {
    display: flex;
    align-items: center;
    gap: var(--space-4);
    flex-wrap: wrap;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: var(--space-3) var(--space-5);
    border: 1px solid var(--border);
    background: var(--bg);
    border-radius: var(--radius-pill);
    font-size: var(--font-size-base);
    color: var(--text);
  }

  .app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-8);
    padding: var(--space-8) var(--space-9);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .app-header__left {
    display: flex;
    align-items: center;
    gap: var(--space-7);
    min-width: 0;
  }

  .app-header__right {
    display: flex;
    align-items: center;
    gap: var(--space-4);
  }

  .brand-mark {
    width: 124px;
    height: 124px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    border: 0 solid var(--border);
    border-radius: var(--radius-2xl);
    padding: 0;
    box-sizing: border-box;
    flex: 0 0 auto;
  }

  .brand-logo {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  .brand-copy__eyebrow {
    font-size: var(--font-size-sm);
    font-weight: var(--font-weight-semibold);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--brand-green-dark);
    margin-bottom: 4px;
  }

  .brand-copy__title {
    margin: 0;
    font-size: var(--font-size-2xl);
    line-height: var(--line-tight);
    font-weight: var(--font-weight-bold);
    color: var(--brand-blue-dark);
  }

  .brand-copy__subtitle {
    margin: 6px 0 0;
    font-size: var(--font-size-base);
    color: var(--text-secondary);
  }

  .user-chip {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    padding: var(--space-3) var(--space-5);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    background: var(--bg);
    color: var(--brand-blue-dark);
  }

  .user-chip .material-symbols-outlined {
    font-size: var(--icon-md);
    color: var(--brand-blue-dark);
  }

  .user-chip__meta {
    display: flex;
    flex-direction: column;
    line-height: 1.15;
  }

  .user-chip__meta strong {
    font-size: var(--font-size-md);
    color: var(--text);
  }

  .user-chip__meta small {
    font-size: var(--font-size-xs);
    color: var(--text-muted);
  }

  .quick-actions {
    padding: var(--space-7) var(--space-10) 0;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    gap: var(--space-5);
  }

  .quick-card {
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: var(--radius-xl);
    padding: var(--space-7);
    cursor: pointer;
    transition: .18s ease;
    box-shadow: var(--shadow-md);
    text-align: left;
  }

  .quick-card:hover {
    transform: translateY(-1px);
  }

  .quick-card h3 {
    margin: 8px 0 4px;
    font-size: var(--font-size-lg);
  }

  .quick-card p {
    margin: 0;
    font-size: var(--font-size-md);
    color: var(--text-muted);
  }

  .toolbar {
    text-align: right;
    justify-content: space-between;
    gap: var(--space-6);
    align-items: center;
    margin: var(--space-7) var(--space-10);
    padding: var(--space-4) var(--space-6);
    background: var(--surface-alt);
    border-radius: var(--radius-lg);
  }

  .toolbar__left {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-2);
  }

  .link-btn {
    background: transparent;
    border: none;
    color: var(--brand-blue);
    padding: var(--space-2) var(--space-3);
    cursor: pointer;
    font-weight: var(--font-weight-semibold);
  }

  .layout {
    display: grid;
    grid-template-columns: var(--sidebar-width) 1fr;
    gap: var(--space-8);
    padding: 0 var(--space-10) var(--space-10);
    transition: grid-template-columns .2s ease;
  }

  .layout.is-sidebar-collapsed {
    grid-template-columns: var(--sidebar-width-collapsed) 1fr;
  }

  .sidebar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    padding: var(--space-6);
    height: fit-content;
    box-shadow: var(--shadow-md);
    display: grid;
    gap: var(--space-3);
    overflow: hidden;
    transition: padding .2s ease;
  }

  .sidebar-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-3);
    width: 100%;
    min-width: 0;
    border: 1px solid var(--border);
    background: var(--surface-alt);
    color: var(--brand-blue-dark);
    padding: var(--space-3) var(--space-4);
    border-radius: var(--radius-lg);
    cursor: pointer;
    font-weight: var(--font-weight-bold);
    transition: background .18s ease, border-color .18s ease;
  }

  .sidebar-toggle:hover {
    background: var(--brand-blue-soft);
    border-color: var(--border-strong);
  }

  .sidebar-toggle .material-symbols-outlined {
    flex: 0 0 auto;
  }

  .sidebar-toggle__label,
  .nav-label {
    min-width: 0;
    overflow: hidden;
    white-space: nowrap;
    opacity: 1;
    transition: opacity .16s ease, width .2s ease;
  }

  .nav-btn {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    padding: var(--space-4) var(--space-5);
    border-radius: var(--radius-lg);
    cursor: pointer;
    text-align: left;
    font-weight: var(--font-weight-semibold);
    min-width: 0;
    transition: background .18s ease, border-color .18s ease, padding .2s ease;
  }

  .nav-btn .material-symbols-outlined {
    flex: 0 0 auto;
  }

  .layout.is-sidebar-collapsed .sidebar {
    padding: var(--space-4);
  }

  .layout.is-sidebar-collapsed .nav-btn,
  .layout.is-sidebar-collapsed .sidebar-toggle {
    justify-content: center;
    padding-left: var(--space-3);
    padding-right: var(--space-3);
    gap: 0;
  }

  .layout.is-sidebar-collapsed .nav-label,
  .layout.is-sidebar-collapsed .sidebar-toggle__label {
    width: 0;
    opacity: 0;
  }

  .nav-btn.is-active,
  .nav-btn:hover {
    background: var(--brand-blue-soft);
    border-color: var(--border-strong);
  }

  .content {
    position: relative;
    min-height: 320px;
  }

  .content-loading {
    position: absolute;
    inset: 0;
    z-index: 40;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255, 255, 255, 0.96);
    opacity: 1;
    visibility: visible;
    transition: opacity 0.22s ease, visibility 0.22s ease;
  }

  .content-loading.is-hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  .content-loading__box {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    text-align: center;
  }

  .content-loading__spinner {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    position: relative;
    background: conic-gradient(
      from 0deg,
      var(--brand-green) 0deg 180deg,
      var(--brand-blue) 180deg 360deg
    );
    animation: contentLoadingSpin 0.9s linear infinite;
    box-shadow: var(--shadow-md);
  }

  .content-loading__spinner::after {
    content: '';
    position: absolute;
    inset: 10px;
    border-radius: 50%;
    background: var(--surface);
  }

  .content-loading__text {
    font-size: var(--font-size-lg);
    font-weight: var(--font-weight-bold);
    color: var(--text);
    letter-spacing: 0.02em;
  }

  @keyframes contentLoadingSpin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .view { display: none; }
  .view.active { display: block; }

  .section-head {
    display: flex;
    justify-content: space-between;
    align-items: start;
    margin: 4px 0 18px;
    gap: 16px;
  }

  .section-head--stacked {
    align-items: flex-start;
  }

  .section-head h2 {
    margin: 0;
    color: var(--brand-blue);
  }

  .section-head h3 {
    margin: 0;
    color: var(--brand-blue);
  }

  .section-head__meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .muted {
    color: var(--text-muted);
  }

  .tile-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
    gap: 14px;
  }

  .tile {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    box-shadow: var(--shadow-md);
    padding: 18px;
    cursor: pointer;
    text-align: left;
  }

  .tile h3 {
    margin: 10px 0 8px;
  }

  .tile p {
    margin: 0;
    color: var(--text-muted);
    font-size: var(--font-size-md);
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    padding: var(--space-7);
    box-shadow: var(--shadow-md);
  }

  .search-panel {
    display: flex;
    gap: 16px;
    align-items: end;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 4px;
    min-width: 0;
  }

  .field--grow {
    flex: 1;
  }

  .field--auto {
    width: 180px;
  }

  .field--half {
    width: calc(50% - 8px);
    display: inline-flex;
  }

  .field--third {
    width: calc(33.33% - 8px);
    display: inline-flex;
  }

  .field--full {
    width: 100%;
  }

  label {
    font-size: var(--font-size-md);
    font-weight: var(--font-weight-semibold);
    color: var(--text);
  }

  input,
  select,
  textarea {
    width: 100%;
    padding: 11px var(--space-4);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    font: inherit;
    color: var(--text);
    background: var(--surface);
  }

  textarea {
    resize: vertical;
  }

  input:focus,
  select:focus,
  textarea:focus {
    outline: 2px solid rgba(61, 150, 180, .18);
    border-color: var(--brand-blue);
  }

  .primary-btn,
  .secondary-btn,
  .danger-btn,
  .admin-reset-btn {
    display: inline-flex;
    align-items: center;
    gap: var(--space-2);
    border-radius: var(--radius-lg);
    padding: var(--space-4) var(--space-6);
    font-weight: var(--font-weight-bold);
    cursor: pointer;
    border: 1px solid transparent;
  }

  .primary-btn {
    background: var(--brand-green);
    color: var(--surface);
  }

  .primary-btn .material-symbols-outlined {
    color: var(--surface);
  }

  .secondary-btn {
    background: var(--surface);
    border-color: var(--border);
    color: var(--brand-blue);
  }

  .danger-btn,
  .admin-reset-btn {
    background: #fff5f5;
    border-color: #fecaca;
    color: #b42318;
  }

  .admin-reset-btn {
    display: none;
    padding: var(--space-3) var(--space-5);
  }

  .admin-reset-btn.is-visible {
    display: inline-flex;
  }

  .actions {
    display: flex;
    gap: var(--space-3);
    flex-wrap: wrap;
    margin-top: 8px;
  }

  .form-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 0 var(--space-6);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    padding: var(--space-7);
    box-shadow: var(--shadow-md);
  }

  .form-grid--dense {
    background: transparent;
    border: 0;
    border-radius: 0;
    padding: 0;
    box-shadow: none;
    gap: 0 var(--space-6);
  }

  .form-grid .field[data-span="2"] {
    grid-column: 1 / -1;
  }

  .table-wrap {
    overflow: auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    box-shadow: var(--shadow-md);
    margin-top: 10px;
  }

  .data-table {
    width: 100%;
    border-collapse: collapse;
  }

  .data-table th,
  .data-table td {
    padding: var(--space-4) var(--space-5);
    border-bottom: 1px solid var(--border);
    font-size: var(--font-size-base);
    text-align: left;
    vertical-align: top;
  }

  .data-table thead th {
    color: var(--brand-blue);
    background: var(--surface-soft);
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 10px;
    border-radius: var(--radius-pill);
    background: var(--brand-blue-soft);
    color: var(--brand-blue-dark);
    font-size: var(--font-size-sm);
    font-weight: var(--font-weight-bold);
  }

  .ficha-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: var(--space-6);
  }

  .ficha-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    padding: var(--space-7);
    box-shadow: var(--shadow-md);
  }

  .ficha-block h3 {
    margin: 0 0 12px;
    color: var(--brand-blue);
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .kv {
    display: grid;
    grid-template-columns: 170px 1fr;
    gap: var(--space-2);
    font-size: var(--font-size-base);
    margin-bottom: 8px;
  }

  .kv strong {
    color: var(--text);
  }

  .empty-state {
    padding: 20px;
    text-align: center;
    color: var(--text-muted);
  }

  .is-admin {
    display: none;
  }

  .show-admin {
    display: inline-flex !important;
  }

  .message {
    padding: 10px 12px;
    border-radius: var(--radius-md);
    margin-bottom: 14px;
    font-size: var(--font-size-base);
  }

  .message.success {
    background: var(--success-soft);
    color: var(--success-dark);
  }

  .message.error {
    background: var(--danger-soft);
    color: var(--danger);
  }

  /* Nuevo ingreso */
  .ingreso-layout {
    display: grid;
    grid-template-columns: minmax(0, 1.6fr) minmax(320px, .9fr);
    gap: 16px;
    align-items: start;
  }

  .ingreso-form {
    display: grid;
    gap: 16px;
  }

  .module-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    padding: var(--space-7);
    box-shadow: var(--shadow-md);
  }

  .module-card__head {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: flex-start;
    margin-bottom: 14px;
  }

  .module-card__head h3 {
    margin: 0;
    color: var(--brand-blue);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .module-card__head p {
    margin: 0;
  }

  .module-card--actions {
    padding-bottom: 10px;
  }

  .form-actions-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .ingreso-side {
    display: grid;
    gap: 16px;
  }

  .sticky-card {
    position: sticky;
    top: 16px;
  }

  .sticky-card + .sticky-card {
    position: static;
  }

  .ingreso-preview {
    display: grid;
    gap: 10px;
  }

  .preview-block {
    display: grid;
    gap: 8px;
  }

  .preview-block__title {
    text-align: center;
    font-size: var(--font-size-sm);
    font-weight: var(--font-weight-bold);
    color: var(--brand-green);
    text-transform: uppercase;
    letter-spacing: .06em;
  }

  .preview-grid {
    text-align: left;
    display: grid;
    gap: 8px;
  }

  .preview-item {
    display: grid;
    grid-template-columns: 120px 1fr;
    gap: 8px;
    font-size: var(--font-size-base);
  }

  .preview-item strong {
    color: var(--text);
  }

  .matches-list {
    display: grid;
    gap: 10px;
  }

  .match-card {
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 12px;
    background: var(--surface-soft);
  }

  .match-card h4 {
    margin: 0 0 6px;
    color: var(--brand-blue);
    font-size: var(--font-size-base);
  }

  .match-card p {
    margin: 0;
    font-size: var(--font-size-md);
    color: var(--text-muted);
  }

  .tips-list {
    margin: 0;
    padding-left: 18px;
    display: grid;
    gap: 10px;
    color: var(--text-muted);
    font-size: var(--font-size-base);
  }

  .field-help {
    font-size: var(--font-size-sm);
    color: var(--text-muted);
    margin-top: -2px;
  }

  .app-loading {
    position: fixed;
    inset: 0;
    z-index: 99999;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255, 255, 255, 0.96);
    opacity: 1;
    visibility: visible;
    transition: opacity 0.28s ease, visibility 0.28s ease;
  }

  .app-loading.is-hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  .app-loading__box {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    text-align: center;
  }

  .access-denied {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: var(--space-10);
    background: linear-gradient(180deg, var(--surface) 0%, var(--bg) 100%);
  }

  .access-denied__card {
    max-width: 560px;
    padding: var(--space-10);
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    background: var(--surface);
    box-shadow: var(--shadow-lg);
    text-align: center;
  }

  .access-denied__card .material-symbols-outlined {
    color: var(--danger);
    font-size: 44px;
  }

  .module-check-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
    gap: var(--space-3);
  }

  .module-check {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    padding: var(--space-3);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    background: var(--surface-soft);
    font-weight: var(--font-weight-semibold);
  }

  .app-loading__spinner {
    width: 84px;
    height: 84px;
    border-radius: 50%;
    position: relative;
    background: conic-gradient(
      from 0deg,
      var(--brand-green) 0deg 180deg,
      var(--brand-blue) 180deg 360deg
    );
    animation: appLoadingSpin 0.9s linear infinite;
    box-shadow: var(--shadow-md);
  }

  .app-loading__spinner::after {
    content: '';
    position: absolute;
    inset: 11px;
    border-radius: 50%;
    background: var(--surface);
  }

  .app-loading__text {
    font-size: var(--font-size-lg);
    font-weight: var(--font-weight-bold);
    color: var(--text);
    letter-spacing: 0.02em;
  }

  .admin-reset-modal {
    position: fixed;
    inset: 0;
    z-index: 1300;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .admin-reset-modal.is-hidden {
    display: none;
  }

  .admin-reset-modal__backdrop {
    position: absolute;
    inset: 0;
    background: rgba(17, 24, 39, 0.48);
  }

  .admin-reset-modal__dialog {
    position: relative;
    z-index: 2;
    width: min(560px, calc(100vw - 32px));
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    box-shadow: var(--shadow-lg);
    padding: var(--space-7);
  }

  .admin-reset-modal__head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: var(--space-4);
    margin-bottom: var(--space-5);
  }

  .admin-reset-modal__head h3 {
    margin: 0;
    color: var(--brand-blue);
  }

  .user-modal {
    position: fixed;
    inset: 0;
    z-index: 1300;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .user-modal.is-hidden {
    display: none;
  }

  .user-modal__backdrop {
    position: absolute;
    inset: 0;
    background: rgba(17, 24, 39, 0.48);
  }

  .user-modal__dialog {
    position: relative;
    z-index: 2;
    width: min(720px, calc(100vw - 32px));
    max-height: calc(100vh - 48px);
    overflow: auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    box-shadow: var(--shadow-lg);
    padding: var(--space-7);
  }

  .user-modal__dialog--sm {
    width: min(520px, calc(100vw - 32px));
  }

  .user-modal__head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: var(--space-4);
    margin-bottom: var(--space-5);
  }

  .user-modal__head h3 {
    margin: 0;
    color: var(--brand-blue);
  }

  .user-delete-warning {
    border: 1px solid #fecaca;
    border-radius: var(--radius-lg);
    background: #fff5f5;
    color: #7a271a;
    padding: var(--space-4);
    margin-bottom: var(--space-5);
    font-size: var(--font-size-base);
    line-height: var(--line-normal);
  }

  .admin-reset-warning {
    border: 1px solid #fecaca;
    border-radius: var(--radius-lg);
    background: #fff5f5;
    color: #7a271a;
    padding: var(--space-4);
    margin-bottom: var(--space-5);
    font-size: var(--font-size-base);
    line-height: var(--line-normal);
  }

  @keyframes appLoadingSpin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .ficha-layout-v2 {
    display: flex;
    flex-direction: column;
    gap: 22px;
  }

  .ficha-universe {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .ficha-universe__head {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .ficha-universe__head h3 {
    margin: 0;
    font-size: var(--font-size-2xl);
    font-weight: var(--font-weight-extrabold);
    color: var(--brand-blue);
  }

  .ficha-grid {
    display: grid;
    gap: 16px;
  }

  .ficha-grid--main {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .ficha-grid--org {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .ficha-block {
    border: 1.5px solid var(--border-strong);
    border-radius: var(--radius-2xl);
    background: var(--surface);
    padding: 18px 18px 14px;
    box-shadow: var(--shadow-sm);
  }

  .ficha-block h3 {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 0 0 14px 0;
    font-size: var(--font-size-lg);
    font-weight: var(--font-weight-extrabold);
    color: var(--brand-blue);
  }

  .ficha-block .material-symbols-outlined {
    font-size: var(--font-size-xl);
  }

  .kv {
    display: grid;
    grid-template-columns: 150px 1fr;
    gap: 10px;
    padding: 3px 0;
  }

  .kv strong {
    color: var(--text);
    font-weight: var(--font-weight-bold);
  }

  .kv span {
    color: var(--text);
  }

  .field--image-upload .image-upload {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .image-upload__preview {
    min-height: 180px;
    border: 1px dashed var(--border);
    border-radius: var(--radius-xl);
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    padding: 12px;
  }

  .image-upload__img {
    max-width: 100%;
    max-height: 260px;
    object-fit: contain;
    display: block;
  }

  .image-upload__actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .form-grid--organizacion {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 260px;
    gap: 16px;
    align-items: start;
  }

  .form-grid--organizacion .field[data-span="2"] {
    grid-column: 1 / -1;
  }

  .form-grid--organizacion .field--org-selector {
    grid-column: 1 / 2;
  }

  .form-grid--organizacion .field--org-image {
    grid-column: 2 / 3;
    grid-row: 1 / span 3;
    align-self: start;
  }

  .field--image-top .image-upload--top {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .image-upload__preview--top {
    min-height: 180px;
    border: 1px dashed var(--border);
    border-radius: var(--radius-xl);
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    padding: 10px;
  }

  .image-upload__actions--stack {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .image-upload__preview--top img,
  .image-upload__img {
    max-width: 100%;
    max-height: 220px;
    object-fit: contain;
    display: block;
  }

  @media (max-width: 1280px) {
    .ingreso-layout {
      grid-template-columns: 1fr;
    }

    .sticky-card {
      position: static;
    }
  }

  @media (max-width: 1100px) {
    .layout {
      grid-template-columns: 1fr;
    }

    .layout.is-sidebar-collapsed {
      grid-template-columns: 1fr;
    }

    .sidebar {
      order: 2;
    }

    .layout.is-sidebar-collapsed .sidebar {
      padding: var(--space-6);
    }

    .layout.is-sidebar-collapsed .nav-btn,
    .layout.is-sidebar-collapsed .sidebar-toggle {
      justify-content: flex-start;
      padding: var(--space-4) var(--space-5);
      gap: var(--space-3);
    }

    .layout.is-sidebar-collapsed .nav-label,
    .layout.is-sidebar-collapsed .sidebar-toggle__label {
      width: auto;
      opacity: 1;
    }

    .form-grid {
      grid-template-columns: 1fr;
    }

    .field--half,
    .field--third {
      width: 100%;
    }

    .ficha-grid {
      grid-template-columns: 1fr;
    }

    .toolbar,
    .hero {
      flex-direction: column;
      align-items: flex-start;
    }
  }

  @media (max-width: 980px) {
    .ficha-grid--main,
    .ficha-grid--org,
    .form-grid--organizacion,
    .avance-header,
    .avance-topbar {
      grid-template-columns: 1fr;
    }

    .form-grid--organizacion .field--org-image {
      grid-column: 1 / -1;
      grid-row: auto;
    }

    .kv {
      grid-template-columns: 1fr;
      gap: 2px;
    }
  }

  @media (max-width: 900px) {
    .app-header {
      flex-direction: column;
      align-items: stretch;
    }

    .app-header__left {
      align-items: center;
    }

    .brand-mark {
      width: 78px;
      height: 78px;
    }

    .brand-copy__title {
      font-size: var(--icon-md);
    }

    .app-header__right {
      justify-content: flex-end;
    }
  }

  /* Avance como barras de progreso */
  .avance-shell {
    display: flex;
    flex-direction: column;
    gap: var(--space-7);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    padding: var(--space-7);
    box-shadow: var(--shadow-md);
  }

  .avance-header {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: var(--space-6);
    align-items: end;
  }

  .avance-section {
    display: flex;
    flex-direction: column;
    gap: var(--space-4);
  }

  .avance-hitos-grid,
  #avance-pre-grid,
  #avance-for-grid {
    display: grid;
    grid-template-columns: repeat(8, minmax(0, 1fr));
    gap: var(--space-4);
    align-items: stretch;
    align-content: start;
    grid-auto-rows: 1fr;
  }

  .avance-hito-card {
    width: auto;
    min-height: 160px;
    aspect-ratio: 1 / 1;
    border: 1.5px solid var(--border-strong);
    border-radius: var(--radius-xl);
    background: var(--surface);
    padding: var(--space-5) var(--space-4);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    text-align: center;
    cursor: pointer;
    transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
    box-shadow: var(--shadow-sm);
    min-width: 0;
    max-width: none;
    grid-column: auto;
    justify-self: stretch;
    align-self: stretch;
    appearance: none;
  }

  .avance-hitos-grid > *,
  #avance-pre-grid > *,
  #avance-for-grid > * {
    display: flex;
    width: auto;
    grid-column: auto;
    min-width: 0;
    max-width: none;
    justify-self: stretch;
    align-self: stretch;
  }

  .avance-hito-card:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
  }

  .avance-hito-card:disabled {
    cursor: not-allowed;
  }

  .avance-hito-card__icon {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .avance-hito-card__icon .material-symbols-outlined {
    font-size: var(--icon-lg);
    line-height: 1;
  }

  .avance-hito-card__body {
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: center;
    width: 100%;
    min-width: 0;
  }

  .avance-hito-card__title {
    font-size: var(--font-size-md);
    font-weight: var(--font-weight-bold);
    line-height: 1.25;
    color: var(--text);
    max-width: 16ch;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .avance-hito-card__status {
    font-size: var(--font-size-sm);
    font-weight: var(--font-weight-bold);
    line-height: 1.2;
    color: var(--text-muted);
  }

  .avance-hito-card__detail {
    font-size: var(--font-size-xs);
    line-height: 1.2;
    color: var(--text-muted);
    min-height: 26px;
    max-width: 16ch;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .avance-hito-card.is-completed {
    border-color: var(--brand-green);
    background: var(--brand-green-soft);
  }

  .avance-hito-card.is-completed .avance-hito-card__icon .material-symbols-outlined {
    color: var(--brand-green);
  }

  .avance-hito-card.is-completed .avance-hito-card__status {
    color: var(--success-dark);
  }

  .avance-hito-card.is-enabled {
    border-color: var(--brand-blue);
    background: var(--surface);
  }

  .avance-hito-card.is-enabled .avance-hito-card__icon .material-symbols-outlined {
    color: var(--brand-blue);
  }

  .avance-hito-card.is-enabled .avance-hito-card__status {
    color: var(--brand-blue);
  }

  .avance-hito-card.is-blocked {
    border-color: var(--border);
    background: var(--disabled-soft);
  }

  .avance-hito-card.is-blocked .avance-hito-card__icon .material-symbols-outlined {
    color: var(--disabled);
  }

  .avance-hito-card.is-blocked .avance-hito-card__status {
    color: var(--text-muted);
  }

  .avance-timeline {
    display: flex;
    flex-direction: column;
    gap: var(--space-4);
  }

  .avance-resumen {
    display: block;
  }

  .avance-resumen-layout {
    display: grid;
    grid-template-columns: minmax(260px, 0.32fr) minmax(0, 1fr);
    gap: var(--space-5);
    align-items: stretch;
  }

  .avance-resumen-card,
  .avance-resumen-progress {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-sm);
  }

  .avance-resumen-card {
    padding: var(--space-5);
    min-width: 0;
  }

  .avance-resumen-card__title,
  .avance-resumen-progress__title {
    color: var(--brand-green);
    font-size: var(--font-size-sm);
    font-weight: var(--font-weight-bold);
    letter-spacing: .06em;
    text-transform: uppercase;
  }

  .avance-resumen-card__title {
    margin-bottom: var(--space-4);
  }

  .avance-resumen-card__grid {
    display: grid;
    gap: var(--space-3);
  }

  .avance-resumen-card__item {
    display: grid;
    grid-template-columns: 112px minmax(0, 1fr);
    gap: var(--space-3);
    align-items: start;
    font-size: var(--font-size-sm);
    line-height: var(--line-height-tight);
  }

  .avance-resumen-card__item strong {
    color: var(--text);
    font-weight: var(--font-weight-bold);
  }

  .avance-resumen-card__item span {
    color: var(--text-secondary);
    overflow-wrap: anywhere;
  }

  .avance-resumen-progress {
    min-width: 0;
    padding: var(--space-5) var(--space-6);
  }

  .avance-resumen-progress__title {
    text-align: center;
    margin-bottom: var(--space-4);
  }

  /* Modal de hito */
  .avance-modal {
    position: fixed;
    inset: 0;
    z-index: 1200;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .avance-modal.is-hidden {
    display: none;
  }

  .avance-modal__backdrop {
    position: absolute;
    inset: 0;
    background: rgba(17, 24, 39, 0.4);
  }

  .avance-modal__dialog {
    position: relative;
    z-index: 2;
    width: min(560px, calc(100vw - 32px));
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    box-shadow: var(--shadow-lg);
    padding: 20px;
  }

  .avance-modal__head {
    display: flex;
    justify-content: space-between;
    align-items: start;
    gap: 12px;
    margin-bottom: 14px;
  }

  .avance-modal__head h3 {
    margin: 0;
    color: var(--brand-blue);
  }

  #avance-modal-org-nombre-field.is-hidden {
    display: none;
  }

  .avance-org-name-input {
    display: grid;
    grid-template-columns: auto minmax(0, 1fr);
    align-items: center;
    gap: var(--space-2);
  }

  .avance-org-name-prefix {
    min-height: 40px;
    display: inline-flex;
    align-items: center;
    padding: 0 var(--space-3);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    background: var(--surface-alt);
    color: var(--text-strong);
    font-size: var(--font-size-sm);
    font-weight: var(--font-weight-bold);
    white-space: nowrap;
  }

  .avance-modal-error {
    margin: var(--space-2) 0 0;
    color: var(--danger);
    font-size: var(--font-size-sm);
    font-weight: var(--font-weight-semibold);
  }

  .avance-modal-error.is-hidden {
    display: none;
  }

  @media (max-width: 1600px) {
    .avance-hitos-grid,
    #avance-pre-grid,
    #avance-for-grid {
      grid-template-columns: repeat(6, minmax(0, 1fr));
    }
  }

  @media (max-width: 1280px) {
    .avance-header {
      grid-template-columns: 1fr;
    }

    .avance-resumen-layout {
      grid-template-columns: minmax(240px, 0.36fr) minmax(0, 1fr);
    }

    .avance-hitos-grid,
    #avance-pre-grid,
    #avance-for-grid {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }
  }

  @media (max-width: 900px) {
    .avance-resumen-layout {
      grid-template-columns: 1fr;
    }

    .avance-hitos-grid,
    #avance-pre-grid,
    #avance-for-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }

  @media (max-width: 640px) {
    .avance-resumen-card,
    .avance-resumen-progress {
      padding: var(--space-4);
    }

    .avance-resumen-card__item {
      grid-template-columns: 1fr;
      gap: 2px;
    }

    .avance-hitos-grid,
    #avance-pre-grid,
    #avance-for-grid {
      grid-template-columns: 1fr;
    }

    .avance-hito-card {
      aspect-ratio: auto;
      min-height: 144px;
    }

    .avance-org-name-input {
      grid-template-columns: 1fr;
    }
  }

  .avance-resumen-bars {
    display: grid;
    gap: var(--space-4);
  }

  .avance-resumen-bar {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    padding: var(--space-4) var(--space-5);
  }

  .avance-resumen-bar__head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: var(--space-4);
    margin-bottom: 8px;
  }

  .avance-resumen-bar__label {
    font-weight: var(--font-weight-bold);
    color: var(--text);
  }

  .avance-resumen-bar__meta {
    font-size: var(--font-size-sm);
    color: var(--text-muted);
  }

  .avance-resumen-bar__row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: var(--space-4);
    align-items: center;
  }

  .avance-resumen-bar__track {
    position: relative;
    width: 100%;
    height: 12px;
    border-radius: var(--radius-pill);
    background: var(--surface-alt);
    overflow: hidden;
  }

  .avance-resumen-bar__fill {
