<script>
window.GO_PES_CALENDARIO = (function() {

  var _currentFilter = 'todos';

  function render(root, data, esc, onAction, onRefresh) {
    if (!root) return;
    if (data === null || data === undefined) {
      root.innerHTML =
        '<section class="inicio-card inicio-cal-card">' +
          '<div class="inicio-card__head">' +
            '<span class="material-symbols-outlined">calendar_month</span>' +
            '<div><h3>Calendario de reuniones</h3><p>Cargando eventos...</p></div>' +
          '</div>' +
          '<div class="inicio-cal-loading"><span class="material-symbols-outlined dash-spin">refresh</span></div>' +
        '</section>';
      return;
    }

    var allEventos = Array.isArray(data.eventos) ? data.eventos : [];

    // Mostrar mensaje de error o nota si existe
    if (data.error || data.nota) {
      root.innerHTML = buildErrorCard_(data.error || data.nota, esc);
      return;
    }

    var eventos = allEventos.filter(function(ev) {
      if (_currentFilter === 'todos') return true;
      if (_currentFilter === 'asambleas') return ev.tipo === 'ministro';
      if (_currentFilter === 'visitas') return ev.tipo === 'reunion';
      return true;
    });

    root.innerHTML = buildCard_(eventos, data.fetchedAt || '', esc);

    if (!root.dataset.calActionsWired) {
      root.dataset.calActionsWired = '1';
      if (typeof onAction === 'function') {
        root.addEventListener('click', function(e) {
          var btn = e.target.closest('.inicio-cal-action');
          if (!btn) return;
          onAction(btn.dataset.calId);
        });
      }
      if (typeof onRefresh === 'function') {
        root.addEventListener('click', function(e) {
          if (e.target.closest('.inicio-cal-refresh-btn')) onRefresh();
        });
      }
      root.addEventListener('change', function(e) {
        if (e.target.id === 'inicio-cal-filter') {
          _currentFilter = e.target.value;
          render(root, data, esc, onAction, onRefresh);
        }
      });
      // Handler para botón de lupa (detalles)
      root.addEventListener('click', function(e) {
        var detailsBtn = e.target.closest('.inicio-cal-details-btn');
        if (!detailsBtn) return;
        var eventId = detailsBtn.dataset.calDetails;
        var evento = allEventos.find(function(ev) { return ev.id === eventId; });
        if (evento) openDetailsModal_(evento, esc);
      });
    }

    // Restaurar valor del filtro
    var filterSelect = root.querySelector('#inicio-cal-filter');
    if (filterSelect) filterSelect.value = _currentFilter;
  }

  function buildCard_(eventos, fetchedAt, esc) {
    var body = eventos.length === 0
      ? '<div class="inicio-cal-empty">' +
          '<span class="material-symbols-outlined">event_busy</span>' +
          '<p>Sin reuniones próximas en los próximos 60 días</p>' +
        '</div>'
      : '<ul class="inicio-cal-list">' +
          eventos.map(function(ev) { return buildItem_(ev, esc); }).join('') +
        '</ul>';

    return '<section class="inicio-card inicio-cal-card">' +
      '<div class="inicio-card__head" style="display:flex;align-items:center;justify-content:space-between;gap:1rem;">' +
        '<div style="display:flex;align-items:center;gap:1rem;">' +
          '<span class="material-symbols-outlined">calendar_month</span>' +
          '<div><h3>Calendario de reuniones</h3>' +
          '<p>Visitas y Asambleas</p></div>' +
        '</div>' +
        '<div style="display:flex;gap:0.5rem;align-items:stretch;">' +
          '<select id="inicio-cal-filter" class="inicio-cal-filter" style="padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface);font-size:0.8rem;height:32px;">' +
            '<option value="todos">Todos</option>' +
            '<option value="visitas">Visitas</option>' +
            '<option value="asambleas">Asambleas</option>' +
          '</select>' +
          '<button class="inicio-cal-refresh-btn secondary-btn" type="button" title="Actualizar calendario" style="padding:6px 12px;height:42px;min-height:42px;">' +
            '<span class="material-symbols-outlined">refresh</span>' +
          '</button>' +
        '</div>' +
      '</div>' +
      body +
      (fetchedAt
        ? '<p class="inicio-cal-footer">' +
            '<span class="material-symbols-outlined">update</span>' +
            esc(fetchedAt) +
          '</p>'
        : '') +
      buildDialog_(esc) +
    '</section>';
  }

  function buildItem_(ev, esc) {
    var esReunion = ev.tipo === 'reunion';
    var partesFecha = ev.fechaLabel.split(' de ');
    var numDia = partesFecha[0] || '';
    var mesDia = partesFecha[1] || '';
    var hora   = ev.allDay ? 'Todo el dia'
               : ev.horaInicio + (ev.horaFin ? ' - ' + ev.horaFin : '');

    var dayMod = esReunion ? 'inicio-cal-badge--reunion' : 'inicio-cal-badge--ministro';
    var yaRegistrado = esReunion && ev.registrado;

    // Badge de estado (solo para Reuniones CS)
    var estadoBadge = '';
    if (esReunion) {
      estadoBadge = ev.yaIngresado
        ? '<span class="cal-status-badge cal-status-badge--ingresada" title="Reunión ingresada en el sistema">' +
            '<span class="material-symbols-outlined">check_circle</span> Ingresada' +
          '</span>'
        : '<span class="cal-status-badge cal-status-badge--pendiente" title="Reunión pendiente de ingresar">' +
            '<span class="material-symbols-outlined">schedule</span> Pendiente' +
          '</span>';
    }

    // Botón de lupa (solo para Reuniones CS)
    var lupaBtn = esReunion
      ? '<button class="inicio-cal-details-btn" data-cal-details="' + esc(ev.id) + '" type="button" ' +
          'title="Ver detalles comparativos">' +
          '<span class="material-symbols-outlined">search</span>' +
        '</button>'
      : '';

    var actionBtn = !esReunion
      ? '<button class="inicio-cal-action inicio-cal-action--pending" type="button" disabled ' +
          'title="Para programar este evento, primero se deben completar los hitos previos en la app">' +
          '<span class="material-symbols-outlined">how_to_reg</span>' +
        '</button>'
      : yaRegistrado
      ? '<button class="inicio-cal-action inicio-cal-action--registered" data-cal-id="' + esc(ev.id) + '" type="button" ' +
          'title="Asistencia registrada - click para continuar con el ingreso">' +
          '<span class="material-symbols-outlined">how_to_reg</span>' +
        '</button>'
      : '<button class="inicio-cal-action" data-cal-id="' + esc(ev.id) + '" type="button" ' +
          'title="Registrar asistencia y crear nuevo ingreso">' +
          '<span class="material-symbols-outlined">person_add</span>' +
        '</button>';

    return '<li class="inicio-cal-item">' +
      '<div class="inicio-cal-day ' + dayMod + '">' +
        '<span class="inicio-cal-diasem">' + esc(ev.diaSemana) + '</span>' +
        '<span class="inicio-cal-num">' + esc(numDia) + '</span>' +
        '<span class="inicio-cal-mes">' + esc(mesDia) + '</span>' +
      '</div>' +
      '<div class="inicio-cal-body">' +
        '<div class="inicio-cal-titulo-row">' +
          '<p class="inicio-cal-titulo">' + esc(ev.titulo) + '</p>' +
          estadoBadge +
        '</div>' +
        '<div class="inicio-cal-meta-row">' +
          '<p class="inicio-cal-meta">' +
            (hora ? '<span class="inicio-cal-hora">' + esc(hora) + '</span>' : '') +
            (ev.lugar ? '<span class="inicio-cal-lugar">' + esc(ev.lugar) + '</span>' : '') +
          '</p>' +
          '<div style="display:flex;gap:0.5rem;">' +
            lupaBtn +
            actionBtn +
          '</div>' +
        '</div>' +
      '</div>' +
    '</li>';
  }

  function buildDialog_(esc) {
    return '<div id="inicio-cal-dialog" class="inicio-cal-dialog is-hidden" role="dialog" aria-modal="true">' +
      '<div class="inicio-cal-dialog__box">' +
        '<p id="cal-dialog-titulo" class="inicio-cal-dialog__titulo"></p>' +
        '<div id="cal-coincidencias" class="cal-coincidencias is-hidden">' +
          '<p class="cal-coincidencias__label">' +
            '<span class="material-symbols-outlined">manage_search</span>' +
            'Coincidencias en el sistema' +
          '</p>' +
          '<div id="cal-coincidencias-content" class="cal-coincidencias__content"></div>' +
        '</div>' +
        '<div id="cal-step-1">' +
          '<p class="inicio-cal-dialog__q">¿Se realizó esta reunión?</p>' +
          '<div class="inicio-cal-dialog__btns">' +
            '<button id="cal-btn-si"  class="btn primary-btn   btn--sm">Sí, se realizó</button>' +
            '<button id="cal-btn-no"  class="btn secondary-btn btn--sm">No se realizó</button>' +
            '<button id="cal-btn-cancel-1" class="inicio-cal-dialog__cancel">Cancelar</button>' +
          '</div>' +
        '</div>' +
        '<div id="cal-step-2" class="is-hidden">' +
          '<p class="inicio-cal-dialog__q">¿Cuántas personas asistieron?</p>' +
          '<input id="cal-asistentes" type="number" min="0" class="inicio-cal-dialog__input" placeholder="Ej: 15" autocomplete="off">' +
          '<div class="inicio-cal-dialog__btns">' +
            '<button id="cal-btn-continuar" class="btn primary-btn btn--sm">Continuar</button>' +
            '<button id="cal-btn-cancel-2"  class="inicio-cal-dialog__cancel">Cancelar</button>' +
          '</div>' +
        '</div>' +
        '<div id="cal-step-loading" class="is-hidden">' +
          '<span class="material-symbols-outlined dash-spin">refresh</span>' +
          '<span>Registrando...</span>' +
        '</div>' +
      '</div>' +
    '</div>';
  }

  function openDetailsModal_(evento, esc) {
    var modal = document.getElementById('cal-details-modal');
    if (!modal) {
      var modalHtml = '<div id="cal-details-modal" class="modal" role="dialog" aria-modal="true">' +
        '<div class="modal__backdrop"></div>' +
        '<div class="cal-details-modal__dialog">' +
          '<div class="cal-details-modal__header">' +
            '<h3>Detalles comparativos</h3>' +
            '<button class="modal__close" type="button" aria-label="Cerrar">' +
              '<span class="material-symbols-outlined">close</span>' +
            '</button>' +
          '</div>' +
          '<div id="cal-details-modal-body" class="cal-details-modal__body"></div>' +
        '</div>' +
      '</div>';
      document.body.insertAdjacentHTML('beforeend', modalHtml);
      modal = document.getElementById('cal-details-modal');

      // Event listeners
      modal.querySelector('.modal__close').addEventListener('click', function() {
        closeDetailsModal_();
      });
      modal.querySelector('.modal__backdrop').addEventListener('click', function() {
        closeDetailsModal_();
      });
    }

    var body = modal.querySelector('#cal-details-modal-body');
    body.innerHTML = buildDetailsModalBody_(evento, esc);

    modal.classList.remove('is-hidden');
    modal.classList.add('is-opening');
    requestAnimationFrame(function() {
      modal.classList.remove('is-opening');
      modal.classList.add('is-open');
    });
  }

  function closeDetailsModal_() {
    var modal = document.getElementById('cal-details-modal');
    if (!modal) return;
    modal.classList.add('is-closing');
    modal.classList.remove('is-open');
    setTimeout(function() {
      modal.classList.add('is-hidden');
      modal.classList.remove('is-closing');
    }, 160);
  }

  function buildDetailsModalBody_(evento, esc) {
    var calSide = '<div class="cal-details-side">' +
      '<div class="cal-details-side__header">' +
        '<span class="material-symbols-outlined">event</span>' +
        '<h4>Evento de Calendario</h4>' +
      '</div>' +
      '<div class="cal-details-side__content">' +
        '<div class="cal-details-field">' +
          '<label>Título</label>' +
          '<p>' + esc(evento.titulo) + '</p>' +
        '</div>' +
        '<div class="cal-details-field">' +
          '<label>Fecha</label>' +
          '<p>' + esc(evento.fechaLabel) + '</p>' +
        '</div>' +
        '<div class="cal-details-field">' +
          '<label>Hora</label>' +
          '<p>' + (evento.allDay ? 'Todo el día' : esc(evento.horaInicio + (evento.horaFin ? ' - ' + evento.horaFin : ''))) + '</p>' +
        '</div>' +
        (evento.lugar
          ? '<div class="cal-details-field">' +
              '<label>Lugar</label>' +
              '<p>' + esc(evento.lugar) + '</p>' +
            '</div>'
          : '') +
        (evento.descripcion
          ? '<div class="cal-details-field">' +
              '<label>Descripción</label>' +
              '<p style="white-space:pre-wrap;">' + esc(evento.descripcion) + '</p>' +
            '</div>'
          : '') +
      '</div>' +
    '</div>';

    var appSide = '';
    if (evento.yaIngresado && evento.hitoInfo) {
      var hi = evento.hitoInfo;
      appSide = '<div class="cal-details-side cal-details-side--ingresada">' +
        '<div class="cal-details-side__header">' +
          '<span class="material-symbols-outlined">check_circle</span>' +
          '<h4>Ingresada en GO-PES</h4>' +
        '</div>' +
        '<div class="cal-details-side__content">' +
          '<div class="cal-details-field">' +
            '<label>Solicitud ID</label>' +
            '<p><a href="#" onclick="window.GO_PES_ROUTER && window.GO_PES_ROUTER.push(\'ficha\', {id:\'' + esc(hi.solicitud_id) + '\'}); return false;">' +
              esc(hi.solicitud_id) +
            '</a></p>' +
          '</div>' +
          (hi.organizacion_nombre
            ? '<div class="cal-details-field">' +
                '<label>Organización</label>' +
                '<p>' + esc(hi.organizacion_nombre) + '</p>' +
              '</div>'
            : '') +
          (hi.vecino_nombre
            ? '<div class="cal-details-field">' +
                '<label>Vecino</label>' +
                '<p>' + esc(hi.vecino_nombre) + '</p>' +
              '</div>'
            : '') +
          (hi.vecino_uv
            ? '<div class="cal-details-field">' +
                '<label>Unidad Vecinal</label>' +
                '<p>' + esc(hi.vecino_uv) + '</p>' +
              '</div>'
            : '') +
          (hi.vecino_direccion
            ? '<div class="cal-details-field">' +
                '<label>Dirección</label>' +
                '<p>' + esc(hi.vecino_direccion) + '</p>' +
              '</div>'
            : '') +
          '<div class="cal-details-field">' +
            '<label>Fecha registrada</label>' +
            '<p>' + esc(hi.fecha_hito) + '</p>' +
          '</div>' +
          (hi.responsable
            ? '<div class="cal-details-field">' +
                '<label>Responsable</label>' +
                '<p>' + esc(hi.responsable) + '</p>' +
              '</div>'
            : '') +
          (hi.observacion
            ? '<div class="cal-details-field">' +
                '<label>Observación</label>' +
                '<p style="white-space:pre-wrap;">' + esc(hi.observacion) + '</p>' +
              '</div>'
            : '') +
        '</div>' +
      '</div>';
    } else {
      appSide = '<div class="cal-details-side cal-details-side--pendiente">' +
        '<div class="cal-details-side__header">' +
          '<span class="material-symbols-outlined">schedule</span>' +
          '<h4>No ingresada</h4>' +
        '</div>' +
        '<div class="cal-details-side__content">' +
          '<p class="cal-details-empty">Esta reunión aún no ha sido ingresada en el sistema.</p>' +
          '<p class="cal-details-hint">Para registrarla, haz clic en el botón <strong>Registrar asistencia</strong> del calendario.</p>' +
        '</div>' +
      '</div>';
    }

    return '<div class="cal-details-grid">' + calSide + appSide + '</div>';
  }

  function buildErrorCard_(message, esc) {
    return '<section class="inicio-card inicio-cal-card">' +
      '<div class="inicio-card__head">' +
        '<span class="material-symbols-outlined">calendar_month</span>' +
        '<div><h3>Calendario de reuniones</h3><p>Error al cargar</p></div>' +
      '</div>' +
      '<div class="inicio-cal-empty">' +
        '<span class="material-symbols-outlined">warning</span>' +
        '<p>' + esc(String(message)) + '</p>' +
        '<p style="font-size:0.75rem;color:var(--text-muted,#666);margin-top:0.5rem;">Revisa los permisos de acceso al calendario o la consola del navegador para más detalles.</p>' +
      '</div>' +
    '</section>';
  }

  return { render: render };
})();
</script>
