<template id="content-loading-template">
  <div id="content-loading" class="content-loading is-hidden" aria-live="polite" aria-busy="false">
    <div class="content-loading__box loading-shell" role="status">
      <div class="content-loading__spinner loading-shell__visual" aria-hidden="true">
        <span class="loading-shell__halo"></span>
        <span class="loading-shell__ring"></span>
        <span class="loading-shell__ring loading-shell__ring--reverse"></span>
        <span class="loading-shell__pulse"></span>
        <span class="loading-shell__beam"></span>
        <span class="loading-shell__dot loading-shell__dot--one"></span>
        <span class="loading-shell__dot loading-shell__dot--two"></span>
        <span class="loading-shell__dot loading-shell__dot--three"></span>
      </div>
      <div class="content-loading__text">Iniciando Gestor Operativo</div>
      <div class="loading-shell__subtext">Actualizando la información del módulo.</div>
    </div>
  </div>
</template>

<script>
  /**
   * SISTEMA DE LOADING UNIFICADO
   *
   * Dos contextos, dos APIs:
   *
   * 1. showModuleLoading(message) / hideModuleLoading()
   *    Overlay que cubre SOLO el área de acción del módulo (#app .content).
   *    Nunca cubre la pantalla completa. Uso: cargas de datos y acciones
   *    disparadas desde el área del módulo.
   *
   * 2. showModalLoading(modalId, message) / hideModalLoading(modalId)
   *    Loader local (flecha circular + texto) montado DENTRO del diálogo
   *    del modal indicado. Uso: acciones disparadas con un modal abierto
   *    (guardar, actualizar) mientras el modal permanece visible.
   *
   * Los loaders locales estáticos de listas/tablas usan la clase
   * .module-loading (ícono refresh + texto) definida en Styles.html.
   */

  function getLoadingSystemConfig_() {
    const app = document.getElementById('app');
    if (!app) return {};
    try {
      const bootstrap = JSON.parse(app.dataset.bootstrap || '{}');
      return (bootstrap && bootstrap.systemConfig) || {};
    } catch (err) {
      return {};
    }
  }

  function getLoadingText_() {
    return (((getLoadingSystemConfig_() || {}).general || {}).loadingText) || 'Iniciando Gestor Operativo';
  }

  function getModuleLoadingHost_() {
    return document.querySelector('#app .content') || document.getElementById('app') || document.body;
  }

  function ensureModuleLoadingMounted_() {
    const host = getModuleLoadingHost_();
    if (!host) return null;

    const existing = document.getElementById('content-loading');
    if (existing) {
      if (existing.parentElement !== host) {
        host.insertBefore(existing, host.firstChild || null);
      }
      return existing;
    }

    const template = document.getElementById('content-loading-template');
    if (!template) return null;

    host.insertBefore(template.content.cloneNode(true), host.firstChild || null);
    const overlay = document.getElementById('content-loading');
    const text = overlay ? overlay.querySelector('.content-loading__text') : null;
    if (text) text.textContent = getLoadingText_();
    return overlay;
  }

  document.addEventListener('DOMContentLoaded', ensureModuleLoadingMounted_);

  function showModuleLoading(message) {
    const overlay = ensureModuleLoadingMounted_();
    if (!overlay) return;

    const text = overlay.querySelector('.content-loading__text');
    if (text) text.textContent = message || getLoadingText_();
    overlay.setAttribute('aria-busy', 'true');
    overlay.style.display = 'flex';

    // Forzar reflow antes de quitar is-hidden para que funcione la transición
    overlay.offsetHeight;
    overlay.classList.remove('is-hidden');
  }

  function hideModuleLoading() {
    const overlay = document.getElementById('content-loading');
    if (!overlay) return;
    overlay.setAttribute('aria-busy', 'false');

    // Agregar is-hidden (activa transición de opacity)
    overlay.classList.add('is-hidden');

    // Después de la transición, resetear display
    setTimeout(() => {
      if (overlay.classList.contains('is-hidden')) {
        overlay.style.display = 'none';
      }
    }, 250); // Sincronizado con --transition-base (220ms) + margen
  }

  /**
   * Obtiene (o crea bajo demanda) el overlay .modal-loading dentro del
   * diálogo del modal indicado. Reutiliza el overlay si el modal ya trae
   * uno declarado en su markup.
   */
  function getModalLoadingOverlay_(modalId, createIfMissing) {
    const modal = document.getElementById(modalId);
    if (!modal) return null;

    const dialog = modal.querySelector('[class*="__dialog"]') || modal;
    let overlay = dialog.querySelector('.modal-loading');
    if (!overlay && createIfMissing) {
      overlay = document.createElement('div');
      overlay.className = 'modal-loading is-hidden';
      overlay.setAttribute('role', 'status');
      overlay.setAttribute('aria-live', 'polite');

      const spinner = document.createElement('div');
      spinner.className = 'modal-loading__spinner';
      spinner.setAttribute('aria-hidden', 'true');

      const text = document.createElement('p');
      text.className = 'modal-loading__text';

      overlay.appendChild(spinner);
      overlay.appendChild(text);
      dialog.appendChild(overlay);
    }
    return overlay;
  }

  /**
   * Muestra el loader local DENTRO del modal indicado (cubre solo el modal).
   *
   * @param {string} modalId - id del modal contenedor (ej: 'org-edit-modal')
   * @param {string} message - Mensaje a mostrar junto al spinner
   */
  function showModalLoading(modalId, message) {
    // Compatibilidad: si el primer argumento no corresponde a un elemento
    // existente, se interpreta como mensaje y se usa el loader del módulo.
    if (typeof modalId === 'string' && !document.getElementById(modalId)) {
      showModuleLoading(modalId);
      return;
    }

    const overlay = getModalLoadingOverlay_(modalId, true);
    if (!overlay) return;

    const text = overlay.querySelector('.modal-loading__text');
    if (text) text.textContent = message || getLoadingText_();
    overlay.setAttribute('aria-busy', 'true');
    overlay.classList.remove('is-hidden');
  }

  /**
   * Oculta el loader del modal indicado. Sin argumentos, oculta el loader
   * del módulo (compatibilidad con la API anterior).
   */
  function hideModalLoading(modalId) {
    if (!modalId) {
      hideModuleLoading();
      return;
    }
    const overlay = getModalLoadingOverlay_(modalId, false);
    if (!overlay) return;
    overlay.setAttribute('aria-busy', 'false');
    overlay.classList.add('is-hidden');
  }

  // Alias de compatibilidad con la API anterior (contexto = módulo)
  const showContentLoading = showModuleLoading;
  const hideContentLoading = hideModuleLoading;

  // Exponer funciones globalmente para módulos cargados con includeModule_()
  window.showModuleLoading = showModuleLoading;
  window.hideModuleLoading = hideModuleLoading;
  window.showContentLoading = showContentLoading;
  window.hideContentLoading = hideContentLoading;
  window.showModalLoading = showModalLoading;
  window.hideModalLoading = hideModalLoading;
</script>
