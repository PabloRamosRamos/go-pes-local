<template id="content-loading-template">
  <div id="content-loading" class="content-loading is-hidden content-loading--content" aria-live="polite" aria-busy="false">
    <div class="content-loading__box loading-shell" role="status">
      <div class="content-loading__spinner loading-shell__visual" aria-hidden="true">
        <span class="loading-shell__halo"></span>
        <span class="loading-shell__ring"></span>
        <span class="loading-shell__ring loading-shell__ring--reverse"></span>
        <span class="loading-shell__pulse"></span>
        <span class="loading-shell__beam"></span>
        <span class="loading-shell__dot loading-shell__dot--one"></span>
        <span class="loading-shell__dot loading-shell__dot--two"></span>
        <span class="loading-shell__dot loading-shell__dot--three"></span>
      </div>
      <div class="content-loading__text">Iniciando Gestor Operativo</div>
      <div class="loading-shell__subtext">Actualizando la información del módulo.</div>
    </div>
  </div>
</template>

<script>
  const CONTENT_LOADING_MODAL_SELECTOR = [
    '.admin-reset-modal:not(.is-hidden)',
    '.user-modal:not(.is-hidden)',
    '.avance-modal:not(.is-hidden)',
    '.socios-modal:not(.is-hidden)',
    '.organizaciones-modal:not(.is-hidden)'
  ].join(', ');

  function getLoadingSystemConfig_() {
    const app = document.getElementById('app');
    if (!app) return {};
    try {
      const bootstrap = JSON.parse(app.dataset.bootstrap || '{}');
      return (bootstrap && bootstrap.systemConfig) || {};
    } catch (err) {
      return {};
    }
  }

  function getLoadingText_() {
    return (((getLoadingSystemConfig_() || {}).general || {}).loadingText) || 'Iniciando Gestor Operativo';
  }

  function getContentLoadingContentHost_() {
    return document.querySelector('#app .content');
  }

  function getContentLoadingGlobalHost_() {
    return document.getElementById('app') || document.body;
  }

  function hasOpenContentLoadingModal_() {
    return !!document.querySelector(CONTENT_LOADING_MODAL_SELECTOR);
  }

  function mountContentLoadingForContext_(overlay, forceModal) {
    if (!overlay) return null;

    const isModal = typeof forceModal === 'boolean' ? forceModal : hasOpenContentLoadingModal_();
    const host = isModal ? getContentLoadingGlobalHost_() : getContentLoadingContentHost_();
    if (!host) return overlay;

    if (overlay.parentElement !== host) {
      host.insertBefore(overlay, host.firstChild || null);
    }

    overlay.classList.toggle('content-loading--modal', isModal);
    overlay.classList.toggle('content-loading--content', !isModal);
    overlay.dataset.loadingContext = isModal ? 'modal' : 'content';
    return overlay;
  }

  function syncContentLoadingLayerState_(overlay) {
    const hasModalLoading = !!(
      overlay &&
      !overlay.classList.contains('is-hidden') &&
      overlay.classList.contains('content-loading--modal')
    );
    const shouldLock = hasModalLoading || hasOpenContentLoadingModal_();
    document.body.classList.toggle('app-has-modal', shouldLock);
    document.documentElement.classList.toggle('app-has-modal', shouldLock);
  }

  function ensureContentLoadingMounted_(forceModal) {
    const existing = document.getElementById('content-loading');
    if (existing) return mountContentLoadingForContext_(existing, forceModal);

    const template = document.getElementById('content-loading-template');
    const initialHost = getContentLoadingContentHost_() || getContentLoadingGlobalHost_();
    if (!template || !initialHost) return null;

    const fragment = template.content.cloneNode(true);
    initialHost.insertBefore(fragment, initialHost.firstChild || null);
    const overlay = mountContentLoadingForContext_(document.getElementById('content-loading'), forceModal);
    const text = overlay ? overlay.querySelector('.content-loading__text') : null;
    if (text) text.textContent = getLoadingText_();
    return overlay;
  }

  document.addEventListener('DOMContentLoaded', ensureContentLoadingMounted_);

  function showContentLoading(message) {
    const overlay = ensureContentLoadingMounted_(hasOpenContentLoadingModal_());
    const text = overlay ? overlay.querySelector('.content-loading__text') : null;
    if (!overlay) return;

    if (text) text.textContent = message || getLoadingText_();
    overlay.setAttribute('aria-busy', 'true');
    overlay.classList.remove('is-hidden');
    overlay.style.display = 'flex';
    syncContentLoadingLayerState_(overlay);
  }

  function hideContentLoading() {
    const overlay = document.getElementById('content-loading');
    if (!overlay) return;
    overlay.setAttribute('aria-busy', 'false');
    overlay.classList.remove('content-loading--modal');
    overlay.classList.add('content-loading--content');
    overlay.classList.add('is-hidden');
    overlay.style.display = 'none';
    mountContentLoadingForContext_(overlay, false);
    syncContentLoadingLayerState_(overlay);
  }

  /**
   * Muestra el loading global con contexto de MODAL forzado.
   * Uso: cuando el flujo dispara una acción desde un modal abierto
   * y necesita que el loader cubra toda la pantalla.
   *
   * @param {string} message - Mensaje a mostrar en el loader
   */
  function showModalLoading(message) {
    const overlay = ensureContentLoadingMounted_(true); // Forzar contexto modal
    const text = overlay ? overlay.querySelector('.content-loading__text') : null;
    if (!overlay) return;

    if (text) text.textContent = message || getLoadingText_();
    overlay.setAttribute('aria-busy', 'true');
    overlay.classList.remove('is-hidden');
    overlay.style.display = 'flex';
    syncContentLoadingLayerState_(overlay);
  }

  /**
   * Oculta el loading modal.
   * Alias de hideContentLoading() para simetría con showModalLoading().
   */
  function hideModalLoading() {
    hideContentLoading();
  }
</script>
