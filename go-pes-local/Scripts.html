  function normalizeModuleLookupKeyClient_(value) {
    return String(value == null ? '' : value)
      .trim()
      .toLowerCase()
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '')
      .replace(/[^a-z0-9]+/g, '_')
      .replace(/^_+|_+$/g, '');
  }

  function getClientModuleAliasMap_() {
    const aliasMap = Object.assign({}, (BOOTSTRAP && BOOTSTRAP.moduleAliasMap) || {});
    (BOOTSTRAP.moduleDefinitions || []).forEach(module => {
      const keyLookup = normalizeModuleLookupKeyClient_(module && module.key);
      const viewLookup = normalizeModuleLookupKeyClient_((module && (module.view || module.key)) || '');
      if (keyLookup) aliasMap[keyLookup] = module.key;
      if (viewLookup) aliasMap[viewLookup] = module.key;
    });
    return aliasMap;
  }

  const CLIENT_MODULE_ALIAS_MAP = getClientModuleAliasMap_();

  function normalizeModuleKey_(value) {
    const lookup = normalizeModuleLookupKeyClient_(value);
    if (!lookup) return '';
    return CLIENT_MODULE_ALIAS_MAP[lookup] || '';
  }

  const GLOBAL_MODAL_SELECTOR = [

    return !!document.querySelector(GLOBAL_MODAL_SELECTOR);

  function syncGlobalUiLayerState_() {
    const splash = document.getElementById('app-loading');
    const hasModal = hasOpenGlobalModal_();
    const hasSplash = !!(splash && !splash.classList.contains('is-hidden') && splash.style.display !== 'none');

    document.body.classList.toggle('app-has-modal', shouldLock);
    document.documentElement.classList.toggle('app-has-modal', shouldLock);
  }

  /**
   * DEPRECATED: Usar A11Y.openModal() / A11Y.closeModal() en su lugar
   * Mantenido temporalmente para compatibilidad con código legacy
   */
  function setModalVisibility_(modalOrId, visible) {
    const modalId = typeof modalOrId === 'string' ? modalOrId : modalOrId.id;

    if (visible) {
      // Usar nuevo sistema A11Y
      if (window.A11Y && window.A11Y.openModal) {
        window.A11Y.openModal(modalId);
      } else {
        // Fallback si A11Y no está cargado aún
        const modal = typeof modalOrId === 'string' ? document.getElementById(modalOrId) : modalOrId;
        if (modal) {
          modal.classList.remove('is-hidden');
          modal.setAttribute('aria-hidden', 'false');
          syncGlobalUiLayerState_();
        }
      }
    } else {
      // Cerrar modal
      if (window.A11Y && window.A11Y.closeModal) {
        window.A11Y.closeModal(modalId);
      } else {
        // Fallback si A11Y no está cargado aún
        const modal = typeof modalOrId === 'string' ? document.getElementById(modalOrId) : modalOrId;
        if (modal) {
          modal.classList.add('is-hidden');
          modal.setAttribute('aria-hidden', 'true');
          syncGlobalUiLayerState_();
        }
      }
    }

    return typeof modalOrId === 'string' ? document.getElementById(modalOrId) : modalOrId;

  const CONFIG_SECTIONS = [
    { key: 'general', label: 'General', icon: 'tune' },
    { key: 'branding', label: 'Branding', icon: 'palette' },
    { key: 'accessModules', label: 'Acceso y módulos', icon: 'account_tree' },

  document.addEventListener('DOMContentLoaded', init);

  function init() {
    hydrateTheme_();
    hydrateAppZoom_();
    initTabDetection_();
    if (!APP.state.user || !APP.state.user.canAccess) {
      showAccessDenied_();
      hideAppLoading();
      hideModuleLoading();
      // Conservar la traza de auditoría también para accesos denegados
      try {
        api('goPesLogAppOpened', BOOTSTRAP.query || {}).catch(function() {});
      } catch (err) {}
      return;
    }

    bindGlobalNav();
    initSidebarCollapse_();
    syncGlobalUiLayerState_();
    hydrateStaticUser();
    applySystemConfigUi_();
    applyModuleDefinitionsUi_();
    bindUserMenu_();
    hydrateAppVersion_();
    hydrateLogo();
    renderQuickActions();
    renderHomeTiles();
    toggleTopQuickActions_(APP.state.activeView);

    showAppLoading(getLoadingText_());

    // Prefetch de Inicio en UNA sola llamada GAS (dashboard + panel + alertas).
    // Solo bloquea el route inicial si la vista de arranque ES Inicio; para
    // cualquier otro módulo se rutea de inmediato y el prefetch corre en
    // background (únicamente si el usuario tiene permiso para ver Inicio).
    var canSeeInicio = !!((((BOOTSTRAP.permissions || {}).modules) || {}).inicio);
    var startsAtInicio = APP.state.activeView === 'inicio' && canSeeInicio;

    var inicioPrefetch = null;
    if (canSeeInicio) {
      inicioPrefetch = api('getInicioBootstrapData').then(function(data) {
        var payload = data || {};
        APP.state.dashboardData = payload.dashboard || {};
        APP.state.dashboardDataFetchedAt = Date.now();
        APP.state.inicioPanelData = payload.panel || {};
        APP.state.inicioPanelFetchedAt = Date.now();
        if (payload.alertas) {
          APP.state.alertasData = payload.alertas;
          APP.state.alertasDataFetchedAt = Date.now();
        }
      }).catch(function() {
        APP.state.dashboardData = APP.state.dashboardData || {};
        APP.state.dashboardDataFetchedAt = Date.now();
        APP.state.inicioPanelData = APP.state.inicioPanelData || {};
        APP.state.inicioPanelFetchedAt = Date.now();
      }).finally(function() {
        APP.state.inicioPrefetchPromise = null;
      });
      APP.state.inicioPrefetchPromise = inicioPrefetch;
    }

    var bootstrapWork = Promise.resolve().then(() => {
      APP.state.user = BOOTSTRAP.user || APP.state.user;
      APP.state.permissions = BOOTSTRAP.permissions || APP.state.permissions;
      mergeCatalogs_(BOOTSTRAP.catalogs || {});
      hydrateStaticUser();
      applySystemConfigUi_();
      applyModuleDefinitionsUi_();
      applyPermissions();
      setStatus('Listo.', null);
    }).catch(err => {
      setStatus('Ocurrió un error al iniciar la aplicación.', false);
    });

    var routeGate = startsAtInicio && inicioPrefetch
      ? Promise.all([bootstrapWork, inicioPrefetch])
      : bootstrapWork;

    routeGate.then(() => {
      route(APP.state.activeView, BOOTSTRAP.query || {});
      if ((BOOTSTRAP.query || {}).solicitud_id || (BOOTSTRAP.query || {}).organizacion_id) {
        loadFicha(BOOTSTRAP.query);
      }
    }).finally(() => {
      // El loader del módulo lo gestiona route(); aquí solo se retira el splash.
      // Sin delays fijos: el splash cierra apenas la app está lista (la rampa
      // final de la barra + fade ya cubren el primer render de la vista).
      hideAppLoading();
      // Registrar la apertura después del primer render (antes se hacía en
      // doGet y retrasaba el primer byte de la app).
      try {
        api('goPesLogAppOpened', BOOTSTRAP.query || {}).catch(function() {});
      } catch (err) {}
    });
  }

  var _tabId = Math.random().toString(36).slice(2);
  var _TAB_KEY = 'go-pes-v2-active-tab';

  function initTabDetection_() {
    try {
      var showMultiTabBanner_ = function() {
        var banner = document.getElementById('multi-tab-banner');
        if (!banner) return;

        banner.classList.remove('is-hidden');

        if (window._bannerAutoCloseTimer) {
          clearTimeout(window._bannerAutoCloseTimer);
        }

        window._bannerAutoCloseTimer = setTimeout(function() {
          var bannerEl = document.getElementById('multi-tab-banner');
          if (bannerEl) {
            bannerEl.classList.add('is-hidden');
          }
          window._bannerAutoCloseTimer = null;
        }, 10000);
      };

      var existing = JSON.parse(localStorage.getItem(_TAB_KEY) || 'null');
      var now = Date.now();
      if (existing && existing.tabId !== _tabId && (now - (existing.ts || 0)) < 25000) {
        showMultiTabBanner_();
      }
      var claimTab_ = function() {
        try { localStorage.setItem(_TAB_KEY, JSON.stringify({ tabId: _tabId, ts: Date.now() })); } catch (_) {}
      };
      claimTab_();
      var heartbeat = setInterval(claimTab_, 10000);
      window.addEventListener('beforeunload', function() {
        clearInterval(heartbeat);
        try {
          var cur = JSON.parse(localStorage.getItem(_TAB_KEY) || 'null');
          if (cur && cur.tabId === _tabId) localStorage.removeItem(_TAB_KEY);
        } catch (_) {}
      });
      window.addEventListener('storage', function(ev) {
        if (ev.key !== _TAB_KEY || !ev.newValue) return;
        try {
          var data = JSON.parse(ev.newValue);
          if (data && data.tabId !== _tabId) {
            showMultiTabBanner_();
          }
        } catch (_) {}
      });
    } catch (_) {}
  }

  function showAccessDenied_() {
    const app = document.getElementById('app');
    const detectedEmail = APP.state.user && (APP.state.user.detected_email || APP.state.user.email)
      ? (APP.state.user.detected_email || APP.state.user.email)
      : '';
    const reason = APP.state.user && APP.state.user.reason
      ? APP.state.user.reason
      : 'Usuario no registrado o inactivo.';
    if (!app) return;
    app.innerHTML = `
      <section class="access-denied">
        <div class="access-denied__card">
          <span class="material-symbols-outlined">lock</span>
          <p class="eyebrow">Acceso denegado</p>
          <h1>No tienes acceso a esta aplicación</h1>
          <p>Tu usuario no está registrado o se encuentra inactivo. Contacta al administrador para solicitar acceso.</p>
          <p class="muted"><strong>Correo detectado:</strong> ${escapeHtml(detectedEmail || 'no disponible')}</p>
          <p class="muted"><strong>Motivo:</strong> ${escapeHtml(reason)}</p>
        </div>
      </section>
    `;
  }

  function initSidebarCollapse_() {
    const layout = document.querySelector('.layout');
    const toggle = document.getElementById('sidebar-toggle');
    const icon = document.getElementById('sidebar-toggle-icon');
    const label = document.getElementById('sidebar-toggle-label');
    if (!layout || !toggle) return;

    const applyState = collapsed => {
      layout.classList.toggle('is-sidebar-collapsed', collapsed);
      toggle.setAttribute('aria-expanded', String(!collapsed));
      toggle.setAttribute('aria-label', collapsed ? 'Expandir menú' : 'Contraer menú');
      toggle.title = collapsed ? 'Expandir menú' : 'Contraer menú';
      if (icon) icon.textContent = collapsed ? 'keyboard_double_arrow_right' : 'keyboard_double_arrow_left';
      if (label) label.textContent = 'Módulos';
    };

    let stored = false;
    try {
      stored = localStorage.getItem('goPesSidebarCollapsed') === 'true';
    } catch (err) {
      stored = false;
    }
    applyState(stored);

    toggle.addEventListener('click', () => {
      const collapsed = !layout.classList.contains('is-sidebar-collapsed');
      try {
        localStorage.setItem('goPesSidebarCollapsed', String(collapsed));
      } catch (err) {
      }
      applyState(collapsed);
    });
  }

  function readStoredTheme_() {
    try {
      const stored = localStorage.getItem(THEME_STORAGE_KEY);
      return stored === 'dark' || stored === 'light' ? stored : '';
    } catch (err) {
      return '';
    }
  }

  function isDarkTheme_() {
    return String(APP.state.theme || document.documentElement.dataset.theme || 'light') === 'dark';
  }

  function applyTheme_(theme, persist) {
    const nextTheme = theme === 'dark' ? 'dark' : 'light';
    APP.state.theme = nextTheme;
    document.documentElement.dataset.theme = nextTheme;
    if (document.body) {
      document.body.dataset.theme = nextTheme;
    }
    if (persist) {
      try {
        localStorage.setItem(THEME_STORAGE_KEY, nextTheme);
      } catch (err) {
      }
    }
    updateThemeToggleUi_();
    applyBrandingRuntimeTheme_();
    hydrateLogo();
  }

  function hydrateTheme_() {
    const bootTheme = document.documentElement.dataset.theme === 'dark' ? 'dark' : 'light';
    applyTheme_(readStoredTheme_() || bootTheme, false);
  }

  function normalizeAppZoom_(zoom) {
    const normalized = String(zoom == null ? '' : zoom).trim();
    return APP_ZOOM_OPTIONS.includes(normalized) ? normalized : '1';
  }

  function readStoredAppZoom_() {
    try {
      const raw = localStorage.getItem(APP_ZOOM_STORAGE_KEY);
      return raw !== null ? normalizeAppZoom_(raw) : null;
    } catch (err) {
      return null;
    }
  }

  function updateZoomMenuUi_() {
    const activeZoom = normalizeAppZoom_(APP.state.zoom);
    document.querySelectorAll('.js-app-zoom-option').forEach(button => {
      const isActive = normalizeAppZoom_(button.dataset.zoom) === activeZoom;
      button.setAttribute('aria-checked', isActive ? 'true' : 'false');

  function openSystemInfoModal_() {
    const modal = document.getElementById('system-info-modal');
    if (!modal) return;
    setModalVisibility_(modal, true);
    const content = document.getElementById('system-info-content');
    if (!content) return;
    const buildInfo = BOOTSTRAP.buildInfo || {};
    const env = String(BOOTSTRAP.environment || '').trim().toUpperCase() || '—';
    const row = (label, value, cls) =>
      `<div class="system-info-row"><span class="system-info-label">${escapeHtml(label)}</span><span class="system-info-value ${cls || ''}">${value}</span></div>`;
    const staticHtml =
      row('Versión', escapeHtml(buildInfo.baseVersion ? 'v' + buildInfo.baseVersion : '—')) +
      row('Build', escapeHtml(buildInfo.buildHash || '—')) +
      row('Actualizado', escapeHtml(buildInfo.buildDate || '—')) +
      row('Entorno', escapeHtml(env));
    content.innerHTML = staticHtml + `<p class="muted" style="margin-top:8px;font-size:0.8rem">Consultando servidor…</p>`;
    api('getSystemInfo').then(info => {
      if (!info) { content.innerHTML = staticHtml; return; }
      const sheetsHtml = (info.sheets || []).map(s =>
        row(s.name, s.ok ? '✓ OK' : '✗ Falta', s.ok ? 'system-info-ok' : 'system-info-fail')
      ).join('');
      content.innerHTML =
        staticHtml +
        (sheetsHtml ? `<p class="eyebrow" style="margin-top:16px;margin-bottom:8px">Hojas críticas</p>${sheetsHtml}` : '') +
        buildDevStatsBlock_(info.devStats || null);
    }).catch(err => {
      content.innerHTML = staticHtml + `<p class="muted" style="margin-top:8px;font-size:0.8rem;color:#c0392b">Error al consultar el servidor.</p>`;
    });

  function bindUserMenu_() {

    const zoomToggle = document.getElementById('zoom-menu-toggle');
    const zoomSubmenu = document.getElementById('zoom-menu-submenu');
    const zoomOptions = Array.from(document.querySelectorAll('.js-app-zoom-option'));
    if (!trigger || !menu || !toggleBtn || !zoomToggle || !zoomSubmenu || !zoomOptions.length || trigger.dataset.bound === '1') return;

    trigger.dataset.bound = '1';
    updateThemeToggleUi_();
    updateZoomMenuUi_();
    setUserMenuOpen_(false);

    const el = document.getElementById('app-version');
    if (!el) return;
    if (!shouldShowVisibleVersionClient_()) {
      el.textContent = '';

      el.classList.add('is-hidden');
      return;
    }
    const buildInfo = BOOTSTRAP.buildInfo || {};
    const path = String(window.location.pathname || '').toLowerCase();
    const channel = path.endsWith('/dev')
      ? 'DEV'
      : path.endsWith('/exec')
        ? 'EXEC'
        : String(BOOTSTRAP.environment || '').trim().toUpperCase();
    const env = String(BOOTSTRAP.environment || '').trim().toUpperCase();
    const ver = (buildInfo.baseVersion || BOOTSTRAP.version) ? `v${buildInfo.baseVersion || BOOTSTRAP.version}` : '';
    const label = [ver, env, buildInfo.buildHash ? `build ${buildInfo.buildHash}` : ''].filter(Boolean).join(' · ') || BOOTSTRAP.versionLabel || '';
    el.textContent = label;
    el.title = buildInfo.updatedAtIso

  function api(fn, payload) {
    return new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(err => {
          const msg = String(err && err.message ? err.message : (err || ''));
          if (/authorization is required|not authorized|you do not have permission|script does not have permission/i.test(msg)) {
            showSessionExpired_();
          }
          reject(msg || 'Ocurrió un error.');
        })
        [fn](payload);
    });
  }

  function buildForm(formId, schema, submitHandler) {
    const form = document.getElementById(formId);
    if (!form || form.dataset.initialized === 'true') return;

    form.dataset.initialized = 'true';
    form.innerHTML = schema.map(f => fieldTemplate(f)).join('') + `
      <div class="field" data-span="2">

          <button type="submit" class="primary-btn">
            <span class="material-symbols-outlined">save</span>Guardar
          </button>

    `;

    form.addEventListener('submit', submitHandler);
    populateSelectsInForm_(form);

    form.querySelectorAll('select[data-options-key="sectorByUv"]').forEach(select => syncSectorOptions(select));

    form.querySelectorAll('select[name="uv"]').forEach(select =>
      select.addEventListener('change', () => {

        if (sectorSelect) syncSectorOptions(sectorSelect, select.value);

  function populateSelectsInForm_(form) {
    form.querySelectorAll('select').forEach(select => {
      const key = select.dataset.optionsKey;
      if (key === 'sectorByUv') return;

      let options = [];
      if (key && APP.state.catalogs[key]) {
        options = APP.state.catalogs[key];
      } else {
        const schemaField = [...Object.values(FORM_SCHEMAS).flat()].find(f => f.name === select.name);
        if (schemaField && schemaField.options) options = schemaField.options;
      }

      fillSelect(select, options);
    });
  }

  function fieldTemplate(field) {
    const spanAttr = field.span === 2 ? ' data-span="2"' : '';
    const requiredAttr = field.required ? ' required' : '';

    if (field.type === 'hidden') {
      return `<input name="${field.name}" type="hidden">`;
    }

    if (field.type === 'image_upload_top') {
      return `
        <div class="field field--image-top"${spanAttr}>
          <label>${field.label}</label>
          <div class="image-upload image-upload--top" data-image-field="${field.name}">
            <input type="hidden" name="${field.name}" value="">
            <input type="file" class="image-upload__file" accept="image/*" hidden>
            <div class="image-upload__preview image-upload__preview--top empty-state">Sin imagen</div>
            <div class="image-upload__actions image-upload__actions--stack">
              <button type="button" class="secondary-btn" data-org-image-action="upload">
                <span class="material-symbols-outlined">upload</span>Subir imagen
              </button>
              <button type="button" class="secondary-btn" data-org-image-action="remove">
                <span class="material-symbols-outlined">delete</span>Eliminar
              </button>
            </div>
          </div>
        </div>
      `;
    }

    if (field.type === 'textarea') {
      return `<div class="field"${spanAttr}><label>${field.label}</label><textarea name="${field.name}"${requiredAttr}></textarea></div>`;
    }

    if (field.type === 'select') {
      return `<div class="field"${spanAttr}><label>${field.label}</label><select name="${field.name}" data-options-key="${field.optionsKey || ''}"${requiredAttr}></select></div>`;
    }

    return `<div class="field"${spanAttr}><label>${field.label}</label><input name="${field.name}" type="${field.type || 'text'}"${requiredAttr}></div>`;
  }

  function fillSelect(select, options, placeholder = 'Seleccionar') {
    if (!select) return;

    select.innerHTML = `<option value="">${placeholder}</option>` + (options || []).map(opt => {
      const value = typeof opt === 'string'
        ? opt
        : (opt.value || opt.codigo || opt.requisito_codigo || opt.instrumento_codigo_catalogo || '');
      const label = typeof opt === 'string'
        ? opt
        : (opt.label || opt.descripcion || opt.nombre || opt.requisito_nombre || opt.instrumento_nombre || opt.requisito_codigo || value);

      return `<option value="${escapeHtml(value)}">${escapeHtml(label)}</option>`;
    }).join('');
  }

  function normalizeEditableUserProfile_(value) {
    const normalized = String(value || '').trim().toLowerCase();
    if (normalized === 'visor') return 'visor';
    if (normalized === 'coordinador' || normalized === 'administrador' || normalized === 'superuser') return 'coordinador';
    return 'operador';
  }

  function getUserRoleLabel_(value) {
    return USER_ROLE_LABELS[normalizeEditableUserProfile_(value)] || 'Operador';
  }

  function roleAllowsManualModules_(value) {
    return normalizeEditableUserProfile_(value) !== 'visor';

  function getCheckedUserModules_(targetId) {
    return Array.from(document.querySelectorAll(`#${targetId} input[type="checkbox"]:checked`))
      .map(input => input.value)
      .filter(Boolean);
  }

  function bindUserRoleVisibility_(selectId, containerId, targetId) {
    const select = document.getElementById(selectId);
    if (!select || select.dataset.boundRoleVisibility === '1') return;
    select.dataset.boundRoleVisibility = '1';
    select.addEventListener('change', () => syncUserModulesVisibility_(selectId, containerId, targetId));
  }

  function syncUserModulesVisibility_(selectId, containerId, targetId) {
    const select = document.getElementById(selectId);
    const container = document.getElementById(containerId);
    const target = targetId || 'user-modules-input';
    const role = normalizeEditableUserProfile_(select?.value || '');
    const allowManual = roleAllowsManualModules_(role);
    const previousSelection = container?.dataset.manualModules || '';
    const layout = container?.closest('.user-edit-layout');

    if (container) container.classList.toggle('is-hidden', !allowManual);
    if (layout) {
      layout.classList.toggle('is-single-column', !allowManual);
    }
    if (!allowManual) {
      if (container) {
        container.dataset.manualModules = getCheckedUserModules_(target).join(',');
      }
      renderUserModuleOptions_(['inicio'], target);
      return;
    }

    const selectionToRender = previousSelection || getCheckedUserModules_(target).join(',');
    renderUserModuleOptions_(selectionToRender, target);
  }

  function canOpenView_(view) {
    if (!APP.state.user || !APP.state.user.canAccess) return false;
    const normalizedView = normalizeModuleKey_(view);
    if (!normalizedView) return false;
    if (normalizedView === 'usuarios') return !!APP.state.permissions.canManageUsers;
    if (normalizedView === 'configuracion') return !!APP.state.permissions.canManageConfig;
    if (normalizedView === 'ficha') return !!((APP.state.permissions.modules || {}).ficha);
    return !!((APP.state.permissions.modules || {})[normalizedView]);
  }

  function renderUserModuleOptions_(selectedModules, targetId) {
    const root = document.getElementById(targetId || 'user-modules-input');
    if (!root) return;
    const selected = Array.isArray(selectedModules)
      ? selectedModules
      : String(selectedModules || '').split(',').map(x => x.trim()).filter(Boolean);
    const allowAll = selected.includes('*');
    const defs = getAssignableModuleDefinitions_();
    root.innerHTML = defs.map(m => {
      const desc = MODULE_DESCRIPTIONS[m.key] || '';
      return `<label class="module-check">
        <input
          class="module-check__input"
          type="checkbox"
          value="${escapeHtml(m.key)}"
          ${allowAll || selected.includes(m.key) || m.required ? 'checked' : ''}
          ${m.required ? 'disabled' : ''}>
        <span class="module-check__box">
          <span class="module-check__title">${escapeHtml(m.label || m.key)}</span>
          ${desc ? `<span class="module-check__desc">${escapeHtml(desc)}</span>` : ''}
          <span class="module-check__meta">${escapeHtml(m.required ? 'Siempre visible' : 'Visible en menú')}</span>
        </span>
      </label>`;
    }).join('');

  function closeAllModals_() {

    const modalSelectors = [
      '#org-detalle-modal',
      '#org-edit-modal',
      '#org-socio-cargo-modal',
      '#avance-modal',
      '#avance-hito-modal',
      '#admin-reset-modal',
      '#user-modal',
      '#socios-modal'
    ];

    modalSelectors.forEach(selector => {
      const modal = document.querySelector(selector);
      if (modal && !modal.classList.contains('is-hidden')) {

  function route(view, params = {}) {
    view = normalizeModuleKey_(view) || view;
    if (!canOpenView_(view)) {
      showError('No tienes permisos para acceder a este módulo.');
      view = getFirstAllowedViewClient_();
      if (!view || !canOpenView_(view)) return;
    }

    APP.state.activeView = view;
    const wasRendered = !!APP.state.renderedViews[view];

    // Cerrar todos los modales abiertos al cambiar de módulo
    closeAllModals_();

    // Desactivar todas las vistas y limpiar estados de transición
    document.querySelectorAll('.view').forEach(v => {
      v.classList.remove('active', 'view-enter', 'view-enter-active');
    });

    // Activar vista con transición enter-only
    const targetView = document.getElementById(`view-${view}`);
    if (targetView) {
      targetView.classList.add('active', 'view-enter');
      // Forzar reflow antes de activar la transición
      targetView.offsetHeight;
      requestAnimationFrame(() => {
        targetView.classList.remove('view-enter');
        targetView.classList.add('view-enter-active');
      });
    }

    document.querySelectorAll('.nav-btn').forEach(btn =>
      btn.classList.toggle('is-active', btn.dataset.view === view)
    );

    toggleTopQuickActions_(view);

    // Loader estándar del módulo: visible desde que se selecciona en el menú
    // y mientras se cargan los catálogos/datos de la vista.
    showModuleLoading(`Cargando ${friendlyViewName_(view)}...`);

    const finalizeRoute = () => {
      // Si el usuario navegó a otro módulo mientras cargaban los datos,
      // no tocar el loader ni el estado de la vista activa.
      if (APP.state.activeView !== view) return;

      hideModuleLoading();
      ensureViewRendered_(view);

      if (view === 'ficha' && APP.state.currentFicha && APP.state.currentFicha.summary) {
        renderFicha(APP.state.currentFicha);
      }

      if (view === 'avance' && wasRendered) {
        refreshAvanceViewOnRoute_();
      }

      if (view === 'organizacion' && wasRendered) {
        refreshOrganizacionesModuloList_();
      }

      if (view === 'instrumento' && wasRendered) {
        APP.state.currentBeneficioCodigo = '';
        APP.state.currentBeneficioOrganizacionId = '';
        refreshBeneficiosModuloMinimo_();
      }

      if (view === 'inicio') {
        renderInicioView_();
      }

      if (view === 'socios' && wasRendered) {
        refreshSociosComites_();
        loadSociosModuleData_().catch(() => {});
      }

      if (view === 'buscar') {
        if (!wasRendered) initBuscarSortableHeaders_();
        updateBuscarTableView_();
      }
      if (view === 'historial') loadHistorial();
      if (view === 'usuarios' && APP.state.permissions.canManageUsers) loadUsers();
      if (view === 'configuracion' && APP.state.permissions.canManageConfig) loadConfiguracionView_();
      if (view === 'nuevo-ingreso') {
        renderNuevoIngresoView_();
      }

      setStatus(`Vista actual: ${friendlyViewName_(view)}`);
    };

    const catalogPromise = ensureCatalogsForView_(view);
    if (catalogPromise) {
      catalogPromise.then(finalizeRoute).catch(err => {
        if (APP.state.activeView === view) hideModuleLoading();
        showError(err);
      });
      return;
    }

    finalizeRoute();
  }

  function normalizeBuscarText_(value) {
    return String(value == null ? '' : value)
      .toLowerCase()
      .normalize('NFD')
      .replace(/[̀-ͯ]/g, '')
      .replace(/\s+/g, ' ')
      .trim();
  }

  function filterBuscarRows_(rows, query) {
    const term = normalizeBuscarText_(query);
    if (!term) return rows;
    return rows.filter(function(r) {
      const haystack = normalizeBuscarText_([
        r.nombre_completo,
        r.rut_vecino,
        r.telefono_contacto,
        r.correo_contacto,
        r.direccion_original,
        r.solicitud_id,
        r.organizacion_id,
        r.nombre_organizacion
      ].join(' | '));
      return haystack.includes(term);
    });
  }

  const BUSCAR_PAGE_SIZE = 25;

  function updateBuscarTableView_(resetPage) {
    const tbody   = document.getElementById('search-results');
    const countEl = document.getElementById('buscar-count');
    if (!tbody) return;

    const allRows = APP.state.buscarModuleRows || [];
    const query   = String((document.getElementById('search-query') || {}).value || '');
    let rows = filterBuscarRows_(allRows, query);

    // Aplicar ordenamiento si existe
    if (APP.state.buscarSortColumn) {
      rows = sortBuscarRows_(rows, APP.state.buscarSortColumn, APP.state.buscarSortDirection);
    }

    if (resetPage) APP.state.buscarPage = 0;

    if (countEl) {
      countEl.textContent = query.trim()
        ? `${rows.length} de ${allRows.length} vecinos`
        : `${allRows.length} vecinos`;
    }

    if (!rows.length) {
      tbody.innerHTML = `<tr><td colspan="7" class="muted">${
        query.trim() ? 'Sin resultados para la búsqueda.' : (allRows.length ? 'Sin resultados.' : 'No hay vecinos registrados.')
      }</td></tr>`;
      return;
    }

    const totalPages = Math.ceil(rows.length / BUSCAR_PAGE_SIZE);
    if (APP.state.buscarPage >= totalPages) APP.state.buscarPage = Math.max(0, totalPages - 1);
    const page = APP.state.buscarPage;
    const pageRows = rows.slice(page * BUSCAR_PAGE_SIZE, (page + 1) * BUSCAR_PAGE_SIZE);

    tbody.innerHTML = pageRows.map(r => `
      <tr>
        <td>${escapeHtml(r.solicitud_id || '')}</td>
        <td>${escapeHtml(formatFechaBuscar_(r.fecha_solicitud) || '')}</td>
        <td>${escapeHtml(r.nombre_completo || '')}</td>
        <td>${escapeHtml(r.direccion_original || '')}</td>
        <td><span class="badge">${escapeHtml(r.estado_actual || '')}</span></td>
        <td>${escapeHtml(r.nombre_organizacion || '')}</td>
        <td>
          <button class="secondary-btn js-open-ficha"
            data-solicitud="${escapeHtml(r.solicitud_id || '')}"
            data-organizacion="${escapeHtml(r.organizacion_id || '')}">
            <span class="material-symbols-outlined">open_in_new</span>Ver ficha
          </button>
        </td>
      </tr>
    `).join('');

    tbody.querySelectorAll('.js-open-ficha').forEach(btn =>
      btn.addEventListener('click', () => loadFicha({
        solicitud_id: btn.dataset.solicitud,
        organizacion_id: btn.dataset.organizacion
      }))
    );

    // Actualizar indicadores de ordenamiento en headers
    updateBuscarSortIndicators_();

    const pager = document.getElementById('buscar-pager');
    if (pager) {
      pager.innerHTML = goPesPaginatorHtml_(page, totalPages, 'buscar');
      pager.querySelectorAll('[data-buscar-page]').forEach(btn => {
        btn.addEventListener('click', () => {
          APP.state.buscarPage = Number(btn.dataset.buscarPage);
          updateBuscarTableView_();
        });
      });
    }

    const exportBtn = document.getElementById('buscar-export-btn');
    if (exportBtn) exportBtn.classList.toggle('is-hidden', !rows.length);
  }

  function formatFechaBuscar_(fecha) {
    if (!fecha) return '-';
    try {
      const d = new Date(fecha);
      if (isNaN(d.getTime())) return '-';
      const day = String(d.getDate()).padStart(2, '0');
      const month = String(d.getMonth() + 1).padStart(2, '0');
      const year = d.getFullYear();
      return `${day}/${month}/${year}`;
    } catch (e) {
      return '-';
    }
  }

  function sortBuscarRows_(rows, column, direction) {
    return rows.slice().sort((a, b) => {
      let valA = a[column];
      let valB = b[column];

      // Manejar valores vacíos
      if (valA == null) valA = '';
      if (valB == null) valB = '';

      // Convertir a string para comparación
      valA = String(valA).toLowerCase();
      valB = String(valB).toLowerCase();

      // Para fechas, convertir a timestamp
      if (column === 'fecha_solicitud') {
        const dateA = new Date(a[column]);
        const dateB = new Date(b[column]);
        valA = isNaN(dateA.getTime()) ? 0 : dateA.getTime();
        valB = isNaN(dateB.getTime()) ? 0 : dateB.getTime();
      }

      if (valA < valB) return direction === 'asc' ? -1 : 1;
      if (valA > valB) return direction === 'asc' ? 1 : -1;
      return 0;
    });
  }

  function updateBuscarSortIndicators_() {
    const headers = document.querySelectorAll('#view-buscar th.sortable');
    headers.forEach(th => {
      th.classList.remove('sort-asc', 'sort-desc');
      if (th.dataset.sort === APP.state.buscarSortColumn) {
        th.classList.add('sort-' + APP.state.buscarSortDirection);
      }
    });
  }

  function initBuscarSortableHeaders_() {
    const headers = document.querySelectorAll('#view-buscar th.sortable');
    headers.forEach(th => {
      if (th.dataset.bound) return;
      th.dataset.bound = 'true';
      th.addEventListener('click', function() {
        const column = this.dataset.sort;

        // Si ya está ordenado por esta columna, invertir dirección
        if (APP.state.buscarSortColumn === column) {
          APP.state.buscarSortDirection = APP.state.buscarSortDirection === 'asc' ? 'desc' : 'asc';
        } else {
          // Nueva columna: empezar con ascendente
          APP.state.buscarSortColumn = column;
          APP.state.buscarSortDirection = 'asc';
        }

        updateBuscarTableView_();
      });
    });
  }

  function formatOrganizacionAntiguedad_(value) {
    const date = parseDateForAge_(value);
    if (!date) return 'Sin antigüedad disponible';

    const today = new Date();
    const diffMs = today.getTime() - date.getTime();
    const totalDays = Math.max(0, Math.floor(diffMs / 86400000));
    const totalMonths = Math.floor(totalDays / 30);
    const years = Math.floor(totalMonths / 12);
    const months = totalMonths % 12;
    const days = totalDays % 30;

    const yearText = `${years} ${years === 1 ? 'Año' : 'Años'}`;
    const monthText = `${months} ${months === 1 ? 'Mes' : 'Meses'}`;
    const dayText = `${days} ${days === 1 ? 'día' : 'días'}`;

    if (years > 0) {
      return `${yearText}, ${monthText} y ${dayText}`;
    }

    if (months > 0) {
      return `${monthText} y ${dayText}`;
    }

    return dayText;
  }

  function parseDateForAge_(value) {
    if (!value) return null;
    const raw = String(value).trim();
    if (!raw) return null;

    const iso = raw.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (iso) {
      const d = new Date(Number(iso[1]), Number(iso[2]) - 1, Number(iso[3]));
      return isNaN(d.getTime()) ? null : d;
    }

    const d = new Date(raw);
    return isNaN(d.getTime()) ? null : d;
  }

  function formatFechaHoraUi_(value) {
    if (!value) return '';

    if (value instanceof Date && !isNaN(value.getTime())) {
      const dd = `${value.getDate()}`.padStart(2, '0');
      const mm = `${value.getMonth() + 1}`.padStart(2, '0');
      const yyyy = value.getFullYear();
      const hh = `${value.getHours()}`.padStart(2, '0');
      const min = `${value.getMinutes()}`.padStart(2, '0');
      return `${dd}-${mm}-${yyyy} ${hh}:${min}`;
    }

    const raw = String(value || '').trim();
    if (!raw) return '';

    const isoDateTime = raw.match(/^(\d{4})-(\d{2})-(\d{2})[T\s](\d{2}):(\d{2})(?::\d{2})?/);
    if (isoDateTime) {
      return `${isoDateTime[3]}-${isoDateTime[2]}-${isoDateTime[1]} ${isoDateTime[4]}:${isoDateTime[5]}`;
    }

    const isoDate = raw.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if (isoDate) {
      return `${isoDate[3]}-${isoDate[2]}-${isoDate[1]}`;
    }

    return raw.replace('T', ' ');
  }

  function formatUiValue_(value) {
    if (value instanceof Date) return formatFechaHoraUi_(value);
    const raw = String(value == null ? '' : value);
    const trimmed = raw.trim();
    if (trimmed === 'Constituida sin instrumentos') return 'Constituida sin beneficios';
    const beneficioLabel = friendlyBeneficioLabel_(trimmed);
    if (beneficioLabel !== trimmed) return beneficioLabel;
    return /^\d{4}-\d{2}-\d{2}(?:[T\s]\d{2}:\d{2})?/.test(raw.trim())
      ? formatFechaHoraUi_(raw)
      : raw;
  }

  function serializeForm(form) {

  function renderSelectOptionsHtml_(options, currentValue, placeholder) {
    const current = String(currentValue || '').trim();
    const rows = Array.isArray(options) ? options : [];
    const items = rows.map(option => {
      const value = typeof option === 'string' ? option : (option.value || option.codigo || option.instrumento_codigo_catalogo || '');
      const label = typeof option === 'string' ? option : (option.label || option.descripcion || option.nombre || value);
      return `<option value="${escapeHtml(value)}" ${String(value) === current ? 'selected' : ''}>${escapeHtml(label)}</option>`;
    }).join('');
    return `<option value="">${escapeHtml(placeholder || 'Seleccionar')}</option>${items}`;
  }

  function loadHistorial() {
    ['hist-periodo', 'hist-origen'].forEach(function(id) {
      const el = document.getElementById(id);
      if (el && !el.dataset.bound) {
        el.dataset.bound = 'true';
        el.addEventListener('change', loadHistorial);
      }
    });
    ['hist-usuario', 'hist-resultado', 'hist-buscar'].forEach(function(id) {
      const el = document.getElementById(id);
      if (el && !el.dataset.bound) {
        el.dataset.bound = 'true';
        el.addEventListener(id === 'hist-buscar' ? 'input' : 'change', () => applyHistorialClientFilters_(true));
      }
    });
    const printBtn = document.getElementById('hist-print-btn');
    if (printBtn && !printBtn.dataset.bound) {
      printBtn.dataset.bound = 'true';
      printBtn.addEventListener('click', printHistorialReport_);
    }

    if (APP.state.historialUsuarios === undefined) {
      APP.state.historialUsuarios = null;
      api('getHistorialUsuariosLista').then(function(users) {
        APP.state.historialUsuarios = Array.isArray(users) ? users : [];
        populateHistorialUsuarioSelect_();
      }).catch(function() { APP.state.historialUsuarios = []; });
    } else if (APP.state.historialUsuarios) {
      populateHistorialUsuarioSelect_();
    }

    const periodo = (document.getElementById('hist-periodo') || {}).value || 'last_month';
    const source_key = (document.getElementById('hist-origen') || {}).value || '';
    const tbody = document.getElementById('hist-tbody');
    const requestSeq = (APP.state.historialRequestSeq || 0) + 1;
    APP.state.historialRequestSeq = requestSeq;

    ['hist-periodo', 'hist-origen'].forEach(function(id) {
      const el = document.getElementById(id);
      if (el) el.disabled = true;
    });

    // Mostrar loader local
    const loader = document.getElementById('hist-table-loading');
    if (loader) loader.classList.remove('is-hidden');

    api('listarHistorial', { periodo: periodo, source_key: source_key }).then(function(rows) {
      if (requestSeq !== APP.state.historialRequestSeq) return;
      APP.state.historialAllRows = Array.isArray(rows) ? rows : [];
      applyHistorialClientFilters_(true);
    }).catch(function(err) {
      if (requestSeq === APP.state.historialRequestSeq && tbody) {
        tbody.innerHTML = '<tr><td colspan="8" class="muted">No fue posible cargar el historial.</td></tr>';
      }
      showError(err);
    }).finally(function() {
      if (requestSeq !== APP.state.historialRequestSeq) return;
      ['hist-periodo', 'hist-origen'].forEach(function(id) {
        const el = document.getElementById(id);
        if (el) el.disabled = false;
      });
      // Ocultar loader local
      if (loader) loader.classList.add('is-hidden');
    });
  }

  const HIST_PAGE_SIZE = 30;

  function applyHistorialClientFilters_(resetPage) {
    if (resetPage) APP.state.histPage = 0;
    const allRows = APP.state.historialAllRows || [];
    const selectedUser = (document.getElementById('hist-usuario') || {}).value || '';
    const resultado = (document.getElementById('hist-resultado') || {}).value || '';
    const buscar = ((document.getElementById('hist-buscar') || {}).value || '').trim().toLowerCase();
    const tbody = document.getElementById('hist-tbody');
    if (!tbody) return;

    let filtered = allRows;

    if (selectedUser) {
      const normalizedUser = selectedUser.toLowerCase().trim();
      filtered = filtered.filter(function(r) {
        return (r.email || '').toLowerCase().trim() === normalizedUser;
      });
    }
    const userHasRowsInPeriod = !selectedUser || filtered.length > 0;

    if (resultado) {
      filtered = filtered.filter(function(r) {
        const res = (r.result || '').toLowerCase();
        if (resultado === 'ok') return res === 'ok' || res === 'éxito' || res === 'exito' || res === 'success';
        if (resultado === 'error') return res === 'error' || res.indexOf('error') !== -1;
        return true;
      });
    }
    if (buscar) {
      filtered = filtered.filter(function(r) {
        return (r.email || '').toLowerCase().indexOf(buscar) !== -1
          || (r.action || '').toLowerCase().indexOf(buscar) !== -1
          || (r.entity_type || '').toLowerCase().indexOf(buscar) !== -1
          || (r.entity_id || '').toLowerCase().indexOf(buscar) !== -1
          || (r.detail_text || '').toLowerCase().indexOf(buscar) !== -1;
      });
    }

    renderHistorialSummaryChips_(allRows, filtered);

    const counterEl = document.getElementById('hist-counter');
    if (counterEl) {
      counterEl.textContent = filtered.length === allRows.length
        ? filtered.length + ' registros'
        : filtered.length + ' de ' + allRows.length + ' registros';
    }

    if (!filtered.length) {
      if (selectedUser && !userHasRowsInPeriod) {
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:20px;color:var(--text-muted,#6b7a8d)">Verificando historial del usuario...</td></tr>';
        api('listarHistorial', { periodo: 'all', email: selectedUser }).then(function(allTimeRows) {
          allTimeRows = Array.isArray(allTimeRows) ? allTimeRows : [];
          tbody.innerHTML = renderHistorialEmptyUser_(
            allTimeRows.length === 0 ? 'never' : 'inactive',
            allTimeRows.length > 0 ? allTimeRows[0].timestamp : null
          );
        }).catch(function() {
          tbody.innerHTML = '<tr><td colspan="8" class="muted" style="text-align:center">No se pudo verificar el historial del usuario.</td></tr>';
        });
        return;
      }
      tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:20px;color:var(--text-muted,#6b7a8d)">No hay registros para los filtros seleccionados.</td></tr>';
      return;
    }

    const totalHistPages = Math.ceil(filtered.length / HIST_PAGE_SIZE);
    if (APP.state.histPage >= totalHistPages) APP.state.histPage = Math.max(0, totalHistPages - 1);
    const histPage = APP.state.histPage;
    const pageRows = filtered.slice(histPage * HIST_PAGE_SIZE, (histPage + 1) * HIST_PAGE_SIZE);

    tbody.innerHTML = pageRows.map(function(r) {
      const srcCls = histSourceBadgeClass_(r.source_key);
      const resCls = histResultBadgeClass_(r.result);
      return '<tr>'
        + '<td style="white-space:nowrap">' + escapeHtml(formatFechaHoraUi_(r.timestamp || '')) + '</td>'
        + '<td><span class="hist-badge ' + srcCls + '">' + escapeHtml(r.source_label || r.source_key || '') + '</span></td>'
        + '<td>' + escapeHtml(r.email || '') + '</td>'
        + '<td>' + escapeHtml(r.action || '') + '</td>'
        + '<td>' + escapeHtml(r.entity_type || '') + '</td>'
        + '<td>' + escapeHtml(r.entity_id || '') + '</td>'
        + '<td><span class="hist-badge ' + resCls + '">' + escapeHtml(r.result || '') + '</span></td>'
        + '<td class="hist-detail">' + escapeHtml(r.detail_text || '') + '</td>'
        + '</tr>';
    }).join('');

    const histPager = document.getElementById('hist-pager');
    if (histPager) {
      histPager.innerHTML = goPesPaginatorHtml_(histPage, totalHistPages, 'hist');
      histPager.querySelectorAll('[data-hist-page]').forEach(function(btn) {
        btn.addEventListener('click', function() {
          APP.state.histPage = Number(btn.dataset.histPage);
          applyHistorialClientFilters_();
        });
      });
    }
  }

  function renderHistorialSummaryChips_(allRows, filteredRows) {
    const chipsEl = document.getElementById('hist-chips');

    const acciones = rows.filter(function(r) { return r.source_key === 'accion_usuario'; }).length;

  function histSourceBadgeClass_(sourceKey) {
    if (sourceKey === 'accion_usuario') return 'hist-badge--accion';
    if (sourceKey === 'procesamiento') return 'hist-badge--proc';
    if (sourceKey === 'acceso') return 'hist-badge--acceso';
    return '';
  }

  function histResultBadgeClass_(result) {
    const r = (result || '').toLowerCase();
    if (r === 'ok' || r === 'éxito' || r === 'exito' || r === 'success') return 'hist-badge--ok';
    if (r.indexOf('error') !== -1) return 'hist-badge--error';
    if (r.indexOf('warn') !== -1 || r.indexOf('skip') !== -1) return 'hist-badge--warn';
    return '';
  }

  function exportBuscarCSV_() {
    const allRows = APP.state.buscarModuleRows || [];
    const query   = String((document.getElementById('search-query') || {}).value || '');
    const rows    = filterBuscarRows_(allRows, query);
    if (!rows.length) { showError('No hay registros para exportar.'); return; }

    const headers = ['Solicitud','Vecino','Dirección','Estado','Organización'];
    const keys    = ['solicitud_id','nombre_completo','direccion_original','estado_actual','nombre_organizacion'];
    const escape  = v => '"' + String(v == null ? '' : v).replace(/"/g, '""') + '"';
    const csv     = [headers.map(escape), ...rows.map(r => keys.map(k => escape(r[k] || '')))].map(r => r.join(',')).join('\r\n');
    const blob    = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' });
    const url     = URL.createObjectURL(blob);
    const a       = document.createElement('a');
    a.href        = url;
    a.download    = 'GO-PES_busqueda_' + todayISO_() + '.csv';
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 200);
    showSuccess('CSV exportado (' + rows.length + ' registros).');
  }

  function initUserEmailField_() {
    const input = document.getElementById('user-email-local');
    if (!input || input.dataset.bound === '1') return;
    input.dataset.bound = '1';

    const normalizeLocal = () => {
      const raw = String(input.value || '').trim().toLowerCase().replace(/\s+/g, '');
      const domain = getAllowedUserDomain_();
      if (!raw) {
        input.value = '';
        return;
      }

      const parts = raw.split('@').filter(Boolean);
      if (parts.length === 1) {
        input.value = parts[0];
        return;
      }

      if (parts.length === 2 && parts[1] === domain) {
        input.value = parts[0];
      }
    };

    input.addEventListener('blur', normalizeLocal);
    input.addEventListener('paste', () => setTimeout(normalizeLocal, 0));
  }

  function buildProvidenciaEmailFromInput_() {
    const input = document.getElementById('user-email-local');
    const raw = String(input?.value || '').trim().toLowerCase().replace(/\s+/g, '');
    const domain = getAllowedUserDomain_();
    if (!raw) throw new Error('Debes ingresar el email del usuario.');

    let localPart = raw;
    if (raw.includes('@')) {
      const parts = raw.split('@').filter(Boolean);
      if (parts.length !== 2 || parts[1] !== domain) {
        throw new Error(`Solo se permiten usuarios con correo @${domain}.`);
      }
      localPart = parts[0];
    }

    if (!/^[a-z0-9._-]+$/.test(localPart)) {
      throw new Error('El correo solo puede contener letras, números, puntos, guiones y guion bajo.');
    }

    if (input) input.value = localPart;
    return `${localPart}@${domain}`;
  }

    const runtimeAccent = isDarkTheme_()

    const tokens = {
      '--runtime-brand-primary': normalizeHexColor_(branding.primaryColor) || '#3D96B4',
      '--runtime-brand-secondary': normalizeHexColor_(branding.secondaryColor) || '#8CC63F',
      '--runtime-brand-accent': runtimeAccent,
      '--runtime-brand-progress': normalizeHexColor_(branding.loadingProgressColor) || '#8CC63F',
      '--runtime-brand-light': normalizeHexColor_(branding.lightBackground) || '#F7FAFC',
      '--runtime-brand-dark': normalizeHexColor_(branding.darkBackground) || '#0D2940'
    };
    Object.keys(tokens).forEach(key => rootStyle.setProperty(key, tokens[key]));
  }

  const getViewDefinition_ = (v) => window.GO_PES_UTILS && window.GO_PES_UTILS.getViewDefinition(normalizeModuleKey_(v) || v);
  const getViewLabel_ = (...args) => window.GO_PES_UTILS && window.GO_PES_UTILS.getViewLabel(...args);

  function applySystemConfigUi_() {
    const config = getSystemConfig_();
    const general = config.general || {};
    const heroTitle = document.querySelector('.hero__title');
    const heroSubtitle = document.querySelector('.hero__subtitle');
    const splashText = document.querySelector('#app-loading .app-loading__text');
    const emailSuffix = document.querySelector('.email-input-group__suffix');

    if (heroTitle) heroTitle.textContent = general.appName || 'Gestor Operativo PES';
    if (heroSubtitle) heroSubtitle.textContent = [
      general.programName || '',
      general.appSubtitle || ''
    ].filter(Boolean).join(' · ');
    if (splashText) splashText.textContent = getLoadingText_();
    if (emailSuffix) emailSuffix.textContent = '@' + getAllowedUserDomain_();
    applyBrandingRuntimeTheme_();
  }

  function applyModuleDefinitionsUi_() {
    const sidebar = document.querySelector('.sidebar');
    const version = document.getElementById('app-version');
    if (!sidebar) return;

    const buttons = Array.from(sidebar.querySelectorAll('.nav-btn'));
    const defs = getNavigableModuleDefinitions_().slice().sort((a, b) => Number(a.order || 0) - Number(b.order || 0));
    const defMap = defs.reduce((acc, def) => {
      acc[def.view || def.key] = def;
      return acc;
    }, {});

    buttons.forEach(button => {
      const view = button.dataset.view;
      const def = defMap[view];
      if (!def) return;
      const label = def.label || view;
      const navLabel = button.querySelector('.nav-label');
      const navIcon = button.querySelector('.material-symbols-outlined');
      if (navLabel) navLabel.textContent = label;
      if (navIcon && def.icon) navIcon.textContent = def.icon;
      button.title = label;
    });

    defs.forEach(def => {
      const button = sidebar.querySelector(`.nav-btn[data-view="${def.view || def.key}"]`);
      if (!button || !version) return;
      sidebar.insertBefore(button, version);
    });

    renderQuickActions();
    renderHomeTiles();
  }


  const friendlyViewName_ = (v) => window.GO_PES_UTILS && window.GO_PES_UTILS.friendlyViewName(v);

  // ══════════════════════════════════════════════════════════════════════════

  window.GO_PES = window.GO_PES || {};
  Object.assign(window.GO_PES, {
    // Core
    APP: APP,
    api: api,

    ensureSociosCatalogs_: ensureSociosCatalogs_,
    ensureBuscarData_: ensureBuscarData_,
    ensureOrganizacionesModuloList_: ensureOrganizacionesModuloList_,
    ensureCatalogsForView_: ensureCatalogsForView_,

    // Utils
    buildFullName: buildFullName,
    todayISO_: todayISO_,
    friendlyBeneficioLabel_: friendlyBeneficioLabel_,
    getSystemConfig_: getSystemConfig_,
    getSocioCargoOptions_: getSocioCargoOptions_,
    getViewLabel_: getViewLabel_,

    // Form helpers
    fillSelect: fillSelect,
    populateSelectsInForm_: populateSelectsInForm_,
    syncSectorOptions: syncSectorOptions,
    formatUiValue_: formatUiValue_
  });

  // Aliases globales directos para compatibilidad
  window.APP = APP;
  window.api = api;

})();
