<script>
/**
 * Scripts_UI.html — Utilidades de UI y notificaciones
 *
 * Funciones extraídas de Scripts.html:
 * - Toast notifications (success, error, session)
 * - Session expired overlay
 * - Status messages
 * - Empty states (box y table row)
 * - Field errors inline
 * - Paginador HTML
 *
 * Creado: 2026-05-31
 * Parte de: Fase 3 Frontend - Modularización JS
 */
(() => {
  'use strict';

  // ══════════════════════════════════════════════════════════════════════════
  // SESSION EXPIRED
  // ══════════════════════════════════════════════════════════════════════════

  let _sessionExpiredShown = false;

  function showSessionExpired_() {
    if (_sessionExpiredShown) return;
    _sessionExpiredShown = true;
    const overlay = document.getElementById('session-expired-overlay');
    if (overlay) overlay.classList.remove('is-hidden');
  }

  // ══════════════════════════════════════════════════════════════════════════
  // TOAST NOTIFICATIONS
  // ══════════════════════════════════════════════════════════════════════════

  function showToast_(message, type, durationMs) {
    const container = document.getElementById('toast-container');
    if (!container) return;
    const icons = { error: 'error', success: 'check_circle', session: 'lock_person' };
    const toast = document.createElement('div');
    toast.className = 'go-toast go-toast--' + (type || 'error');
    toast.innerHTML =
      '<span class="material-symbols-outlined go-toast__icon">' + (icons[type] || 'info') + '</span>' +
      '<span class="go-toast__body">' + escapeHtml(message) + '</span>' +
      '<button type="button" class="go-toast__close" aria-label="Cerrar"><span class="material-symbols-outlined" style="font-size:1rem">close</span></button>';
    const close = () => {
      toast.classList.add('go-toast--out');
      setTimeout(() => toast.parentNode && toast.remove(), 200);
    };
    toast.querySelector('.go-toast__close').addEventListener('click', close);
    if (durationMs) setTimeout(close, durationMs);
    container.appendChild(toast);
  }

  function showSuccess(message) {
    setStatus(message, true);
    showToast_(message, 'success', 4000);
  }

  function showError(error) {
    const message = typeof error === 'string'
      ? error
      : (error && error.message ? error.message : 'Ocurrió un error.');
    setStatus(message, false);
    showToast_(message, 'error', 7000);
  }

  // ══════════════════════════════════════════════════════════════════════════
  // STATUS MESSAGE
  // ══════════════════════════════════════════════════════════════════════════

  function setStatus(message, ok) {
    const el = document.getElementById('status-message');
    if (!el) return;
    el.textContent = message;
    el.style.color = ok === false ? '#A12A2A' : ok === true ? '#0C6844' : '';
  }

  // ══════════════════════════════════════════════════════════════════════════
  // EMPTY STATES
  // ══════════════════════════════════════════════════════════════════════════

  /**
   * Genera un empty-state completo (ícono + título + mensaje opcional)
   */
  function goPesEmptyStateHtml_(icon, title, msg, extraClass) {
    const cls = ['empty-state', extraClass].filter(Boolean).join(' ');
    return `<div class="${cls}">
      <span class="material-symbols-outlined" style="font-size:2rem;opacity:.35;display:block">${icon || 'inbox'}</span>
      <strong>${escapeHtml(title || '')}</strong>
      ${msg ? `<p class="muted" style="font-size:.82rem;margin:0">${escapeHtml(msg)}</p>` : ''}
    </div>`;
  }

  /**
   * Genera una fila vacía para <tbody> (no puede usar el box de empty-state)
   */
  function goPesTableEmptyRowHtml_(icon, msg, colspan) {
    return `<tr><td colspan="${colspan || 1}" style="padding:0;border:0">
      <div style="display:flex;align-items:center;justify-content:center;gap:8px;padding:28px 16px;color:var(--text-muted,#6b7a8d);font-size:.85rem">
        <span class="material-symbols-outlined" style="opacity:.4;font-size:1.2rem">${icon || 'inbox'}</span>
        <span>${escapeHtml(msg || 'Sin registros.')}</span>
      </div>
    </td></tr>`;
  }

  // ══════════════════════════════════════════════════════════════════════════
  // FIELD ERRORS
  // ══════════════════════════════════════════════════════════════════════════

  function goPesFieldError_(el, message) {
    if (!el) return;
    const wrapper = el.closest('.field');
    if (!wrapper) return;
    let span = wrapper.querySelector('.field-error');
    if (!span) {
      span = document.createElement('span');
      span.className = 'field-error';
      span.setAttribute('role', 'alert');
      el.insertAdjacentElement('afterend', span);
    }
    span.textContent = message || '';
    wrapper.classList.toggle('has-error', !!message);
  }

  function goPesFieldClearError_(el) {
    goPesFieldError_(el, '');
  }

  // ══════════════════════════════════════════════════════════════════════════
  // PAGINATOR
  // ══════════════════════════════════════════════════════════════════════════

  function goPesPaginatorHtml_(current, total, prefix) {
    if (total <= 1) return '';
    const MAX_VISIBLE = 7;
    const makeBtn = (page, label, active, disabled) =>
      '<button type="button" class="go-pager__btn' + (active ? ' go-pager__btn--active' : '') + '"'
      + (disabled ? ' disabled' : ' data-' + prefix + '-page="' + page + '"')
      + '>' + label + '</button>';

    let pages = [];
    if (total <= MAX_VISIBLE) {
      for (let i = 1; i <= total; i++) pages.push(i);
    } else {
      if (current <= 4) {
        pages = [1, 2, 3, 4, 5, '…', total];
      } else if (current >= total - 3) {
        pages = [1, '…', total - 4, total - 3, total - 2, total - 1, total];
      } else {
        pages = [1, '…', current - 1, current, current + 1, '…', total];
      }
    }

    const buttons = pages.map(p =>
      p === '…'
        ? '<span class="go-pager__info">…</span>'
        : makeBtn(p, p, p === current, false)
    ).join('');

    const prev = makeBtn(current - 1, '‹', false, current === 1);
    const next = makeBtn(current + 1, '›', false, current === total);

    return '<div class="go-pager">' + prev + buttons + next + '</div>';
  }

  // ══════════════════════════════════════════════════════════════════════════
  // UTILS (necesarias para las funciones anteriores)
  // ══════════════════════════════════════════════════════════════════════════

  function escapeHtml(value) {
    return String(value == null ? '' : value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  // ══════════════════════════════════════════════════════════════════════════
  // API PÚBLICA (exponer a window para compatibilidad con Scripts.html)
  // ══════════════════════════════════════════════════════════════════════════

  window.GO_PES_UI = window.GO_PES_UI || {};
  Object.assign(window.GO_PES_UI, {
    showSessionExpired: showSessionExpired_,
    showToast: showToast_,
    showSuccess: showSuccess,
    showError: showError,
    setStatus: setStatus,
    emptyStateHtml: goPesEmptyStateHtml_,
    tableEmptyRowHtml: goPesTableEmptyRowHtml_,
    fieldError: goPesFieldError_,
    fieldClearError: goPesFieldClearError_,
    paginatorHtml: goPesPaginatorHtml_,
    escapeHtml: escapeHtml
  });

})();
</script>
