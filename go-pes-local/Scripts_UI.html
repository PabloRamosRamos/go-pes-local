<script>
/**
 * Scripts_UI.html — Utilidades de UI y notificaciones
 *
 * Funciones extraídas de Scripts.html:
 * - Toast notifications (success, error, session)
 * - Session expired overlay
 * - Status messages
 * - Empty states (box y table row)
 * - Field errors inline
 * - Paginador HTML
 *
 * Creado: 2026-05-31
 * Parte de: Fase 3 Frontend - Modularización JS
 */
(() => {
  'use strict';

  // ══════════════════════════════════════════════════════════════════════════
  // SESSION EXPIRED
  // ══════════════════════════════════════════════════════════════════════════

  let _sessionExpiredShown = false;

  function showSessionExpired_() {
    if (_sessionExpiredShown) return;
    _sessionExpiredShown = true;
    const overlay = document.getElementById('session-expired-overlay');
    if (overlay) overlay.classList.remove('is-hidden');
  }

  // ══════════════════════════════════════════════════════════════════════════
  // TOAST NOTIFICATIONS
  // ══════════════════════════════════════════════════════════════════════════

  function showToast_(message, type, durationMs) {
    const container = document.getElementById('toast-container');
    if (!container) return;
    const icons = { error: 'error', success: 'check_circle', session: 'lock_person' };
    const toast = document.createElement('div');
    toast.className = 'go-toast go-toast--' + (type || 'error');
    toast.innerHTML =
      '<span class="material-symbols-outlined go-toast__icon">' + (icons[type] || 'info') + '</span>' +
      '<span class="go-toast__body">' + escapeHtml(message) + '</span>' +
      '<button type="button" class="go-toast__close" aria-label="Cerrar"><span class="material-symbols-outlined" style="font-size:1rem">close</span></button>';
    const close = () => {
      toast.classList.add('go-toast--out');
      setTimeout(() => toast.parentNode && toast.remove(), 200);
    };
    toast.querySelector('.go-toast__close').addEventListener('click', close);
    if (durationMs) setTimeout(close, durationMs);
    container.appendChild(toast);
  }

  function showSuccess(message) {
    setStatus(message, true);
    showToast_(message, 'success', 4000);
  }

  /**
   * Normaliza mensajes técnicos internos a mensajes operativos para usuario.
   * Detecta nombres de campos, tablas, constantes internas y los traduce a lenguaje funcional.
   */
  function normalizeUserMessage_(rawMessage) {
    if (!rawMessage || typeof rawMessage !== 'string') {
      return 'Ocurrió un error inesperado.';
    }

    let msg = rawMessage.trim();

    // ── Mapeo de mensajes técnicos completos ──
    const exactMatches = {
      'Usuario no registrado en DIM_Usuarios.': 'Tu usuario no tiene acceso habilitado al sistema.',
      'Usuario registrado pero inactivo en DIM_Usuarios.': 'Tu acceso al sistema está deshabilitado.',
      'Falta solicitud_id.': 'No fue posible identificar la solicitud. Recarga la ficha e inténtalo nuevamente.',
      'Falta organizacion_id.': 'No fue posible identificar la organización seleccionada.',
      'GO_PES_V2 no está disponible.': 'El sistema no está disponible en este momento. Intenta nuevamente o contacta a soporte.',
      'No se pudo acceder al spreadsheet contenedor.': 'El sistema no está disponible en este momento. Intenta nuevamente o contacta a soporte.',
      'Ingresa la fecha del estado (YYYY-MM-DD)': 'Ingresa la fecha del cambio de estado.'
    };

    if (exactMatches[msg]) {
      return exactMatches[msg];
    }

    // ── Patrones de reemplazo (orden: específico → genérico) ──

    // Contexto inválido de PIN
    if (/contexto invalido\. debe ser:/i.test(msg)) {
      return 'No fue posible validar esta acción de seguridad.';
    }

    // Campos obligatorios con nombre técnico
    const fieldLabels = {
      nombre_vecino: 'Nombre',
      apellido_vecino: 'Apellido',
      telefono_contacto: 'Teléfono',
      direccion_original: 'Dirección',
      requerimiento_inicial: 'Requerimiento',
      correo_contacto: 'Correo',
      solicitud_id: 'Identificador de solicitud',
      organizacion_id: 'Identificador de organización',
      org_instrumento_id: 'Identificador de beneficio',
      nombre_organizacion: 'Nombre de organización',
      tipo_organizacion: 'Tipo de organización',
      fecha_ingreso: 'Fecha de ingreso',
      observacion: 'Observación'
    };

    // "Falta el campo obligatorio: nombre_vecino" → "Debes completar el campo Nombre."
    msg = msg.replace(
      /falta\s+el\s+campo\s+obligatorio:\s*(\w+)/gi,
      (match, field) => {
        const label = fieldLabels[field] || field;
        return `Debes completar el campo ${label}`;
      }
    );

    // "El campo nombre_vecino es obligatorio" → "Debes completar el campo Nombre"
    msg = msg.replace(
      /el\s+campo\s+(\w+)\s+es\s+obligatorio/gi,
      (match, field) => {
        const label = fieldLabels[field] || field;
        return `Debes completar el campo ${label}`;
      }
    );

    // Reemplazar nombres técnicos sueltos por etiquetas
    Object.keys(fieldLabels).forEach(techName => {
      const regex = new RegExp(`\\b${techName}\\b`, 'gi');
      msg = msg.replace(regex, fieldLabels[techName]);
    });

    // Referencias a tablas internas (DIM_*, MAE_*, FACT_*, etc.)
    if (/\b(DIM|MAE|FACT|RAW|CFG|LOG|VW)_[A-Z_]+\b/i.test(msg)) {
      msg = msg.replace(/\b(DIM|MAE|FACT|RAW|CFG|LOG|VW)_[A-Z_]+\b/gi, 'el sistema');
    }

    // Referencias a constantes globales
    msg = msg.replace(/\bGO_PES_V2\b/g, 'el sistema');
    msg = msg.replace(/\bSpreadsheet\b/gi, 'el sistema');

    // Errores de spreadsheet/acceso
    if (/no\s+se\s+encontr[oó]\s+el\s+spreadsheet/i.test(msg)) {
      return 'El sistema no está disponible en este momento. Intenta nuevamente o contacta a soporte.';
    }

    // JSON stringify crudo (ej: {"errors":[...]})
    if (/^\{.*\}$/.test(msg) || /^\[.*\]$/.test(msg)) {
      return 'Ocurrió un error al procesar la solicitud. Revisa los datos e inténtalo nuevamente.';
    }

    // Mensajes que ya están bien escritos para usuario (dejarlos pasar)
    return msg;
  }

  function showError(error) {
    const rawMessage = typeof error === 'string'
      ? error
      : (error && error.message ? error.message : 'Ocurrió un error.');

    const message = normalizeUserMessage_(rawMessage);
    setStatus(message, false);
    showToast_(message, 'error', 7000);
  }

  // ══════════════════════════════════════════════════════════════════════════
  // STATUS MESSAGE
  // ══════════════════════════════════════════════════════════════════════════

  function setStatus(message, ok) {
    const el = document.getElementById('status-message');
    if (!el) return;
    el.textContent = message;
    el.style.color = ok === false ? '#A12A2A' : ok === true ? '#0C6844' : '';
  }

  // ══════════════════════════════════════════════════════════════════════════
  // EMPTY STATES
  // ══════════════════════════════════════════════════════════════════════════

  /**
   * Genera un empty-state completo (ícono + título + mensaje opcional)
   */
  function goPesEmptyStateHtml_(icon, title, msg, extraClass) {
    const cls = ['empty-state', extraClass].filter(Boolean).join(' ');
    return `<div class="${cls}">
      <span class="material-symbols-outlined" style="font-size:2rem;opacity:.35;display:block">${icon || 'inbox'}</span>
      <strong>${escapeHtml(title || '')}</strong>
      ${msg ? `<p class="muted" style="font-size:.82rem;margin:0">${escapeHtml(msg)}</p>` : ''}
    </div>`;
  }

  /**
   * Genera una fila vacía para <tbody> (no puede usar el box de empty-state)
   */
  function goPesTableEmptyRowHtml_(icon, msg, colspan) {
    return `<tr><td colspan="${colspan || 1}" style="padding:0;border:0">
      <div style="display:flex;align-items:center;justify-content:center;gap:8px;padding:28px 16px;color:var(--text-muted,#6b7a8d);font-size:.85rem">
        <span class="material-symbols-outlined" style="opacity:.4;font-size:1.2rem">${icon || 'inbox'}</span>
        <span>${escapeHtml(msg || 'Sin registros.')}</span>
      </div>
    </td></tr>`;
  }

  // ══════════════════════════════════════════════════════════════════════════
  // FIELD ERRORS
  // ══════════════════════════════════════════════════════════════════════════

  function goPesFieldError_(el, message) {
    if (!el) return;
    const wrapper = el.closest('.field');
    if (!wrapper) return;
    let span = wrapper.querySelector('.field-error');
    if (!span) {
      span = document.createElement('span');
      span.className = 'field-error';
      span.setAttribute('role', 'alert');
      el.insertAdjacentElement('afterend', span);
    }
    span.textContent = message || '';
    wrapper.classList.toggle('has-error', !!message);
  }

  function goPesFieldClearError_(el) {
    goPesFieldError_(el, '');
  }

  // ══════════════════════════════════════════════════════════════════════════
  // PAGINATOR
  // ══════════════════════════════════════════════════════════════════════════

  function goPesPaginatorHtml_(current, total, prefix) {
    if (total <= 1) return '';
    const MAX_VISIBLE = 7;
    const makeBtn = (page, label, active, disabled) =>
      '<button type="button" class="go-pager__btn' + (active ? ' go-pager__btn--active' : '') + '"'
      + (disabled ? ' disabled' : ' data-' + prefix + '-page="' + page + '"')
      + '>' + label + '</button>';

    let pages = [];
    if (total <= MAX_VISIBLE) {
      for (let i = 1; i <= total; i++) pages.push(i);
    } else {
      if (current <= 4) {
        pages = [1, 2, 3, 4, 5, '…', total];
      } else if (current >= total - 3) {
        pages = [1, '…', total - 4, total - 3, total - 2, total - 1, total];
      } else {
        pages = [1, '…', current - 1, current, current + 1, '…', total];
      }
    }

    const buttons = pages.map(p =>
      p === '…'
        ? '<span class="go-pager__info">…</span>'
        : makeBtn(p, p, p === current, false)
    ).join('');

    const prev = makeBtn(current - 1, '‹', false, current === 1);
    const next = makeBtn(current + 1, '›', false, current === total);

    return '<div class="go-pager">' + prev + buttons + next + '</div>';
  }

  // ══════════════════════════════════════════════════════════════════════════
  // UTILS (necesarias para las funciones anteriores)
  // ══════════════════════════════════════════════════════════════════════════

  function escapeHtml(value) {
    return String(value == null ? '' : value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  // ══════════════════════════════════════════════════════════════════════════
  // API PÚBLICA (exponer a window para compatibilidad con Scripts.html)
  // ══════════════════════════════════════════════════════════════════════════

  window.GO_PES_UI = window.GO_PES_UI || {};
  Object.assign(window.GO_PES_UI, {
    showSessionExpired: showSessionExpired_,
    showToast: showToast_,
    showSuccess: showSuccess,
    showError: showError,
    setStatus: setStatus,
    emptyStateHtml: goPesEmptyStateHtml_,
    tableEmptyRowHtml: goPesTableEmptyRowHtml_,
    fieldError: goPesFieldError_,
    fieldClearError: goPesFieldClearError_,
    paginatorHtml: goPesPaginatorHtml_,
    escapeHtml: escapeHtml
  });

})();
</script>
