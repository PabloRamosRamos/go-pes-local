  .config-visual-kit-toggle__btn.is-active {
    background: var(--accent-soft);
    border-color: var(--interactive-border-strong);
    color: var(--accent-strong);
  }

  .config-visual-kit-stage {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: var(--space-5);
    align-items: start;
  }

  .config-branding-visual-kit[data-ui-kit-mode="light"] .config-visual-kit-stage,
  .config-branding-visual-kit[data-ui-kit-mode="dark"] .config-visual-kit-stage {
    grid-template-columns: 1fr;
  }

  .config-visual-kit-stage__item {
    min-width: 0;
  }

  .config-visual-kit-preview {
    --runtime-brand-primary: var(--runtime-brand-primary, #214E8A);
    --runtime-brand-secondary: var(--runtime-brand-secondary, #007C4A);
    --runtime-brand-accent: var(--runtime-brand-accent, #03C2AE);
    --runtime-brand-progress: var(--runtime-brand-progress, #8CC63F);
    --runtime-brand-light: var(--runtime-brand-light, #F7FAFC);
    --runtime-brand-dark: var(--runtime-brand-dark, #0D2940);
    padding: var(--space-4);
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    background: linear-gradient(180deg, color-mix(in srgb, var(--runtime-brand-light, var(--bg)) 72%, #ffffff) 0%, var(--surface) 100%);
    box-shadow: var(--shadow-sm);
    color: var(--text);
  }

  .config-visual-kit-preview.theme-dark {
    color-scheme: dark;
    --brand-blue: #74c8e6;
    --brand-blue-dark: #a9ebfb;
    --brand-blue-soft: #173140;
    --brand-green: #9fd85a;
    --brand-green-dark: #c7ee96;
    --brand-green-soft: #1d2b18;
    --brand-teal: #36d5bf;
    --brand-teal-dark: #7be8dc;
    --brand-teal-soft: #142d29;
    --text: #e8eff6;
    --text-secondary: #c4d2e1;
    --text-muted: #8ea2b4;
    --border: #294356;
    --border-strong: #4aa8c8;
    --bg: #0c131d;
    --surface: #14202d;
    --surface-alt: #182635;
    --surface-soft: #1b2a39;
    --success: #9fd85a;
    --success-dark: #d7f4b0;
    --success-soft: #21311a;
    --info: #74c8e6;
    --info-soft: #163243;
    --disabled: #738497;
    --disabled-soft: #18232f;
    --danger-soft: #311b22;
    --warning-soft: #352815;
    --shadow-sm: 0 6px 18px rgba(0, 0, 0, 0.28);
    --shadow-md: 0 12px 26px rgba(0, 0, 0, 0.34);
    --shadow-lg: 0 26px 56px rgba(0, 0, 0, 0.42);
    --accent: var(--runtime-brand-primary, #74c8e6);
    --accent-strong: color-mix(in srgb, var(--runtime-brand-primary, #74c8e6) 76%, white);
    --accent-soft: color-mix(in srgb, var(--runtime-brand-primary, #74c8e6) 18%, var(--surface));
    --success-accent: var(--runtime-brand-secondary, #9fd85a);
    --highlight-accent: var(--runtime-brand-accent, #36d5bf);
    --highlight-soft: color-mix(in srgb, var(--runtime-brand-accent, #36d5bf) 12%, var(--surface));
    --app-bg-start: color-mix(in srgb, var(--runtime-brand-dark, #0f1824) 76%, #08111a);
    --app-bg-end: color-mix(in srgb, var(--runtime-brand-dark, #0b121b) 62%, #05090e);
    --heading-color: color-mix(in srgb, var(--runtime-brand-primary, #74c8e6) 74%, #f5fbff);
    --eyebrow-color: color-mix(in srgb, var(--runtime-brand-accent, #9fd85a) 72%, white);
    --interactive-surface: #172433;
    --interactive-hover: color-mix(in srgb, var(--runtime-brand-primary, #74c8e6) 16%, #172433);
    --interactive-border-strong: color-mix(in srgb, var(--runtime-brand-primary, #74c8e6) 42%, var(--border));
    --focus-ring: color-mix(in srgb, var(--runtime-brand-primary, #74c8e6) 28%, transparent);
    --input-bg: #152230;
    --input-border: #294356;
    --input-placeholder: #8ea2b4;
    --table-header-bg: #182635;
    --table-header-fg: color-mix(in srgb, var(--runtime-brand-primary, #74c8e6) 72%, white);
    --table-row-hover: color-mix(in srgb, var(--runtime-brand-primary, #74c8e6) 7%, #14202d);
    --badge-bg: color-mix(in srgb, var(--runtime-brand-primary, #74c8e6) 18%, #14202d);
    --badge-fg: #e8f7ff;
    --primary-btn-bg: var(--runtime-brand-secondary, #9fd85a);
    --primary-btn-bg-hover: color-mix(in srgb, var(--runtime-brand-secondary, #9fd85a) 86%, white);
    --primary-btn-fg: #08131d;
    --secondary-btn-bg: #172433;
    --secondary-btn-bg-hover: #203143;
    --secondary-btn-border: #294356;
    --secondary-btn-fg: #e8eff6;
    --danger-btn-bg: #3a1f26;
    --danger-btn-bg-hover: #472730;
    --danger-btn-border: #8f4c58;
    --danger-btn-fg: #ffe1db;
    --alert-danger-bg: #2b1820;
    --alert-danger-border: #7d4350;
    --alert-danger-fg: #ffd7d2;
    --alert-warning-bg: #342615;
    --alert-warning-border: #8f6a28;
    --alert-warning-fg: #ffd98a;
    --alert-info-bg: #132b3a;
    --alert-info-border: #3b7190;
    --alert-info-fg: #9fe5ff;
    --reminder-bg: #172433;
    --reminder-border: #355468;
    --reminder-icon: #7be8dc;
    background: linear-gradient(180deg, color-mix(in srgb, var(--runtime-brand-dark, #0D2940) 88%, #08131d) 0%, #0b1621 100%);
  }

  .config-visual-kit-preview__surface {
    display: grid;
    gap: var(--space-4);
  }

  .config-visual-kit-section {
    display: grid;
    gap: var(--space-4);
    padding: var(--space-5);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    background: var(--surface);
    box-shadow: var(--shadow-sm);
  }

  .config-visual-kit-section__head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: var(--space-3);
  }

  .config-visual-kit-section__head h4,
  .config-visual-kit-color-card strong,
  .config-visual-kit-typography-card h2 {
    margin: 0;
  }

  .config-visual-kit-type-grid,
  .config-visual-kit-inline-grid,
  .config-visual-kit-panel-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: var(--space-4);
    align-items: start;
  }

  .config-visual-kit-type-scale,
  .config-visual-kit-stack {
    display: grid;
    gap: var(--space-3);
  }

  .config-visual-kit-typography-card,
  .config-visual-kit-type-row,
  .config-visual-kit-color-card {
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    background: var(--surface-soft);
    padding: var(--space-4);
  }

  .config-visual-kit-meta-list,
  .config-visual-kit-type-row {
    display: grid;
    gap: var(--space-2);
  }

  .config-visual-kit-meta-list div,
  .config-visual-kit-type-row > div {
    display: grid;
    gap: 2px;
  }

  .config-visual-kit-meta-list span,
  .config-visual-kit-type-row span,
  .config-visual-kit-color-card span,
  .config-visual-kit-color-card small {
    color: var(--text-muted);
  }

  .config-visual-kit-type-display {
    margin: 0;
    font-size: var(--font-size-display);
    font-weight: var(--font-weight-bold);
    line-height: var(--line-tight);
  }

  .config-visual-kit-type-h1,
  .config-visual-kit-type-h2,
  .config-visual-kit-type-h3,
  .config-visual-kit-type-body,
  .config-visual-kit-type-caption {
    margin: 0;
  }

  .config-visual-kit-type-caption {
    font-size: var(--font-size-sm);
    color: var(--text-secondary);
  }

  .config-visual-kit-color-grid,
  .config-visual-kit-card-grid,
  .config-visual-kit-alert-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: var(--space-4);
  }

  .config-visual-kit-color-card {
    grid-template-columns: 52px minmax(0, 1fr) auto;
    align-items: center;
  }

  .config-visual-kit-color-card__swatch {
    width: 52px;
    height: 52px;
    border-radius: var(--radius-lg);
    border: 1px solid color-mix(in srgb, var(--text) 10%, transparent);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.1);
  }

  .config-visual-kit-color-card code {
    padding: 6px 10px;
    border-radius: var(--radius-md);
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: var(--font-size-sm);
    white-space: nowrap;
  }

  .config-visual-kit-button-row,
  .config-visual-kit-chip-row,
  .config-visual-kit-radio-row {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-3);
    align-items: center;
  }

  .config-visual-kit-button-row .secondary-btn[disabled] {
    opacity: .5;
    cursor: not-allowed;
    box-shadow: none;
    transform: none;
  }

  .config-visual-kit-form-grid {
    background: transparent;
    border: 0;
    box-shadow: none;
    padding: 0;
  }

  .config-visual-kit-check {
    display: inline-flex;
    align-items: center;
    gap: var(--space-2);
    font-weight: var(--font-weight-medium);
    color: var(--text);
  }

  .config-visual-kit-check input {
    width: 16px;
    min-height: 16px;
    height: 16px;
    margin: 0;
    accent-color: var(--accent);
  }

  .config-visual-kit-card-sample {
    min-height: 164px;
    align-content: start;
  }

  .config-visual-kit-card-sample__head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: var(--space-3);
  }

  .config-visual-kit-avance-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: var(--space-4);
  }

  .config-visual-kit-avance-grid .avance-hito-card {
    cursor: default;
  }

  .config-visual-kit-table-wrap {
    margin-top: 0;
  }

  .config-visual-kit-table-wrap .secondary-btn {
    min-height: 34px;
    padding: 0 12px;
  }

  .config-visual-kit-alert-grid .inicio-alert-item,
  .config-visual-kit-alert-grid .inicio-reminder-item {
    min-height: 104px;
  }

  .config-visual-kit-panel-grid .beneficios-block,
  .config-visual-kit-panel-grid .panel {
    height: 100%;
  }

  @media (max-width: 1180px) {
    .config-layout {
      grid-template-columns: 1fr;
    }

    .config-nav {
      position: static;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }

    .config-subgrid {
      grid-template-columns: 1fr;
    }

    .config-branding-layout {
      grid-template-columns: 1fr;
    }

    .config-branding-preview-panel {
      position: static;
    }

    .config-visual-kit-stage,
    .config-visual-kit-type-grid,
    .config-visual-kit-inline-grid,
    .config-visual-kit-panel-grid,
    .config-visual-kit-card-grid,
    .config-visual-kit-color-grid,
    .config-visual-kit-alert-grid,
    .config-visual-kit-avance-grid {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 760px) {
    .config-grid {
      grid-template-columns: 1fr;
    }

    .config-nav {
      grid-template-columns: 1fr;
    }

    .config-branding-logo-grid,
    .config-branding-palette-grid,
    .config-branding-mini__legend {
      grid-template-columns: 1fr;
    }

    .config-branding-card__head,
    .config-visual-kit-section__head {
      flex-direction: column;
      align-items: flex-start;
    }

    .config-branding-visual-kit,
    .config-visual-kit-section,
    .config-visual-kit-preview {
      padding: var(--space-4);
    }
  }

  .user-email-field {
    align-self: start;
  }

  .email-input-group {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    width: 100%;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    overflow: hidden;
    background: var(--surface);
  }

  .email-input-group:focus-within {
    outline: 2px solid rgba(61, 150, 180, .18);
    border-color: var(--brand-blue);
  }

  .email-input-group input {
    border: 0;
    border-radius: 0;
    min-width: 0;
  }

  .email-input-group input:focus {
    outline: 0;
    border-color: transparent;
  }

  .email-input-group__suffix {
    display: inline-flex;
    align-items: center;
    padding: 0 14px;
    border-left: 1px solid var(--border);
    background: var(--surface-soft);
    color: var(--brand-blue-dark);
    font-size: var(--font-size-md);
    font-weight: var(--font-weight-semibold);
    white-space: nowrap;
  }

  .app-loading__text {
    margin: 0;
    font-size: clamp(1rem, 1.35vw, 1.16rem);
    font-weight: var(--font-weight-bold);
    color: rgba(235, 244, 252, 0.96);
    letter-spacing: 0.02em;
  }

  .splash-screen {
    position: relative;
    width: min(1080px, calc(100vw - 64px));
    min-height: min(720px, calc(100vh - 64px));
    padding: clamp(28px, 4vw, 44px);
    border-radius: 36px;
    overflow: hidden;
    border: 1px solid rgba(186, 214, 235, 0.16);
    background:
      radial-gradient(circle at top left, color-mix(in srgb, var(--runtime-brand-primary, #3890B0) 28%, transparent), transparent 34%),
      radial-gradient(circle at bottom right, color-mix(in srgb, var(--runtime-brand-accent, #00C0A8) 22%, transparent), transparent 30%),
      linear-gradient(155deg, var(--runtime-brand-dark, #0d2940) 0%, color-mix(in srgb, var(--runtime-brand-primary, #154f69) 58%, var(--runtime-brand-dark, #0d2940)) 48%, color-mix(in srgb, var(--runtime-brand-secondary, #11453f) 68%, var(--runtime-brand-dark, #0d2940)) 100%);
    box-shadow:
      0 36px 80px rgba(4, 14, 31, 0.34),
      inset 0 1px 0 rgba(255, 255, 255, 0.08);
  }

  .splash-screen__ambient,
  .splash-screen__ambient-orb,
  .splash-screen__ambient-grid {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .splash-screen__ambient-orb {
    filter: blur(6px);
    opacity: 0.8;
  }

  .splash-screen__ambient-orb--one {
    inset: -12% auto auto -8%;
    width: 360px;
    height: 360px;
    border-radius: 50%;
    background: radial-gradient(circle, color-mix(in srgb, var(--runtime-brand-primary, #3890B0) 28%, transparent), transparent);
    animation: splashOrbFloatOne 12s ease-in-out infinite alternate;
  }

  .splash-screen__ambient-orb--two {
    inset: auto -8% -18% auto;
    width: 420px;
    height: 420px;
    border-radius: 50%;
    background: radial-gradient(circle, color-mix(in srgb, var(--runtime-brand-accent, #00C0A8) 24%, transparent), transparent);
    animation: splashOrbFloatTwo 14s ease-in-out infinite alternate;
  }

  .splash-screen__ambient-grid {
    background:
      linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
    background-size: 42px 42px;
    mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.45), transparent 88%);
    opacity: 0.18;
    animation: splashGridDrift 20s linear infinite;
  }

  .splash-screen__content {
    position: relative;
    z-index: 1;
    min-height: min(632px, calc(100vh - 160px));
    display: grid;
    align-content: space-between;
    gap: clamp(28px, 4vw, 48px);
  }

  .splash-screen__brand {
    display: grid;
    justify-items: center;
    gap: clamp(24px, 3vw, 34px);
    text-align: center;
    padding-top: clamp(22px, 3vw, 38px);
  }

  .splash-screen__logo-wrap {
    position: relative;
    width: clamp(180px, 24vw, 248px);
    height: clamp(180px, 24vw, 248px);
    display: grid;
    place-items: center;
    animation: splashLogoFloat 5.4s ease-in-out infinite;
  }

  .splash-screen__logo-ring,
  .splash-screen__logo-sheen,
  .splash-screen__logo-core {
    position: absolute;
    inset: 0;
    border-radius: 50%;
  }

  .splash-screen__logo-ring--outer {
    border: 1px solid color-mix(in srgb, var(--runtime-brand-primary, #7CC4DC) 24%, transparent);
    box-shadow:
      0 0 0 1px rgba(255, 255, 255, 0.04) inset,
      0 0 0 18px rgba(255, 255, 255, 0.02);
    animation: splashRingSpin 16s linear infinite;
  }

  .splash-screen__logo-ring--inner {
    inset: 16px;
    border: 1px solid color-mix(in srgb, var(--runtime-brand-accent, #00C0A8) 34%, transparent);
    animation: splashRingSpinReverse 10s linear infinite;
  }

  .splash-screen__logo-sheen {
    display: none;
  }

  .splash-screen__logo-core {
    inset: 26px;
    display: grid;
    place-items: center;
    overflow: hidden;
    border: 0;
    background: transparent;
    box-shadow: none;
    backdrop-filter: none;
  }

  .splash-screen__logo-core::after {
    display: none;
  }

  .splash-screen__logo {
    width: 64%;
    max-height: 64%;
    object-fit: contain;
    filter: drop-shadow(0 12px 18px rgba(3, 12, 28, 0.22));
    animation: splashLogoPulse 4.2s ease-in-out infinite;
  }

  .splash-screen__copy {
    display: grid;
    gap: 12px;
    max-width: 760px;
  }

  .splash-screen__eyebrow {
    margin: 0;
    font-size: var(--font-size-sm);
    font-weight: var(--font-weight-bold);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: color-mix(in srgb, var(--runtime-brand-accent, #97E2D7) 90%, white);
  }

  .splash-screen__title {
    margin: 0;
    font-size: clamp(2.2rem, 5vw, 4.1rem);
    line-height: 1.03;
    color: #f6fbff;
    letter-spacing: -0.04em;
  }

  .splash-screen__meta {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 14px;
    color: rgba(222, 237, 248, 0.84);
    font-size: var(--font-size-base);
  }

  .splash-screen__version {
    padding: 9px 14px;
    border-radius: var(--radius-pill);
    border: 1px solid color-mix(in srgb, var(--runtime-brand-primary, #7AC5DC) 20%, transparent);
    background: color-mix(in srgb, var(--runtime-brand-primary, #3890B0) 12%, transparent);
    font-weight: var(--font-weight-semibold);
  }

  .splash-screen__divider {
    width: 42px;
    height: 1px;
    background: linear-gradient(90deg, transparent, color-mix(in srgb, var(--runtime-brand-progress, #88C038) 76%, transparent), transparent);
  }

  .splash-screen__institution {
    font-weight: var(--font-weight-medium);
  }

  .splash-screen__progress-block {
    display: grid;
    gap: 16px;
    padding: clamp(22px, 2.5vw, 28px);
    border-radius: 28px;
    border: 1px solid color-mix(in srgb, var(--runtime-brand-primary, #7CC4DC) 16%, transparent);
    background:
      linear-gradient(180deg, color-mix(in srgb, var(--runtime-brand-primary, #3890B0) 16%, transparent), rgba(255, 255, 255, 0.04));
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
  }

  .splash-screen__progress-head,
  .splash-screen__progress-footer {
    display: flex;
    justify-content: space-between;
    gap: 18px;
    align-items: end;
  }

  .splash-screen__progress-label,
  .splash-screen__status,
  .splash-screen__powered {
    margin: 0;
  }

  .splash-screen__progress-label {
    font-size: var(--font-size-xs);
    font-weight: var(--font-weight-bold);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: color-mix(in srgb, var(--runtime-brand-accent, #97E2D7) 80%, white);
    margin-bottom: 8px;
  }

  .splash-screen__percent {
    min-width: 74px;
    padding: 10px 14px;
    border-radius: var(--radius-pill);
    background: color-mix(in srgb, var(--runtime-brand-primary, #3890B0) 14%, transparent);
    border: 1px solid color-mix(in srgb, var(--runtime-brand-primary, #7AC5DC) 18%, transparent);
    text-align: center;
    color: #f6fbff;
    font-weight: var(--font-weight-bold);
    font-size: clamp(1rem, 1.8vw, 1.22rem);
  }

  .splash-screen__progress-track {
    position: relative;
    height: 14px;
    border-radius: 999px;
    overflow: hidden;
    background: rgba(9, 29, 40, 0.48);
    border: 1px solid color-mix(in srgb, var(--runtime-brand-primary, #7AC5DC) 16%, transparent);
  }

  .splash-screen__progress-track::before {
    content: '';
    position: absolute;
    inset: 2px;
    border-radius: inherit;
    background: linear-gradient(90deg, color-mix(in srgb, var(--runtime-brand-primary, #3890B0) 10%, transparent), rgba(255, 255, 255, 0.01));
  }

  .splash-screen__progress-bar {
    position: absolute;
    inset: 0 auto 0 0;
    width: 0%;
    border-radius: inherit;
    background:
      linear-gradient(90deg, var(--runtime-brand-primary, #3890B0) 0%, var(--runtime-brand-accent, #00C0A8) 58%, var(--runtime-brand-progress, #88C038) 100%);
    box-shadow:
      0 0 22px color-mix(in srgb, var(--runtime-brand-accent, #00C0A8) 28%, transparent),
      inset 0 1px 0 rgba(255, 255, 255, 0.22);
    transition: width 0.18s linear;
  }

  .splash-screen__progress-bar::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(120deg, transparent 20%, rgba(255, 255, 255, 0.38) 50%, transparent 80%);
    animation: splashProgressSweep 1.8s linear infinite;
  }

  .splash-screen__status {
    color: rgba(226, 238, 247, 0.82);
    font-size: var(--font-size-sm);
  }

  .splash-screen__powered {
    color: rgba(151, 226, 215, 0.74);
    font-size: var(--font-size-xs);
    font-weight: var(--font-weight-bold);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    text-align: right;
  }

  @keyframes splashOrbFloatOne {
    0% { transform: translate3d(0, 0, 0) scale(1); }
    100% { transform: translate3d(32px, 18px, 0) scale(1.08); }
  }

  @keyframes splashOrbFloatTwo {
    0% { transform: translate3d(0, 0, 0) scale(1); }
    100% { transform: translate3d(-28px, -16px, 0) scale(1.09); }
  }

  @keyframes splashGridDrift {
    from { transform: translate3d(0, 0, 0); }
    to { transform: translate3d(24px, 16px, 0); }
  }

  @keyframes splashLogoFloat {
    0%, 100% { transform: translate3d(0, 0, 0); }
    50% { transform: translate3d(0, -10px, 0); }
  }

  @keyframes splashLogoPulse {
    0%, 100% { transform: scale(0.97); }
    50% { transform: scale(1.02); }
  }

  @keyframes splashRingSpin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  @keyframes splashRingSpinReverse {
    from { transform: rotate(360deg); }
    to { transform: rotate(0deg); }
  }

  @keyframes splashLogoSweep {
    0%, 100% { transform: translateX(-120%) rotate(8deg); opacity: 0; }
    26%, 72% { opacity: 1; }
    52% { transform: translateX(130%) rotate(8deg); opacity: 0.78; }
  }

  @keyframes splashProgressSweep {
    from { transform: translateX(-28%); }
    to { transform: translateX(28%); }
  }

  /* Avance como barras de progreso */
  .avance-shell {
    display: flex;
    flex-direction: column;
    gap: var(--space-7);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    padding: var(--space-7);
    box-shadow: var(--shadow-md);
  }

  .avance-header {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: var(--space-6);
    align-items: end;
  }

  .avance-section {
    display: flex;
    flex-direction: column;
    gap: var(--space-4);
  }

  .avance-hitos-grid,
  #avance-pre-grid,
  #avance-for-grid {
    display: grid;
    grid-template-columns: repeat(8, minmax(0, 1fr));
    gap: var(--space-4);
    align-items: stretch;
    align-content: start;
    grid-auto-rows: 1fr;
  }

  .avance-hito-card {
    width: auto;
    min-height: 182px;
    aspect-ratio: auto;
    position: relative;
    overflow: hidden;
    isolation: isolate;
    border: 1px solid var(--avance-card-border);
    border-radius: 16px;
    background: var(--avance-card-bg);
    padding: 16px 16px 14px;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: flex-start;
    gap: 14px;
    text-align: left;
    cursor: pointer;
    transition:
      transform .18s ease,
      box-shadow .18s ease,
      border-color .18s ease,
      background-color .18s ease,
      opacity .18s ease;
    box-shadow: var(--avance-card-shadow);
    min-width: 0;
    max-width: none;
    grid-column: auto;
    justify-self: stretch;
    align-self: stretch;
    appearance: none;
  }

  .avance-hito-card::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at top right, color-mix(in srgb, var(--avance-card-icon-fg) 10%, transparent) 0%, transparent 38%),
      linear-gradient(180deg, rgba(255,255,255,0.04) 0%, transparent 34%);
    pointer-events: none;
    z-index: -1;
  }

  .avance-hito-card__head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    width: 100%;
  }

  .avance-hito-card__eyebrow {
    display: inline-flex;
    align-items: center;
    min-height: 30px;
    padding: 5px 12px;
    border-radius: var(--radius-pill);
    background: var(--avance-card-head-bg);
    color: var(--avance-card-head-fg);
    font-size: 10px;
    font-weight: var(--font-weight-bold);
    letter-spacing: .12em;
    text-transform: uppercase;
    box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--avance-card-head-fg) 10%, transparent);
  }

  .avance-hitos-grid > *,
  #avance-pre-grid > *,
  #avance-for-grid > * {
    display: flex;
    width: auto;
    grid-column: auto;
    min-width: 0;
    max-width: none;
    justify-self: stretch;
    align-self: stretch;
  }

  .avance-hito-card:hover:not(:disabled) {
    transform: translateY(-3px);
    border-color: var(--avance-card-border-hover);
    box-shadow: var(--avance-card-shadow-hover);
  }

  .avance-hito-card:disabled {
    cursor: default;
  }

  .avance-hito-card:focus-visible {
    outline: none;
    border-color: color-mix(in srgb, var(--accent) 58%, var(--avance-card-border));
    box-shadow:
      0 0 0 4px color-mix(in srgb, var(--accent) 18%, transparent),
      var(--avance-card-shadow-hover);
  }

  .avance-hito-card:active:not(:disabled) {
    transform: translateY(-1px) scale(0.995);
  }

  .avance-hito-card__icon {
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 0 0 auto;
    width: 42px;
    height: 42px;
    border-radius: 14px;
    background: var(--avance-card-icon-bg);
    color: var(--avance-card-icon-fg);
    box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--avance-card-icon-fg) 16%, transparent);
  }

  .avance-hito-card__icon .material-symbols-outlined {
    font-size: 24px;
    line-height: 1;
    color: currentColor;
  }

  .avance-hito-card__body {
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: flex-start;
    width: 100%;
    min-width: 0;
    flex: 1;
  }

  .avance-hito-card__title {
    font-size: 16px;
    font-weight: var(--font-weight-extrabold);
    line-height: 1.24;
    color: var(--avance-card-title);
    max-width: none;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .avance-hito-card__status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: var(--radius-pill);
    background: var(--avance-card-status-bg);
    font-size: 10px;
    font-weight: var(--font-weight-bold);
    line-height: 1.2;
    color: var(--avance-card-status-fg);
    text-transform: uppercase;
    letter-spacing: .1em;
  }

  .avance-hito-card__status::before {
    content: "";
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.92;
    flex: 0 0 auto;
  }

  .avance-hito-card__detail {
    margin-top: auto;
    width: 100%;
    padding-top: 12px;
    border-top: 1px dashed var(--avance-card-divider);
    font-size: 12px;
    line-height: 1.35;
    color: var(--avance-card-detail);
    min-height: 44px;
    max-width: none;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .avance-hito-card.is-completed {
    border-color: var(--avance-card-success-border);
    background: var(--avance-card-success-bg);
  }

  .avance-hito-card.is-completed .avance-hito-card__icon .material-symbols-outlined {
    font-variation-settings: 'FILL' 1, 'wght' 500, 'GRAD' 0, 'opsz' 24;
  }

  .avance-hito-card.is-completed .avance-hito-card__eyebrow {
    background: var(--avance-card-success-pill-bg);
    color: var(--avance-card-success-pill-fg);
  }

  .avance-hito-card.is-completed .avance-hito-card__status {
    color: var(--avance-card-success-pill-fg);
    background: var(--avance-card-success-pill-bg);
  }

  .avance-hito-card.is-completed .avance-hito-card__icon {
    background: var(--avance-card-success-icon-bg);
    color: var(--avance-card-success-border);
    box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--avance-card-success-border) 18%, transparent);
  }

  .avance-hito-card.is-enabled {
    border-color: var(--avance-card-info-border);
    background: var(--avance-card-info-bg);
  }

  .avance-hito-card.is-enabled .avance-hito-card__icon .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 500, 'GRAD' 0, 'opsz' 24;
  }

  .avance-hito-card.is-enabled .avance-hito-card__eyebrow {
    background: var(--avance-card-info-pill-bg);
    color: var(--avance-card-info-pill-fg);
  }

  .avance-hito-card.is-enabled .avance-hito-card__status {
    color: var(--avance-card-info-pill-fg);
    background: var(--avance-card-info-pill-bg);
  }

  .avance-hito-card.is-enabled .avance-hito-card__icon {
    background: var(--avance-card-info-icon-bg);
    color: var(--avance-card-info-border);
    box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--avance-card-info-border) 20%, transparent);
  }

  .avance-hito-card.is-blocked {
    border-color: var(--avance-card-blocked-border);
    background: var(--avance-card-blocked-bg);
    box-shadow: 0 10px 24px rgba(36, 54, 75, 0.05);
  }

  .avance-hito-card.is-blocked .avance-hito-card__icon .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 350, 'GRAD' 0, 'opsz' 24;
  }

  .avance-hito-card.is-blocked .avance-hito-card__eyebrow {
    background: var(--avance-card-blocked-pill-bg);
    color: var(--avance-card-blocked-pill-fg);
  }

  .avance-hito-card.is-blocked .avance-hito-card__status {
    color: var(--avance-card-blocked-pill-fg);
    background: var(--avance-card-blocked-pill-bg);
  }

  .avance-hito-card.is-blocked .avance-hito-card__icon {
    background: var(--avance-card-blocked-icon-bg);
    color: var(--avance-card-blocked-border);
    box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--avance-card-blocked-border) 18%, transparent);
  }

  .avance-hito-card.is-blocked .avance-hito-card__title {
    color: color-mix(in srgb, var(--avance-card-title) 84%, var(--avance-card-blocked-border));
  }

  .avance-hito-card.is-blocked .avance-hito-card__detail {
    color: color-mix(in srgb, var(--avance-card-detail) 88%, var(--avance-card-blocked-border));
  }

  .avance-hito-card[data-estado="Pendiente"] {
    border-color: color-mix(in srgb, var(--warning) 42%, var(--avance-card-border));
  }

  .avance-timeline {
    display: flex;
    flex-direction: column;
    gap: var(--space-4);
  }

  .avance-resumen {
    display: block;
  }

  .avance-resumen-layout {
    display: grid;
    grid-template-columns: minmax(260px, 0.32fr) minmax(0, 1fr);
    gap: var(--space-5);
    align-items: stretch;
  }

  .avance-resumen-card,
  .avance-resumen-progress {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-sm);
  }

  .avance-resumen-card {
    padding: var(--space-5);
    min-width: 0;
  }

  .avance-resumen-card__title,
  .avance-resumen-progress__title {
    color: var(--brand-green);
    font-size: var(--font-size-sm);
    font-weight: var(--font-weight-bold);
    letter-spacing: .06em;
    text-transform: uppercase;
  }

  .avance-resumen-card__title {
    margin-bottom: var(--space-4);
  }

  .avance-resumen-card__grid {
    display: grid;
    gap: var(--space-3);
  }

  .avance-resumen-card__item {
    display: grid;
    grid-template-columns: 112px minmax(0, 1fr);
    gap: var(--space-3);
    align-items: start;
    font-size: var(--font-size-sm);
    line-height: var(--line-height-tight);
  }

  .avance-resumen-card__item strong {
    color: var(--text);
    font-weight: var(--font-weight-bold);
  }

  .avance-resumen-card__item span {
    color: var(--text-secondary);
    overflow-wrap: anywhere;
  }

  .avance-resumen-progress {
    min-width: 0;
    padding: var(--space-5) var(--space-6);
  }

  .avance-resumen-progress__title {
    text-align: center;
    margin-bottom: var(--space-4);
  }

  /* Modal de hito */
  .avance-modal {
    position: fixed;
    inset: 0;
    z-index: var(--layer-modal);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .avance-modal.is-hidden {
    display: none;
  }

  .avance-modal__backdrop {
    position: absolute;
    inset: 0;
    background: rgba(17, 24, 39, 0.4);
  }

  .avance-modal__dialog {
    position: relative;
    z-index: 2;
    width: min(560px, calc(100vw - 32px));
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    box-shadow: var(--shadow-lg);
    padding: 20px;
  }

  .avance-modal__head {
    display: flex;
    justify-content: space-between;
    align-items: start;
    gap: 12px;
    margin-bottom: 14px;
  }

  .avance-modal__head h3 {
    margin: 0;
    color: var(--brand-blue);
  }

  #avance-modal-org-nombre-field.is-hidden {
    display: none;
  }

  .avance-org-name-input {
    display: grid;
    grid-template-columns: auto minmax(0, 1fr);
    align-items: center;
    gap: var(--space-2);
  }

  .avance-org-name-prefix {
    min-height: 40px;
    display: inline-flex;
    align-items: center;
    padding: 0 var(--space-3);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    background: var(--surface-alt);
    color: var(--text-strong);
    font-size: var(--font-size-sm);
    font-weight: var(--font-weight-bold);
    white-space: nowrap;
  }

  .avance-modal-error {
    margin: var(--space-2) 0 0;
    color: var(--danger);
    font-size: var(--font-size-sm);
    font-weight: var(--font-weight-semibold);
  }

  .avance-modal-error.is-hidden {
    display: none;
  }

  @media (max-width: 1600px) {
    .avance-hitos-grid,
    #avance-pre-grid,
    #avance-for-grid {
      grid-template-columns: repeat(6, minmax(0, 1fr));
    }
  }

  @media (max-width: 1280px) {
    .avance-header {
      grid-template-columns: 1fr;
    }

    .avance-resumen-layout {
      grid-template-columns: minmax(240px, 0.36fr) minmax(0, 1fr);
    }

    .avance-hitos-grid,
    #avance-pre-grid,
    #avance-for-grid {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }
  }

  @media (max-width: 900px) {
    .avance-resumen-layout {
      grid-template-columns: 1fr;
    }

    .avance-hitos-grid,
    #avance-pre-grid,
    #avance-for-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }

  @media (max-width: 640px) {
    .avance-resumen-card,
    .avance-resumen-progress {
      padding: var(--space-4);
    }

    .avance-resumen-card__item {
      grid-template-columns: 1fr;
      gap: 2px;
    }

    .avance-hitos-grid,
    #avance-pre-grid,
    #avance-for-grid {
      grid-template-columns: 1fr;
    }

    .avance-hito-card {
      aspect-ratio: auto;
      min-height: 156px;
    }

    .avance-org-name-input {
      grid-template-columns: 1fr;
    }
  }

  .avance-resumen-bars {
    display: grid;
    gap: var(--space-4);
  }

  .avance-resumen-bar {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    padding: var(--space-4) var(--space-5);
  }

  .avance-resumen-bar__head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: var(--space-4);
    margin-bottom: 8px;
  }

  .avance-resumen-bar__label {
    font-weight: var(--font-weight-bold);
    color: var(--text);
  }

  .avance-resumen-bar__meta {
    font-size: var(--font-size-sm);
    color: var(--text-muted);
  }

  .avance-resumen-bar__row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: var(--space-4);
    align-items: center;
  }

  .avance-resumen-bar__track {
    position: relative;
    width: 100%;
    height: 12px;
    border-radius: var(--radius-pill);
    background: var(--surface-alt);
    overflow: hidden;
  }

  .avance-resumen-bar__fill {
    height: 100%;
    border-radius: var(--radius-pill);
    background: linear-gradient(90deg, var(--brand-green) 0%, var(--brand-blue) 100%);
    transition: width .25s ease;
  }

  .avance-resumen-bar__pct {
    min-width: 48px;
    text-align: right;
    font-weight: var(--font-weight-bold);
    color: var(--text);
  }

  /* Modulo Socios */
  .socios-shell {
    display: grid;
    gap: var(--space-6);
  }

  .socios-head {
    align-items: center;
  }

  .socios-actions {
    display: flex;
    gap: var(--space-3);
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .socios-layout {
    --socios-panel-min-height: 560px;
    --socios-panel-max-height: 650px;
    --socios-panel-height: clamp(var(--socios-panel-min-height), 70vh, var(--socios-panel-max-height));
    display: grid;
    grid-template-columns: minmax(280px, 1fr) minmax(0, 3fr);
    gap: var(--space-5);
    align-items: stretch;
  }

  .socios-data-panel {
    min-width: 0;
    min-height: var(--socios-panel-min-height);
    height: var(--socios-panel-height);
    max-height: var(--socios-panel-max-height);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    box-shadow: var(--shadow-md);
    padding: var(--space-5);
    display: grid;
    grid-template-rows: auto 1fr;
    gap: var(--space-4);
    overflow: hidden;
  }

  .socios-panel__head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: var(--space-4);
  }

  .socios-panel__head h3,
  .socios-detail-field strong {
    margin: 0;
  }

  .socios-panel__head p {
    margin: 4px 0 0;
  }

  .socios-panel__count {
    min-width: 42px;
    height: 42px;
    padding: 0 12px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 999px;
    background: var(--badge-bg);
    color: var(--badge-fg);
    font-size: var(--font-size-lg);
    font-weight: var(--font-weight-bold);
  }

  .socios-table-panel {
    grid-template-rows: auto auto 1fr;
  }

  .socios-dashboard-panel {
    grid-template-rows: auto 1fr;
  }

  .socios-table-toolbar {
    display: grid;
    gap: var(--space-2);
  }

  .socios-search-field {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    padding: 0 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    background: var(--surface-soft);
    transition: border-color .2s ease, box-shadow .2s ease, background .2s ease;
  }

  .socios-search-field:focus-within {
    border-color: var(--brand-blue);
    box-shadow: 0 0 0 3px var(--brand-blue-soft);
    background: var(--surface);
  }

  .socios-search-field .material-symbols-outlined {
    color: var(--text-muted);
    font-size: 20px;
  }

  .socios-search-field input {
    min-height: 46px;
    padding: 0;
    border: 0;
    background: transparent;
    box-shadow: none;
  }

  .socios-search-field input:focus {
    outline: none;
  }

  .socios-table__summary {
    margin: 0;
    font-size: var(--font-size-sm);
  }

  .socios-table-wrap {
    height: 100%;
    min-height: 0;
    overflow: auto;
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    background: var(--surface-soft);
  }

  .socios-table {
    width: 100%;
    border-collapse: collapse;
  }

  .socios-table th,
  .socios-table td {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    text-align: left;
    vertical-align: middle;
    background: var(--surface);
  }

  .socios-table thead th {
    position: sticky;
    top: 0;
    z-index: 1;
    background: var(--surface-alt);
    color: var(--text-secondary);
    font-size: var(--font-size-sm);
  }

  .socios-table__name {
    font-weight: var(--font-weight-bold);
    color: var(--text);
    margin-bottom: 2px;
  }

  .socios-table td small {
    color: var(--text-muted);
  }

  .socios-table__action-cell {
    width: 72px;
    text-align: right;
  }

  .socios-table__action-btn {
    width: 34px;
    height: 34px;
  }

  .socios-table__empty {
    text-align: center;
    color: var(--text-muted);
    padding: var(--space-6);
  }

  .socios-embed-panel {
    display: flex;
    height: 100%;
    min-height: 0;
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    overflow: hidden;
  }

  .socios-embed {
    display: block;
    width: 100%;
    height: 100%;
    min-height: 100%;
    border: 0;
    overflow: hidden;
  }

  .socios-embed--empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: var(--space-3);
    padding: var(--space-7);
    text-align: center;
    color: var(--text-muted);
    background: linear-gradient(135deg, var(--brand-blue-soft), var(--surface));
  }

  .socios-embed--empty .material-symbols-outlined {
    color: var(--brand-blue);
    font-size: 44px;
  }

  .socios-embed--empty strong {
    color: var(--text);
  }

  .socios-preview {
    display: grid;
    gap: var(--space-4);
  }

  .socios-modal {
    position: fixed;
    inset: 0;
    z-index: var(--layer-modal);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .socios-modal.is-hidden {
    display: none;
  }

  .socios-modal__backdrop {
    position: absolute;
    inset: 0;
    background: rgba(17, 24, 39, 0.4);
  }

  .socios-modal__dialog {
    position: relative;
    z-index: 2;
    width: min(720px, calc(100vw - 32px));
    max-height: calc(100vh - 32px);
    overflow: auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    box-shadow: var(--shadow-lg);
    padding: var(--space-7);
  }

  .socios-modal__dialog--detail {
    width: min(920px, calc(100vw - 32px));
  }

  .socios-modal__head {
    display: flex;
    justify-content: space-between;
    align-items: start;
    gap: var(--space-4);
    margin-bottom: var(--space-5);
  }

  .socios-modal__head h3 {
    margin: 0;
    color: var(--brand-blue);
  }

  .socios-manual-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: var(--space-4);
  }

  .socios-manual-grid .field--half,
  .socios-manual-grid .field--full {
    width: 100%;
    display: flex;
  }

  .socios-manual-grid .field--full {
    grid-column: 1 / -1;
  }

  .socios-manual-message {
    margin: var(--space-4) 0 0;
    padding: var(--space-3) var(--space-4);
    border: 1px solid var(--success);
    border-radius: var(--radius-lg);
    background: var(--success-soft);
    color: var(--success-dark);
    font-weight: var(--font-weight-bold);
  }

  .socios-manual-message.is-hidden {
    display: none;
  }

  .socios-manual-feedback {
    margin: var(--space-4) 0 0;
    padding: var(--space-3) var(--space-4);
    border-radius: var(--radius-lg);
    font-weight: var(--font-weight-bold);
  }

  .socios-manual-feedback--error {
    border: 1px solid var(--danger);
    background: var(--danger-soft);
    color: var(--danger);
  }

  .socios-manual-feedback--loading {
    border: 1px solid var(--brand-blue);
    background: var(--brand-blue-soft);
    color: var(--brand-blue-dark);
  }

  .socios-manual-feedback.is-hidden {
    display: none;
  }

  .socios-detail-card {
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    background: var(--surface-soft);
    padding: var(--space-4);
  }

  .socios-detail-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: var(--space-3);
  }

  .socios-detail-field {
    padding: var(--space-4);
    border-radius: var(--radius-lg);
    background: var(--surface);
    border: 1px solid var(--border);
    display: grid;
    gap: 6px;
    align-content: start;
  }

  .socios-detail-field span {
    color: var(--text-muted);
    font-size: var(--font-size-xs);
    font-weight: var(--font-weight-bold);
    text-transform: uppercase;
    letter-spacing: .05em;
  }

  @media (max-width: 900px) {
    .socios-head {
      align-items: flex-start;
    }

    .socios-actions {
      width: 100%;
      justify-content: flex-start;
    }

    .socios-layout {
      --socios-panel-min-height: 460px;
      --socios-panel-max-height: 560px;
      --socios-panel-height: clamp(var(--socios-panel-min-height), 68vh, var(--socios-panel-max-height));
      grid-template-columns: 1fr;
    }

    .socios-data-panel {
      min-height: var(--socios-panel-min-height);
      height: var(--socios-panel-height);
      max-height: var(--socios-panel-max-height);
    }
  }

  @media (max-width: 640px) {
    .inicio-summary-grid {
      grid-template-columns: 1fr;
    }

    .inicio-dashboard-head {
      align-items: flex-start;
      flex-direction: column;
    }

    .inicio-dashboard-panel {
      --inicio-dashboard-height: 500px;
    }

    .socios-modal__dialog {
      padding: var(--space-5);
    }

    .socios-detail-grid,
    .socios-manual-grid {
      grid-template-columns: 1fr;
    }
  }

  /* Modulo Organizaciones */
  .organizaciones-shell {
    display: grid;
    gap: var(--space-6);
  }

  .organizaciones-head,
  .organizaciones-summary {
    align-items: center;
  }

  .organizaciones-actions {
    display: flex;
    gap: var(--space-3);
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .organizaciones-age-card {
    display: grid;
    align-content: center;
    align-self: stretch;
    min-width: 0;
    padding: 12px 14px;
    text-align: left;
    border-radius: var(--radius-xl);
    background: linear-gradient(180deg, var(--surface-soft) 0%, var(--surface-alt) 100%);
    border: 1px solid color-mix(in srgb, var(--accent) 14%, var(--border));
  }

  .organizaciones-age-card span {
    display: block;
    color: var(--text-muted);
    font-size: var(--font-size-xs);
    font-weight: var(--font-weight-bold);
    letter-spacing: .06em;
    text-transform: uppercase;
  }

  .organizaciones-age-card strong {
    display: block;
    margin-top: 4px;
    color: var(--brand-blue-dark);
    font-size: 18px;
    line-height: var(--line-tight);
  }

  .organizaciones-age-card small {
    margin-top: 6px;
    color: var(--text-muted);
    font-size: 11px;
    line-height: 1.25;
  }

  .organizaciones-selector-panel {
    display: flex;
    align-items: end;
    gap: var(--space-4);
  }

  .organizaciones-detail {
    display: grid;
    gap: var(--space-4);
  }

  .organizaciones-hero-card {
    display: grid;
    grid-template-columns: 88px minmax(0, 1.1fr) minmax(420px, 0.9fr);
    gap: var(--space-5);
    align-items: stretch;
    padding: 14px 18px;
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    background: linear-gradient(180deg, color-mix(in srgb, var(--surface) 88%, var(--accent-soft)) 0%, var(--surface) 100%);
    box-shadow: var(--shadow-sm);
    margin-bottom: 10px;
  }

  .organizaciones-hero-card__icon {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 76px;
    height: 76px;
    border-radius: var(--radius-xl);
    background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 16%, var(--surface)) 0%, color-mix(in srgb, var(--accent) 7%, var(--surface-soft)) 100%);
    border: 1px solid color-mix(in srgb, var(--accent) 20%, var(--border));
    box-shadow: inset 0 0 0 1px color-mix(in srgb, #ffffff 4%, transparent);
  }

  .organizaciones-hero-card__icon .material-symbols-outlined {
    font-size: 34px;
    color: var(--accent);
  }

  .organizaciones-hero-card__main {
    display: grid;
    align-content: center;

    flex-shrink: 0;

  .cal-coincidencias__content { display: flex; flex-direction: column; gap: 0.4rem; }
  .cal-coincidencias__match {

    align-items: center;
    justify-content: space-between;
    gap: 0.5rem;

  .cal-coincidencias__match-info span   { color: var(--text-muted); font-size: 0.74rem; }
  .cal-coincidencias__loading,
  .cal-coincidencias__empty {
    font-size: 0.8rem;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 0.35rem;

  /* ===== Organizaciones — tarjetas y stepper (GO-PES v2) ===== */
  .org-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1rem;
    padding-bottom: 2rem;
  }

  .org-card {
    padding: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .org-card__header { padding: 1rem 1rem 0.75rem; }
  .org-card__title-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 0.5rem;
    margin-bottom: 0.5rem;
  }
  .org-card__title {
    margin: 0;
    font-size: 0.95rem;
    line-height: 1.4;
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;

    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.15rem 0.75rem;

  .org-card__badge {
    font-size: 0.68rem;
    font-weight: 700;
    padding: 2px 9px;
    border-radius: 10px;
    white-space: nowrap;

  .org-card__badge--suspendida{ background: #fef3c7; color: #d97706; }
  .org-card__badge--inactivo  { background: #fee2e2; color: #dc2626; }
  .org-card__badge--proceso   { background: var(--runtime-brand-primary, #3D96B4); color: #fff; }

  .org-card__avance {
    padding: 0.6rem 1rem;
    border-top: 1px solid var(--border);
    background: var(--surface-2);
  }
  .org-card__avance-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.5rem;
  }
  .org-card__avance-label {
    font-size: 0.69rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
  }
  .org-card__avance-count {
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--primary, #3D96B4);
  }

  .org-card__stepper      { display: flex; flex-direction: column; }
  .org-card__stepper-gap  { height: 5px; }
  .org-card__stepper-row  { display: flex; align-items: center; }
  .org-card__stepper-label {
    font-size: 0.63rem;
    font-weight: 700;
    color: var(--text-muted);
    min-width: 22px;
    margin-right: 5px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .org-card__stepper-track { flex: 1; display: flex; align-items: center; }

  .org-step-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    flex-shrink: 0;
    cursor: default;
    font-weight: 700;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .org-step-dot--lg { font-size: 7px; }
  .org-step-dot--sm { font-size: 5.5px; }
  .org-step-dot--done    { background: #8CC63F; color: #fff; border: none; }
  .org-step-dot--current { background: var(--runtime-brand-primary, #3D96B4); color: #fff; border: 2px solid var(--runtime-brand-primary, #3D96B4); }
  .org-step-dot--pending { background: transparent; color: var(--text-muted); border: 1.5px solid var(--border, #D6E0EA); }

  .org-step-line          { flex: 1; height: 2px; }
  .org-step-line--done    { background: #8CC63F; }
  .org-step-line--pending { background: var(--border, #D6E0EA); }

  .org-card__footer { padding: 0.75rem 1rem; border-top: 1px solid var(--border); }

  .org-chip-btn--active {
    background: var(--runtime-brand-primary, #3D96B4);
    color: #fff;
    border-color: var(--runtime-brand-primary, #3D96B4);
  }

  /* ========================================
     ACCESIBILIDAD (A11Y)
     Añadido: 2026-05-31 - Fase 1 Frontend
     ======================================== */

  /**
   * Screen Reader Only
   * Oculta visualmente pero mantiene accesible para lectores de pantalla
   */
  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }

  /**
   * Versión focusable de sr-only (útil para skip links)
   */
  .sr-only-focusable:not(:focus):not(:focus-within) {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }

/* System Info Modal */

.system-info-value { font-size: 0.85rem; font-weight: 500; word-break: break-all; }
.system-info-ok { color: #007C4A; } .system-info-fail { color: #c0392b; }
.sysinfo-dev-panel { margin-top: 20px; border-top: 2px solid var(--runtime-brand-secondary, #8CC63F); padding-top: 14px; }
.sysinfo-dev-eyebrow { margin: 0 0 12px; font-size: .67rem; font-weight: 700; color: var(--runtime-brand-secondary, #8CC63F); text-transform: uppercase; letter-spacing: .08em; display: flex; align-items: center; gap: 5px; }
.sysinfo-dev-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; margin-bottom: 12px; }
.sysinfo-dev-stat { background: var(--surface-alt, #f7fafc); border-radius: 8px; padding: 8px 6px; text-align: center; }
.sysinfo-dev-val { display: block; font-size: 1rem; font-weight: 700; color: var(--text, #24364B); letter-spacing: -.01em; }
.sysinfo-dev-lbl { display: block; font-size: .62rem; color: var(--text-muted, #6b7a8d); margin-top: 2px; line-height: 1.3; }
.sysinfo-dev-value-box { background: rgba(140,198,63,.11); border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; }
@supports (color-mix(in srgb, red, blue)) {

}
.sysinfo-dev-value-label { font-size: .67rem; font-weight: 700; color: var(--runtime-brand-secondary, #8CC63F); text-transform: uppercase; letter-spacing: .06em; display: block; margin-bottom: 4px; }
.sysinfo-dev-value-main { font-size: 1.08rem; font-weight: 700; color: var(--text, #24364B); }
.sysinfo-dev-value-uf { font-size: .78rem; font-weight: 500; color: var(--text-muted, #6b7a8d); }
.sysinfo-dev-value-ref { font-size: .7rem; color: var(--text-muted, #6b7a8d); margin-top: 3px; }

/* Módulo Historial */
.hist-filter-bar { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 16px; }
.hist-filter-bar .field { margin-bottom: 0; }
.hist-chips { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
.hist-chip { background: var(--surface, #fff); border: 1px solid var(--border, #D6E0EA); border-radius: 10px; padding: 10px 16px; min-width: 110px; }
.hist-chip__label { font-size: 0.72rem; color: var(--text-muted, #6b7a8d); text-transform: uppercase; letter-spacing: 0.05em; }
.hist-chip__value { font-size: 1.5rem; font-weight: 700; line-height: 1.2; color: var(--text, #24364B); }
.hist-chip--acciones .hist-chip__value { color: #214E8A; }
.hist-chip--accesos .hist-chip__value { color: #007C4A; }
.hist-chip--errores .hist-chip__value { color: #c0392b; }
.hist-table-wrap { max-height: 520px; overflow-y: auto; border: 1px solid var(--border, #D6E0EA); border-radius: 8px; }
.hist-table-wrap table { width: 100%; border-collapse: collapse; }
.hist-table-wrap thead th { position: sticky; top: 0; background: var(--surface-alt, #f7fafc); z-index: 1; padding: 10px 12px; text-align: left; font-size: 0.78rem; font-weight: 600; color: var(--text-muted, #6b7a8d); border-bottom: 1px solid var(--border, #D6E0EA); white-space: nowrap; }
.hist-table-wrap tbody td { padding: 8px 12px; font-size: 0.82rem; border-bottom: 1px solid var(--border, #EAF0F5); vertical-align: top; }
.hist-table-wrap tbody tr:last-child td { border-bottom: none; }
.hist-counter { font-size: 0.8rem; color: var(--text-muted, #6b7a8d); margin-bottom: 8px; }
.hist-badge { border-radius: 20px; }
.hist-badge--accion { background: #dce8f7; color: #214E8A; }
.hist-badge--proc { background: #e8f5e9; color: #007C4A; }
.hist-badge--acceso { background: #ede8fb; color: #5c3d99; }
.hist-badge--ok { background: #d4edda; color: #155724; }
.hist-badge--error { background: #fde8e8; color: #c0392b; }
.hist-badge--warn { background: #fff3cd; color: #856404; }
.hist-detail { max-width: 240px; white-space: normal; word-break: break-word; color: var(--text-muted, #6b7a8d); }
html[data-theme="dark"] .hist-chip--acciones .hist-chip__value { color: var(--info, #74c8e6); }
html[data-theme="dark"] .hist-chip--accesos .hist-chip__value { color: var(--success, #9fd85a); }
html[data-theme="dark"] .hist-chip--errores .hist-chip__value { color: #f5a3a3; }
html[data-theme="dark"] .hist-badge--accion { background: var(--info-soft, #163243); color: var(--info, #74c8e6); }
html[data-theme="dark"] .hist-badge--proc { background: var(--success-soft, #21311a); color: var(--success, #9fd85a); }
html[data-theme="dark"] .hist-badge--acceso { background: #221c3a; color: #b89af5; }
html[data-theme="dark"] .hist-badge--ok { background: var(--success-soft, #21311a); color: var(--success, #9fd85a); }
html[data-theme="dark"] .hist-badge--error { background: var(--danger-soft, #311b22); color: var(--alert-danger-fg, #ffd7d2); }
html[data-theme="dark"] .hist-badge--warn { background: var(--warning-soft, #352815); color: var(--alert-warning-fg, #ffd98a); }

/* Módulo Usuarios */
.panel .user-edit-layout { max-width: none; grid-template-columns: 1fr 2fr; }
.module-check__desc { font-size: 0.72rem; color: var(--text-muted, #6b7a8d); margin: 2px 0 4px; line-height: 1.35; }

/* Toast notifications */
#toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9998; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
.go-toast { display: flex; align-items: flex-start; gap: 10px; padding: 11px 14px; border-radius: 8px; min-width: 240px; max-width: 360px; font-size: .84rem; font-weight: 500; box-shadow: 0 3px 16px rgba(0,0,0,.13); pointer-events: all; animation: toastSlideIn .2s ease; line-height: 1.4; }
.go-toast__icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
.go-toast__body { flex: 1; }
.go-toast__close { background: none; border: none; cursor: pointer; opacity: .55; padding: 0; line-height: 1; color: inherit; display: flex; align-items: center; flex-shrink: 0; }
.go-toast__close:hover { opacity: 1; }
.go-toast--error { background: #fde8e8; color: #7a1f1f; border-left: 4px solid #c0392b; }
.go-toast--success { background: #e6f4ec; color: #0b4d2a; border-left: 4px solid #007C4A; }
.go-toast--session { background: #fff8e1; color: #6d4c00; border-left: 4px solid #f9a825; }
.go-toast--out { animation: toastSlideOut .18s ease forwards; }
@keyframes toastSlideIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
@keyframes toastSlideOut { to { opacity:0; transform:translateY(8px); } }
html[data-theme="dark"] .go-toast--error { background: var(--danger-soft,#311b22); color: var(--alert-danger-fg,#ffd7d2); border-left-color: #e05555; }
html[data-theme="dark"] .go-toast--success { background: var(--success-soft,#21311a); color: var(--success,#9fd85a); border-left-color: var(--success,#9fd85a); }
html[data-theme="dark"] .go-toast--session { background: var(--warning-soft,#352815); color: var(--alert-warning-fg,#ffd98a); border-left-color: #f9a825; }

/* Session expired overlay */
#session-expired-overlay { position: fixed; inset: 0; z-index: 10000; background: rgba(0,0,0,.6); display: flex; align-items: center; justify-content: center; padding: 20px; }
#session-expired-overlay.is-hidden { display: none; }
.session-expired-dialog { background: var(--surface,#fff); border-radius: 12px; padding: 32px 28px; max-width: 380px; width: 100%; text-align: center; box-shadow: 0 8px 40px rgba(0,0,0,.22); }
.session-expired-icon { font-size: 2.4rem; color: #e6a817; display: block; margin-bottom: 12px; }
.session-expired-dialog h3 { margin: 0 0 8px; font-size: 1.1rem; color: var(--text,#24364B); }
.session-expired-dialog p { font-size: .87rem; color: var(--text-muted,#6b7a8d); margin: 0 0 20px; line-height: 1.5; }

/* Pagination */
.go-pager { display: flex; align-items: center; gap: 6px; padding: 8px 2px 0; flex-wrap: wrap; }
.go-pager__btn { background: var(--surface,#fff); border: 1px solid var(--border,#D6E0EA); border-radius: 6px; padding: 4px 10px; font-size: .78rem; cursor: pointer; color: var(--text,#24364B); line-height: 1.4; }
.go-pager__btn:hover:not(:disabled) { background: var(--surface-alt,#f7fafc); }
.go-pager__btn--active { background: var(--runtime-brand-primary,#3D96B4); border-color: var(--runtime-brand-primary,#3D96B4); color: #fff; font-weight: 600; }
.go-pager__btn:disabled { opacity: .4; cursor: default; }
.go-pager__info { font-size: .78rem; color: var(--text-muted,#6b7a8d); margin: 0 4px; }
html[data-theme="dark"] .go-pager__btn { background: var(--surface,#14202d); border-color: var(--border,#294356); }
html[data-theme="dark"] .go-pager__btn:hover:not(:disabled) { background: var(--surface-alt,#182635); }
html[data-theme="dark"] .go-pager__btn--active { background: var(--runtime-brand-primary,#3D96B4); border-color: var(--runtime-brand-primary,#3D96B4); color: #fff; }

/* Inline field errors */
.field-error { display: block; font-size: .74rem; color: #c0392b; margin-top: 3px; line-height: 1.3; }
.field-error:empty { display: none; }
.field.has-error > input, .field.has-error > select, .field.has-error > textarea { border-color: #c0392b; }
html[data-theme="dark"] .field-error { color: #f5a3a3; }
html[data-theme="dark"] .field.has-error > input, html[data-theme="dark"] .field.has-error > select, html[data-theme="dark"] .field.has-error > textarea { border-color: #e05555; }

/* Reactivar usuario */
.table-action-btn--success { color: var(--success,#1a7a42); border-color: var(--success-btn-border,#b5dfc8); }
.table-action-btn--success:hover { background: var(--success-soft,#eaf6ef); }
html[data-theme="dark"] .table-action-btn--success { color: var(--success,#9fd85a); border-color: var(--success,#9fd85a); }
html[data-theme="dark"] .table-action-btn--success:hover { background: var(--success-soft,#1e3012); }

/* Dashboard v2 — grids, tendencias, gauges, tablas */
.dash-kpi__trend{display:inline-flex;align-items:center;gap:2px;font-size:.67rem;font-weight:600;padding:2px 5px;border-radius:10px;margin-top:3px;line-height:1.2}

.dash-kpi__trend--down{color:#cb2431;background:rgba(203,36,49,.08)}
.dash-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px}
.dash-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.dash-gauge-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;padding:4px 0}
.dash-gauge-item{display:flex;flex-direction:column;align-items:center;gap:4px}
.dash-gauge-svg{width:86px;height:86px;flex-shrink:0}
.dash-gauge-bg{fill:none;stroke:var(--border,#D6E0EA);stroke-width:7}
.dash-gauge-arc{fill:none;stroke-width:7;stroke-linecap:round}
.dash-gauge-num{font-size:14px;font-weight:700;fill:var(--text,#24364B)}
.dash-gauge-sub{font-size:9px;fill:var(--text-muted,#6b7a8d)}
.dash-gauge-label{font-size:.68rem;color:var(--text-muted,#6b7a8d);text-align:center;line-height:1.2;max-width:82px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dash-line-wrap{display:flex;flex-direction:column;gap:8px;width:100%}
.dash-line-svg{width:100%;height:auto;overflow:visible;display:block}
.dash-line-legend{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.dash-line-leg-item{display:flex;align-items:center;gap:5px;font-size:.75rem;color:var(--text-muted,#6b7a8d)}
.dash-line-leg-dot{width:12px;height:3px;border-radius:2px;flex-shrink:0}
.dash-bstat-grid{display:grid;grid-template-columns:1fr;gap:8px;width:100%;padding:4px 0}
.dash-bstat-card{border:1px solid;border-radius:8px;padding:11px 13px;display:flex;flex-direction:column;gap:2px}
.dash-bstat-header{display:flex;align-items:center;gap:6px;font-size:.78rem;font-weight:600}
.dash-bstat-header .material-symbols-outlined{font-size:1rem}
.dash-bstat-num{font-size:1.55rem;font-weight:700;color:var(--text,#24364B);line-height:1}
.dash-bstat-pct{font-size:.73rem;color:var(--text-muted,#6b7a8d)}
.dash-bstat-sub{font-size:.67rem;color:var(--text-muted,#6b7a8d)}
.dash-bstat-card--vigente{border-color:#22863a !important;background:rgba(34,134,58,.07) !important}
.dash-bstat-card--vigente .dash-bstat-header{color:#22863a}
.dash-bstat-card--por-vencer{border-color:#b36a00 !important;background:rgba(179,106,0,.07) !important}
.dash-bstat-card--por-vencer .dash-bstat-header{color:#b36a00}
.dash-bstat-card--atrasado{border-color:#cb2431 !important;background:rgba(203,36,49,.07) !important}
.dash-bstat-card--atrasado .dash-bstat-header{color:#cb2431}
.dash-tables-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:4px}
.dash-table-card{background:var(--surface,#fff);border:1px solid var(--border,#D6E0EA);border-radius:8px;overflow:hidden;display:flex;flex-direction:column}
.dash-table-card__head{padding:9px 13px 7px;border-bottom:1px solid var(--border,#D6E0EA);flex-shrink:0}
.dash-table-card__head h4{margin:0;font-size:.83rem;color:var(--text,#24364B);font-weight:600}
.dash-table-card__body{overflow:auto;max-height:210px;flex:1}
.dash-table{width:100%;border-collapse:collapse;font-size:.77rem}
.dash-table th{padding:6px 10px;text-align:left;font-size:.68rem;font-weight:600;color:var(--text-muted,#6b7a8d);text-transform:uppercase;letter-spacing:.03em;border-bottom:1px solid var(--border,#D6E0EA);position:sticky;top:0;background:var(--surface,#fff);z-index:1}
.dash-table td{padding:6px 10px;border-bottom:1px solid var(--border,#D6E0EA);color:var(--text,#24364B);vertical-align:middle}
.dash-table tr:last-child td{border-bottom:none}
.dash-table tr:hover td{background:var(--surface-alt,#f4f6f9)}
.dash-priority-badge{padding:2px 7px;font-size:.7rem}
.dash-status-pill{display:inline-block;padding:2px 7px;border-radius:10px;font-size:.7rem;background:var(--surface-alt,#f0f4f8);color:var(--text,#24364B)}
html[data-theme="dark"] .dash-kpi__trend--up{color:#56d364;background:rgba(86,211,100,.12)}
html[data-theme="dark"] .dash-kpi__trend--down{color:#f85149;background:rgba(248,81,73,.1)}
html[data-theme="dark"] .dash-gauge-bg{stroke:var(--border,#294356)}
html[data-theme="dark"] .dash-gauge-num{fill:var(--text,#d4e4f0)}
html[data-theme="dark"] .dash-gauge-sub{fill:var(--text-muted,#7a9ab5)}
html[data-theme="dark"] .dash-bstat-num{color:var(--text,#d4e4f0)}
html[data-theme="dark"] .dash-bstat-card--vigente{background:rgba(34,134,58,.16) !important;border-color:#3fb950 !important}
html[data-theme="dark"] .dash-bstat-card--vigente .dash-bstat-header{color:#3fb950}
html[data-theme="dark"] .dash-bstat-card--por-vencer{background:rgba(179,106,0,.16) !important;border-color:#e3b341 !important}
html[data-theme="dark"] .dash-bstat-card--por-vencer .dash-bstat-header{color:#e3b341}
html[data-theme="dark"] .dash-bstat-card--atrasado{background:rgba(203,36,49,.16) !important;border-color:#f85149 !important}
html[data-theme="dark"] .dash-bstat-card--atrasado .dash-bstat-header{color:#f85149}
html[data-theme="dark"] .dash-table-card{background:var(--surface,#14202d);border-color:var(--border,#294356)}
html[data-theme="dark"] .dash-table-card__head{border-bottom-color:var(--border,#294356)}
html[data-theme="dark"] .dash-table-card__head h4{color:var(--text,#d4e4f0)}
html[data-theme="dark"] .dash-table th{background:var(--surface,#14202d);color:var(--text-muted,#7a9ab5);border-bottom-color:var(--border,#294356)}
html[data-theme="dark"] .dash-table td{color:var(--text,#d4e4f0);border-bottom-color:var(--border,#1e3040)}
html[data-theme="dark"] .dash-table tr:hover td{background:var(--surface-alt,#182635)}
html[data-theme="dark"] .dash-status-pill{background:var(--surface-alt,#182635);color:var(--text,#d4e4f0)}

/* ========================================
   DASHBOARD RESPONSIVE — Fase 4.1
   Media queries para tablet y mobile
   ======================================== */

/* Tablet: 768px - 1199px */
@media (max-width: 1199px) {
  .dash-kpi-row {
    grid-template-columns: repeat(3, 1fr);
  }

  .dash-grid-3 {
    grid-template-columns: 1fr 1fr;
  }

  .dash-tables-row {
    grid-template-columns: 1fr;
  }

  .dash-gauge-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

/* Mobile: < 768px */
@media (max-width: 767px) {
  .dash-kpi-row {
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }

  .dash-kpi {
    flex-direction: column;
    align-items: flex-start;
    gap: 6px;
    padding: 10px;
  }

  .dash-kpi__icon {
    font-size: 1.1rem;
  }

  .dash-kpi__value {
    font-size: 1.1rem;
  }

  .dash-kpi__label {
    font-size: 0.7rem;
    white-space: normal;
  }

  .dash-grid-3,
  .dash-grid-2 {
    grid-template-columns: 1fr;
    gap: 10px;
  }

  .dash-tables-row {
    grid-template-columns: 1fr;
    gap: 10px;
  }

  .dash-table-card__body {
    max-height: 180px;
  }

  .dash-gauge-grid {
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }

  .dash-gauge-svg {
    width: 70px;
    height: 70px;
  }

  .dash-gauge-label {
    font-size: 0.65rem;
    max-width: 70px;
  }

  .dash-donut-wrap {
    flex-direction: column;
  }

  .dash-donut-svg {
    width: 150px;
    height: 150px;
  }
}

/* Mobile pequeño: < 480px */
@media (max-width: 479px) {
  .dash-kpi-row {
    grid-template-columns: 1fr;
  }

  .dash-gauge-grid {
    grid-template-columns: 1fr;
  }
}

/* ========================================
   TABLAS RESPONSIVE — Fase 4.2
   Card layout en mobile para tablas data
   ======================================== */

@media (max-width: 767px) {
  /* Tablas generales: convertir a cards */
  .data-table thead {
    position: absolute;
    clip: rect(0, 0, 0, 0);
    height: 1px;
    width: 1px;
    margin: -1px;
    padding: 0;
    overflow: hidden;
    border: 0;
  }

  .data-table tbody tr {
    display: block;
    margin-bottom: 12px;
    border: 1px solid var(--border, #D6E0EA);
    border-radius: 8px;
    background: var(--surface, #fff);
  }

  .data-table tbody td {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border, #EAF0F5);
    text-align: right;
    min-height: 40px;
  }

  .data-table tbody td:last-child {
    border-bottom: none;
  }

  .data-table tbody td::before {
    content: attr(data-label);
    font-weight: 600;
    text-align: left;
    padding-right: 12px;
    flex-shrink: 0;
    color: var(--text-muted, #6b7a8d);
    font-size: 0.85rem;
  }

  /* Tablas del dashboard ya son responsive por grid */
  .dash-table {
    font-size: 0.7rem;
  }

  .dash-table th,
  .dash-table td {
    padding: 5px 8px;
  }

  /* Tabla de búsqueda */
  .buscar-table-wrap {
    overflow-x: auto;
  }

  /* Tabla de organizaciones */
  .organizaciones-table tbody td {
    display: flex;
    justify-content: space-between;
    padding: 10px 12px;
  }

  .organizaciones-table tbody td::before {
    content: attr(data-label);
    font-weight: 600;
    color: var(--text-muted, #6b7a8d);
  }

  /* Tabla de socios */
  .socios-table tbody tr {
    display: block;
    margin-bottom: 10px;
    border: 1px solid var(--border, #D6E0EA);
    border-radius: 6px;
  }

  .socios-table tbody td {
    display: flex;
    justify-content: space-between;
    padding: 8px 12px;
  }

  .socios-table tbody td::before {
    content: attr(data-label);
    font-weight: 600;
    color: var(--text-muted, #6b7a8d);
  }

  /* Tabla de usuarios */
  .users-table tbody tr {
    display: block;
    margin-bottom: 10px;
    border-radius: 6px;
  }

  .users-table tbody td {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 12px;
  }

  .users-table tbody td::before {
    content: attr(data-label);
    font-weight: 600;
    color: var(--text-muted, #6b7a8d);
  }

  /* Botones de acción en tablas */
  .table-action-btn {
    font-size: 0.75rem;
    padding: 4px 8px;
  }

  .table-action-btn .material-symbols-outlined {
    font-size: 0.9rem;
  }
}

/* Calendario de reuniones — Módulo Inicio */
.inicio-cal-card{margin-top:0}
.inicio-cal-loading{display:flex;align-items:center;justify-content:center;padding:20px;color:var(--text-muted,#6b7a8d)}
.inicio-cal-empty{display:flex;flex-direction:column;align-items:center;gap:6px;padding:20px 12px;color:var(--text-muted,#6b7a8d);font-size:.82rem;text-align:center}
.inicio-cal-empty .material-symbols-outlined{font-size:1.6rem;opacity:.45}
.inicio-cal-list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:0}
.inicio-cal-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid var(--border,#D6E0EA)}
.inicio-cal-item:last-child{border-bottom:none}
.inicio-cal-day{display:flex;flex-direction:column;align-items:center;width:38px;flex-shrink:0;text-align:center;border-radius:8px;padding:4px 2px;transition:background .12s}
.inicio-cal-day.inicio-cal-badge--reunion .inicio-cal-num{color:#3D96B4}
.inicio-cal-day.inicio-cal-badge--ministro .inicio-cal-num{color:#5c8c1e}
.inicio-cal-diasem{font-size:.62rem;font-weight:600;color:var(--text-muted,#6b7a8d);text-transform:uppercase;letter-spacing:.04em}
.inicio-cal-num{font-size:1.1rem;font-weight:700;color:var(--text,#24364B);line-height:1.1}
.inicio-cal-mes{font-size:.6rem;color:var(--text-muted,#6b7a8d);text-transform:uppercase}
.inicio-cal-body{flex:1;min-width:0}
.inicio-cal-titulo-row{display:flex;align-items:center;gap:6px;min-width:0;margin-bottom:2px}
.inicio-cal-titulo{margin:0;font-size:.8rem;font-weight:600;color:var(--text,#24364B);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.inicio-cal-meta{margin:2px 0 0;font-size:.72rem;color:var(--text-muted,#6b7a8d);display:flex;gap:6px;flex-wrap:wrap}
.inicio-cal-lugar::before{content:"· "}
.inicio-cal-badge{flex-shrink:0;display:inline-flex;padding:2px 7px;font-size:.65rem;font-weight:700;letter-spacing:.03em}
.inicio-cal-badge--reunion{background:rgba(61,150,180,.15);color:#3D96B4}
.inicio-cal-badge--ministro{background:rgba(140,198,63,.15);color:#5c8c1e}
.inicio-cal-footer{margin:6px 12px 8px;font-size:.68rem;color:var(--text-muted,#6b7a8d);display:flex;align-items:center;gap:4px}
.inicio-cal-footer .material-symbols-outlined{font-size:.85rem}
.inicio-cal-meta-row{display:flex;align-items:center;gap:4px}
.inicio-cal-meta{flex:1;margin:2px 0 0}
.inicio-cal-action{flex-shrink:0;display:flex;align-items:center;justify-content:center;width:38px;height:38px;border:1px solid var(--border,#D6E0EA);border-radius:6px;background:none;cursor:pointer;color:var(--text-muted,#6b7a8d);transition:background .12s,color .12s,border-color .12s}
.inicio-cal-action:hover:not(:disabled){background:rgba(61,150,180,.12);color:#3D96B4;border-color:#3D96B4}
.inicio-cal-action .material-symbols-outlined{font-size:1.1rem;pointer-events:none}
.inicio-cal-action--pending{cursor:not-allowed;opacity:.38}
html[data-theme="dark"] .inicio-cal-action:hover:not(:disabled){background:rgba(116,200,230,.15);color:#74c8e6;border-color:#74c8e6}
.inicio-cal-card{position:relative}
.inicio-cal-dialog{position:absolute;inset:0;background:var(--surface,#fff);border-radius:inherit;z-index:20;display:flex;align-items:center;justify-content:center;padding:16px}
.inicio-cal-dialog.is-hidden{display:none}
.inicio-cal-dialog__box{width:100%;display:flex;flex-direction:column;gap:12px}
.inicio-cal-dialog__titulo{margin:0;font-size:.78rem;font-weight:600;color:var(--text-muted,#6b7a8d);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.inicio-cal-dialog__q{margin:0;font-size:.88rem;font-weight:600;color:var(--text,#24364B)}
.inicio-cal-dialog__btns{display:flex;flex-wrap:wrap;gap:6px;align-items:center}

.inicio-cal-dialog__input{width:100%;padding:7px 10px;border:1px solid var(--border,#D6E0EA);border-radius:6px;font-size:.88rem;background:var(--surface-alt,#f7fafc);color:var(--text,#24364B);outline:none}

#cal-step-loading{display:flex;align-items:center;justify-content:center;gap:8px;font-size:.82rem;color:var(--text-muted,#6b7a8d)}
html[data-theme="dark"] .inicio-cal-dialog{background:var(--surface,#1a2234)}

html[data-theme="dark"] .inicio-cal-badge--ministro{background:rgba(140,198,63,.2);color:#9fd85a}
html[data-theme="dark"] .inicio-cal-num{color:var(--text,#d4e4f0)}

/* Multi-tab banner */
#multi-tab-banner { position: fixed; top: 0; left: 0; right: 0; z-index: 9995; display: flex; align-items: center; gap: 10px; padding: 9px 16px; background: #fff3cd; color: #664d03; border-bottom: 2px solid #ffc107; font-size: .83rem; font-weight: 500; line-height: 1.4; }
#multi-tab-banner.is-hidden { display: none; }
#multi-tab-banner .material-symbols-outlined { font-size: 1.15rem; flex-shrink: 0; }
#multi-tab-banner__msg { flex: 1; }
#multi-tab-banner__close { background: none; border: none; cursor: pointer; color: inherit; padding: 2px; display: flex; align-items: center; flex-shrink: 0; opacity: .7; }
#multi-tab-banner__close:hover { opacity: 1; }
html[data-theme="dark"] #multi-tab-banner { background: #3a2900; color: #ffd47e; border-bottom-color: #b98900; }

/* Seguimiento de gestiones en Ficha */
